schema_version: 1
phase: '0'
task_id: GF-W1-DSN-002
title: "Specify exact interpretation pack schema with resolution hierarchy and adapter-scoped uniqueness"
owner_role: SUPERVISOR
status: planned
priority: CRITICAL
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY
domain: green_finance
pilot: false

intent: >-
  Replayability is the central promise of the regulatory agility design. Every
  authority decision and lifecycle transition must reference the interpretation
  pack version it was evaluated under, so that later clarifications can be
  applied retrospectively. This only works if the interpretation pack schema
  is exact — every field defined, the uniqueness constraint specified including
  the adapter-scoped case, and the resolution hierarchy locked. Vagueness here
  makes every downstream replayability claim aspirational rather than real.

anti_patterns:
  - "Defining the schema without the adapter-scoped uniqueness variant — breaks methodology-specific overrides"
  - "Leaving resolution order as prose description rather than a queryable constraint"
  - "Conflating jurisdiction-level packs with adapter-specific packs in the same uniqueness rule"

depends_on:
  - GF-W1-DSN-001

blocks:
  - GF-W1-SCH-001

touches:
  - docs/architecture/INTERPRETATION_PACK_SCHEMA.md
  - tasks/GF-W1-DSN-002/meta.yml

invariants:
  - INV-141
  - INV-143

work:
  - >-
    Create docs/architecture/INTERPRETATION_PACK_SCHEMA.md. Specify every
    field: interpretation_pack_id (UUID PK default uuid_v7_or_random()),
    domain (TEXT NOT NULL CHECK IN ('CARBON_MARKET','TAXONOMY',
    'CLAIMS_SUBSTANTIATION','METHODOLOGY')),
    jurisdiction_code (TEXT NOT NULL),
    authority_level (TEXT NOT NULL CHECK IN ('SOVEREIGN','REGULATORY',
    'INTERNAL','DEFAULT')),
    legal_source_reference (TEXT NOT NULL — e.g. 'ZM-SI-5-2026-S3.2'),
    rule_text (TEXT NOT NULL),
    confidence_level (TEXT NOT NULL CHECK IN ('CONFIRMED',
    'PRACTICE_ASSUMED','PENDING_CLARIFICATION')),
    effective_from (TIMESTAMPTZ NOT NULL),
    supersedes_id (UUID NULL FK self-reference — points to the pack this one supersedes),
    adapter_registration_id (UUID NULL FK adapter_registrations),
    dependency_refs (JSONB NULL — list of {source_type, reference, notes}),
    created_at (TIMESTAMPTZ NOT NULL DEFAULT now()),
    created_by (TEXT NOT NULL DEFAULT CURRENT_USER).
  - >-
    Specify the TWO uniqueness constraints:
    Constraint A (global packs): UNIQUE (domain, jurisdiction_code,
    authority_level) WHERE adapter_registration_id IS NULL AND supersedes_id IS NULL.
    Constraint B (adapter-scoped packs): UNIQUE (domain, jurisdiction_code,
    authority_level, adapter_registration_id) WHERE supersedes_id IS NULL
    AND adapter_registration_id IS NOT NULL AND supersedes_id IS NULL.
    Document why both are needed: A ensures one active global rule per domain
    per jurisdiction per authority level. B ensures one active adapter-specific
    override per the same dimensions plus adapter identity.
  - >-
    Specify the deterministic resolution algorithm as an explicit ORDER BY
    query (not prose preferences). The authoritative resolution order is:
    SELECT * FROM interpretation_packs
    WHERE domain = :domain AND jurisdiction_code = :jurisdiction
      AND supersedes_id IS NULL
      AND (adapter_registration_id IS NULL OR adapter_registration_id = :adapter_id)
    ORDER BY
      (adapter_registration_id IS NOT NULL) DESC,
      CASE authority_level
        WHEN 'SOVEREIGN'   THEN 4
        WHEN 'REGULATORY'  THEN 3
        WHEN 'INTERNAL'    THEN 2
        WHEN 'DEFAULT'     THEN 1
      END DESC,
      effective_from DESC
    LIMIT 1.
    Document: adapter-scoped packs always win over global packs at the same
    authority level. Within the same scope, SOVEREIGN=4 > REGULATORY=3 >
    INTERNAL=2 > DEFAULT=1. When two packs tie on all criteria, the most
    recently effective one wins (effective_from DESC).
  - >-
    Specify append-only posture: no UPDATE or DELETE on this table. Supersession
    is expressed by inserting a new pack where supersedes_id points to the
    pack being superseded. The old pack is not modified.
  - >-
    Provide worked example: Zambia CARBON_MARKET pack at REGULATORY authority
    level (global, adapter_registration_id NULL) and a PWRM0001-specific
    methodology pack at INTERNAL level (adapter_registration_id = PWRM0001 row).
    Show how the resolution algorithm picks the adapter-scoped pack first.

acceptance_criteria:
  - >-
    docs/architecture/INTERPRETATION_PACK_SCHEMA.md exists with all required
    sections: field definitions, two uniqueness constraints, resolution
    algorithm, append-only posture, worked example.
  - >-
    Both uniqueness constraint variants are specified (global and adapter-scoped).
  - >-
    Resolution hierarchy is specified as a deterministic ordered algorithm,
    not as prose preferences.
  - >-
    Document approved by architecture owner before GF-W1-SCH-001 begins.

negative_tests:
  - id: GF-W1-DSN-002-N1
    description: >-
      Attempt to begin GF-W1-SCH-001 without this document being approved.
      Task authoring process must identify the missing dependency and block.
    required: true
  - id: GF-W1-DSN-002-N2
    description: >-
      Verify that the worked example demonstrates the adapter-scoped pack
      taking precedence over the global pack. If the example shows global
      winning over adapter-scoped, the resolution algorithm is wrong.
    required: true

verification:
  - test -f docs/architecture/INTERPRETATION_PACK_SCHEMA.md
  - grep -q "adapter_registration_id IS NOT NULL" docs/architecture/INTERPRETATION_PACK_SCHEMA.md
  - grep -q "supersedes_id" docs/architecture/INTERPRETATION_PACK_SCHEMA.md
  - grep -q "ORDER BY" docs/architecture/INTERPRETATION_PACK_SCHEMA.md
  - bash scripts/dev/pre_ci.sh

evidence:
  - path: evidence/phase0/interpretation_pack_schema.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - sections_present
      - uniqueness_constraints_specified
      - resolution_algorithm_present

failure_modes:
  - "Only global uniqueness constraint specified — adapter override impossible => BLOCKED"
  - "Resolution algorithm left as prose — not deterministic => FAIL"
  - "supersedes_id IS NULL uniqueness not used — multiple active packs possible => CRITICAL_FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/architecture/ADAPTER_CONTRACT_INTERFACE.md
  - docs/operations/GREEN_FINANCE_VOLATILITY_MAP.md

second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: [all — no schema touched]
  unchanged_core_functions: [all]
  adapter_only_differences: [adapter_registration_id value in adapter-scoped packs]
  jurisdiction_profile_impact: >-
    Zimbabwe would have its own jurisdiction_code in pack rows.
    The schema structure does not change per jurisdiction.
  required_core_changes: []
  explanation: >-
    The interpretation pack schema is identical for a solar energy pilot in
    Zambia and a forestry carbon pilot in Zimbabwe. Both use the same table
    structure. Both use the same two uniqueness constraints. The adapter-scoped
    constraint works for any adapter_registration_id value — the schema does
    not know whether the adapter is solar or forestry.
  second_pilot_reviewed_by: Architecture Owner
pilot_scope_ref: not_applicable

implementation_plan: docs/plans/phase0/GF-W1-DSN-002/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-DSN-002/EXEC_LOG.md
notes: >-
  The adapter_registration_id FK direction confirmed here: interpretation_packs
  references adapter_registrations (nullable). Not the reverse. This is because
  a regulatory pack (no adapter) must exist without an adapter row, while an
  adapter-scoped pack adds the FK to qualify the scope.
client: codex_cli
assigned_agent: <UNASSIGNED>
model: <UNASSIGNED>
