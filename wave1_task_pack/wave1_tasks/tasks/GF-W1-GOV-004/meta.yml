schema_version: 1
phase: '0'
task_id: GF-W1-GOV-004
title: "Create pilot activation gate that must pass before any pilot is declared live"
owner_role: SUPERVISOR
status: planned
priority: CRITICAL
risk_class: GOVERNANCE
blast_radius: CI_GATES
domain: green_finance
pilot: false

intent: >-
  Without a formal activation gate, a pilot can be declared "running" before
  all constraints are verified. The gap between "adapter registered" and
  "pilot is live" is exactly where silent compromises enter — a quick run
  before checks complete, an interpretation pack not yet seeded, a checkpoint
  state left ambiguous. This gate is the kill switch that prevents any pilot
  from going live without a proven-clean state across all six dimensions:
  schema integrity, invariant compliance, adapter completeness, interpretation
  pack validity, second pilot test sign-off, and checkpoint configuration.

anti_patterns:
  - "Running pilot informally before gate passes — even in dev — sets a precedent"
  - "Making the gate advisory rather than blocking"
  - "Allowing partial gate pass with exceptions — any failure blocks entirely"

depends_on:
  - GF-W1-FRZ-001
  - GF-W1-FRZ-003
  - GF-W1-GOV-001
  - GF-W1-GOV-002
  - GF-W1-GOV-003

blocks:
  - GF-W1-PLT-001

touches:
  - scripts/audit/verify_pilot_activation_gate.sh
  - .github/workflows/green_finance_contract_gate.yml
  - tasks/GF-W1-GOV-004/meta.yml

invariants:
  - INV-135
  - INV-136
  - INV-137
  - INV-138
  - INV-139
  - INV-140
  - INV-141
  - INV-142
  - INV-143
  - INV-144

work:
  - >-
    Create scripts/audit/verify_pilot_activation_gate.sh. Accepts --pilot <id>
    argument (e.g. --pilot PWRM0001). Runs six check groups in sequence:
    fail-fast on any group failure.
  - >-
    Check group 1 — Schema integrity: run verify_core_contract_gate.sh and
    verify_neutral_schema_ast.py. Zero violations required.
  - >-
    Check group 2 — Invariant compliance: confirm INV-135 through INV-144 are
    all at status implemented or roadmap with verifier present. Zero unverified
    implemented entries.
  - >-
    Check group 3 — Adapter completeness: confirm adapter_registrations row
    exists for the pilot's methodology code. Confirm all required verbs are
    registered (get_monitoring_schema, get_checklist_template,
    get_calculation_entrypoint, get_issuance_semantics, get_retirement_semantics).
    Confirm payload schema references are non-null.
  - >-
    Check group 4 — Interpretation pack validity: confirm at least one active
    interpretation pack exists for the pilot's jurisdiction_code and domain
    CARBON_MARKET. Confirm uniqueness constraint is satisfied (no duplicate
    active packs for same domain/jurisdiction/authority_level/adapter).
    Confirm all referenced packs have confidence_level declared.
  - >-
    Check group 5 — Second pilot test sign-off: confirm SCOPE.md exists at
    docs/pilots/PILOT_<id>/SCOPE.md. Confirm second_pilot_reviewed_by is
    populated. Confirm required_core_changes is empty.
  - >-
    Check group 6 — Checkpoint configuration: confirm all regulatory checkpoints
    for the pilot's jurisdiction have a declared state (required,
    conditionally_required, pending_authority_clarification, or waived_for_pilot).
    No checkpoint may have a null state.
  - >-
    Emit structured evidence to evidence/phase0/pilot_activation_<id>.json.
    Exit 0 only if all six groups pass with zero failures.
  - >-
    Wire into CI: the activation gate runs when docs/pilots/PILOT_*/ changes.
    Configure as a required status check.

acceptance_criteria:
  - >-
    bash scripts/audit/verify_pilot_activation_gate.sh --pilot PWRM0001 exits
    non-zero when adapter_registrations has no row for PWRM0001.
  - >-
    Exits non-zero when SCOPE.md second_pilot_reviewed_by is absent.
  - >-
    Exits non-zero when any checkpoint has a null state.
  - >-
    Exits 0 only when all six check groups pass cleanly.
  - >-
    Evidence file is emitted regardless of pass/fail with detailed group results.

negative_tests:
  - id: GF-W1-GOV-004-N1
    description: >-
      Run activation gate for a pilot with a complete SCOPE.md but no
      adapter_registrations row. Must exit non-zero and identify check
      group 3 as the failure.
    required: true
  - id: GF-W1-GOV-004-N2
    description: >-
      Run with a checkpoint table containing a row with null state for the
      pilot's jurisdiction. Must exit non-zero and identify check group 6.
    required: true
  - id: GF-W1-GOV-004-N3
    description: >-
      Run verify_core_contract_gate.sh with a known sector noun in a migration.
      Activation gate must inherit this failure through check group 1.
    required: true

verification:
  - bash scripts/audit/verify_pilot_activation_gate.sh --pilot PWRM0001
  - bash scripts/dev/pre_ci.sh

evidence:
  - path: evidence/phase0/pilot_activation_PWRM0001.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - pilot_id
      - status
      - check_group_results
      - schema_integrity
      - invariant_compliance
      - adapter_completeness
      - interpretation_pack_validity
      - second_pilot_sign_off
      - checkpoint_configuration

failure_modes:
  - "Gate runs as advisory — pilot goes live without clean state => CRITICAL_FAIL"
  - "Any check group skipped due to missing dependency => CRITICAL_FAIL"
  - "Gate passes with zero checks run — empty success => CRITICAL_FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/operations/PILOT_REJECTION_PLAYBOOK.md

second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: [all — no schema touched]
  unchanged_core_functions: [all]
  adapter_only_differences: [the --pilot argument value]
  jurisdiction_profile_impact: none — gate is jurisdiction-agnostic
  required_core_changes: []
  explanation: >-
    The activation gate script accepts a pilot ID argument and runs the same
    six check groups for any pilot in any sector. A solar pilot and a forestry
    pilot both pass through identical gate logic. The gate does not encode any
    sector-specific validation — it validates adapter completeness, interpretation
    pack presence, and checkpoint configuration regardless of sector.
  second_pilot_reviewed_by: Architecture Owner
pilot_scope_ref: not_applicable

implementation_plan: docs/plans/phase0/GF-W1-GOV-004/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-GOV-004/EXEC_LOG.md
notes: >-
  This is the final kill switch before any pilot goes live. It must be
  wired and passing before GF-W1-PLT-001 is executed. No exceptions.
client: codex_cli
assigned_agent: <UNASSIGNED>
model: <UNASSIGNED>
