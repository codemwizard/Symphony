schema_version: 1
phase: '1'
task_id: GF-W1-FNC-001
title: "Phase 1 functions: register_project and activate_project"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA
domain: green_finance
pilot: false

intent: >-
  register_project and activate_project are the entry-point host verbs for creating and activating a project against a registered methodology version. They must be SECURITY DEFINER with hardened search_path. They call adapter-registered entrypoints, not methodology-specific logic.

anti_patterns:
  - "Encoding any methodology-specific logic in the function body"
  - "Interpreting payload field names in record_monitoring_record"
  - "Adding functions not in the agreed list for this tranche"
  

depends_on:
    - GF-W1-SCH-009

blocks:
    - GF-W1-FNC-002

touches:
  - schema/migrations/0080_gf_fn_project_registration.sql
  - scripts/db/verify_gf_fnc_001.sh
  - tasks/GF-W1-FNC-001/meta.yml

invariants:
  - INV-136
  - INV-141
  

work:
  - >-
    Write SECURITY DEFINER functions with SET search_path = pg_catalog, public.
    register_project validates methodology_version exists and adapter is active. activate_project transitions from DRAFT to ACTIVE recording lifecycle event.
  - >-
    Write verifier script confirming SECURITY DEFINER posture, correct search_path,
    function exists, and negative test scenarios pass.
  - >-
    Update MIGRATION_HEAD.

acceptance_criteria:
  - >-
    All functions are SECURITY DEFINER with hardened search_path.
  - >-
    Negative tests pass: invalid inputs rejected with appropriate SQLSTATE.
  - >-
    Function rejects malformed inputs with explicit SQLSTATE codes.

negative_tests:
  - id: GF-W1-FNC-001-N1
    description: >-
      Call register_project with a methodology_version_id that does not exist. Must fail with FK violation or explicit SQLSTATE.
    required: true

verification:
  - bash scripts/db/verify_gf_fnc_001.sh
  - python3 scripts/audit/verify_neutral_schema_ast.py schema/migrations/0080_gf_fn_project_registration.sql
  - bash scripts/dev/pre_ci.sh

evidence:
  - path: evidence/phase1/gf_fnc_001.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - functions_verified
      - security_definer_confirmed
      - negative_tests_passed

failure_modes:
  - "Function encodes sector-specific logic => CRITICAL_FAIL (Rule 3)"
  
  - "SECURITY DEFINER posture absent => CRITICAL_FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/operations/PILOT_REJECTION_PLAYBOOK.md
  - docs/architecture/ADAPTER_CONTRACT_INTERFACE.md

second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: []
  unchanged_core_functions: [all previously implemented]
  adapter_only_differences: [methodology_version_id value, adapter_code value]
  jurisdiction_profile_impact: none
  required_core_changes: []
  explanation: >-
    All Phase 1 host verbs are generic platform verbs. A solar energy project
    and a forestry carbon project both call the same functions with different
    data values. No function is sector-specific. The adapter registration
    provides the methodology-specific logic — the host function calls the adapter,
    it does not embed the logic.
  second_pilot_reviewed_by: Architecture Owner
pilot_scope_ref: not_applicable

implementation_plan: docs/plans/phase1/GF-W1-FNC-001/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-FNC-001/EXEC_LOG.md
notes: Phase 1 functions. Phase 0 schema must be stable before writing any function.
client: codex_cli
