  database_url_env_var: DATABASE_URL
  setup_command: "export DATABASE_URL=\"postgresql://symphony_admin:symphony_pass@localhost:55432/symphony\""

migration_dependencies:
  enabled: true
  required_migrations:
    - 0168: "Attestation seam schema baseline present"
    - 0171: "Attestation kill-switch gate baseline present"
  table_dependencies:
    - asset_batches: "authoritative Wave 8 boundary"
    - schema_migrations: "must track migrations"
  verification_step: "Confirm the target migration chain and authoritative boundary exist before implementation."

work:
  - >-
    [ID w8_db_001_work_01] Inventory all current `asset_batches` trigger paths and identify every trigger or function that currently participates in Wave 8-relevant attestation behavior.
  - >-
    [ID w8_db_001_work_02] Add a forward-only migration that establishes one authoritative dispatcher trigger on `asset_batches` and removes or bypasses competing authority-trigger chains.
  - >-
    [ID w8_db_001_work_03] Build a verifier that proves a write to `asset_batches` runs through one explicit dispatcher path rather than multiple independent triggers.

acceptance_criteria:
  - >-
    [ID w8_db_001_work_01] The task records the pre-change `asset_batches` trigger topology and identifies all competing authority paths.
  - >-
    [ID w8_db_001_work_02] A forward-only migration establishes one authoritative dispatcher trigger on `asset_batches` without relying on lexical trigger-order behavior.
  - >-
    [ID w8_db_001_work_03] The verifier proves PostgreSQL routes a write through one dispatcher path at the authoritative boundary.

negative_tests:
  - id: TSK-P2-W8-DB-001-N1
    description: >-
      Verifier fails if more than one independent authority trigger still participates in the `asset_batches` write path.
    required: true

positive_tests:
  - id: TSK-P2-W8-DB-001-P1
    description: >-
      Verifier passes only when PostgreSQL demonstrates one dispatcher-trigger path on `asset_batches`.
    required: true

verification:
