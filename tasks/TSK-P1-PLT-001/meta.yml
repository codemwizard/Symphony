schema_version: 1
phase: '1'
task_id: TSK-P1-PLT-001
title: "Serve Pilot HTML via LegacyAPI so that the operator cookie is correctly injected"
owner_role: ARCHITECT
status: completed
priority: CRITICAL
risk_class: GOVERNANCE
blast_radius: APP_LAYER
intent: >-
  The pilot-demo operator cookie is currently only set via the /pilot-demo/supervisory route.
  Since other pilot HTML files are served statically, they lack the cookie needed for API calls.
  This task moves pilot file serving into Program.cs to ensure a consistent auth session.
anti_patterns:
  - "Serving pilot files statically without auth context."
  - "Allowing 401 errors to persist on the onboarding flow."
out_of_scope:
  - "Modifying the actual content of the HTML files (left for PLT-004/005/006)."
stop_conditions:
  - "If the operator cookie is not present in the Set-Cookie header of the file response."
proof_guarantees:
  - "Verification confirms that routes like /pilot-demo/onboarding return 200 and a valid cookie."
proof_limitations:
  - "Does not verify the correctness of the HTML content itself."
depends_on:
  - GF-W1-UI-024
touches:
  - services/ledger-api/dotnet/src/LedgerApi/Program.cs
  - tasks/TSK-P1-PLT-001/meta.yml
invariants:
  - INV-GOV-PILOT-001
work:
  - "[ID TSK-P1-PLT-001_work_item_01] Define pilot-demo route mappings for onboarding, monitoring, and token-issuance in Program.cs."
  - "[ID TSK-P1-PLT-001_work_item_02] Implement the HTML file reader and __SYMPHONY_UI_CONTEXT__ injection logic for these routes."
  - "[ID TSK-P1-PLT-001_work_item_03] Ensure Response.Cookies.Append is called with correct security flags (HttpOnly, Secure, SameSite)."
acceptance_criteria:
  - "[ID TSK-P1-PLT-001_work_item_01] GET /pilot-demo/onboarding returns status 200."
  - "[ID TSK-P1-PLT-001_work_item_03] Response contains Set-Cookie header for 'symphony_pilot_demo_operator'."
negative_tests:
  - id: TSK-P1-PLT-001-N1
    description: "Requesting a pilot route when SYMPHONY_RUNTIME_PROFILE is not 'pilot-demo' must return 404."
    required: true
verification:
  - "# [ID TSK-P1-PLT-001_work_item_01] curl -i http://localhost:5242/pilot-demo/onboarding | grep '200 OK' || exit 1"
  - "# [ID TSK-P1-PLT-001_work_item_03] curl -i http://localhost:5242/pilot-demo/onboarding | grep 'set-cookie: symphony_pilot_demo_operator' || exit 1"
evidence:
  - path: evidence/phase1/tsk_p1_plt_001.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
failure_modes:
  - "Cookie missing from response => FAIL"
  - "Route returns 404 when profile is pilot-demo => FAIL"
must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - services/ledger-api/dotnet/src/LedgerApi/Program.cs
implementation_plan: docs/plans/phase1/TSK-P1-PLT-001/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-PLT-001/EXEC_LOG.md
client: cursor
assigned_agent: architect
model: <UNASSIGNED>
