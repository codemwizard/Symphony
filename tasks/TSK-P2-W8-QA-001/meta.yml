regulated_surface_compliance:
  enabled: true
  approval_workflow: stage_a_only
  stage_a_required_before_edit: true
  regulated_paths:
    - scripts/audit/verify_wave8_three_surface_determinism.sh
    - scripts/audit/verify_tsk_p2_w8_qa_001.sh
    - evidence/phase2/tsk_p2_w8_qa_001.json
  must_read:
    - docs/operations/REGULATED_SURFACE_PATHS.yml

remediation_trace_compliance:
  enabled: true
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

database_connection:
  enabled: false

migration_dependencies:
  enabled: false

work:
  - >-
    [ID w8_qa_001_work_01] Create or update attestation test vectors that contain contract-source canonical bytes, expected hash, and signature-verification expectations, and freeze them independently of runtime implementation logic.
  - >-
    [ID w8_qa_001_work_02] Build a verifier that compares contract vector bytes, frozen `LedgerApi` runtime bytes, and SQL authoritative runtime bytes for the same logical inputs.
  - >-
    [ID w8_qa_001_work_03] Emit evidence showing three-surface equality for bytes, hash, and verification outcome and fail if runtime vectors are regenerated from implementation logic.

acceptance_criteria:
  - >-
    [ID w8_qa_001_work_01] Attestation test vectors exist, define canonical bytes, expected hash, and expected verification outcomes, and are not implementation-generated.
  - >-
    [ID w8_qa_001_work_02] The verifier compares contract, frozen `LedgerApi` runtime, and SQL runtime outputs directly.
  - >-
    [ID w8_qa_001_work_03] Evidence proves three-surface equality for bytes, hash, and verification result and fails if runtime vectors are regenerated from implementation logic.

negative_tests:
  - id: TSK-P2-W8-QA-001-N1
    description: >-
      Verifier fails if any of the three surfaces emits different canonical bytes for the same logical payload.
    required: true

positive_tests:
  - id: TSK-P2-W8-QA-001-P1
    description: >-
      Verifier passes only when all three surfaces agree on bytes, hash, and verification result.
    required: true

verification:
  - '# [ID w8_qa_001_work_01] [ID w8_qa_001_work_02] [ID w8_qa_001_work_03] test -e scripts/audit/verify_tsk_p2_w8_qa_001.sh && bash scripts/audit/verify_tsk_p2_w8_qa_001.sh > evidence/phase2/tsk_p2_w8_qa_001.json || exit 1'
  - 'bash scripts/audit/verify_task_pack_readiness.sh --task TSK-P2-W8-QA-001'
  - 'python3 scripts/audit/validate_evidence.py --task TSK-P2-W8-QA-001 --evidence evidence/phase2/tsk_p2_w8_qa_001.json'

