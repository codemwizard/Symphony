work:
  - Add an explicit serial derivation rule to docs/operations/WAVE_EXECUTION_SEMANTICS.md.
  - Define canonical ordering from task metadata as dependency-first and numeric-second.
  - Prevent agents from interpreting waves as parallel frontier batches.
  - Provide a concrete INT-001 / INT-002 / INT-003 / INT-004 example showing why INT-003 may follow immediately after INT-002.
acceptance_criteria:
  - docs/operations/WAVE_EXECUTION_SEMANTICS.md contains a section titled "4A. Serial Derivation Rule".
  - The new section defines runnable-set recomputation after each completed task.
  - The new section states that blocked, deferred, and completed tasks are excluded from the runnable set.
  - The new section states that numeric or canonical order is used only as the tie-break among currently runnable tasks.
  - The new section explicitly says wave boundaries cannot reorder the derived serial order.
  - The new section includes the INT-001 / INT-002 / INT-003 / INT-004 example.
