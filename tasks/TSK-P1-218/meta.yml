work:
- Add governed server-side onboarding endpoints for tenant lifecycle, programme CRUD, policy binding,
  activation/suspension, and readback of onboarding status.
- These APIs must operate on persisted control-plane state and must enforce server-side authorization
  boundaries using the hardened secret and operator-session model.
- Do not push privileged onboarding responsibility into browser code or require operators to assemble
  raw curl sequences for normal onboarding.
acceptance_criteria:
- The backend exposes documented onboarding APIs for tenant, programme, policy, and activation flows.
- APIs validate control-plane invariants and reject cross-tenant or invalid lifecycle transitions.
- APIs are idempotent where appropriate and return deterministic machine-readable errors.
- Raw admin API keys are not required in browser JavaScript to use these flows.
verification:
