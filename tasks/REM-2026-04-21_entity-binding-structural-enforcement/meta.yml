notes: >
  This task creates a Wave 5 casefile for structural entity binding. Wave 5's state machine will call
  enforce_authority_transition_binding(uuid, uuid). For this call to be structurally safe (not cryptographic-only),
  execution_records must carry entity_type/entity_id columns by Wave 5. Deferring to Wave 6 extends the
  accepted-risk window by an entire wave with no architectural justification.

