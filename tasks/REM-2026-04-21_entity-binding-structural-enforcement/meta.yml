intent: >
  Create a remediation casefile to upgrade cryptographic-only entity binding to structural enforcement before Wave 5 ships.
  This casefile documents the architectural risk in Wave 4's policy_decisions table and defines candidate
  approaches for structural enforcement to be implemented in Wave 5. The casefile does not implement
  the structural binding itself, only documents the risk and candidate approaches.

