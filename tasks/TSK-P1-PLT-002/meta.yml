schema_version: 1
phase: '1'
task_id: TSK-P1-PLT-002
title: "Map /pilot-demo/api/reveal to SupervisoryRevealReadModelHandler"
owner_role: ARCHITECT
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: APP_LAYER
intent: >-
  The pilot frontend expects a /pilot-demo/api/reveal/{programId} endpoint to show
  the underlying logic and invariants for a programme.
  Currently, this is only available via an admin-restricted /v1 endpoint.
  This task adds a shim that uses the pilot operator cookie for authentication.
anti_patterns:
  - "Hardcoding result payloads instead of calling the ReadModel handler."
  - "Bypassing the operator cookie check for reveal data."
out_of_scope:
  - "Modifying the logic inside SupervisoryRevealReadModelHandler.cs."
stop_conditions:
  - "If the shim fails to return the exact structure provided by the ReadModel."
proof_guarantees:
  - "Verification confirms that the shim returns a valid JSON reveal payload."
proof_limitations:
  - "Does not verify the business logic of the reveal itself."
depends_on:
  - TSK-P1-PLT-001
touches:
  - services/ledger-api/dotnet/src/LedgerApi/Program.cs
  - tasks/TSK-P1-PLT-002/meta.yml
invariants:
  - INV-GOV-PILOT-002
work:
  - "[ID TSK-P1-PLT-002_work_item_01] Add the GET /pilot-demo/api/reveal/{programId} route to Program.cs."
  - "[ID TSK-P1-PLT-002_work_item_02] Implement the Operator Cookie validation for this route."
  - "[ID TSK-P1-PLT-002_work_item_03] Call SupervisoryRevealReadModelHandler.Handle and return the result."
acceptance_criteria:
  - "[ID TSK-P1-PLT-002_work_item_01] GET /pilot-demo/api/reveal/PGM-ZAMBIA-GRN-001 returns 200 OK."
  - "[ID TSK-P1-PLT-002_work_item_03] Response body contains the 'tests' array from the reveal handler."
negative_tests:
  - id: TSK-P1-PLT-002-N1
    description: "Accessing without a valid operator cookie must return 401."
    required: true
verification:
  - "# [ID TSK-P1-PLT-002_work_item_01] curl -i http://localhost:5242/pilot-demo/api/reveal/PGM-ZAMBIA-GRN-001 -H 'Cookie: symphony_pilot_demo_operator=VALID_COOKIE' | grep '200 OK' || exit 1"
  - "# [ID TSK-P1-PLT-002_work_item_03] curl http://localhost:5242/pilot-demo/api/reveal/PGM-ZAMBIA-GRN-001 -H 'Cookie: symphony_pilot_demo_operator=VALID_COOKIE' | grep 'tests' || exit 1"
evidence:
  - path: evidence/phase1/tsk_p1_plt_002.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
failure_modes:
  - "Shim returns 404 when valid cookie is provided => FAIL"
  - "Shim exposes admin-restricted fields unintentionally => FAIL"
must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - services/ledger-api/dotnet/src/LedgerApi/ReadModels/SupervisoryRevealReadModelHandler.cs
implementation_plan: docs/plans/phase1/TSK-P1-PLT-002/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-PLT-002/EXEC_LOG.md
notes: This task provides a pilot-specific shim around the admin reveal endpoint. The implementation reuses the existing SupervisoryRevealReadModelHandler logic but adds operator cookie authentication. This avoids duplicating business logic while providing pilot demo access.
client: cursor
assigned_agent: architect
model: <UNASSIGNED>
