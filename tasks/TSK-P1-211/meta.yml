failure_modes:
- Migration uses ADD CONSTRAINT ... UNIQUE USING INDEX which promotes the partial index
  and produces a partial constraint that still fails ON CONFLICT (client_key).
- Migration drops the index but the IF NOT EXISTS guard on ADD CONSTRAINT is omitted,
  causing the migration to fail on databases where the constraint was already added manually.
- Migration leaves the old partial index in place alongside the new full constraint,
  creating two uniqueness objects on client_key.
- The verifier checks pg_indexes instead of pg_constraint and passes even when only
  the bare index exists.
- db_psql onboarding still fails with SQLSTATE 42P10 after migration because the
  partial constraint inherited a WHERE clause.
