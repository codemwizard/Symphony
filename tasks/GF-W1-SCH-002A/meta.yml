schema_version: 1
phase: '0'
task_id: GF-W1-SCH-002A
title: Introduce foundational root tables projects and methodology_versions so the
  GF schema chain has a DAG root
owner_role: DB_FOUNDATION
status: completed
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA
domain: green_finance
pilot: false
intent: projects and methodology_versions are the DAG root for all Green Finance schema
  tasks. Every downstream migration (0099+) depends on these two tables existing.
  The verifier must confirm ownership uniqueness, sidecar alignment, and that IF NOT
  EXISTS is absent from both migrations.
anti_patterns:
- Using CREATE TABLE IF NOT EXISTS in either migration SQL
- Marking completed without evidence of ownership uniqueness check
out_of_scope:
- Any migration number other than 0097 and 0098
- Application-layer project management functions
stop_conditions:
- "If CREATE TABLE IF NOT EXISTS appears in either migration SQL \u2192 STOP"
- "If verify_gf_sch_002a.sh does not emit evidence with run_id \u2192 STOP"
proof_guarantees:
- Verifier confirms IF NOT EXISTS is absent from both migrations
- Verifier confirms ownership uniqueness (each table declared by exactly one sidecar)
- Evidence file contains run_id, git_sha, and all check results
proof_limitations:
- Verifier cannot test live DB enforcement without a running Postgres instance
depends_on: []
blocks:
- GF-W1-SCH-003
- GF-W1-SCH-004
- GF-W1-SCH-005
touches:
- schema/migrations/0097_gf_projects.sql
- schema/migrations/0097_gf_projects.meta.yml
- schema/migrations/0098_gf_methodology_versions.sql
- schema/migrations/0098_gf_methodology_versions.meta.yml
- schema/migrations/MIGRATION_HEAD
- scripts/db/verify_gf_sch_002a.sh
- evidence/phase0/gf_sch_002a.json
- tasks/GF-W1-SCH-002A/meta.yml
invariants:
- INV-SCHEMA-OWNERSHIP-001
- INV-SCHEMA-ORDER-002
- INV-SCHEMA-NO-FORWARD-REF-003
- INV-SCHEMA-OWNERSHIP-MAP-007
- INV-SCHEMA-SIDECAR-SQL-CONSISTENCY-012
work:
- '[ID GF-W1-SCH-002A] [ID gf_w1_sch_002a_wi01] Create schema/migrations/0097_gf_projects.sql
  and schema/migrations/0098_gf_methodology_versions.sql with RLS enabled, canonical
  tenant isolation, no IF NOT EXISTS.'
- '[ID GF-W1-SCH-002A] [ID gf_w1_sch_002a_wi02] Create sidecars 0097_gf_projects.meta.yml
  and 0098_gf_methodology_versions.meta.yml; update MIGRATION_HEAD to 0098.'
- '[ID GF-W1-SCH-002A] [ID gf_w1_sch_002a_wi01] Create scripts/db/verify_gf_sch_002a.sh:
  check IF NOT EXISTS rejection, ownership uniqueness, sidecar alignment, migration
  head; emit evidence/phase0/gf_sch_002a.json with run_id.'
acceptance_criteria:
- '[ID GF-W1-SCH-002A] [ID gf_w1_sch_002a_wi01] verify_gf_sch_002a.sh exits 0 and
  evidence/phase0/gf_sch_002a.json contains status=PASS with run_id present.'
- '[ID GF-W1-SCH-002A] [ID gf_w1_sch_002a_wi01] verify_gf_sch_002a.sh exits non-zero
  when given a SQL file containing CREATE TABLE IF NOT EXISTS projects.'
- '[ID GF-W1-SCH-002A] [ID gf_w1_sch_002a_wi02] MIGRATION_HEAD contains 0098 and both
  sidecars declare their respective tables as sole governed identifiers.'
negative_tests:
- id: GF-W1-SCH-002A-N1
  description: SQL file containing CREATE TABLE IF NOT EXISTS projects must cause
    verify_gf_sch_002a.sh to exit non-zero with if_not_exists_antipattern in the failures
    array.
  required: true
- id: GF-W1-SCH-002A-N2
  description: Sidecar declaring projects in two separate meta.yml files must cause
    the verifier to fail with ownership_not_unique in the failures array.
  required: true
positive_tests:
- id: GF-W1-SCH-002A-P1
  description: SQL with no IF NOT EXISTS and correct RLS must cause verify_gf_sch_002a.sh
    to exit 0.
  required: false
verification:
- '[ID GF-W1-SCH-002A] bash scripts/dev/pre_ci.sh | grep -q ''.'' >> evidence/phase1/gf_w1_sch_002a.json
  || exit 1'
- '[ID GF-W1-SCH-002A] [ID gf_w1_sch_002a_wi01] bash scripts/db/verify_gf_sch_002a.sh
  && test -f evidence/phase0/gf_sch_002a.json > /dev/null || exit 1'
- '[ID GF-W1-SCH-002A] [ID gf_w1_sch_002a_wi01] grep -q ''"status"'' evidence/phase0/gf_sch_002a.json
  > /dev/null || exit 1'
- '[ID GF-W1-SCH-002A] [ID gf_w1_sch_002a_wi02] python3 scripts/audit/verify_migration_meta_alignment.py
  && grep -q ''0098'' schema/migrations/MIGRATION_HEAD || exit 1'
evidence:
- path: evidence/phase0/gf_sch_002a.json
  must_include:
  - task_id
  - run_id
  - git_sha
  - timestamp_utc
  - status
  - observed_paths
  - observed_hashes
  - command_outputs
  - execution_trace
  - checks
  - failures
failure_modes:
- "Evidence file missing \u2192 BLOCKED (all downstream SCH tasks cannot start)"
- "if_not_exists_antipattern in either migration SQL \u2192 FAIL (verifier exits non-zero)"
- "ownership_not_unique failure \u2192 CRITICAL_FAIL (two migrations claim the same\
  \ table)"
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
- docs/operations/AGENT_GUARDRAILS_GREEN_FINANCE.md
- docs/plans/phase0/GF-W1-SCH-002A/PLAN.md
implementation_plan: docs/plans/phase0/GF-W1-SCH-002A/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-SCH-002A/EXEC_LOG.md
notes: SCH-002A is the DAG root. IF NOT EXISTS was removed from both migrations during
  the GF-W1 scaffolding session (see REM-GF-W1-SCH-002A-VERIFIER). The verifier was
  rewritten from a stub to a 7-check real verifier in the same session.
client: codex_cli
assigned_agent: db_foundation_agent
model: <UNASSIGNED>
