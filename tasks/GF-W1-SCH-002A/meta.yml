model: <UNASSIGNED>

domain: green_finance
pilot: true
second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: [projects, methodology_versions]
  unchanged_core_functions: [all]
  adapter_only_differences:
    - "Only adapter/data rows change between sectors; the foundational tables remain neutral"
    - "Sector-specific semantics belong in downstream data and adapter registration, not in root-table schema"
  jurisdiction_profile_impact: >-
    Jurisdiction variation appears in downstream policy/profile rows. The
    foundational `projects` and `methodology_versions` tables remain unchanged.
  required_core_changes: []
  explanation: >-
    Solar and forestry pilots both require the same neutral ownership anchors:
    a project record and one or more methodology-version records linked to that
    project. No sector-specific columns are needed in either table, so a second
    pilot reuses the same foundational schema with different data only.
  second_pilot_reviewed_by: Architecture Owner
pilot_scope_ref: not_applicable
