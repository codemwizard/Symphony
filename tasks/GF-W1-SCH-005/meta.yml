schema_version: 1
phase: '0'
task_id: GF-W1-SCH-005
title: "Migration 0101: asset_batches, asset_lifecycle_events, retirement_events neutral lifecycle tables"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  This task creates the neutral lifecycle tables only after foundational,
  monitoring, and evidence-lineage ownership is stable. It isolates lifecycle
  ownership from every earlier concern so issuance/retirement semantics cannot
  smuggle in root, monitoring, or lineage drift.

anti_patterns:
  - "Recreating foundational, monitoring, or lineage objects in the lifecycle task"
  - "Adding undeclared helper tables or destructive lifecycle semantics"
  - "Encoding sector-specific lifecycle behavior into neutral schema objects"

depends_on:
  - GF-W1-SCH-004
  - GF-W1-SCH-002A

blocks:
  - GF-W1-SCH-006

touches:
  - schema/migrations/0101_gf_asset_lifecycle.sql
  - schema/migrations/0101_gf_asset_lifecycle.meta.yml
  - schema/migrations/MIGRATION_HEAD
  - scripts/db/verify_gf_asset_lifecycle.sh
  - evidence/phase0/gf_asset_lifecycle.json
  - tasks/GF-W1-SCH-005/meta.yml

invariants:
  - INV-SCHEMA-ORDER-002
  - INV-SCHEMA-NO-FORWARD-REF-003
  - INV-SCHEMA-TASK-REF-DEP-006
  - INV-SCHEMA-OWNERSHIP-MAP-007
  - INV-SCHEMA-OWNERSHIP-CLOSURE-008
  - INV-SCHEMA-STATIC-DDL-ONLY-010
  - INV-SCHEMA-SIDECAR-SQL-CONSISTENCY-012
  - INV-SCHEMA-NO-PROCEDURAL-DDL-013
  - INV-SCHEMA-NO-DESTRUCTIVE-DDL-015

work:
  - >-
    [ID gf_w1_sch_005_work_item_01] Create migration 0101 for
    `public.asset_batches`, `public.asset_lifecycle_events`, and
    `public.retirement_events` only.
  - >-
    [ID gf_w1_sch_005_work_item_02] Add the sidecar and update `MIGRATION_HEAD`
    from actual filesystem state.
  - >-
    [ID gf_w1_sch_005_work_item_03] Write `scripts/db/verify_gf_asset_lifecycle.sh`
    to prove lifecycle-only ownership and rejection of undeclared/procedural/
    destructive behavior.
  - >-
    [ID gf_w1_sch_005_work_item_04] Emit bounded evidence to
    `evidence/phase0/gf_asset_lifecycle.json`.

acceptance_criteria:
  - >-
    [ID gf_w1_sch_005_work_item_01] Migration 0101 introduces only the three
    declared lifecycle tables and their declared dependent governed objects.
  - >-
    [ID gf_w1_sch_005_work_item_02] The sidecar matches parsed SQL exactly and
    direct dependencies on `GF-W1-SCH-004` and `GF-W1-SCH-002A` are preserved.
  - >-
    [ID gf_w1_sch_005_work_item_03] The verifier exits 0 and fails closed on
    undeclared objects, procedural SQL, destructive DDL, or non-lifecycle
    object leakage.
  - >-
    [ID gf_w1_sch_005_work_item_04] Evidence file
    `evidence/phase0/gf_asset_lifecycle.json` exists and includes the declared proof fields.

negative_tests:
  - id: GF-W1-SCH-005-N1
    description: >-
      Add an extra governed table or undeclared helper object to migration 0101.
      Ownership closure and sidecar/SQL consistency must fail.
    required: true
  - id: GF-W1-SCH-005-N2
    description: >-
      Add destructive lifecycle semantics or procedural SQL to the migration.
      The lifecycle verifier must fail.
    required: true

verification:
  - >-
    grep -n "asset_batches\\|asset_lifecycle_events\\|retirement_events" schema/migrations/0101_gf_asset_lifecycle.sql || exit 1 # [ID gf_w1_sch_005_work_item_01] [ID gf_w1_sch_005_work_item_02]
  - >-
    bash scripts/db/verify_gf_asset_lifecycle.sh | tee evidence/phase0/gf_asset_lifecycle.json >/dev/null && test -f evidence/phase0/gf_asset_lifecycle.json || exit 1 # [ID gf_w1_sch_005_work_item_03]
  - >-
    test -f evidence/phase0/gf_asset_lifecycle.json || exit 1 # [ID gf_w1_sch_005_work_item_04]

evidence:
  - path: evidence/phase0/gf_asset_lifecycle.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - asset_batches_owner
      - asset_lifecycle_events_owner
      - retirement_events_owner
      - ownership_closure_confirmed
      - sidecar_sql_consistency_confirmed
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace

failure_modes:
  - "Lifecycle task recreates non-lifecycle objects => CRITICAL_FAIL"
  - "Lifecycle schema contains destructive or procedural behavior => CRITICAL_FAIL"
  - "Undeclared created object => CRITICAL_FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/operations/PILOT_REJECTION_PLAYBOOK.md
  - docs/operations/AGENT_GUARDRAILS_GREEN_FINANCE.md

implementation_plan: docs/plans/phase0/GF-W1-SCH-005/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-SCH-005/EXEC_LOG.md

notes: >-
  This repaired task owns lifecycle tables only. Direct dependency on
  `GF-W1-SCH-002A` is explicit because lifecycle rows reference foundational
  ownership and must not rely on transitive availability.
client: codex_cli
assigned_agent: <UNASSIGNED>
model: <UNASSIGNED>

domain: green_finance
pilot: true
second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: [asset_batches, asset_lifecycle_events, retirement_events]
  unchanged_core_functions: [issue_asset_batch, retire_asset_batch]
  adapter_only_differences:
    - "Lifecycle transition payloads and business conditions differ by adapter"
    - "Neutral lifecycle tables remain unchanged across sectors"
  jurisdiction_profile_impact: >-
    Jurisdiction differences affect seeded rules and authority decisions, not
    the neutral lifecycle schema.
  required_core_changes: []
  explanation: >-
    A solar issuance flow and a forestry retirement flow both need the same
    neutral lifecycle primitives: a batch record, lifecycle events, and a
    retirement event history. The sector-specific policy logic is stored in
    downstream rules and data, not in the lifecycle table structure.
  second_pilot_reviewed_by: Architecture Owner
pilot_scope_ref: not_applicable
