schema_version: 1
phase: '0'
task_id: GF-W1-SCH-005
title: Introduce asset_batches, asset_lifecycle_events, and retirement_events so GF
  asset lifecycle state is structurally captured
owner_role: DB_FOUNDATION
status: completed
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA
domain: green_finance
pilot: false
intent: 'The asset lifecycle tables capture the full state machine for Green Finance
  assets: batches are issued, lifecycle events are recorded, and batches are retired.
  asset_lifecycle_events must use a join-tenant RLS pattern because it references
  asset_batches. retirement_events must be append-only. Migration 0101 depends on
  0100 (evidence lineage) and the SCH-002A roots.'
anti_patterns:
- Granting UPDATE or DELETE on retirement_events to any runtime role
- Using CREATE TABLE IF NOT EXISTS in the migration SQL
- Applying direct tenant isolation RLS to asset_lifecycle_events instead of join-tenant
out_of_scope:
- Application-layer issuance and retirement functions (reserved for GF-W1-FNC-005)
- Any migration number other than 0101
- RLS changes to any table outside the three lifecycle tables
stop_conditions:
- "If UPDATE or DELETE is grantable on retirement_events to any runtime role \u2192\
  \ STOP"
- "If CREATE TABLE IF NOT EXISTS appears in migration SQL \u2192 STOP"
- "If asset_lifecycle_events uses direct tenant column instead of join-tenant RLS\
  \ \u2192 STOP"
proof_guarantees:
- Verifier confirms REVOKE UPDATE/DELETE on retirement_events for runtime roles
- Verifier confirms asset_batches and retirement_events use canonical tenant isolation
- Sidecar declares all three tables as sole governed identifiers for migration 0101
proof_limitations:
- Verifier cannot test live DB enforcement without a running Postgres instance
- Verifier cannot validate lifecycle state machine transitions at DB layer
depends_on:
- GF-W1-SCH-002A
- GF-W1-SCH-004
blocks:
- GF-W1-SCH-006
touches:
- schema/migrations/0101_gf_asset_lifecycle.sql
- schema/migrations/0101_gf_asset_lifecycle.meta.yml
- schema/migrations/MIGRATION_HEAD
- scripts/db/verify_gf_asset_lifecycle.sh
- evidence/phase0/gf_asset_lifecycle.json
- tasks/GF-W1-SCH-005/meta.yml
invariants:
- INV-SCHEMA-OWNERSHIP-001
- INV-SCHEMA-ORDER-002
- INV-SCHEMA-NO-FORWARD-REF-003
- INV-SCHEMA-OWNERSHIP-MAP-007
- INV-SCHEMA-SIDECAR-SQL-CONSISTENCY-012
work:
- '[ID GF-W1-SCH-005] [ID gf_w1_sch_005_wi01] Create schema/migrations/0101_gf_asset_lifecycle.sql:
  asset_batches and retirement_events with REVOKE UPDATE/DELETE for runtime roles
  and tenant isolation RLS; asset_lifecycle_events with join-tenant RLS; no IF NOT
  EXISTS.'
- '[ID GF-W1-SCH-005] [ID gf_w1_sch_005_wi02] Create schema/migrations/0101_gf_asset_lifecycle.meta.yml
  sidecar declaring all three tables as sole introduced identifiers; update schema/migrations/MIGRATION_HEAD
  to 0101.'
- '[ID GF-W1-SCH-005] [ID gf_w1_sch_005_wi01] Create scripts/db/verify_gf_asset_lifecycle.sh:
  check IF NOT EXISTS rejection, append-only privileges on retirement_events, RLS
  policies, ownership uniqueness, migration head; emit evidence/phase0/gf_asset_lifecycle.json.'
acceptance_criteria:
- '[ID GF-W1-SCH-005] [ID gf_w1_sch_005_wi01] verify_gf_asset_lifecycle.sh exits 0
  and evidence/phase0/gf_asset_lifecycle.json contains status=PASS with retirement_append_only_confirmed=true
  and rls_confirmed=true.'
- '[ID GF-W1-SCH-005] [ID gf_w1_sch_005_wi01] verify_gf_asset_lifecycle.sh exits non-zero
  when given a SQL file containing CREATE TABLE IF NOT EXISTS asset_batches.'
- '[ID GF-W1-SCH-005] [ID gf_w1_sch_005_wi02] MIGRATION_HEAD contains 0101 and sidecar
  declares all three lifecycle tables as governed identifiers.'
negative_tests:
- id: GF-W1-SCH-005-N1
  description: SQL file containing CREATE TABLE IF NOT EXISTS asset_batches must cause
    verify_gf_asset_lifecycle.sh to exit non-zero with if_not_exists_antipattern in
    the failures array.
  required: true
- id: GF-W1-SCH-005-N2
  description: SQL granting UPDATE on retirement_events to a runtime role must cause
    the verifier to fail with retirement_not_append_only in the failures array.
  required: true
positive_tests:
- id: GF-W1-SCH-005-P1
  description: SQL with correct REVOKE UPDATE/DELETE on retirement_events and no IF
    NOT EXISTS must cause verify_gf_asset_lifecycle.sh to exit 0.
  required: false
verification:
- '[ID GF-W1-SCH-005] bash scripts/dev/pre_ci.sh | grep -q ''.'' >> evidence/phase1/gf_w1_sch_005.json
  || exit 1'
- '[ID GF-W1-SCH-005] [ID gf_w1_sch_005_wi01] bash scripts/db/verify_gf_asset_lifecycle.sh
  && test -f evidence/phase0/gf_asset_lifecycle.json > /dev/null || exit 1'
- '[ID GF-W1-SCH-005] [ID gf_w1_sch_005_wi01] grep -q ''"status"'' evidence/phase0/gf_asset_lifecycle.json
  > /dev/null || exit 1'
- '[ID GF-W1-SCH-005] [ID gf_w1_sch_005_wi02] python3 scripts/audit/verify_migration_meta_alignment.py
  && grep -q ''0101'' schema/migrations/MIGRATION_HEAD || exit 1'
evidence:
- path: evidence/phase0/gf_asset_lifecycle.json
  must_include:
  - task_id
  - run_id
  - git_sha
  - timestamp_utc
  - status
  - observed_paths
  - observed_hashes
  - command_outputs
  - execution_trace
  - retirement_append_only_confirmed
  - rls_confirmed
  - migration_head_confirmed
  - checks
  - failures
failure_modes:
- "Evidence file missing \u2192 BLOCKED (GF-W1-SCH-006 cannot start)"
- "retirement_append_only_confirmed=false \u2192 CRITICAL_FAIL (retirement_events\
  \ is mutable)"
- "if_not_exists_antipattern in migration SQL \u2192 FAIL (verifier exits non-zero)"
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
- docs/operations/AGENT_GUARDRAILS_GREEN_FINANCE.md
- docs/plans/phase0/GF-W1-SCH-005/PLAN.md
implementation_plan: docs/plans/phase0/GF-W1-SCH-005/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-SCH-005/EXEC_LOG.md
notes: asset_lifecycle_events uses join-tenant RLS (via asset_batches) because it
  has no direct tenant_id column. retirement_events is append-only via privilege revocation.
  Migration 0101 depends on 0100 (evidence_nodes/edges).
client: codex_cli
assigned_agent: db_foundation_agent
model: <UNASSIGNED>
second_pilot_test:
  candidate_sector_1: PWRM0001 plastic waste recovery
  candidate_sector_2: VM0044 solar energy generation
  unchanged_core_tables:
  - projects
  - methodology_versions
  - monitoring_records
  - evidence_nodes
  - evidence_edges
  unchanged_core_functions: []
  adapter_only_differences:
  - 'asset_batch_type discriminator: PWRM uses PLASTIC_CREDIT_BATCH, VM0044 uses SOLAR_REC_BATCH'
  - lifecycle_event_type values differ per adapter registration
  jurisdiction_profile_impact: "Not applicable \u2014 all three lifecycle tables use\
    \ tenant isolation. Both sectors share identical table structure."
  required_core_changes: []
  explanation: The asset_batches table uses a batch_type TEXT discriminator. PWRM0001
    plastic credit batches use batch_type='PLASTIC_CREDIT_BATCH' and VM0044 solar
    RECs use 'SOLAR_REC_BATCH'. Lifecycle events are typed via event_type discriminator.
