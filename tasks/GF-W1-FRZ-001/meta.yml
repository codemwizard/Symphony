schema_version: 1
phase: '0'
task_id: GF-W1-FRZ-001
title: "Merge governance package v2 to establish green finance policy baseline"
owner_role: SUPERVISOR
status: completed
priority: CRITICAL
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY
domain: green_finance
pilot: false

intent: >-
  The pilot containment policy, rejection playbook, agent guardrails, scope
  template, core contract gate script, and updated task metadata schema exist
  as outputs but are not yet part of the repo baseline. Until they are merged,
  no governance rule is enforced and agents are not bound by any pilot
  containment constraint. This task makes the governance package real.

anti_patterns:
  - "Merging docs without wiring CI — policy exists on paper but nothing enforces it"
  - "Marking complete before all file paths resolve and repo lints pass"
  - "Adding sector-specific content to any governance document during merge"

depends_on: []

blocks:
  - GF-W1-FRZ-002
  - GF-W1-FRZ-003
  - GF-W1-GOV-001
  - GF-W1-GOV-002
  - GF-W1-GOV-003

touches:
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/operations/AGENT_GUARDRAILS_GREEN_FINANCE.md
  - docs/operations/PILOT_REJECTION_PLAYBOOK.md
  - docs/operations/TASK_AUTHORING_STANDARD_v2.md
  - docs/pilots/PILOT_SCOPE_TEMPLATE.md
  - docs/invariants/NEUTRAL_HOST_INVARIANT_ENTRIES.md
  - docs/invariants/INVARIANTS_MANIFEST.yml
