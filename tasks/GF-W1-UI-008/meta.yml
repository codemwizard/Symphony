schema_version: 1
phase: '1'
task_id: GF-W1-UI-008
title: Create canonical recipient landing page
owner_role: SUPERVISOR
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: APP_LAYER

intent: >-
  Create src/recipient-landing/index.html as the canonical worker submission page
  with a 4-step flow: token validation, GPS capture, weighbridge form, and receipt.
  Enforces GPS privacy via resolveNeighbourhoodLabel — raw coordinates never appear.

anti_patterns:
  - "Displaying raw GPS coordinates in any DOM element"
  - "Using geocoding API instead of resolveNeighbourhoodLabel"
  - "Trusting browser arithmetic for net weight — comment: display only, backend recomputes"
  - "Using alert() or confirm() — use inline banners"

out_of_scope:
  - "Backend API changes — all existing routes unchanged"
  - "Program.cs wiring — handled by GF-W1-UI-009"
  - "Supervisory dashboard — separate tasks"

stop_conditions:
  - "Raw GPS coordinates rendered in DOM => CRITICAL_FAIL, stop immediately"
  - "resolveNeighbourhoodLabel function not defined in this file => CRITICAL_FAIL"
  - "Net weight field is editable (must be readonly) => FAIL"
  - "Missing // display only — backend recomputes comment on net weight => FAIL"
  - "Any node in the proof graph is orphaned => STOP"

proof_guarantees:
  - "grep verifies resolveNeighbourhoodLabel function definition exists"
  - "negative grep confirms no raw coordinate DOM insertion"
  - "grep verifies readonly attribute on net weight input"
  - "grep verifies 'display only' comment"

proof_limitations:
  - "GPS grep catches explicit patterns only — template literals not caught"
  - "4-step flow navigation requires manual browser testing"
  - "Error handling (400/422) requires live API testing"

depends_on:
  - GF-W1-UI-001

blocks:
  - GF-W1-UI-009

touches:
  - src/recipient-landing/index.html
  - tasks/GF-W1-UI-008/meta.yml
  - evidence/phase1/gf_w1_ui_008.json

invariants:
  - INV-GF-UI-003

work:
  - >-
    [ID gf_w1_ui_008_work_01] Create src/recipient-landing/index.html as the canonical
    file. Define resolveNeighbourhoodLabel function from the steering file.
  - >-
    [ID gf_w1_ui_008_work_02] Step 1 — Token validation: Read token from
    window.location.hash. Call GET /api/public/evidence-links/context with
    x-evidence-link-token header. Show role chip, zone via resolveNeighbourhoodLabel
    (never raw coordinates), TTL countdown. On error: red error card. "Continue to
    GPS Capture →" button.
  - >-
    [ID gf_w1_ui_008_work_03] Step 2 — GPS capture: Call navigator.geolocation.
    getCurrentPosition(). Show neighbourhood label (never raw coordinates). Compute
    Haversine distance from (-15.4167, 28.2833). ≤ 250m: green banner. > 250m: amber
    banner. "Continue to Form →" advances regardless — server enforces.
  - >-
    [ID gf_w1_ui_008_work_04] Step 3 — Weighbridge form (WASTE_COLLECTOR only):
    Plastic Type select (PET/HDPE/LDPE/PP/PS/OTHER). Gross Weight (kg) input.
    Tare Weight (kg) input. Net Weight: readonly, computed as
    (parseFloat(gross) - parseFloat(tare)).toFixed(2) with comment
    "// display only — backend recomputes from gross-tare". Photo upload zone.
    Collector ID readonly from token context. Submit Evidence button: upload photo
    then POST /v1/evidence-links/submit. Handle 202, 400, 422 responses.
  - >-
    [ID gf_w1_ui_008_work_05] Step 4 — Receipt: Green full-card state. instruction_id
    (monospace), sequence_number, submitted_at_utc. Text: "Your evidence has been
    recorded and sealed."

acceptance_criteria:
  - >-
    [ID gf_w1_ui_008_work_01] src/recipient-landing/index.html exists with
    resolveNeighbourhoodLabel function definition matching steering file.
  - >-
    [ID gf_w1_ui_008_work_02] Step 1 shows role chip, zone label (not coordinates),
    TTL countdown. Error state shows red card with error_code.
  - >-
    [ID gf_w1_ui_008_work_03] Step 2 shows neighbourhood label and zone check chip.
    No raw coordinates in DOM.
  - >-
    [ID gf_w1_ui_008_work_04] Step 3 form has all required fields. Net weight is
    readonly with "display only — backend recomputes" comment. Submit calls correct
    endpoints. Error handling for 400 and 422 responses.
  - >-
    [ID gf_w1_ui_008_work_05] Step 4 shows instruction_id, sequence_number, and
    confirmation text in green.

negative_tests:
  - id: GF-W1-UI-008-N1
    description: >-
      Grep src/recipient-landing/index.html for raw coordinate rendering patterns.
      The grep must find zero matches. If raw coordinates appear => CRITICAL_FAIL.
    required: true
  - id: GF-W1-UI-008-N2
    description: >-
      Grep for alert() or confirm() calls. Must find zero matches.
    required: true

positive_tests:
  - id: GF-W1-UI-008-P1
    description: >-
      Grep for resolveNeighbourhoodLabel function definition. Must be present.
    required: true
  - id: GF-W1-UI-008-P2
    description: >-
      Grep for "display only" comment near net weight. Must be present.
    required: true

verification:
  - >-
    # [ID gf_w1_ui_008_work_01] [ID gf_w1_ui_008_work_02] [ID gf_w1_ui_008_work_03]
    # [ID gf_w1_ui_008_work_04] [ID gf_w1_ui_008_work_05]
    test -f src/recipient-landing/index.html
    && grep -q "resolveNeighbourhoodLabel" src/recipient-landing/index.html
    && grep -q "display only" src/recipient-landing/index.html
    && grep -q "readonly" src/recipient-landing/index.html
    && grep -q "evidence-links/submit" src/recipient-landing/index.html
    && cat src/recipient-landing/index.html | grep "recorded and sealed"
    > evidence/phase1/gf_w1_ui_008.json || exit 1
  - >-
    # [ID gf_w1_ui_008_work_02] [ID gf_w1_ui_008_work_03]
    test -z "$(grep -E 'textContent.*latitude|innerHTML.*longitude' src/recipient-landing/index.html)"
    || exit 1

evidence:
  - path: evidence/phase1/gf_w1_ui_008.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace
      - gps_coordinate_check_passed

failure_modes:
  - Raw GPS coordinates rendered in DOM => CRITICAL_FAIL
  - resolveNeighbourhoodLabel not defined => CRITICAL_FAIL
  - Net weight editable (not readonly) => FAIL
  - "display only" comment missing => FAIL
  - alert() or confirm() used => FAIL
  - Evidence file missing => FAIL

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - .kiro/steering/ui-canonical-design.md
  - .kiro/steering/pwrm0001-domain-rules.md
  - .kiro/steering/symphony-platform-conventions.md
  - .kiro/specs/symphony-ui-canonical/requirements.md
  - .kiro/specs/symphony-ui-canonical/design.md
  - .kiro/specs/symphony-ui-canonical/tasks.md

implementation_plan: docs/plans/phase1/GF-W1-UI-008/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-UI-008/EXEC_LOG.md

notes: >-
  Atomic task 8 of 10. Largest single task due to 4-step flow but all contained in
  one file. Privacy-critical: GPS coordinate prohibition enforced.
  Phase Key: GF-W1. Phase Name: Green Finance Wave 1.

