work:
- Extend the pilot-demo supervisory website with an operator onboarding console that can create
  tenants, manage programme lifecycle, bind policy, register suppliers, and manage programme
  supplier allowlists through the server-side onboarding APIs.
- The browser must never receive ADMIN_API_KEY or signing-key material. Privileged actions must be
  mediated by same-origin server routes protected by the operator session boundary.
- Present onboarding state, validation errors, and readiness outcomes in the UI so onboarding is a
  product workflow rather than an operator shell ritual.
acceptance_criteria:
- Operators can complete the supported onboarding flow from the website without manually issuing raw
  provisioning curl commands for normal operations.
- Browser-delivered HTML and JavaScript do not embed admin or signing secrets.
- UI actions call same-origin server routes that enforce operator-session authorization.
- The UI reflects persisted onboarding state after page reload and after server restart.
verification:
- bash scripts/audit/verify_tsk_p1_219.sh
- python3 scripts/audit/validate_evidence.py --task TSK-P1-219 --evidence evidence/phase1/tsk_p1_219_operator_onboarding_console.json
evidence:
- evidence/phase1/tsk_p1_219_operator_onboarding_console.json
failure_modes:
- Browser code receives admin credentials or calls privileged endpoints directly with raw secret headers.
- UI stores onboarding state only in local browser state and loses it on reload.
- The onboarding path still requires shell-based API choreography for standard use.
