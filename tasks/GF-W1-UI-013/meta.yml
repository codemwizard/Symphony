schema_version: 1
phase: '1'
task_id: GF-W1-UI-013
title: Implement overall pilot gate status card with color-coded badges and timestamp
owner_role: ARCHITECT
status: planned
priority: NORMAL
risk_class: GOVERNANCE
blast_radius: APP_LAYER
intent: Implement overall pilot gate status card showing PASS/PENDING/FAIL with color-coded badges and last verified timestamp
  to provide stakeholders with immediate visibility into Symphony's compliance posture. This card serves as the top-level
  summary before drilling into category details.
anti_patterns:
- Hardcoding gate status instead of computing from criteria data
- Not color-coding badges according to UI canonical design rules
- Missing timestamp or not formatting it properly
- Missing action buttons for manual refresh and export
depends_on:
- GF-W1-UI-012
blocks:
- GF-W1-UI-014
touches:
- src/supervisory-dashboard/index.html
- evidence/phase1/gf_w1_ui_013.json
- tasks/GF-W1-UI-013/meta.yml
invariants: []
work:
- '[ID gf_w1_ui_013_work_item_01] Add overall status card HTML structure in overall-status placeholder'
- '[ID gf_w1_ui_013_work_item_02] Implement renderOverallStatus(status, lastVerified) function'
- '[ID gf_w1_ui_013_work_item_03] Add color-coded badges using chip-auth (green), chip-hold (amber), chip-sim (red) classes'
- '[ID gf_w1_ui_013_work_item_04] Add last verified timestamp display with formatTimestamp() function'
- '[ID gf_w1_ui_013_work_item_05] Add Refresh Now and Export Report action buttons'
acceptance_criteria:
- '[ID gf_w1_ui_013_work_item_01] Status card structure exists in overall-status div'
- '[ID gf_w1_ui_013_work_item_02] renderOverallStatus() sets badge class and message based on status'
- '[ID gf_w1_ui_013_work_item_03] Badges display with correct colors (green/amber/red)'
- '[ID gf_w1_ui_013_work_item_04] Timestamp displays in formatted readable format'
- '[ID gf_w1_ui_013_work_item_05] Action buttons are visible and clickable'
negative_tests:
- id: GF-W1-UI-013-N1
  description: Verify that status is not hardcoded but computed from criteria data.
  required: true
positive_tests:
- id: GF-W1-UI-013-P1
  description: Verify that overall status card displays correctly with all elements.
  required: true
verification:
- grep -q 'renderOverallStatus' src/supervisory-dashboard/index.html || exit 1
- grep -q 'overall-status' src/supervisory-dashboard/index.html || exit 1
- test -f evidence/phase1/gf_w1_ui_013.json || exit 1
evidence:
- path: evidence/phase1/gf_w1_ui_013.json
  must_include:
  - task_id
  - timestamp
  - status
  - overall_status_card_created
  - render_function_implemented
  - color_coded_badges_present
  - timestamp_display_implemented
  - action_buttons_present
  - checks
  - observed_paths
  - command_outputs
  - execution_trace
failure_modes:
- Status hardcoded => FUNCTIONAL.STALE_STATUS_DISPLAY => FAIL
- Badges not color-coded => UI.DESIGN_VIOLATION => FAIL
- Timestamp missing => FUNCTIONAL.NO_DATA_FRESHNESS_INDICATOR => FAIL
- Action buttons missing => FUNCTIONAL.NO_MANUAL_CONTROLS => FAIL
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- .kiro/steering/ui-canonical-design.md
- docs/operations/PILOT_DEMO_VIDEO_SCRIPT.md
- docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
implementation_plan: docs/plans/phase1/GF-W1-UI-013/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-UI-013/EXEC_LOG.md
notes: 'This task implements the top-level gate status card. Status is computed from criteria data, not hardcoded. Color-coded
  badges follow UI canonical design rules. Phase: Green Finance Wave 1. Domain: green_finance.'
client: kiro
assigned_agent: architect
model: claude-sonnet-4-20250514
domain: green_finance
pilot: true
second_pilot_test: The overall gate status card pattern works for any programme requiring compliance dashboard. For PWRM0001
  plastic collection, the card shows pilot success gate status. For a hypothetical VM0044 solar energy programme, the card
  would show programme compliance gate status. The card structure, color-coded badges, timestamp display, and action buttons
  are identical; only the criteria being evaluated differ per programme.
pilot_scope_ref: docs/pilots/PILOT_PWRM0001/SCOPE.md
