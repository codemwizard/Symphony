notes: >
  This task completes the missing runtime integration seam. OpenBao presence in infrastructure is not
  sufficient; the application must consume secrets from it in the hardened path. TSK-P1-INF-005
  proved the OpenBao and ESO sandbox manifests. TSK-P1-INF-006 proved the signing key management
  path. This task builds the application-side wire that those tasks deferred. Read both exec logs
  before implementing to understand what was built and what must not be re-implemented.
