work:
- The current application reads INGRESS_API_KEY, ADMIN_API_KEY, EVIDENCE_SIGNING_KEY,
  DEMO_INSTRUCTION_SIGNING_KEY, and tenant allowlist inputs directly from process environment
  variables. OpenBao exists in infrastructure posture, but the application runtime does not use it
  as the secret source of truth.
- Introduce a first-class secret provider abstraction for runtime secret resolution with at least an
  environment-backed adapter and an OpenBao-backed adapter. Wire the application through dependency
  injection so security-sensitive code paths stop reading environment variables directly.
- Hardened GreenTech4CE deployment must use OpenBao-backed runtime secret resolution. Environment
  fallback may remain only for self-tests and explicitly developer-only profiles, not for the
  supported hardened demo profile.
- Startup and readiness must fail closed when required OpenBao-backed secrets are unavailable.
acceptance_criteria:
- Security-sensitive runtime paths no longer call Environment.GetEnvironmentVariable directly for
  ingress, admin, instruction-signing, evidence-signing, or operator-session secrets.
- Hardened demo profile resolves required secrets through the OpenBao provider and starts only when
  those secrets are retrievable and valid.
- Readiness fails when OpenBao is unreachable or required secret material is missing.
- Existing self-tests continue to work through an explicitly scoped developer/test provider path.
- Evidence proves runtime secret consumption, not just infrastructure reachability.
