  p=''evidence/phase1/human_governance_review_signoff.json''

  d=json.load(open(p))

  req=[''reviewer_id'',''reviewed_files'',''signed_at_utc'',''change_ref'']

  missing=[k for k in req if k not in d]

  assert not missing, missing

  print(''PASS'')

  PY2'
