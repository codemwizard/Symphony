schema_version: 1
phase: '1'
task_id: TSK-P1-222
title: "Repair the TSK-RLS-ARCH-001 task contract so that Wave 1 implementation stays truthful and fail-closed"
owner_role: SUPERVISOR
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: CI_GATES
intent: >-
  The current RLS remediation plan now executes through smaller first-wave tasks,
  but `TSK-RLS-ARCH-001` still describes a much larger bundled implementation
  surface. This task narrows the parent RLS contract so implementation truth,
  verifier authority, and evidence scope match the new staged execution model
  before any Wave 1 platform work begins.
anti_patterns:
  - "Leaving `TSK-RLS-ARCH-001` broad enough that Wave 1 work can hide undeclared scope"
  - "Inventing a new completion path in child tasks without repairing the parent task contract"
  - "Marking the task pack ready when plan, evidence, or verification authority is ambiguous"
depends_on: []
blocks:
  - TSK-P1-223
  - TSK-P1-224
  - TSK-P1-225
  - TSK-P1-226
touches:
  - tasks/TSK-RLS-ARCH-001/meta.yml
  - docs/plans/phase1/TSK-RLS-ARCH-001/PLAN.md
  - docs/plans/phase1/TSK-RLS-ARCH-001/EXEC_LOG.md
  - scripts/audit/verify_tsk_p1_222.sh
  - evidence/phase1/tsk_p1_222_rls_contract_repair.json
  - tasks/TSK-P1-222/meta.yml
  - docs/plans/phase1/TSK-P1-222/PLAN.md
  - docs/plans/phase1/TSK-P1-222/EXEC_LOG.md
invariants:
  - INV-105
  - INV-119
work:
  - >-
    [ID tsk_p1_222_work_item_01] Amend `tasks/TSK-RLS-ARCH-001/meta.yml` so its stated scope, verifier path,
    evidence path, and closure assumptions match the staged execution model rather than the omnibus shape.
  - >-
    [ID tsk_p1_222_work_item_02] Update the parent task plan and execution log headers so they explicitly
    reference Wave 1, the first-five companion plan, and the remainder plan.
  - >-
    [ID tsk_p1_222_work_item_03] Create a deterministic verifier script that fails when the parent task pack
    still implies undeclared Wave 1 or closure authority drift.
acceptance_criteria:
  - >-
    [ID tsk_p1_222_work_item_01] `TSK-RLS-ARCH-001` declares only truthful current-scope files, evidence, and
    verifier authority for the staged execution model.
  - >-
    [ID tsk_p1_222_work_item_02] The parent task plan and log point reviewers to the master plan, first-five
    plan, and remainder plan without ambiguity about execution order.
  - >-
    [ID tsk_p1_222_work_item_03] `scripts/audit/verify_tsk_p1_222.sh` exits 0 only when the parent task pack
    reflects the staged execution contract and emits the declared Phase-1 evidence.
negative_tests:
  - id: TSK-P1-222-N1
    description: >-
      Introduce a mismatched verifier or evidence reference in `TSK-RLS-ARCH-001`
      and confirm the task-specific verifier fails closed instead of allowing the
      parent task contract to drift silently.
    required: true
positive_tests:
  - id: TSK-P1-222-P1
    description: >-
      With the parent task pack repaired, the task-specific verifier and the
      generic task readiness checks both pass against the updated task contract.
    required: false
verification:
  - >-
    # [ID tsk_p1_222_work_item_01] [ID tsk_p1_222_work_item_02] [ID tsk_p1_222_work_item_03]
    test -x scripts/audit/verify_tsk_p1_222.sh && bash scripts/audit/verify_tsk_p1_222.sh > evidence/phase1/tsk_p1_222_rls_contract_repair.json || exit 1
  - >-
    # [ID tsk_p1_222_work_item_03]
    test -f evidence/phase1/tsk_p1_222_rls_contract_repair.json && python3 scripts/audit/validate_evidence.py --task TSK-P1-222 --evidence evidence/phase1/tsk_p1_222_rls_contract_repair.json || exit 1
  - >-
    # [ID tsk_p1_222_work_item_03]
    test -x scripts/dev/pre_ci.sh && RUN_PHASE1_GATES=1 bash scripts/dev/pre_ci.sh || exit 1
evidence:
  - path: evidence/phase1/tsk_p1_222_rls_contract_repair.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace
      - parent_task_id
      - repaired_paths
      - contract_alignment
failure_modes:
  - "Parent RLS task still declares omnibus implementation scope => FAIL"
  - "Wave 1 execution order remains ambiguous to reviewers or agents => BLOCKED"
  - "Evidence file missing => FAIL"
must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - AGENT_ENTRYPOINT.md
  - docs/operations/AGENT_PROMPT_ROUTER.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/reference/rls-remediation-final-plan.md
  - docs/reference/rls-remediation-first-five-tasks.md
implementation_plan: docs/plans/phase1/TSK-P1-222/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-222/EXEC_LOG.md
notes: >-
  Wave 1 anchor task. This task exists only to restore truthful parent-task scope
  before any verification-spine primitives are implemented. It must complete
  first or the later tasks will inherit a misleading contract.
client: cursor
assigned_agent: supervisor
model: Cascade
