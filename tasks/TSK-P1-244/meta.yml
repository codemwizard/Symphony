work:
- '[ID tsk_p1_244_work_item_01] Extend `scripts/audit/runtime_guarded_execution_core.sh`
  so `repo-guard` enforces repository-root normalization and rejects path traversal
  outside the working tree.'
- '[ID tsk_p1_244_work_item_02] Add explicit filesystem write-boundary rules so the
  execution core writes only to declared evidence paths or shell temp space and fails
  closed on unauthorized output targets.'
- '[ID tsk_p1_244_work_item_03] Create `scripts/audit/verify_tsk_p1_244.sh` so the
  verifier exercises real path and write-boundary behavior against the execution core
  instead of trusting text claims.'
- '[ID tsk_p1_244_work_item_04] Emit bounded evidence at `evidence/phase1/tsk_p1_244_repository_filesystem_integrity.json`
  proving the repository/filesystem integrity layer and explicitly leaving evidence
  finalization and adversarial coverage downstream.'
acceptance_criteria:
- '[ID tsk_p1_244_work_item_01] The `repo-guard` execution path rejects repo-root
  inputs that normalize outside the working tree and does not permit path traversal
  through relative path tricks.'
- '[ID tsk_p1_244_work_item_02] The execution core permits writes only to an explicit
  evidence target or shell temp space and exits non-zero for unauthorized output paths
  under repository/filesystem guard mode.'
- '[ID tsk_p1_244_work_item_03] `scripts/audit/verify_tsk_p1_244.sh` inspects and
  exercises the real execution core for repository-root and write-boundary failures
  and emits `evidence/phase1/tsk_p1_244_repository_filesystem_integrity.json`.'
- '[ID tsk_p1_244_work_item_04] The evidence proves only repository/filesystem integrity
  guarantees and states that evidence-finalization semantics and adversarial coverage
  remain downstream obligations.'
verification:
- '# [ID tsk_p1_244_work_item_01] [ID tsk_p1_244_work_item_02] # [ID tsk_p1_244_work_item_03]
  [ID tsk_p1_244_work_item_04] bash -lc ''test -x scripts/audit/verify_tsk_p1_244.sh
  && bash scripts/audit/verify_tsk_p1_244.sh > evidence/phase1/tsk_p1_244_repository_filesystem_integrity.json
  || exit 1'''
- '# [ID tsk_p1_244_work_item_04] bash -lc ''test -f evidence/phase1/tsk_p1_244_repository_filesystem_integrity.json
  && python3 scripts/audit/validate_evidence.py --task TSK-P1-244 --evidence evidence/phase1/tsk_p1_244_repository_filesystem_integrity.json
  || exit 1'''
- '# [ID tsk_p1_244_work_item_01] [ID tsk_p1_244_work_item_02] # [ID tsk_p1_244_work_item_03]
  [ID tsk_p1_244_work_item_04] bash -lc ''test -x scripts/dev/pre_ci.sh && RUN_PHASE1_GATES=1
  bash scripts/dev/pre_ci.sh || exit 1'''
