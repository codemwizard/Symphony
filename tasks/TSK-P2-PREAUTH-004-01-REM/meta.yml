intent: >-
  Wave 4 audit identified that TSK-P2-PREAUTH-004-01 metadata references migration 0119 (4 columns) instead of the actual 0134 migration (11 columns).
  This task creates a verifier script built from the 0134 contract and updates the 004-01 task metadata to reflect the hardened implementation.
  Without this fix, the task metadata is out of sync with the actual migration, creating governance drift risk.

anti_patterns:
