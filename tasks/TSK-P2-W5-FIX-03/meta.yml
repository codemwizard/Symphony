# ── Regulated Surface Compliance (CRITICAL) ────────────────────────────────
regulated_surface_compliance:
  enabled: true
  approval_workflow: stage_a_stage_b
  stage_a_required_before_edit: true
  regulated_paths:
    - schema/migrations/0147_add_fks_to_state_transitions.sql
  must_read:
    - docs/operations/REGULATED_SURFACE_PATHS.yml
    - docs/operations/approval_metadata.schema.json

# ── Remediation Trace Compliance (CRITICAL) ────────────────────────────────
remediation_trace_compliance:
  enabled: true
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

# ── Database Connection ────────────────────────────────────────────────────
database_connection:
  enabled: true
  connection_string_format: "postgresql://<user>:<password>@<host>:<port>/<database>"
  example_connection_string: "postgresql://symphony_admin:symphony_pass@localhost:5432/symphony"
  container_name: symphony-postgres
  database_url_env_var: DATABASE_URL
  setup_command: "export DATABASE_URL=\"postgresql://symphony_admin:symphony_pass@localhost:5432/symphony\""

# ── Migration Dependencies ─────────────────────────────────────────────────
migration_dependencies:
  enabled: true
  required_migrations:
    - "0134": "policy_decisions table with policy_decision_id PK"
    - "0137": "state_transitions table with execution_id and policy_decision_id"
    - "0146": "state_rules entity_type (FIX-02)"
  table_dependencies:
    - "execution_records": "must exist with execution_id PK"
    - "policy_decisions": "must exist with policy_decision_id PK"
    - "state_transitions": "must exist with execution_id and policy_decision_id columns"
  verification_step: "Confirm all referenced tables exist in earlier migrations"


# ── Work items ─────────────────────────────────────────────────────────────
work:
  - >-
    [ID w5_fix_03_work_01] Verify no orphaned rows exist: query
    state_transitions for execution_id values not in execution_records and
    policy_decision_id values not in policy_decisions. Record counts in
    EXEC_LOG.md.
  - >-
    [ID w5_fix_03_work_02] Write migration
    0147_add_fks_to_state_transitions.sql. The migration must: (a) Check
    for orphaned rows and abort with PRECONDITION FAILED if any exist;
    (b) Add FK: execution_id REFERENCES execution_records(execution_id);
    (c) Add FK: policy_decision_id REFERENCES policy_decisions(policy_decision_id);
    (d) Both FKs must NOT use ON DELETE CASCADE (append-only table);
    (e) Use IF NOT EXISTS / DO blocks for idempotency.
  - >-
    [ID w5_fix_03_work_03] Update MIGRATION_HEAD to 0147.
  - >-
    [ID w5_fix_03_work_04] Write verification script
    scripts/db/verify_tsk_p2_w5_fix_03.sh with live behavioral tests:
    (1) Verify FK constraints exist in information_schema;
    (2) N1: INSERT with non-existent execution_id must fail with FK violation;
    (3) N2: INSERT with non-existent policy_decision_id must fail with FK violation;
    (4) P1: INSERT with valid FKs must not be rejected by FK constraints.
  - >-
    [ID w5_fix_03_work_05] Run verification script and generate evidence JSON.
  - >-
    [ID w5_fix_03_work_06] Post-implementation governance — Structural Change
    Gate (Step 9): Append entries to THREAT_MODEL.md and COMPLIANCE_MAP.md.
  - >-
    [ID w5_fix_03_work_07] Post-implementation governance — Schema Baseline
    Drift (Steps 10-11): Regenerate baseline, update ADR-0010.
  - >-
    [ID w5_fix_03_work_08] Post-implementation governance — DDL Lock-Risk
    (Step 12): ALTER TABLE ADD CONSTRAINT may trigger linter — allowlist if needed.
  - >-
    [ID w5_fix_03_work_09] Post-implementation governance — Stage Evidence
    Files (Step 13).
  - >-
    [ID w5_fix_03_work_10] Update EXEC_LOG.md with verification_commands_run
    and final_status markers.

# ── Acceptance criteria ────────────────────────────────────────────────────
acceptance_criteria:
  - >-
    [ID w5_fix_03_work_01] EXEC_LOG.md confirms zero orphaned rows before FK
    creation.
  - >-
    [ID w5_fix_03_work_02] Two FK constraints exist on state_transitions
    verified via information_schema.table_constraints.
  - >-
    [ID w5_fix_03_work_03] MIGRATION_HEAD contains '0147'.
  - >-
    [ID w5_fix_03_work_04] [ID w5_fix_03_work_05] Verification script exits 0
    with FK rejection proof in evidence JSON.
  - >-
    [ID w5_fix_03_work_06] THREAT_MODEL.md and COMPLIANCE_MAP.md contain
    dated entries referencing TSK-P2-W5-FIX-03 and migration 0147.
  - >-
    [ID w5_fix_03_work_07] Baseline regenerated and ADR-0010 updated.
  - >-
    [ID w5_fix_03_work_09] Phase0 evidence files freshly generated and staged.
  - >-
    [ID w5_fix_03_work_10] EXEC_LOG.md contains all 5 remediation trace
    markers.

# ── Negative tests ─────────────────────────────────────────────────────────
negative_tests:
  - id: TSK-P2-W5-FIX-03-N1
    description: >-
      AFTER fix: INSERT into state_transitions with a non-existent
      execution_id must fail with FK violation error (SQLSTATE 23503).
    required: true
  - id: TSK-P2-W5-FIX-03-N2
    description: >-
      AFTER fix: INSERT into state_transitions with a non-existent
      policy_decision_id must fail with FK violation error (SQLSTATE 23503).
    required: true

# ── Positive tests ─────────────────────────────────────────────────────────
positive_tests:
  - id: TSK-P2-W5-FIX-03-P1
    description: >-
      AFTER fix: INSERT with valid execution_id and policy_decision_id must
      not be rejected by FK constraints (may still be rejected by triggers).
    required: true

# ── Verification commands ──────────────────────────────────────────────────
verification:
  - >-
    [ID w5_fix_03_work_02] psql "$DATABASE_URL" -tAc "SELECT count(*) FROM
    information_schema.table_constraints WHERE table_name = 'state_transitions'
    AND constraint_type = 'FOREIGN KEY'" | grep -q '2' || exit 1
  - >-
    [ID w5_fix_03_work_03] test "$(cat schema/migrations/MIGRATION_HEAD)" =
    '0147' || exit 1
  - >-
    [ID w5_fix_03_work_04] [ID w5_fix_03_work_05] bash
    scripts/db/verify_tsk_p2_w5_fix_03.sh || exit 1
  - >-
    [ID w5_fix_03_work_05] test -f evidence/phase2/tsk_p2_w5_fix_03.json ||
    exit 1

# ── Evidence contract ──────────────────────────────────────────────────────
