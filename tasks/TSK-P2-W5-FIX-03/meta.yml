  - "Orphaned rows exist blocking FK creation => BLOCKED"
  - "FK uses ON DELETE CASCADE on append-only table => CRITICAL_FAIL"
  - "Verification script does not test FK rejection => FAIL"
  - "Evidence file missing => FAIL"
  - "Baseline not regenerated => FAIL (pre_ci.sh will flag)"
  - "ADR-0010 not updated => FAIL (governance gate will flag)"

