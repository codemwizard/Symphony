schema_version: 1
phase: '2'
task_id: TSK-P2-W5-FIX-03
title: "Add FK constraints on state_transitions.execution_id and policy_decision_id to enforce referential integrity at DB level"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

# ── Why this task exists ───────────────────────────────────────────────────
intent: >-
  Migration 0137 created state_transitions with execution_id UUID NOT NULL and
  policy_decision_id UUID NOT NULL, but declared no FOREIGN KEY constraints
  pointing to execution_records(execution_id) or policy_decisions(policy_decision_id).
  The DoD is explicit: 'No soft references. No we validate in code.' Without DB-level
  FK enforcement, a direct INSERT that bypasses or pre-dates the triggers leaves
  dangling references with no enforcement. This is a referential integrity gap
  that makes the authority chain unverifiable.

# ── What this task must NOT do ─────────────────────────────────────────────
anti_patterns:
  - "Editing migration 0137 directly — forward-only migrations are immutable"
  - "Adding FKs without checking for existing orphaned rows — silent constraint failure"
  - "Bundling SECURITY DEFINER or trigger ordering changes"
  - "Marking complete without proving FK rejection on orphan INSERT"

# ── Anti-drift boundaries ──────────────────────────────────────────────────
out_of_scope:
  - "SECURITY DEFINER hardening (TSK-P2-W5-FIX-04)"
  - "Trigger ordering (TSK-P2-W5-FIX-05)"
  - "ON DELETE policy changes on state_current (TSK-P2-W5-FIX-06)"
stop_conditions:
  - "Existing orphaned rows prevent FK constraint creation — must abort with PRECONDITION FAILED"
  - "FK uses ON DELETE CASCADE — append-only table must not cascade deletes"
  - "Verifier does not attempt INSERT with non-existent execution_id or policy_decision_id"
  - "Approval metadata not created before editing regulated surface"

# ── Proof limits ───────────────────────────────────────────────────────────
proof_guarantees:
  - "FK constraint exists: state_transitions.execution_id REFERENCES execution_records(execution_id)"
  - "FK constraint exists: state_transitions.policy_decision_id REFERENCES policy_decisions(policy_decision_id)"
  - "INSERT with non-existent execution_id is rejected by DB constraint (not trigger)"
  - "INSERT with non-existent policy_decision_id is rejected by DB constraint (not trigger)"
proof_limitations:
  - "Does not prove FK behavior under concurrent transactions"
  - "Does not prove SECURITY DEFINER correctness (deferred to FIX-04)"

# ── Dependencies ───────────────────────────────────────────────────────────
depends_on:
  - TSK-P2-W5-FIX-02

blocks:
  - TSK-P2-W5-FIX-04

# ── File scope ─────────────────────────────────────────────────────────────
touches:
