schema_version: 1
phase: '1'
task_id: TSK-P1-233
title: Implement a report-only dependency truth validator so downstream tasks cannot
  proceed on socially assumed upstream completion
owner_role: SECURITY_GUARDIAN
status: completed
depends_on:
- TSK-P1-232
touches:
- scripts/audit/task_dependency_truth_gate.py
- scripts/audit/verify_tsk_p1_233.sh
- evidence/phase1/tsk_p1_233_dependency_truth.json
- tasks/TSK-P1-233/meta.yml
- docs/plans/phase1/TSK-P1-233/PLAN.md
- docs/plans/phase1/TSK-P1-233/EXEC_LOG.md
invariants:
- INV-105
- INV-119
work:
- Implement a report-only dependency truth gate that checks whether dependencies are
  completed through valid proof artifacts, whether required dependency outputs exist,
  and whether downstream tasks attempt to reimplement dependency responsibilities.
- Emit dependency findings through the shared gate result contract with detection
  scope limited to dependency truth rather than broad semantic task analysis.
- Add a task-specific verifier that exercises dependency-complete-but-unproven and
  missing-output fixtures and emits declared dependency-truth evidence.
acceptance_criteria:
- Downstream tasks no longer rely on socially assumed upstream completion when proof
  or required outputs are missing.
- Dependency truth findings use the shared gate result contract instead of ad hoc
  dependency-warning output.
- '`scripts/audit/verify_tsk_p1_233.sh` exercises invalid and valid dependency fixtures
  and emits `evidence/phase1/tsk_p1_233_dependency_truth.json`.'
verification:
- bash scripts/audit/verify_tsk_p1_233.sh
- python3 scripts/audit/validate_evidence.py --task TSK-P1-233 --evidence evidence/phase1/tsk_p1_233_dependency_truth.json
- RUN_PHASE1_GATES=1 bash scripts/dev/pre_ci.sh
evidence:
- '{''path'': ''evidence/phase1/tsk_p1_233_dependency_truth.json'', ''must_include'':
  [''task_id'', ''git_sha'', ''timestamp_utc'', ''status'', ''checks'', ''gate_result_contract_fields'',
  ''unproven_dependency_result'', ''missing_output_result'', ''valid_dependency_result'']}'
failure_modes:
- Dependency truth gate allows socially assumed upstream completion => FAIL
- Missing dependency outputs are not surfaced before downstream execution => BLOCKED
- Evidence file missing => FAIL
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- AGENT_ENTRYPOINT.md
- docs/operations/AGENT_PROMPT_ROUTER.md
- docs/operations/TASK_CREATION_PROCESS.md
- docs/reference/rls-anti-drift-wave2-task-plan.md
implementation_plan: docs/plans/phase1/TSK-P1-233/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-233/EXEC_LOG.md
notes: This gate validates dependency truth, not cross-task architecture purity. Freshness
  and broader lineage semantics remain later follow-on work.
client: cursor
assigned_agent: security_guardian
model: Cascade
