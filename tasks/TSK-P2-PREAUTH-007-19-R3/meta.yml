schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-007-19-R3
title: Fail meaningless fallbacks when DATABASE_URL unset
owner_role: SECURITY_GUARDIAN
status: planned
priority: HIGH
risk_class: SECURITY
blast_radius: SCRIPTS_ONLY

intent: >-
  Replace "unknown:unknown:unknown" fallbacks with explicit failure when DATABASE_URL is not set,
  ensuring provenance is never meaningless. The original implementation returned meaningless placeholders
  when DATABASE_URL was unset, providing no actual provenance and potentially masking configuration errors.

anti_patterns:
  - "Returning 'unknown' values when DATABASE_URL is unset"
  - "Silent fallbacks that provide no provenance"
  - "Accepting 'unknown' in provenance fields"
  - "Continuing execution without DATABASE_URL"

out_of_scope:
  - Changing DATABASE_URL format or structure
  - Modifying environment fingerprint capture logic
  - Changing executor identity capture logic (except error handling)

stop_conditions:
  - "If functions still return 'unknown' when DATABASE_URL unset → STOP"
  - "If verifier accepts 'unknown' values → STOP"
  - "If DATABASE_URL check is not explicit → STOP"

proof_guarantees:
  - "Functions fail with clear error when DATABASE_URL is unset"
  - "Error message explicitly states DATABASE_URL requirement"
  - "Verifier rejects 'unknown' in any provenance field"
  - "Verifier passes when DATABASE_URL is set correctly"

proof_limitations:
  - "Only validates at capture time, not at every step of CI execution"
  - "Relies on environment variable being set correctly"

depends_on:
  - TSK-P2-PREAUTH-007-19-R2

blocks:
