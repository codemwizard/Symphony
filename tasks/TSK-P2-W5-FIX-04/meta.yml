# ── Database Connection ────────────────────────────────────────────────────
database_connection:
  enabled: true
  connection_string_format: "postgresql://<user>:<password>@<host>:<port>/<database>"
  example_connection_string: "postgresql://symphony_admin:symphony_pass@localhost:5432/symphony"
  container_name: symphony-postgres
  database_url_env_var: DATABASE_URL
  setup_command: "export DATABASE_URL=\"postgresql://symphony_admin:symphony_pass@localhost:5432/symphony\""

# ── Migration Dependencies ─────────────────────────────────────────────────
migration_dependencies:
  enabled: true
  required_migrations:
    - "0139": "enforce_transition_state_rules()"
    - "0140": "enforce_transition_authority()"
    - "0141": "enforce_transition_signature()"
    - "0142": "enforce_execution_binding()"
    - "0143": "deny_state_transitions_mutation()"
    - "0144": "update_current_state()"
    - "0147": "FK constraints (FIX-03)"
  table_dependencies:
    - "state_transitions": "must exist with all triggers attached"
  verification_step: "Confirm all referenced tables exist in earlier migrations"


# ── Work items ─────────────────────────────────────────────────────────────
work:
  - >-
    [ID w5_fix_04_work_01] Audit all 6 functions: query pg_proc for prosecdef
    and proconfig. Confirm all are SECURITY INVOKER (prosecdef=false) and have
    no proconfig. Record in EXEC_LOG.md.
  - >-
    [ID w5_fix_04_work_02] Write migration
    0148_harden_trigger_functions_security_definer.sql. For each of the 6
    functions, use CREATE OR REPLACE FUNCTION with the original body plus
    SECURITY DEFINER SET search_path = pg_catalog, public. The function bodies
    must be copied from their current pg_proc state (post FIX-01 and FIX-02),
    not from old migration files.
  - >-
    [ID w5_fix_04_work_03] Update MIGRATION_HEAD to 0148.
  - >-
    [ID w5_fix_04_work_04] Write verification script
    scripts/db/verify_tsk_p2_w5_fix_04.sh: For each function, query pg_proc
    for prosecdef=true and proconfig LIKE '%search_path=pg_catalog, public%'.
    Fail if any function is missing either attribute.
  - >-
    [ID w5_fix_04_work_05] Run verification script and generate evidence JSON.
  - >-
    [ID w5_fix_04_work_06] Post-implementation governance — Structural Change
    Gate (Step 9): Append entries to THREAT_MODEL.md (SECURITY DEFINER reduces
    search_path hijack surface) and COMPLIANCE_MAP.md.
  - >-
    [ID w5_fix_04_work_07] Post-implementation governance — Schema Baseline
    Drift (Steps 10-11): Regenerate baseline, update ADR-0010.
  - >-
    [ID w5_fix_04_work_08] Post-implementation governance — DDL Lock-Risk
    (Step 12): Verify and allowlist if flagged.
  - >-
    [ID w5_fix_04_work_09] Post-implementation governance — Stage Evidence
    Files (Step 13).
  - >-
    [ID w5_fix_04_work_10] Update EXEC_LOG.md with verification_commands_run
    and final_status markers.

# ── Acceptance criteria ────────────────────────────────────────────────────
acceptance_criteria:
  - >-
    [ID w5_fix_04_work_01] EXEC_LOG.md confirms all 6 functions are SECURITY
    INVOKER (prosecdef=false) before fix.
  - >-
    [ID w5_fix_04_work_02] All 6 functions have prosecdef=true and hardened
    search_path after migration 0148.
  - >-
    [ID w5_fix_04_work_03] MIGRATION_HEAD contains '0148'.
  - >-
    [ID w5_fix_04_work_04] [ID w5_fix_04_work_05] Verification script exits 0
    and evidence JSON produced.
  - >-
    [ID w5_fix_04_work_06] THREAT_MODEL.md and COMPLIANCE_MAP.md updated.
  - >-
    [ID w5_fix_04_work_07] Baseline regenerated and ADR-0010 updated.
  - >-
    [ID w5_fix_04_work_09] Phase0 evidence staged.
  - >-
    [ID w5_fix_04_work_10] EXEC_LOG.md contains all 5 remediation trace
    markers.

# ── Negative tests ─────────────────────────────────────────────────────────
negative_tests:
  - id: TSK-P2-W5-FIX-04-N1
    description: >-
      BEFORE fix: Query pg_proc confirms all 6 functions have prosecdef=false.
      This proves SECURITY DEFINER is genuinely missing.
    required: true

# ── Positive tests ─────────────────────────────────────────────────────────
positive_tests:
  - id: TSK-P2-W5-FIX-04-P1
    description: >-
      AFTER fix: All 6 functions have prosecdef=true AND proconfig contains
      'search_path=pg_catalog, public'.
    required: true

# ── Verification commands ──────────────────────────────────────────────────
verification:
  - >-
    [ID w5_fix_04_work_02] psql "$DATABASE_URL" -tAc "SELECT count(*) FROM
    pg_proc WHERE proname IN ('enforce_transition_state_rules',
    'enforce_transition_authority', 'generate_transition_hash',
    'enforce_hash_uniqueness', 'set_transitioned_at',
    'update_current_state') AND prosecdef = true" | grep -q '6' || exit 1
  - >-
    [ID w5_fix_04_work_03] test "$(cat schema/migrations/MIGRATION_HEAD)" =
    '0148' || exit 1
  - >-
    [ID w5_fix_04_work_04] [ID w5_fix_04_work_05] bash
    scripts/db/verify_tsk_p2_w5_fix_04.sh || exit 1
  - >-
    [ID w5_fix_04_work_05] test -f evidence/phase2/tsk_p2_w5_fix_04.json ||
    exit 1

