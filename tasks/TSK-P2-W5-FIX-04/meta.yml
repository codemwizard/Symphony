schema_version: 1
phase: '2'
task_id: TSK-P2-W5-FIX-04
title: "Harden all Wave 5 trigger functions with SECURITY DEFINER and SET search_path = pg_catalog, public"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: SECURITY
blast_radius: DB_SCHEMA

# ── Why this task exists ───────────────────────────────────────────────────
intent: >-
  AGENTS.md mandates: 'SECURITY DEFINER functions must harden: SET search_path
  = pg_catalog, public'. Migrations 0139-0144 created six trigger functions —
  all defined as plain SECURITY INVOKER (the default). Without SECURITY
  DEFINER + hardened search_path, any user with USAGE on the schema can
  create a shadow function in a preceding schema and hijack trigger execution.
  The six functions are: enforce_transition_state_rules(),
  enforce_transition_authority(), generate_transition_hash(),
  enforce_hash_uniqueness(), set_transitioned_at(),
  update_current_state().

# ── What this task must NOT do ─────────────────────────────────────────────
anti_patterns:
  - "Adding SECURITY DEFINER without SET search_path — creates privilege escalation"
  - "Editing existing migrations 0139-0144 directly"
  - "Changing function logic — only adding security posture"
  - "Bundling trigger ordering rename (FIX-05)"

# ── Anti-drift boundaries ──────────────────────────────────────────────────
out_of_scope:
  - "Trigger ordering (TSK-P2-W5-FIX-05)"
  - "SQLSTATE codes (TSK-P2-W5-FIX-08)"
  - "Function logic changes"
stop_conditions:
  - "SECURITY DEFINER added without SET search_path"
  - "Any function body logic changed (only security posture should change)"
  - "Approval metadata not created before editing regulated surface"

# ── Proof limits ───────────────────────────────────────────────────────────
proof_guarantees:
  - "All 6 trigger functions have prosecdef = true in pg_proc"
  - "All 6 trigger functions have proconfig containing 'search_path=pg_catalog, public'"
proof_limitations:
  - "Does not prove functions are owned by correct role"
  - "Cannot prove search_path injection is impossible (proves hardening exists)"

# ── Dependencies ───────────────────────────────────────────────────────────
depends_on:
  - TSK-P2-W5-FIX-03

blocks:
  - TSK-P2-W5-FIX-05

# ── File scope ─────────────────────────────────────────────────────────────
touches:
