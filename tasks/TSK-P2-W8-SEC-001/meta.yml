  enabled: false

work:
  - >-
    [ID w8_sec_001_work_01] Consume the runtime/provider honesty proof from `TSK-P2-W8-SEC-000` and document the authoritative Ed25519 verification implementation standard for Wave 8 inside that proven environment.
  - >-
    [ID w8_sec_001_work_02] Implement a verification primitive that verifies signatures over the contract-defined input bytes and rejects non-canonical or differently canonicalized byte streams.
  - >-
    [ID w8_sec_001_work_03] Add primitive-level tests for malformed signatures, wrong keys, valid signatures over contract-defined bytes, and fail-closed behavior inside the proven runtime environment.

acceptance_criteria:
  - >-
    [ID w8_sec_001_work_01] The authoritative Ed25519 verification standard is documented as consuming the environment/provider honesty proven by `SEC-000`.
  - >-
    [ID w8_sec_001_work_02] The primitive verifies signatures over contract-defined bytes and rejects non-canonical byte interpretations.
  - >-
    [ID w8_sec_001_work_03] Primitive-level tests prove malformed-signature failure, wrong-key failure, valid-signature success, and fail-closed runtime behavior inside the proven environment.

negative_tests:
  - id: TSK-P2-W8-SEC-001-N1
    description: >-
      Verifier fails if the primitive accepts signatures over bytes that differ from the contract-defined signature input.
    required: true

positive_tests:
  - id: TSK-P2-W8-SEC-001-P1
    description: >-
      Verifier passes only when valid Ed25519 signatures over contract-defined bytes succeed and malformed, wrong-key, or runtime-failure cases fail inside the `SEC-000`-proven environment.
    required: true

verification:
  - '# [ID w8_sec_001_work_01] [ID w8_sec_001_work_02] [ID w8_sec_001_work_03] test -e scripts/security/verify_tsk_p2_w8_sec_001.sh && bash scripts/security/verify_tsk_p2_w8_sec_001.sh > evidence/phase2/tsk_p2_w8_sec_001.json || exit 1'
