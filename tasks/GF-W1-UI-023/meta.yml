schema_version: 1
phase: '1'
task_id: GF-W1-UI-023
title: Perform integration testing of complete pilot success criteria flow
owner_role: ARCHITECT
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: APP_LAYER
intent: Perform integration testing of the complete pilot success criteria flow to ensure all UI components, API endpoints,
  polling, and export functionality work together correctly. This task validates criteria loading, overall status display,
  category sections, criterion detail panel, Run Verification Now, auto-refresh polling, and export report functionality.
  All test scenarios must be documented in evidence.
anti_patterns:
- Testing only happy path without error states and edge cases
- Not testing polling start/stop behavior
- Not testing export functionality for both JSON and PDF
- Not testing Run Verification Now button
- Not documenting test results in evidence file
depends_on:
- GF-W1-UI-022
blocks: []
touches:
- evidence/phase1/gf_w1_ui_023_integration_test_results.json
- tasks/GF-W1-UI-023/meta.yml
invariants: []
work:
- '[ID gf_w1_ui_023_work_item_01] Test criteria loading on tab activation'
- '[ID gf_w1_ui_023_work_item_02] Test overall status display (PASS / PENDING / FAIL)'
- '[ID gf_w1_ui_023_work_item_03] Test all three category sections (technical, operational, regulatory)'
- '[ID gf_w1_ui_023_work_item_04] Test criterion detail panel opens and displays all details'
- '[ID gf_w1_ui_023_work_item_05] Test Run Verification Now functionality'
- '[ID gf_w1_ui_023_work_item_06] Test auto-refresh polling (starts on activate, stops on deactivate)'
- '[ID gf_w1_ui_023_work_item_07] Test export report (JSON and PDF) with fingerprint'
acceptance_criteria:
- '[ID gf_w1_ui_023_work_item_01] Criteria load correctly when tab is activated'
- '[ID gf_w1_ui_023_work_item_02] Overall status displays with correct color-coded badge'
- '[ID gf_w1_ui_023_work_item_03] All three category sections display with correct criteria'
- '[ID gf_w1_ui_023_work_item_04] Criterion detail panel opens and shows all details'
- '[ID gf_w1_ui_023_work_item_05] Run Verification Now button triggers API call and updates status'
- '[ID gf_w1_ui_023_work_item_06] Polling starts when tab is activated and stops when deactivated'
- '[ID gf_w1_ui_023_work_item_07] Export generates valid JSON and PDF files with fingerprint'
negative_tests:
- id: GF-W1-UI-023-N1
  description: Verify that criteria loading fails gracefully if API endpoint is unavailable.
  required: true
- id: GF-W1-UI-023-N2
  description: Verify that Run Verification Now fails gracefully if API call fails.
  required: true
- id: GF-W1-UI-023-N3
  description: Verify that export fails gracefully if criteria data is missing.
  required: true
positive_tests:
- id: GF-W1-UI-023-P1
  description: Verify complete happy path from tab activation through criteria display, detail panel, verification, polling,
    and export.
  required: true
verification:
- test -f evidence/phase1/gf_w1_ui_023_integration_test_results.json || exit 1
evidence:
- path: evidence/phase1/gf_w1_ui_023_integration_test_results.json
  must_include:
  - task_id
  - timestamp
  - status
  - criteria_loading_tested
  - overall_status_display_tested
  - category_sections_tested
  - criterion_detail_panel_tested
  - run_verification_now_tested
  - auto_refresh_polling_tested
  - export_report_tested
  - checks
  - observed_paths
  - command_outputs
  - execution_trace
failure_modes:
- Only happy path tested => GOVERNANCE.INCOMPLETE_TESTING => FAIL
- Polling behavior not verified => FUNCTIONAL.POLLING_UNVERIFIED => FAIL
- Export not tested => FUNCTIONAL.EXPORT_UNVERIFIED => FAIL
- Run Verification Now not tested => FUNCTIONAL.VERIFICATION_TRIGGER_UNVERIFIED => FAIL
- Test results not documented => GOVERNANCE.NO_TEST_EVIDENCE => FAIL
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- .kiro/steering/ui-canonical-design.md
- docs/operations/PILOT_DEMO_VIDEO_SCRIPT.md
- docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
implementation_plan: docs/plans/phase1/GF-W1-UI-023/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-UI-023/EXEC_LOG.md
notes: 'This task performs integration testing of the complete pilot success criteria flow. All test scenarios (positive and
  negative) must be documented in evidence file. This is the final task in the Pilot Success Criteria feature implementation.
  Phase: Green Finance Wave 1. Domain: green_finance.'
client: kiro
assigned_agent: architect
model: claude-sonnet-4-20250514
domain: green_finance
pilot: true
second_pilot_test: The integration testing pattern works for any programme requiring compliance dashboard with end-to-end
  flow validation. For PWRM0001 plastic collection, the test validates criteria loading, status display, category sections,
  detail panel, verification trigger, polling, and export. For a hypothetical VM0044 solar energy programme, the test would
  validate the same flow with programme-specific criteria. The test structure (criteria loading, status display, category
  sections, detail panel, verification trigger, polling, export) is identical; only the criteria content differs per programme.
pilot_scope_ref: docs/pilots/PILOT_PWRM0001/SCOPE.md
