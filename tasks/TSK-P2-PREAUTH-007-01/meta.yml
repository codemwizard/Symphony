schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-007-01
title: "Register INV-170 interpretation_pack temporal uniqueness"
owner_role: INVARIANTS_CURATOR
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY

intent: >-
  This task registers INV-170 for interpretation_pack temporal uniqueness enforcement.
  Without this invariant, temporal uniqueness of interpretation packs is not governed,
  creating risk of inconsistent policy application across time periods.

anti_patterns:
  - "Registering invariant without verification_command"
  - "Using incorrect enforcement_location"
  - "Writing the verifier after registration"

out_of_scope:
  - "Other invariant registrations (deferred to TSK-P2-PREAUTH-007-02 through 007-05)"
  - "Verifier implementation"

stop_conditions:
  - "If INV-170 is not added to INVARIANTS_MANIFEST.yml"
  - "If status is not set to draft"
  - "If enforcement_location is not set to schema/migrations/0116"

proof_guarantees:
  - "INV-170 exists in INVARIANTS_MANIFEST.yml"
  - "INV-170 has status: draft"
  - "INV-170 has enforcement_location: schema/migrations/0116"
  - "INV-170 has verification_command"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the invariant will be correctly enforced"
  - "Cannot verify that the verification command is correct"

depends_on:
  - TSK-P2-PREAUTH-007-00
blocks:
  - TSK-P2-PREAUTH-007-02

touches:
  - docs/invariants/INVARIANTS_MANIFEST.yml
  - scripts/audit/verify_tsk_p2_preauth_007_01.sh
  - tasks/TSK-P2-PREAUTH-007-01/meta.yml

invariants:
  - INV-170

work:
  - >-
    [ID tsk_p2_preauth_007_01_work_item_01] Add INV-170 to INVARIANTS_MANIFEST.yml with:
    id: INV-170, title: interpretation_pack temporal uniqueness, status: draft,
    enforcement_location: schema/migrations/0116, verification_command: grep -E 'UNIQUE.*project_id.*interpretation_pack_id.*effective_from' schema/migrations/0116.
  - >-
    [ID tsk_p2_preauth_007_01_work_item_02] Write verify_tsk_p2_preauth_007_01.sh that runs grep to verify
    INV-170 exists in INVARIANTS_MANIFEST.yml with correct fields.
  - >-
    [ID tsk_p2_preauth_007_01_work_item_03] Run verify_tsk_p2_preauth_007_01.sh to confirm invariant is registered correctly.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_007_01_work_item_01] INV-170 exists in INVARIANTS_MANIFEST.yml.
  - >-
    [ID tsk_p2_preauth_007_01_work_item_01] INV-170 has status: draft.
  - >-
    [ID tsk_p2_preauth_007_01_work_item_01] INV-170 has enforcement_location: schema/migrations/0116.
  - >-
    [ID tsk_p2_preauth_007_01_work_item_02] verify_tsk_p2_preauth_007_01.sh exists and checks for invariant.
  - >-
    [ID tsk_p2_preauth_007_01_work_item_03] verify_tsk_p2_preauth_007_01.sh exits 0.

negative_tests:
  - id: TSK-P2-PREAUTH-007-01-N1
    description: >-
      Verify that verify_tsk_p2_preauth_007_01.sh exits non-zero when INV-170 does not exist in INVARIANTS_MANIFEST.yml.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-007-01-P1
    description: >-
      Verify that verify_tsk_p2_preauth_007_01.sh exits 0 when INV-170 exists with correct fields.
    required: false

verification:
  - >-
    # [ID tsk_p2_preauth_007_01_work_item_01] [ID tsk_p2_preauth_007_01_work_item_02]
    # [ID tsk_p2_preauth_007_01_work_item_03]
    test -x scripts/audit/verify_tsk_p2_preauth_007_01.sh && bash scripts/audit/verify_tsk_p2_preauth_007_01.sh > evidence/phase2/tsk_p2_preauth_007_01.json || exit 1
  - >-
    grep -A 5 "id: INV-170" docs/invariants/INVARIANTS_MANIFEST.yml | grep -q "status: draft" &&
    grep -A 5 "id: INV-170" docs/invariants/INVARIANTS_MANIFEST.yml | grep -q "enforcement_location" || exit 1
  - >-
    # [ID tsk_p2_preauth_007_01_work_item_03]
    test -f evidence/phase2/tsk_p2_preauth_007_01.json || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_007_01.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - inv_170_registered
      - inv_170_status_draft

failure_modes:
  - "INV-170 not registered => CRITICAL_FAIL"
  - "INV-170 status not draft => FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/invariants/INVARIANTS_MANIFEST.yml
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-007-01/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-007-01/EXEC_LOG.md

notes: >-
  This task blocks TSK-P2-PREAUTH-007-02. Phase Key: PRE-PHASE2. Phase Name: Pre-Phase 2 Implementation.

client: cursor
assigned_agent: invariants_curator
model: <UNASSIGNED>
