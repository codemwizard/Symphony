    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - verifier_registry_exists
      - verifier_project_assignments_exists
      - reg26_function_exists
      - reg26_enforcement_confirmed
      - append_only_confirmed
      - rls_confirmed
      - ast_scan_clean
      - migration_head_updated

failure_modes:
  - "check_reg26_separation absent or not SECURITY DEFINER => CRITICAL_FAIL (INV-169)"
  - "Regulation 26 constraint enforced in application code only => CRITICAL_FAIL"
  - "Sector noun in migration detected by AST verifier => CRITICAL_FAIL"
  - "Append-only trigger absent on verifier_registry => CRITICAL_FAIL"
  - "Evidence file absent at task completion => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/operations/PILOT_REJECTION_PLAYBOOK.md
  - docs/operations/GREEN_FINANCE_VOLATILITY_MAP.md

second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: [verifier_registry, verifier_project_assignments]
  unchanged_core_functions: [check_reg26_separation]
  adapter_only_differences:
    - "methodology_scope JSONB values differ: solar adapter codes vs forestry adapter codes"
    - "jurisdiction_scope values differ as data rows, not schema"
    - "Accreditation authority differs per country as data — not schema columns"
  jurisdiction_profile_impact: >-
    A Zimbabwe verifier and a Zambia verifier are both rows in verifier_registry
    with different jurisdiction_code values. No schema change required.
    Regulation 26 constraint applies identically across all jurisdictions.
  required_core_changes: []
  explanation: >-
    verifier_registry uses JSONB for methodology_scope and jurisdiction_scope
    precisely so that a solar verifier and a forestry verifier can be registered
    without any schema change. Both use the same table. The check_reg26_separation
    function operates on project assignment records — it does not encode any
    sector-specific logic. A second pilot in any sector uses identical
    infrastructure with different data values only.
  second_pilot_reviewed_by: Architecture Owner
pilot_scope_ref: not_applicable

implementation_plan: docs/plans/phase0/GF-W1-SCH-008/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-SCH-008/EXEC_LOG.md
notes: >-
  This is a POLICY_TABLE. Schema changes should be rare. Row changes
  (new verifier registrations, accreditation renewals, scope updates)
  are the expected mode of evolution. The Regulation 26 constraint in
  check_reg26_separation is a hard compliance requirement under Zambia
  S.I. No. 5 of 2026 and must never be weakened or moved to application
  code. SQLSTATE GF001 is reserved for this violation.
