schema_version: 1
phase: '0'
task_id: GF-W1-SCH-008
title: "Migration 0087: verifier_registry POLICY_TABLE with Regulation 26 separation-of-duties constraint"
owner_role: DB_FOUNDATION
status: completed
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA
domain: green_finance
pilot: false

intent: >-
  S.I. No. 5 of 2026 Regulation 23 requires verifiers to be registered with
  the Director and hold active UNFCCC accreditation. Regulation 26 explicitly
  prohibits a validator from verifying the same project they validated.
  Without a verifier_registry table, Symphony has no way to enforce either
  requirement at the data layer. This creates two failure modes: any entity
  could issue verifier tokens regardless of accreditation status, and the
  Regulation 26 separation-of-duties rule would exist only as policy prose
  rather than a DB-enforced invariant. This table is the prerequisite for
  both the verifier read token function (FNC-006) and the verifier revenue
  model (Model B). It is classified POLICY_TABLE because accreditation status,
  expiry, and scope change as row updates, not schema migrations.

anti_patterns:
  - "Adding methodology-specific columns to this table — scope is stored as JSONB arrays, not dedicated columns"
  - "Hardcoding Zambia-specific accreditation body — use jurisdiction_code and accreditation_authority fields"
  - "Leaving Regulation 26 constraint as application logic — it must be DB-enforced"
  - "Conflating VALIDATOR and VERIFIER roles — they are distinct and must be distinguishable"

depends_on:
  - GF-W1-SCH-007
  - GF-W1-SCH-002A

blocks:
  - GF-W1-SCH-009
  - GF-W1-FNC-006

touches:
  - schema/migrations/0087_gf_verifier_registry.sql
  - schema/migrations/0087_gf_verifier_registry.meta.yml
  - schema/migrations/MIGRATION_HEAD
  - scripts/db/verify_gf_sch_008.sh
  - tasks/GF-W1-SCH-008/meta.yml

invariants:
  - INV-163
  - INV-169

work:
  - >-
    Write 0087_gf_verifier_registry.sql. Table: verifier_registry.
    Fields:
    verifier_id UUID PK DEFAULT uuid_generate_v4(),
    tenant_id UUID NOT NULL FK tenants(tenant_id),
    jurisdiction_code TEXT NOT NULL,
    verifier_name TEXT NOT NULL,
    role_type TEXT NOT NULL CHECK (role_type IN ('VALIDATOR','VERIFIER','VALIDATOR_VERIFIER')),
    accreditation_reference TEXT NOT NULL,
    accreditation_authority TEXT NOT NULL,
    accreditation_expiry DATE NOT NULL,
    methodology_scope JSONB NOT NULL DEFAULT '[]',
    jurisdiction_scope JSONB NOT NULL DEFAULT '[]',
    is_active BOOLEAN NOT NULL DEFAULT false,
    deactivated_at TIMESTAMPTZ NULL,
    deactivation_reason TEXT NULL,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    created_by TEXT NOT NULL DEFAULT CURRENT_USER.
    No sector nouns. RLS by tenant_id. Append-only trigger. Revoke-first.
  - >-
    Create verifier_project_assignments table in same migration:
    assignment_id UUID PK,
    verifier_id UUID NOT NULL FK verifier_registry(verifier_id),
    project_id UUID NOT NULL FK projects(project_id),
    assigned_role TEXT NOT NULL CHECK (assigned_role IN ('VALIDATOR','VERIFIER')),
    assigned_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    assigned_by TEXT NOT NULL DEFAULT CURRENT_USER.
    Append-only trigger.
  - >-
    Add Regulation 26 separation-of-duties constraint as a DB function
    check_reg26_separation(p_verifier_id UUID, p_project_id UUID,
    p_requested_role TEXT) RETURNS void SECURITY DEFINER. Logic: if
    p_requested_role = 'VERIFIER', query verifier_project_assignments for any
    row where verifier_id = p_verifier_id AND project_id = p_project_id AND
    assigned_role = 'VALIDATOR'. If found, raise SQLSTATE 'GF001' with message
    'Regulation 26 violation: validator cannot verify the same project'.
    This function is called by issue_verifier_read_token (FNC-006) before
    issuing any verifier-scoped token.
  - >-
    Write 0087_gf_verifier_registry.meta.yml sidecar:
    phase=0, layer=POLICY_TABLE, volatility_class=POLICY_TABLE,
    touches_core_schema=true,
    introduces_identifiers=[verifier_registry, verifier_project_assignments,
    check_reg26_separation],
    second_pilot_justification_required=true.
  - >-
    Update MIGRATION_HEAD from 0086 to 0087.
  - >-
    Write scripts/db/verify_gf_sch_008.sh confirming: both tables exist,
    append-only triggers present, RLS on verifier_registry, role_type CHECK
    constraint exists, check_reg26_separation function exists and is
    SECURITY DEFINER, Regulation 26 negative test passes.

acceptance_criteria:
  - >-
    bash scripts/db/verify_gf_sch_008.sh exits 0 against test DB with
    migration applied.
  - >-
    INSERT a verifier with role_type = 'VALIDATOR'. Assign them to project P
    as VALIDATOR via verifier_project_assignments. Call
    check_reg26_separation(verifier_id, project_id, 'VERIFIER'). Must raise
    SQLSTATE GF001.
  - >-
    Same verifier requesting VERIFIER role on a DIFFERENT project must
    succeed — only same-project violation is blocked.
  - >-
    INSERT with role_type = 'AUDITOR' fails with CHECK constraint violation.
  - >-
    Attempt UPDATE on verifier_registry row fails with append-only SQLSTATE.
  - >-
    Evidence file evidence/phase0/gf_sch_008.json exists and passes verifier.

negative_tests:
  - id: GF-W1-SCH-008-N1
    description: >-
      Assign a verifier as VALIDATOR on project P, then call
      check_reg26_separation for VERIFIER role on the same project P.
      Must raise SQLSTATE GF001 with Regulation 26 message. This is the
      core compliance test — DB layer enforcement, not application logic.
    required: true
  - id: GF-W1-SCH-008-N2
    description: >-
      INSERT into verifier_registry with role_type = 'CONSULTANT'. Must
      fail with CHECK constraint. Only VALIDATOR, VERIFIER, and
      VALIDATOR_VERIFIER are permitted role types.
    required: true
  - id: GF-W1-SCH-008-N3
    description: >-
      Attempt direct UPDATE on a verifier_registry row. Must fail with
      append-only SQLSTATE. Deactivation is done by inserting a new row
      with is_active=false, not by mutating the existing row.
    required: true
  - id: GF-W1-SCH-008-N4
    description: >-
      Run AST verifier against migration file. Must exit 0 — no sector
      nouns in any identifier position.
    required: true

verification:
  - bash scripts/db/verify_gf_sch_008.sh
  - python3 scripts/audit/verify_neutral_schema_ast.py schema/migrations/0085_gf_verifier_registry.sql
  - python3 scripts/audit/verify_migration_meta_alignment.py
  - bash scripts/audit/verify_migration_sequence.sh
  - bash scripts/dev/pre_ci.sh

