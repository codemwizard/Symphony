schema_version: 1
phase: '3'
task_id: TSK-P3-CLEAN-007
wave: CLEAN
title: "Maintain Phase 3 DAG artifacts after cleanup so that human and machine DAGs agree on statuses and sequencing"
owner_role: ARCHITECT
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY

intent: >-
  After CLEAN-001 (contract parse) and CLEAN-003 (invariant register) are
  completed, the Phase 3 DAG artifacts must be updated to reflect their new
  statuses. This task maintains docs/PHASE3/PHASE3_TASK_DAG.md and
  docs/PHASE3/phase3_task_dag.yml to ensure consistency across human and
  machine representations.

depends_on:
  - TSK-P3-CLEAN-001
  - TSK-P3-CLEAN-003
invariants: []

deliverable_files:
  - scripts/audit/verify_tsk_p3_clean_007.sh
  - evidence/phase3/tsk_p3_clean_007.json
  - docs/plans/phase3/TSK-P3-CLEAN-007/PLAN.md
  - docs/plans/phase3/TSK-P3-CLEAN-007/EXEC_LOG.md

regulated_surface_compliance:
  enabled: false
  approval_workflow: none
  stage_a_required_before_edit: false
  regulated_paths: []
  must_read: []

remediation_trace_compliance:
  enabled: false
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

out_of_scope:
  - "Adding new DAG nodes beyond the existing Phase 3 task universe."
  - "Modifying DAG sequencing logic or wave assignments."
  - "Implementing any DAG node; only status and consistency updates."

stop_conditions:
  - "If blocked_by duplicates normal depends_on predecessors => STOP."
  - "If DAG and master plan diverge on surface mappings => STOP."
  - "If new DAG nodes are introduced that do not exist in the master plan => STOP."

proof_guarantees:
  - "Verifier mechanically confirms PHASE3_TASK_DAG.md and phase3_task_dag.yml agree on node statuses, depends_on, and blocked_by."
  - "Verifier mechanically confirms phase3_task_dag.yml parses as valid YAML."
  - "Verifier mechanically confirms no blocked_by entry duplicates a depends_on entry."

proof_limitations:
  - "Does not verify DAG semantic correctness beyond structural consistency."
  - "Does not verify master plan agreement beyond surface mapping presence."

touches:
  - docs/PHASE3/PHASE3_TASK_DAG.md
  - docs/PHASE3/phase3_task_dag.yml
  - scripts/audit/verify_tsk_p3_clean_007.sh
  - evidence/phase3/tsk_p3_clean_007.json
  - tasks/TSK-P3-CLEAN-007/meta.yml
  - docs/plans/phase3/TSK-P3-CLEAN-007/PLAN.md
  - docs/plans/phase3/TSK-P3-CLEAN-007/EXEC_LOG.md

work:
  - "[ID tsk_p3_clean_007_work_01] Update docs/PHASE3/PHASE3_TASK_DAG.md to reflect the current status of all Wave 0 nodes after CLEAN-001 and CLEAN-003 are completed."
  - "[ID tsk_p3_clean_007_work_02] Update docs/PHASE3/phase3_task_dag.yml to match the human-readable DAG on statuses, depends_on, blocked_by, and surface mappings."
  - "[ID tsk_p3_clean_007_work_03] Verify that blocked_by does not duplicate normal depends_on predecessors and that DAG and master plan are consistent."

acceptance_criteria:
  - "[ID tsk_p3_clean_007_work_01] PHASE3_TASK_DAG.md Wave 0 node statuses are updated to reflect completed cleanup predecessors."
  - "[ID tsk_p3_clean_007_work_02] phase3_task_dag.yml parses as valid YAML and its node statuses, depends_on, and blocked_by match PHASE3_TASK_DAG.md exactly."
  - "[ID tsk_p3_clean_007_work_03] No blocked_by entry duplicates a depends_on entry in either DAG artifact; DAG and master plan surface mappings agree."

negative_tests:
  - id: TSK-P3-CLEAN-007-N1
    description: "Feed a DAG YAML where blocked_by duplicates a depends_on entry; verifier must reject."
    required: true

positive_tests:
  - id: TSK-P3-CLEAN-007-P1
    description: "Feed consistent DAG artifacts with correct statuses and no blocked_by/depends_on overlap; verifier must pass."
    required: true

verification:
  - '# [ID tsk_p3_clean_007_work_01] [ID tsk_p3_clean_007_work_02] [ID tsk_p3_clean_007_work_03] test -x scripts/audit/verify_tsk_p3_clean_007.sh && bash scripts/audit/verify_tsk_p3_clean_007.sh > evidence/phase3/tsk_p3_clean_007.json || exit 1'
  - 'bash scripts/dev/pre_ci.sh || exit 1'

evidence:
  - path: evidence/phase3/tsk_p3_clean_007.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes

failure_modes:
  - "Evidence file missing => FAIL"
  - "Human and machine DAGs disagree on statuses => CRITICAL_FAIL"
  - "blocked_by duplicates depends_on entry => CRITICAL_FAIL"
  - "phase3_task_dag.yml fails YAML parse => FAIL"

must_read:
  - AGENT_ENTRYPOINT.md
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/operations/IMPLEMENTATION_PLAN_CREATION_PROCESS.md
  - docs/operations/TASK_ID_NOMENCLATURE.md
  - docs/PHASE3/PHASE3_CAPABILITY_BOUNDARY.md
  - docs/PHASE3/PHASE3_INVARIANT_REGISTER.md
  - docs/PHASE3/implementation_plans/TSK-P3-CAP-000_governance_cleanup.md

implementation_plan: docs/plans/phase3/TSK-P3-CLEAN-007/PLAN.md
