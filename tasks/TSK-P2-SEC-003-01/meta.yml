schema_version: 1
phase: '2'
task_id: TSK-P2-SEC-003-01
title: Verify fail-closed behavior and promote INV-132
owner_role: SECURITY_GUARDIAN
status: completed
priority: HIGH
risk_class: SECURITY
blast_radius: CI_GATES
intent: This task runs the fail-closed behavior tests for INV-132 and promotes the
  invariant to implemented status. Without this verification, the system may fail-open
  on missing signing keys or secrets, creating security vulnerabilities.
anti_patterns:
- Promoting INV-132 to implemented without running fail-closed tests
- Assuming the tests pass without actual execution
- Writing the verifier after marking the invariant as implemented
out_of_scope:
- Changing fail-closed logic implementation (deferred to separate task if needed)
- Modifying other security verifiers
- Database schema changes
stop_conditions:
- If scan_secrets.sh does not exit 0
- If test_missing_signing_key_fails_closed.sh does not exit 0
- If INV-132 status is not updated to implemented
proof_guarantees:
- scan_secrets.sh exits 0
- test_missing_signing_key_fails_closed.sh exits 0
- 'INV-132 in INVARIANTS_MANIFEST.yml has status: implemented'
- Verifier script exists and emits evidence
proof_limitations:
- Cannot verify that all fail-closed scenarios are covered
- Cannot verify that fail-closed behavior cannot be bypassed
depends_on:
- TSK-P2-SEC-003-00
blocks:
- TSK-P2-CCG-001-00
touches:
- docs/invariants/INVARIANTS_MANIFEST.yml
- scripts/audit/verify_tsk_p2_sec_003_01.sh
- tasks/TSK-P2-SEC-003-01/meta.yml
invariants:
- INV-132
work:
- '[ID tsk_p2_sec_003_01_work_item_01] Run scan_secrets.sh to verify secrets scanning
  is functional.'
- '[ID tsk_p2_sec_003_01_work_item_02] Run test_missing_signing_key_fails_closed.sh
  to verify system fails closed when signing key is missing.'
- '[ID tsk_p2_sec_003_01_work_item_03] Update INV-132 in INVARIANTS_MANIFEST.yml with
  status: implemented, enforcement_location, and verification_command.'
- '[ID tsk_p2_sec_003_01_work_item_04] Write verify_tsk_p2_sec_003_01.sh that runs
  the verifiers and emits evidence.'
acceptance_criteria:
- >-
  [ID tsk_p2_sec_003_01_work_item_01] [ID tsk_p2_sec_003_01_ac_01] scan_secrets.sh exits 0.
- >-
  [ID tsk_p2_sec_003_01_work_item_02] [ID tsk_p2_sec_003_01_ac_02] test_missing_signing_key_fails_closed.sh exits 0.
- >-
  [ID tsk_p2_sec_003_01_work_item_03] [ID tsk_p2_sec_003_01_ac_03] INV-132 in INVARIANTS_MANIFEST.yml has status: implemented.
- >-
  [ID tsk_p2_sec_003_01_work_item_04] [ID tsk_p2_sec_003_01_ac_04] verify_tsk_p2_sec_003_01.sh exists and exits 0.
negative_tests:
- id: TSK-P2-SEC-003-01-N1
  description: Verify that test_missing_signing_key_fails_closed.sh exits non-zero
    when system is configured to fail-open on missing signing key.
  required: true
positive_tests:
- id: TSK-P2-SEC-003-01-P1
  description: Verify that test_missing_signing_key_fails_closed.sh exits 0 when system
    is configured to fail-closed on missing signing key.
  required: false
