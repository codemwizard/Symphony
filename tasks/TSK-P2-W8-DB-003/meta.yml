work:
  - >-
    [ID w8_db_003_work_01] Implement SQL-side canonical payload construction for `asset_batches` using the exact field set and normalization rules defined in `CANONICAL_ATTESTATION_PAYLOAD_v1.md`.
  - >-
    [ID w8_db_003_work_02] Materialize or reconstruct the canonical payload bytes at the authoritative boundary so later verifiers can compare them directly to the contract vectors.
  - >-
    [ID w8_db_003_work_03] Build a verifier that proves the SQL runtime emits canonical bytes identical to the frozen contract vector for the same logical input.

acceptance_criteria:
  - >-
    [ID w8_db_003_work_01] SQL-side canonical payload construction uses the exact contract-defined field set and normalization rules.
  - >-
    [ID w8_db_003_work_02] The authoritative boundary exposes or reconstructs the canonical bytes deterministically for verification.
  - >-
    [ID w8_db_003_work_03] The verifier proves SQL canonical bytes match the frozen contract vector exactly.

negative_tests:
  - id: TSK-P2-W8-DB-003-N1
    description: >-
      Verifier fails if SQL emits bytes that differ from the contract vector for the same logical payload.
    required: true

positive_tests:
  - id: TSK-P2-W8-DB-003-P1
    description: >-
      Verifier passes only when SQL canonicalization is byte-identical to the contract source.
    required: true

