  setup_command: "export DATABASE_URL=\"postgresql://symphony_admin:symphony_pass@localhost:55432/symphony\""

migration_dependencies:
  enabled: true
  required_migrations:
    - 0168: "Attestation seam schema baseline present"
    - 0171: "Attestation kill-switch gate baseline present"
  table_dependencies:
    - asset_batches: "authoritative Wave 8 boundary"
    - schema_migrations: "must track migrations"
  verification_step: "Confirm the target migration chain and authoritative boundary exist before implementation."

work:
  - >-
    [ID w8_db_006_work_01] Integrate the Ed25519 verification primitive into the `asset_batches` dispatcher path so PostgreSQL independently validates the exact write inside the authoritative boundary.
  - >-
    [ID w8_db_006_work_02] Enforce fail-closed rejection for invalid signatures and unavailable-crypto states with registered failure modes and explicit cryptographic branch causality.
  - >-
    [ID w8_db_006_work_03] Build a verifier that proves PostgreSQL rejects cryptographically invalid writes and unavailable-crypto states at `asset_batches`, does not trust a service claim or audit row, and derives branch provenance from the same production execution path that emits the terminal SQLSTATE.

acceptance_criteria:
  - >-
    [ID w8_db_006_work_01] PostgreSQL independently validates the exact `asset_batches` write and the Ed25519 primitive executes inside that authoritative dispatcher path.
  - >-
    [ID w8_db_006_work_02] Invalid signatures and unavailable-crypto states are rejected fail-closed with registered failure modes and explicit cryptographic branch causality.
  - >-
    [ID w8_db_006_work_03] The verifier proves PostgreSQL physically rejects invalid or unavailable-crypto writes at `asset_batches` without trusting a service claim or audit row, and branch provenance comes from the same production execution path as the terminal SQLSTATE.

negative_tests:
  - id: TSK-P2-W8-DB-006-N1
    description: >-
      Verifier fails if PostgreSQL accepts a structurally valid but cryptographically invalid write at `asset_batches`.
    required: true

positive_tests:
  - id: TSK-P2-W8-DB-006-P1
    description: >-
      Verifier passes only when cryptographic validity is enforced inside the authoritative boundary.
    required: true

verification:
