    # [ID tsk_p2_sec_001_01_work_item_01] [ID tsk_p2_sec_001_01_work_item_02] [ID tsk_p2_sec_001_01_work_item_03] [ID tsk_p2_sec_001_01_work_item_04] [ID tsk_p2_sec_001_01_work_item_05] [ID tsk_p2_sec_001_01_ac_01] [ID tsk_p2_sec_001_01_ac_02] [ID tsk_p2_sec_001_01_ac_03] [ID tsk_p2_sec_001_01_ac_04] [ID tsk_p2_sec_001_01_ac_05]
    test -x scripts/security/verify_supervisor_bind_localhost.sh || exit 1
  - >-
    # [ID tsk_p2_sec_001_01_work_item_01] [ID tsk_p2_sec_001_01_work_item_02] [ID tsk_p2_sec_001_01_work_item_03] [ID tsk_p2_sec_001_01_work_item_04] [ID tsk_p2_sec_001_01_work_item_05] [ID tsk_p2_sec_001_01_ac_01] [ID tsk_p2_sec_001_01_ac_02] [ID tsk_p2_sec_001_01_ac_03] [ID tsk_p2_sec_001_01_ac_04] [ID tsk_p2_sec_001_01_ac_05]
    python3 scripts/audit/validate_evidence.py --task TSK-P2-SEC-001-01 --evidence evidence/phase2/tsk_p2_sec_001_01.json || exit 1
  - >-
    # [ID tsk_p2_sec_001_01_work_item_01] [ID tsk_p2_sec_001_01_work_item_02] [ID tsk_p2_sec_001_01_work_item_03] [ID tsk_p2_sec_001_01_work_item_04] [ID tsk_p2_sec_001_01_work_item_05] [ID tsk_p2_sec_001_01_ac_01] [ID tsk_p2_sec_001_01_ac_02] [ID tsk_p2_sec_001_01_ac_03] [ID tsk_p2_sec_001_01_ac_04] [ID tsk_p2_sec_001_01_ac_05]
    bash scripts/dev/pre_ci.sh || exit 1
  - >-
    # [ID tsk_p2_sec_001_01_work_item_01] [ID tsk_p2_sec_001_01_work_item_02] [ID tsk_p2_sec_001_01_work_item_03] [ID tsk_p2_sec_001_01_work_item_04] [ID tsk_p2_sec_001_01_work_item_05] [ID tsk_p2_sec_001_01_ac_01] [ID tsk_p2_sec_001_01_ac_02] [ID tsk_p2_sec_001_01_ac_03] [ID tsk_p2_sec_001_01_ac_04] [ID tsk_p2_sec_001_01_ac_05]
    grep -q HTTPServer scripts/security/verify_supervisor_bind_localhost.sh &&
    grep -q 127.0.0.1 scripts/security/verify_supervisor_bind_localhost.sh || exit 1
  - >-
    # [ID tsk_p2_sec_001_01_work_item_01] [ID tsk_p2_sec_001_01_work_item_02] [ID tsk_p2_sec_001_01_work_item_03] [ID tsk_p2_sec_001_01_work_item_04] [ID tsk_p2_sec_001_01_work_item_05] [ID tsk_p2_sec_001_01_ac_01] [ID tsk_p2_sec_001_01_ac_02] [ID tsk_p2_sec_001_01_ac_03] [ID tsk_p2_sec_001_01_ac_04] [ID tsk_p2_sec_001_01_ac_05]
    bash scripts/security/verify_supervisor_bind_localhost.sh || exit 1
  - >-
    # [ID tsk_p2_sec_001_01_work_item_01] [ID tsk_p2_sec_001_01_work_item_02] [ID tsk_p2_sec_001_01_work_item_03] [ID tsk_p2_sec_001_01_work_item_04] [ID tsk_p2_sec_001_01_work_item_05] [ID tsk_p2_sec_001_01_ac_01] [ID tsk_p2_sec_001_01_ac_02] [ID tsk_p2_sec_001_01_ac_03] [ID tsk_p2_sec_001_01_ac_04] [ID tsk_p2_sec_001_01_ac_05]
    grep -A 5 "id: INV-130" docs/invariants/INVARIANTS_MANIFEST.yml | grep -q "status: implemented" || exit 1
  - >-
    # [ID tsk_p2_sec_001_01_work_item_01] [ID tsk_p2_sec_001_01_work_item_02] [ID tsk_p2_sec_001_01_work_item_03] [ID tsk_p2_sec_001_01_work_item_04] [ID tsk_p2_sec_001_01_work_item_05] [ID tsk_p2_sec_001_01_ac_01] [ID tsk_p2_sec_001_01_ac_02] [ID tsk_p2_sec_001_01_ac_03] [ID tsk_p2_sec_001_01_ac_04] [ID tsk_p2_sec_001_01_ac_05]
    test -x scripts/audit/verify_tsk_p2_sec_001_01.sh &&
    bash scripts/audit/verify_tsk_p2_sec_001_01.sh &&
    test -f evidence/phase2/tsk_p2_sec_001_01.json || exit 1
