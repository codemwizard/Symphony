schema_version: 1
phase: '2'
task_id: TSK-P2-SEC-001-01
title: Fix verifier scope and promote INV-130
owner_role: SECURITY_GUARDIAN
status: completed
priority: HIGH
risk_class: SECURITY
blast_radius: CI_GATES
intent: This task fixes the verifier scope for INV-130 (supervisor bind localhost)
  by adding the exact grep pattern and promotes the invariant to implemented status.
  Without this fix, the supervisor API may bind to non-localhost interfaces, creating
  a remote code execution risk.
anti_patterns:
- Promoting INV-130 to implemented without a working verifier
- Using vague grep patterns that could match false positives
- Writing the verifier after marking the invariant as implemented
out_of_scope:
- Changing supervisor_api server code (deferred to separate task if needed)
- Modifying other security verifiers
- Database schema changes
stop_conditions:
- If the verifier does not use the exact grep pattern specified
- If the verifier passes on code that binds to 0.0.0.0
- If INV-130 status is not updated to implemented
proof_guarantees:
- verify_supervisor_bind_localhost.sh contains exact grep pattern for 127.0.0.1
- 'INV-130 in INVARIANTS_MANIFEST.yml has status: implemented'
- Verifier script exits non-zero on code binding to 0.0.0.0
proof_limitations:
- Cannot verify that the supervisor actually binds to localhost at runtime
- Cannot verify that all supervisor instances are covered by this check
depends_on:
- TSK-P2-SEC-001-00
blocks:
- TSK-P2-CCG-001-00
touches:
- scripts/security/verify_supervisor_bind_localhost.sh
- docs/invariants/INVARIANTS_MANIFEST.yml
- scripts/audit/verify_tsk_p2_sec_001_01.sh
- tasks/TSK-P2-SEC-001-01/meta.yml
- evidence/phase2/tsk_p2_sec_001_01.json
invariants:
- INV-130
work:
- '[ID tsk_p2_sec_001_01_work_item_01] Audit verify_supervisor_bind_localhost.sh to
  check current scope and grep patterns.'
- '[ID tsk_p2_sec_001_01_work_item_02] Add exact grep pattern to verify_supervisor_bind_localhost.sh:
  grep -E ''HTTPServer\s*\(\s*["\x27]127\.0\.0\.1["\x27]'' supervisor_api/server.py'
- '[ID tsk_p2_sec_001_01_work_item_03] Run the verifier to confirm it passes on current
  code.'
- '[ID tsk_p2_sec_001_01_work_item_04] Update INV-130 in INVARIANTS_MANIFEST.yml with
  status: implemented, enforcement_location, and verification_command.'
- '[ID tsk_p2_sec_001_01_work_item_05] Write verify_tsk_p2_sec_001_01.sh that runs
  the verifier and emits evidence.'
acceptance_criteria:
- >-
  [ID tsk_p2_sec_001_01_work_item_01] [ID tsk_p2_sec_001_01_ac_01] verify_supervisor_bind_localhost.sh contains the exact grep pattern for 127.0.0.1 binding.
- >-
  [ID tsk_p2_sec_001_01_work_item_02] [ID tsk_p2_sec_001_01_ac_02] verify_supervisor_bind_localhost.sh exits 0 on current code.
- >-
  [ID tsk_p2_sec_001_01_work_item_03] [ID tsk_p2_sec_001_01_ac_03] INV-130 in INVARIANTS_MANIFEST.yml has status: implemented.
- >-
  [ID tsk_p2_sec_001_01_work_item_04] [ID tsk_p2_sec_001_01_ac_04] verify_tsk_p2_sec_001_01.sh exists and exits 0.
- >-
  [ID tsk_p2_sec_001_01_work_item_05] [ID tsk_p2_sec_001_01_ac_05] verify_tsk_p2_sec_001_01.sh emits evidence to evidence/phase2/tsk_p2_sec_001_01.json.
negative_tests:
- id: TSK-P2-SEC-001-01-N1
  description: Create temp file /tmp/supervisor_bind_test_$$.py with HTTPServer(('0.0.0.0',
    8080)) and verify that verify_supervisor_bind_localhost.sh exits non-zero. Clean
    up with trap.
  required: true
positive_tests:
- id: TSK-P2-SEC-001-01-P1
  description: Create temp file with HTTPServer(('127.0.0.1', 8080)) and verify verifier
    exits 0.
  required: false
