schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-006C-02
title: "Add DataAuthority and AuditGrade to MonitoringRecord read model"
owner_role: ARCHITECT
status: planned
priority: HIGH
risk_class: INTEGRITY
blast_radius: APP_LAYER

intent: >-
  This task adds DataAuthority and AuditGrade properties to the MonitoringRecord read model.
  Without these properties, the C# layer cannot track data authority for monitoring records,
  creating risk of non-auditable data usage.

anti_patterns:
  - "Adding properties without appropriate defaults"
  - "Using different type than DB column"
  - "Writing the verifier after the code is written"

out_of_scope:
  - "Adding properties to other read models (deferred to TSK-P2-PREAUTH-006C-03)"
  - "Database schema changes"

stop_conditions:
  - "If DataAuthority property is not added to MonitoringRecord"
  - "If AuditGrade property is not added to MonitoringRecord"
  - "If properties do not have appropriate types"

proof_guarantees:
  - "DataAuthority property exists in MonitoringRecord read model"
  - "AuditGrade property exists in MonitoringRecord read model"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the properties are semantically correct"
  - "Cannot verify that the properties will work for all use cases"

depends_on:
  - TSK-P2-PREAUTH-006C-01
blocks:
  - TSK-P2-PREAUTH-006C-03

touches:
  - src/Symphony/Models/MonitoringRecord.cs
  - scripts/audit/verify_tsk_p2_preauth_006c_02.sh
  - tasks/TSK-P2-PREAUTH-006C-02/meta.yml

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_006c_02_work_item_01] Add DataAuthority property of type DataAuthorityLevel
    to MonitoringRecord read model with default Phase1IndicativeOnly.
  - >-
    [ID tsk_p2_preauth_006c_02_work_item_02] Add AuditGrade property of type bool to MonitoringRecord
    read model with default false.
  - >-
    [ID tsk_p2_preauth_006c_02_work_item_03] Write verify_tsk_p2_preauth_006c_02.sh that runs grep to verify
    properties exist and have correct types.
  - >-
    [ID tsk_p2_preauth_006c_02_work_item_04] Run verify_tsk_p2_preauth_006c_02.sh to confirm properties are added correctly.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_006c_02_work_item_01] DataAuthority property exists in MonitoringRecord.
  - >-
    [ID tsk_p2_preauth_006c_02_work_item_02] AuditGrade property exists in MonitoringRecord.
  - >-
    [ID tsk_p2_preauth_006c_02_work_item_03] verify_tsk_p2_preauth_006c_02.sh exists and checks for properties.
  - >-
    [ID tsk_p2_preauth_006c_02_work_item_04] verify_tsk_p2_preauth_006c_02.sh exits 0.

negative_tests:
  - id: TSK-P2-PREAUTH-006C-02-N1
    description: >-
      Verify that verify_tsk_p2_preauth_006c_02.sh exits non-zero when DataAuthority property does not exist.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-006C-02-P1
    description: >-
      Verify that verify_tsk_p2_preauth_006c_02.sh exits 0 when properties exist with correct types.
    required: false

verification:
  - >-
    # [ID tsk_p2_preauth_006c_02_work_item_01] [ID tsk_p2_preauth_006c_02_work_item_02]
    # [ID tsk_p2_preauth_006c_02_work_item_03] [ID tsk_p2_preauth_006c_02_work_item_04]
    test -x scripts/audit/verify_tsk_p2_preauth_006c_02.sh && bash scripts/audit/verify_tsk_p2_preauth_006c_02.sh > evidence/phase2/tsk_p2_preauth_006c_02.json || exit 1
  - >-
    grep -q "DataAuthority" src/Symphony/Models/MonitoringRecord.cs &&
    grep -q "DataAuthorityLevel" src/Symphony/Models/MonitoringRecord.cs || exit 1
  - >-
    grep -q "AuditGrade" src/Symphony/Models/MonitoringRecord.cs &&
    grep -q "bool" src/Symphony/Models/MonitoringRecord.cs || exit 1
  - >-
    # [ID tsk_p2_preauth_006c_02_work_item_04]
    test -f evidence/phase2/tsk_p2_preauth_006c_02.json || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_006c_02.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - data_authority_property_exists
      - audit_grade_property_exists

failure_modes:
  - "DataAuthority property not added => CRITICAL_FAIL"
  - "AuditGrade property not added => CRITICAL_FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-006C-02/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-006C-02/EXEC_LOG.md

notes: >-
  This task blocks TSK-P2-PREAUTH-006C-03. Phase Key: PRE-PHASE2. Phase Name: Pre-Phase 2 Implementation.

client: cursor
assigned_agent: architect
model: <UNASSIGNED>
