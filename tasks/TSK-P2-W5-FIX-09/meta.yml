schema_version: 1
phase: '2'
task_id: TSK-P2-W5-FIX-09
title: "Set signature_payload to 'PLACEHOLDER_PENDING_SIGNING_CONTRACT' in generate_transition_hash() to make pre-signing posture explicit"
owner_role: DB_FOUNDATION
status: planned
priority: NORMAL
risk_class: GOVERNANCE
blast_radius: DB_SCHEMA

intent: >-
  Migration 0141 created generate_transition_hash() which uses
  NEW.entity_type || NEW.entity_id || NEW.from_state || NEW.to_state as the
  hash input. The DoD specifies a placeholder signature_payload marker that
  makes it impossible to later mistake this for real signing output. Without
  a clearly labeled placeholder, a future Wave 6 agent could assume the
  current hash is the final signature — creating a false authority chain.

anti_patterns:
  - "Implementing actual Ed25519 signing (blocked behind signing contract)"
  - "Removing the hash function entirely"
  - "Using a placeholder that looks like a real signature"

out_of_scope:
  - "Ed25519 signing implementation (Wave 6 design task)"
  - "Signature verification logic"
stop_conditions:
  - "Placeholder text is not clearly distinguishable from real signature output"
  - "Hash function logic is changed beyond adding placeholder marker"

proof_guarantees:
  - "generate_transition_hash() output starts with 'PLACEHOLDER_PENDING_SIGNING_CONTRACT:'"
proof_limitations:
  - "Does not prove future signing implementation will replace placeholder correctly"

depends_on:
  - TSK-P2-W5-FIX-08

blocks:
