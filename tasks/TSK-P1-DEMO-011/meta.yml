acceptance_criteria:
- Gate includes all applicable criteria and target thresholds from Symphony_PRD_GreenTech4CE(3).docx, Section 6 ("Pilot Success Criteria").
- Gate fails if threshold evidence is missing or below target.
- Supervisory reveal demonstrates interpreted evidence status (PRESENT/FAILED/MISSING) and not merely raw uploaded files.
- Raw evidence artifacts remain drill-down accessible from the same flow.
- Evidence output is machine-readable and task-bound.
- Success gate fails if production profile exposes demo-only routes/features.
