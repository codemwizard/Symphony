    state_rules lookup. Record in EXEC_LOG.md as failure_signature.
  - >-
    [ID w5_fix_02_work_02] Write migration
    0146_add_entity_type_to_state_rules.sql. The migration must: (a) Add
    column entity_type TEXT NOT NULL with a DEFAULT for existing rows (use
    hard precondition check: if rows exist, abort with PRECONDITION FAILED
    unless a deterministic backfill is provided); (b) Drop the old unique
    constraint (from_state, to_state, required_decision_type); (c) Create
    new unique constraint (entity_type, from_state, to_state,
    required_decision_type); (d) Use IF NOT EXISTS / DO blocks for
    idempotency.
  - >-
    [ID w5_fix_02_work_03] Update MIGRATION_HEAD to 0146.
  - >-
