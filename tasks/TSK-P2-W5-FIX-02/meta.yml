    [ID w5_fix_02_work_02] psql "$DATABASE_URL" -tAc "SELECT is_nullable FROM
    information_schema.columns WHERE table_name = 'state_rules' AND
    column_name = 'entity_type'" | grep -q 'NO' || exit 1
  - >-
    [ID w5_fix_02_work_03] test "$(cat schema/migrations/MIGRATION_HEAD)" =
    '0146' || exit 1
  - >-
    [ID w5_fix_02_work_04] [ID w5_fix_02_work_05] bash
    scripts/db/verify_tsk_p2_w5_fix_02.sh || exit 1
  - >-
