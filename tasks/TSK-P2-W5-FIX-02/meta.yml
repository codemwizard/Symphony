# ── Negative tests ─────────────────────────────────────────────────────────
negative_tests:
  - id: TSK-P2-W5-FIX-02-N1
    description: >-
      BEFORE fix: INSERT into state_transitions must fail with raw PostgreSQL
      error 'column "entity_type" does not exist' from state_rules lookup.
      This proves the column is genuinely missing.
    required: true
  - id: TSK-P2-W5-FIX-02-N2
    description: >-
      AFTER fix: Two-domain isolation. Seed rule for entity_type='asset',
      PENDING->APPROVED. INSERT state_transitions for entity_type='kyc',
      PENDING->APPROVED must fail with 'no rule defined'. This proves
      entity_type scoping works — rules don't leak across domains.
    required: true

# ── Positive tests ─────────────────────────────────────────────────────────
