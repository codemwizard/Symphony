    (1) Verify entity_type column exists and is NOT NULL;
    (2) Verify unique constraint includes entity_type;
    (3) Two-domain isolation test: seed a rule for entity_type 'asset' with
    transition PENDING->APPROVED, then INSERT state_transitions for
    entity_type 'asset' (must succeed or pass rule check), then INSERT for
    entity_type 'kyc' (must fail with 'no rule defined').
  - >-
    [ID w5_fix_02_work_05] Run verification script and generate evidence JSON
