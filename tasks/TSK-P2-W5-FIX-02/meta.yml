schema_version: 1
phase: '2'
task_id: TSK-P2-W5-FIX-02
title: "Add entity_type column to state_rules so that enforce_transition_state_rules() resolves correctly per entity domain"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

# ── Why this task exists ───────────────────────────────────────────────────
intent: >-
  Migration 0139 created enforce_transition_state_rules() which queries
  state_rules with 'WHERE entity_type = NEW.entity_type' (lines 14, 24). But
  migration 0135 created state_rules with only (from_state, to_state,
  required_decision_type) — no entity_type column. Every INSERT to
  state_transitions that fires trg_enforce_transition_state_rules raises a raw
  PostgreSQL error 'column "entity_type" does not exist'. This is the second
  runtime crash alongside the column mismatch in FIX-01. Without entity_type,
  the rule system cannot scope transitions per entity domain — making
  cross-domain rule leakage inevitable and replay non-deterministic.

# ── What this task must NOT do ─────────────────────────────────────────────
anti_patterns:
  - "Editing migration 0135 directly — forward-only migrations are immutable"
  - "Removing the entity_type predicate from the trigger — destroys domain isolation"
  - "Adding entity_type as nullable — allows orphaned rules with no domain binding"
  - "Testing only that the column exists without proving the trigger fires correctly"
  - "Writing negative test after the fix is applied"

# ── Anti-drift boundaries ──────────────────────────────────────────────────
out_of_scope:
  - "SECURITY DEFINER hardening (TSK-P2-W5-FIX-04)"
  - "Trigger ordering rename (TSK-P2-W5-FIX-05)"
  - "SQLSTATE assignment (TSK-P2-W5-FIX-08)"
  - "Modifying enforce_transition_state_rules() function body — the trigger is correct, the table is wrong"
  - "Seeding production state rules — this task adds the column and constraint only"
stop_conditions:
  - "Migration creates entity_type as nullable — violates domain isolation guarantee"
  - "Migration removes entity_type predicate from trigger — destroys cross-domain rule scoping"
  - "Unique constraint does not include entity_type — allows duplicate rules per domain"
  - "Verifier does not exercise two-domain isolation (same transition valid for one, rejected for other)"
  - "Approval metadata not created before editing regulated surface"

# ── Proof limits ───────────────────────────────────────────────────────────
proof_guarantees:
  - "state_rules.entity_type column exists and is NOT NULL"
  - "UNIQUE constraint includes entity_type: (entity_type, from_state, to_state)"
  - "enforce_transition_state_rules() trigger resolves entity_type correctly"
  - "Two-domain test: same (from_state, to_state) accepted for domain A, rejected for domain B"
proof_limitations:
  - "Does not prove rule completeness — seeding correct rules is a separate concern"
  - "Does not prove SECURITY DEFINER correctness (deferred to FIX-04)"
  - "Cannot prove behavior with production-scale rule sets"

