work:
- Update the canonical task template so anti-drift boundary fields or clearly equivalent
  canonical sections for out-of-scope, non-goals, stop conditions, proof guarantees,
  and proof limitations are required for newly authored task packs.
- Strengthen the template guidance so parity drift, fake narrowness, placeholder verification,
  scope theater, and completion claims beyond proof are called out as named authoring
  anti-patterns.
- Add a task-specific verifier that exercises a fixture task missing the hardened
  anti-drift contract shape and emits declared Phase-1 evidence for strict rejection.
acceptance_criteria:
- The canonical template requires the hardened anti-drift contract shape for newly
  authored tasks instead of leaving those sections optional or implicit.
- Template guidance names the key anti-drift authoring failures explicitly enough
  that future task authors are not forced to infer them from separate planning artifacts.
- '`scripts/audit/verify_tsk_p1_227.sh` demonstrates that a fixture task missing the
  hardened anti-drift sections fails the strict validation flow and emits `evidence/phase1/tsk_p1_227_template_hardening.json`.'
verification:
- bash scripts/audit/verify_tsk_p1_227.sh
- python3 scripts/audit/validate_evidence.py --task TSK-P1-227 --evidence evidence/phase1/tsk_p1_227_template_hardening.json
- RUN_PHASE1_GATES=1 bash scripts/dev/pre_ci.sh
evidence:
- '{''path'': ''evidence/phase1/tsk_p1_227_template_hardening.json'', ''must_include'':
  [''task_id'', ''git_sha'', ''timestamp_utc'', ''status'', ''checks'', ''required_boundary_fields'',
  ''rejected_fixture_id'', ''strict_validation_commands'']}'
failure_modes:
- Canonical template still permits omission of anti-drift boundary sections => FAIL
- Fixture task without hardened anti-drift sections passes strict validation => BLOCKED
- Evidence file missing => FAIL
must_read:
