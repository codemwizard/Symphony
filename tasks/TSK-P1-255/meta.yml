  - '[ID tsk_p1_255_work_item_04] test -f evidence/phase1/tsk_p1_255_pre_push_fixed_point.json && cat evidence/phase1/tsk_p1_255_pre_push_fixed_point.json | tee /tmp/tsk_p1_255_evidence.log >/dev/null || exit 1'
