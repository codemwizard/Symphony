  - '[ID tsk_p1_255_work_item_01] [ID tsk_p1_255_work_item_02] [ID tsk_p1_255_work_item_03] test -x scripts/audit/verify_tsk_p1_255.sh && SYMPHONY_ENV=development bash scripts/audit/verify_tsk_p1_255.sh || exit 1'
