schema_version: 1
phase: '2'
task_id: TSK-P2-W5-FIX-06
title: "Add ON DELETE RESTRICT to state_current FK referencing state_transitions to prevent silent cascade deletion"
owner_role: DB_FOUNDATION
status: planned
priority: HIGH
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  Migration 0138 created state_current with a FK to state_transitions via
  last_transition_id but used ON DELETE CASCADE. Deleting a state_transitions
  row would silently cascade-delete the current state record — violating the
  append-only guarantee. The FK must use ON DELETE RESTRICT to ensure any
  attempt to delete a referenced transition is explicitly rejected.

anti_patterns:
  - "Editing migration 0138 directly"
  - "Using ON DELETE SET NULL — destroys referential linkage"
  - "Testing only FK existence without proving DELETE rejection"

out_of_scope:
  - "Adding new columns to state_current"
  - "Function logic changes"
stop_conditions:
  - "ON DELETE CASCADE remains after migration"
  - "Verifier does not attempt DELETE on referenced transition"

proof_guarantees:
  - "FK on state_current.last_transition_id uses ON DELETE RESTRICT"
  - "Attempting DELETE on referenced state_transitions row is rejected"
proof_limitations:
  - "Does not prove all FK policies across the entire schema"

depends_on:
  - TSK-P2-W5-FIX-05

blocks:
  - TSK-P2-W5-FIX-07

touches:
  - schema/migrations/0150_fix_state_current_fk_restrict.sql
