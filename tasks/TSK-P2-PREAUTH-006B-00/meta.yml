schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-006B-00
title: "Create PLAN.md and verify alignment for data authority triggers"
owner_role: DB_FOUNDATION
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY

intent: >-
  This task creates the PLAN.md for 5 data authority trigger functions. Without a verified plan,
  the trigger changes lack architectural documentation and verification trace, creating risk of
  incomplete or incorrect implementation of data authority enforcement.

anti_patterns:
  - "Creating PLAN.md after implementation has started"
  - "Writing PLAN.md without explicit tracking IDs for work items"
  - "Omitting stop conditions or proof limitations"

out_of_scope:
  - "Actual trigger implementation (deferred to TSK-P2-PREAUTH-006B-01 through 006B-04)"
  - "C# read model changes (deferred to TSK-P2-PREAUTH-006C)"

stop_conditions:
  - "If verify_plan_semantic_alignment.py fails with orphaned nodes"
  - "If the plan lacks explicit verifier specifications"
  - "If the plan lacks negative test definitions"

proof_guarantees:
  - "PLAN.md exists at docs/plans/phase2/TSK-P2-PREAUTH-006B-00/PLAN.md"
  - "PLAN.md passes verify_plan_semantic_alignment.py validation"

proof_limitations:
  - "Cannot verify that the plan content is technically correct without implementation"
  - "Cannot verify that the triggers will enforce data authority correctly"

depends_on:
  - TSK-P2-PREAUTH-006A-04
blocks:
  - TSK-P2-PREAUTH-006B-01

touches:
  - docs/plans/phase2/TSK-P2-PREAUTH-006B-00/PLAN.md
  - tasks/TSK-P2-PREAUTH-006B-00/meta.yml

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_006b_00_work_item_01] Create PLAN.md at docs/plans/phase2/TSK-P2-PREAUTH-006B-00/PLAN.md
    from PLAN_TEMPLATE.md with objective, architectural context, pre-conditions, files to change,
    stop conditions, implementation steps, verification, evidence contract, rollback, and risk sections.
  - >-
    [ID tsk_p2_preauth_006b_00_work_item_02] Document the 5 trigger functions: enforce_monitoring_authority(),
    enforce_asset_batch_authority(), enforce_state_transition_authority(), upgrade_authority_on_execution_binding(),
    downgrade_authority_on_supersession().
  - >-
    [ID tsk_p2_preauth_006b_00_work_item_03] Document trigger attachment points: BEFORE INSERT OR UPDATE
    on monitoring_records, asset_batches, state_transitions, AFTER INSERT on state_transitions.
  - >-
    [ID tsk_p2_preauth_006b_00_work_item_04] Run verify_plan_semantic_alignment.py to validate
    proof graph integrity: python3 scripts/audit/verify_plan_semantic_alignment.py
    --plan docs/plans/phase2/TSK-P2-PREAUTH-006B-00/PLAN.md --meta tasks/TSK-P2-PREAUTH-006B-00/meta.yml

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_006b_00_work_item_01] PLAN.md exists at docs/plans/phase2/TSK-P2-PREAUTH-006B-00/PLAN.md
    and contains all required sections.
  - >-
    [ID tsk_p2_preauth_006b_00_work_item_02] PLAN.md documents all 5 trigger functions.
  - >-
    [ID tsk_p2_preauth_006b_00_work_item_03] PLAN.md documents trigger attachment points.
  - >-
    [ID tsk_p2_preauth_006b_00_work_item_04] verify_plan_semantic_alignment.py exits 0 with
    NO_ORPHANS=true and GRAPH_CONNECTED=true.

negative_tests:
  - id: TSK-P2-PREAUTH-006B-00-N1
    description: >-
      Verify that verify_plan_semantic_alignment.py fails on a plan with orphaned work items
      (missing acceptance criteria mapping).
    required: true

positive_tests: []

verification:
  - >-
    # [ID tsk_p2_preauth_006b_00_work_item_01]
    test -f docs/plans/phase2/TSK-P2-PREAUTH-006B-00/PLAN.md || exit 1
  - >-
    grep -q "enforce_monitoring_authority" docs/plans/phase2/TSK-P2-PREAUTH-006B-00/PLAN.md &&
    grep -q "upgrade_authority_on_execution_binding" docs/plans/phase2/TSK-P2-PREAUTH-006B-00/PLAN.md || exit 1
  - >-
    # [ID tsk_p2_preauth_006b_00_work_item_04]
    python3 scripts/audit/verify_plan_semantic_alignment.py --plan docs/plans/phase2/TSK-P2-PREAUTH-006B-00/PLAN.md --meta tasks/TSK-P2-PREAUTH-006B-00/meta.yml || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_006b_00.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - plan_path
      - graph_validation_enabled
      - no_orphans
      - graph_connected

failure_modes:
  - "PLAN.md missing => CRITICAL_FAIL"
  - "verify_plan_semantic_alignment.py fails => FAIL"
  - "PLAN lacks trigger documentation => FAIL_REVIEW"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/contracts/templates/PLAN_TEMPLATE.md
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-006B-00/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-006B-00/EXEC_LOG.md

notes: >-
  This task depends on TSK-P2-PREAUTH-006A-04 and blocks TSK-P2-PREAUTH-006B-01.
  Phase Key: PRE-PHASE2. Phase Name: Pre-Phase 2 Implementation.

client: cursor
assigned_agent: db_foundation
model: <UNASSIGNED>
