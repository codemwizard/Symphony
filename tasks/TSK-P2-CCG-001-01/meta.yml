schema_version: 1
phase: '2'
task_id: TSK-P2-CCG-001-01
title: Run gate and promote INV-159/160/161/166
owner_role: INVARIANTS_CURATOR
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: CI_GATES
intent: This task runs the core contract gate and promotes INV-159 (neutrality), INV-160
  (adapter-boundary), INV-161 (function-names), and INV-166 (payload-neutrality) to
  implemented status. Without this verification, the core contract may violate neutrality
  or adapter boundaries, creating architectural debt.
anti_patterns:
- Promoting invariants to implemented without running the gate
- Assuming the gate passes without actual execution
- Writing the verifier after marking invariants as implemented
out_of_scope:
- Changing core contract logic implementation (deferred to separate task if needed)
- Modifying other invariants
- Database schema changes
stop_conditions:
- If verify_core_contract_gate.sh does not exit 0
- If any of INV-159, INV-160, INV-161, INV-166 status is not updated to implemented
- If the gate is skipped or mocked
proof_guarantees:
- verify_core_contract_gate.sh exits 0 with all sub-checks passing
- 'INV-159, INV-160, INV-161, INV-166 in INVARIANTS_MANIFEST.yml have status: implemented'
- Verifier script exists and emits evidence
proof_limitations:
- Cannot verify that all core contract violations are caught by the gate
- Cannot verify that neutrality cannot be violated through other means
