schema_version: 1
phase: '2'
task_id: TSK-P2-W8-ARCH-003
title: "Signing and replay contract hardening"
owner_role: ARCHITECT
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCUMENTATION

intent: >-
  Wave 8 must not leave signing semantics distributed across code comments,
  timestamp folklore, verifier conventions, or provider drift. This contract
  hardens the signature boundary into a single replay authority while treating
  runtime/provider fidelity as a prerequisite gate proven by `SEC-000`.

primary_enforcement_domain: >-
  signature semantics

anti_patterns:
  - "Saying 'Ed25519' without freezing the exact signed bytes"
  - "Distributing replay semantics across separate docs or tasks"
  - "Allowing signer overlap or crypto unavailability to degrade into acceptance"
  - "Questioning framework availability in the abstract instead of proving runtime fidelity"
  - "Allowing downstream tasks to assume a callable surface before `SEC-000` passes"

out_of_scope:
  - "Any work outside the single primary enforcement domain declared for this task."
  - "Implementation or evidence claims for non-authoritative surfaces unless explicitly routed through the same `asset_batches` boundary."

stop_conditions:
  - "If the task begins to span more than one primary enforcement domain, stop and split the work into separate task packs."
  - "If the verifier cannot produce a deterministic fail domain for the task objective, stop and repair the pack before implementation."
  - "If the verifier cannot prove the contract or control artifact is explicit and complete, stop and repair the pack before implementation."

proof_guarantees:
  - "The task is constrained to one primary enforcement domain."
  - "The verifier path is tied to explicit work-item IDs and proof-carrying evidence expectations."

proof_limitations:
  - "This task alone does not certify Wave 8 complete; it proves only its declared domain."

depends_on:
  - TSK-P2-W8-ARCH-001
  - TSK-P2-W8-ARCH-002

blocks:
  - TSK-P2-W8-ARCH-004
  - TSK-P2-W8-ARCH-006
  - TSK-P2-W8-SEC-000
  - TSK-P2-W8-DB-002
  - TSK-P2-W8-DB-005
  - TSK-P2-W8-SEC-001

touches:
  - docs/contracts/ED25519_SIGNING_CONTRACT.md
  - scripts/agent/verify_tsk_p2_w8_arch_003.py
  - evidence/phase2/tsk_p2_w8_arch_003.json
  - tasks/TSK-P2-W8-ARCH-003/meta.yml
  - docs/plans/phase2/TSK-P2-W8-ARCH-003/PLAN.md
  - docs/plans/phase2/TSK-P2-W8-ARCH-003/EXEC_LOG.md

invariants:
  - INV-GOV-TEMPLATE-004
  - INV-GOV-TEMPLATE-005

