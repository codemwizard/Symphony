regulated_surface_compliance:
  enabled: true
  approval_workflow: stage_a_only
  stage_a_required_before_edit: true
  regulated_paths:
    - evidence/phase2/tsk_p2_w8_arch_003.json
    - scripts/agent/verify_tsk_p2_w8_arch_003.py
  must_read:
    - docs/operations/REGULATED_SURFACE_PATHS.yml

remediation_trace_compliance:
  enabled: true
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

database_connection:
  enabled: false

migration_dependencies:
  enabled: false

work:
  - >-
    [ID w8_arch_003_work_01] Define the exact signature input bytes, including whether Ed25519 signs canonical payload bytes directly, hash bytes, or a domain-separated envelope and how raw-byte versus encoded-byte semantics are interpreted.
  - >-
    [ID w8_arch_003_work_02] Add persisted-before-signing timestamp rules, project and entity scope authorization rules, and signer-precedence law that hard-fails on overlapping active matches.
  - >-
    [ID w8_arch_003_work_03] Centralize replay law, including duplicate decision semantics, nonce semantics, same-signature cross-context semantics, and same-canonical-bytes different-`occurred_at` semantics.
  - >-
    [ID w8_arch_003_work_04] State that Wave 8 requires the first-party `.NET 10` Ed25519 surface, forbids third-party providers or fallbacks, and defers concrete runtime/provider-path proof to `TSK-P2-W8-SEC-000`.
  - >-
    [ID w8_arch_003_work_05] Define fail-closed unavailable-crypto semantics for verifier unavailability, key lookup unavailability, signer-surface unavailability, unresolved functions/extensions, and dependency load failure.
  - >-
    [ID w8_arch_003_work_06] Register named failure classes for key scope, timestamp invalidity, replay invalidity, precedence conflict, and unavailable-crypto failure.

acceptance_criteria:
  - >-
    [ID w8_arch_003_work_01] The signing contract explicitly defines the exact bytes Ed25519 signs and rejects non-canonical byte interpretations.
  - >-
    [ID w8_arch_003_work_02] The signing contract explicitly defines scope authorization and precedence rules that hard-fail when multiple active keys match the same resolution query.
  - >-
    [ID w8_arch_003_work_03] Replay semantics are centralized in the signing contract rather than inferred across separate documents.
  - >-
    [ID w8_arch_003_work_04] The signing contract requires the first-party `.NET 10` Ed25519 surface, forbids third-party providers or fallbacks, and states that no downstream task may assume a callable surface before `SEC-000` proves runtime fidelity.
  - >-
    [ID w8_arch_003_work_05] The signing contract explicitly states that unavailable crypto is itself a hard verification failure.
  - >-
    [ID w8_arch_003_work_06] Named failure classes cover scope, timestamp, replay, precedence, and unavailable-crypto failures.

negative_tests:
  - id: TSK-P2-W8-ARCH-003-N1
    description: >-
      Verifier fails if signature bytes, replay law, runtime/provider gating, or
      unavailable-crypto semantics remain implied rather than explicit.
    required: true

positive_tests:
  - id: TSK-P2-W8-ARCH-003-P1
    description: >-
      Verifier passes only when the signing contract can serve as the sole semantic authority for signature and replay logic.
    required: true

verification:
