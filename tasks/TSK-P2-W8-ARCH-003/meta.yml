  - 'bash scripts/audit/verify_task_pack_readiness.sh --task TSK-P2-W8-ARCH-003'
  - 'python3 scripts/audit/validate_evidence.py --task TSK-P2-W8-ARCH-003 --evidence evidence/phase2/tsk_p2_w8_arch_003.json'

