schema_version: 1
phase: '2'
task_id: TSK-P2-GOV-CONV-007
title: "Wire Phase-2 contract verifier into local and CI gates"
owner_role: SECURITY_GUARDIAN
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: CI_GATES

intent: >-
  The canonical Phase-2 contract verifier must be wired into local and CI workflows
  after it exists, otherwise contract validity remains optional. This task only
  connects scripts/audit/verify_phase2_contract.sh to scripts/dev/pre_ci.sh and the
  CI workflow under a Phase-2 gate flag. It prevents verifier drift by proving the
  local and CI paths call the same contract verifier and write the same evidence path.

anti_patterns:
  - >-
    Creating or changing the Phase-2 contract verifier in the same task as workflow
    wiring.
  - >-
    Wiring CI to a different command than local pre_ci, causing local/CI parity drift.
  - >-
    Making Phase-2 contract verification advisory or warning-only after the gate flag
    is enabled.

out_of_scope:
  - Modifying docs/PHASE2/phase2_contract.yml
  - Modifying scripts/audit/verify_phase2_contract.sh behavior
  - Writing Phase-2 human contract or policy documents
  - Creating ratification approval artifacts
  - Wiring unrelated Phase-3 or Phase-4 gates

stop_conditions:
  - >-
    STOP if TSK-P2-GOV-CONV-006 is incomplete or scripts/audit/verify_phase2_contract.sh
    does not exist.
  - >-
    STOP if the local and CI wiring cannot use the same verifier command.
  - >-
    STOP if the verifier would run only as advisory while RUN_PHASE2_GATES=1 is set.
  - >-
    STOP if approval metadata is absent before editing scripts/dev/pre_ci.sh,
    .github/workflows/**, scripts/audit/**, or evidence/**.

proof_guarantees:
  - >-
    RUN_PHASE2_GATES=1 causes scripts/dev/pre_ci.sh to run the Phase-2 contract
    verifier.
  - >-
    The CI workflow invokes the same Phase-2 contract verifier command or the same
    local parity path.
  - >-
    Evidence records that local and CI wiring reference the canonical verifier and
    expected evidence path.

proof_limitations:
  - >-
    This task does not prove the semantic correctness of verify_phase2_contract.sh;
    that is covered by TSK-P2-GOV-CONV-006.
  - >-
    This task does not create or modify Phase-2 contract rows.
  - >-
    This task does not prove external CI execution after merge; it proves repo wiring.

depends_on:
  - TSK-P2-GOV-CONV-006
blocks:
  - TSK-P2-GOV-CONV-012

touches:
  - scripts/dev/pre_ci.sh
  - .github/workflows/ci.yml
  - scripts/audit/verify_gov_conv_007.sh
  - evidence/phase2/gov_conv_007_phase2_contract_wiring.json
  - tasks/TSK-P2-GOV-CONV-007/meta.yml
  - docs/plans/phase2/TSK-P2-GOV-CONV-007/PLAN.md
  - docs/plans/phase2/TSK-P2-GOV-CONV-007/EXEC_LOG.md

deliverable_files:
  - scripts/dev/pre_ci.sh
  - .github/workflows/ci.yml
  - scripts/audit/verify_gov_conv_007.sh
  - evidence/phase2/gov_conv_007_phase2_contract_wiring.json
  - docs/plans/phase2/TSK-P2-GOV-CONV-007/PLAN.md
  - docs/plans/phase2/TSK-P2-GOV-CONV-007/EXEC_LOG.md

invariants:
  - INV-GOV-CONV-007

regulated_surface_compliance:
  enabled: true
  approval_workflow: stage_a_stage_b
  stage_a_required_before_edit: true
  regulated_paths:
    - scripts/dev/pre_ci.sh
    - .github/workflows/ci.yml
    - scripts/audit/verify_gov_conv_007.sh
    - evidence/phase2/gov_conv_007_phase2_contract_wiring.json
  must_read:
    - docs/operations/REGULATED_SURFACE_PATHS.yml
    - docs/operations/approval_metadata.schema.json

remediation_trace_compliance:
  enabled: true
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

work:
  - >-
    [ID gov_conv_007_w01] Update scripts/dev/pre_ci.sh so RUN_PHASE2_GATES=1 invokes
    scripts/audit/verify_phase2_contract.sh and writes evidence/phase2/phase2_contract_status.json.
  - >-
    [ID gov_conv_007_w02] Update .github/workflows/ci.yml so the CI path invokes the
    same Phase-2 contract verifier command or invokes the local parity command that
    calls it.
  - >-
    [ID gov_conv_007_w03] Create scripts/audit/verify_gov_conv_007.sh to inspect
    pre_ci and CI workflow wiring for the canonical verifier command and evidence path.
  - >-
    [ID gov_conv_007_w04] Emit evidence/phase2/gov_conv_007_phase2_contract_wiring.json
    with local_wired, ci_wired, command_matches, evidence_path_matches, and advisory_only.

acceptance_criteria:
  - >-
    [ID gov_conv_007_w01] RUN_PHASE2_GATES=1 bash scripts/dev/pre_ci.sh invokes
    scripts/audit/verify_phase2_contract.sh fail-closed.
  - >-
    [ID gov_conv_007_w02] CI workflow references the canonical verifier command or
    the local parity command that invokes it.
  - >-
    [ID gov_conv_007_w03] The wiring verifier exits non-zero if local or CI references
    are missing or divergent.
  - >-
    [ID gov_conv_007_w04] Evidence records local_wired: true, ci_wired: true,
    command_matches: true, evidence_path_matches: true, and advisory_only: false.

negative_tests:
  - id: TSK-P2-GOV-CONV-007-N1
    description: >-
      Run the wiring verifier against a fixture pre_ci file that omits
      verify_phase2_contract.sh. It must exit non-zero with local_wired: false.
    required: true
  - id: TSK-P2-GOV-CONV-007-N2
    description: >-
      Run the wiring verifier against a fixture workflow that calls a different
      Phase-2 contract command. It must exit non-zero with command_matches: false.
    required: true
  - id: TSK-P2-GOV-CONV-007-N3
    description: >-
      Run the wiring verifier against a fixture where the command is guarded by
      warning-only or continue-on-error semantics. It must exit non-zero with
      advisory_only: true.
    required: true

positive_tests:
  - id: TSK-P2-GOV-CONV-007-P1
    description: >-
      Run the wiring verifier against live pre_ci and CI workflow files. It must
      emit PASS evidence showing local and CI are wired to the same verifier path.
    required: true

verification:
  - >-
    # [ID gov_conv_007_w01] [ID gov_conv_007_w02] [ID gov_conv_007_w03] [ID gov_conv_007_w04]
    test -x scripts/audit/verify_gov_conv_007.sh && bash scripts/audit/verify_gov_conv_007.sh > evidence/phase2/gov_conv_007_phase2_contract_wiring.json || exit 1
  - >-
    python3 scripts/audit/validate_evidence.py --task TSK-P2-GOV-CONV-007 --evidence evidence/phase2/gov_conv_007_phase2_contract_wiring.json || exit 1
  - >-
    RUN_PHASE2_GATES=1 bash scripts/dev/pre_ci.sh || exit 1

evidence:
  - path: evidence/phase2/gov_conv_007_phase2_contract_wiring.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - local_wired
      - ci_wired
      - command_matches
      - evidence_path_matches
      - advisory_only

failure_modes:
  - >-
    CI and local workflows call different Phase-2 contract verification commands
    => CRITICAL_FAIL
  - >-
    Phase-2 contract verifier is advisory-only under RUN_PHASE2_GATES=1 => CRITICAL_FAIL
  - >-
    Workflow wiring modifies unrelated gates or phases => BLOCKED
  - >-
    Evidence file missing => FAIL

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/operations/TASK_AUTHORING_STANDARD_v2.md
  - docs/operations/WAVE5_TASK_CREATION_LESSONS_LEARNED.md
  - scripts/audit/verify_phase2_contract.sh

implementation_plan: docs/plans/phase2/TSK-P2-GOV-CONV-007/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-GOV-CONV-007/EXEC_LOG.md
notes: >-
  This task only wires the already-created canonical verifier. It must not change
  verifier semantics or Phase-2 contract rows.
client: codex_cli
assigned_agent: security_guardian
model: UNASSIGNED