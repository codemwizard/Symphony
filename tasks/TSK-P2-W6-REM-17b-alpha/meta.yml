title: "Backfill interpretation_version_id on state_transitions from execution_records lineage"
owner_role: DB Foundation
status: completed
priority: HIGH
risk_class: DATA_MIGRATION
blast_radius: DB_SCHEMA

intent: >-
  Populate state_transitions.interpretation_version_id from execution_records.interpretation_version_id
  via the FK on execution_id. Uses a three-phase assert-mutate-reconcile pattern with row accounting.

anti_patterns:
  - "Backfilling without cardinality assertion"
  - "Overwriting already-populated values"
  - "Leaving the append-only trigger disabled after backfill"

out_of_scope:
  - "Backfilling policy_decisions.project_id (TSK-P2-W6-REM-17b-β)"
  - "Adding NOT NULL constraint (TSK-P2-W6-REM-17c-α)"

stop_conditions:
  - "Cardinality assertion fails (ambiguous lineage)"
  - "Row accounting mismatch"
  - "Remaining NULL rows after backfill"

proof_guarantees:
  - "Every state_transitions row has interpretation_version_id populated from authoritative source"
  - "Row accounting reconciles: pre-update NULL count equals updated count"

proof_limitations:
  - "On empty tables the backfill is vacuously correct"

depends_on:
  - TSK-P2-W6-REM-17a

blocks:
  - TSK-P2-W6-REM-17c-alpha

touches:
