  - tasks/TSK-P2-W6-REM-17b-alpha/meta.yml

invariants:
  - INV-BACKFILL-INTEGRITY

work:
  - "Author migration 0158 implementing the three-phase backfill contract."
  - "Temporarily disable the append-only trigger during backfill, re-enable immediately after."
  - "Author verification script asserting zero remaining NULLs and idempotent rerun."

acceptance_criteria:
  - "Join-cardinality assertion passes"
  - "Row accounting reconciles"
  - "Zero rows with NULL interpretation_version_id"
