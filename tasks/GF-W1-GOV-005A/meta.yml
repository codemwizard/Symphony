schema_version: 1
phase: '0'
task_id: GF-W1-GOV-005A
title: "Fail closed on invalid migration ownership and reference order"
owner_role: SECURITY_GUARDIAN
status: planned
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: CI_GATES

intent: >-
  The existing migration sequence guard only proves numeric ordering and head
  consistency. It does not prove that governed objects have one owner, that
  references resolve in create-before-use order, or that sidecars truthfully
  describe the SQL. This task closes that gap with a global graph verifier that
  rejects invalid ownership, ordering, sidecar forgery, dynamic/procedural DDL,
  and incomplete direct task dependencies.

anti_patterns:
  - "Treating sidecars as authoritative without comparing them to parsed SQL"
  - "Implementing the verifier as regex-only string matching"
  - "Passing transitive dependencies off as direct task prerequisites"
  - "Silently ignoring undeclared or ownerless governed objects"

depends_on:
  - GF-W1-GOV-005

blocks: []

touches:
  - scripts/audit/verify_migration_reference_order.py
  - scripts/audit/tests/test_verify_migration_reference_order.py
  - evidence/phase0/gf_gov_005a_reference_order.json
  - tasks/GF-W1-GOV-005A/meta.yml

invariants:
  - INV-SCHEMA-OWNERSHIP-001
  - INV-SCHEMA-ORDER-002
  - INV-SCHEMA-NO-FORWARD-REF-003
  - INV-SCHEMA-DETERMINISM-004
  - INV-SCHEMA-TASK-REF-DEP-006
  - INV-SCHEMA-OWNERSHIP-MAP-007
  - INV-SCHEMA-OWNERSHIP-CLOSURE-008
  - INV-SCHEMA-STATIC-DDL-ONLY-010
  - INV-MIGRATION-HEAD-CONSISTENCY-011
  - INV-SCHEMA-SIDECAR-SQL-CONSISTENCY-012
  - INV-SCHEMA-NO-PROCEDURAL-DDL-013
  - INV-MIGRATION-SEQUENCE-INTEGRITY-014
  - INV-SCHEMA-NO-DESTRUCTIVE-DDL-015

work:
  - >-
    [ID gf_w1_gov_005a_work_item_01] Parse governed object ownership from
    tokenized or parsed SQL for tables, named indexes, standalone sequences,
    and explicitly named constraints.
  - >-
    [ID gf_w1_gov_005a_work_item_02] Parse references and enforce ordered
    resolution, same-file ordering, and ownerless-reference failure behavior.
  - >-
    [ID gf_w1_gov_005a_work_item_03] Validate sidecar/SQL consistency,
    ownership closure, root-table `IF NOT EXISTS` bans, direct dependency
    completeness, and sequence/head integrity.
  - >-
    [ID gf_w1_gov_005a_work_item_04] Reject procedural SQL, dynamic DDL,
    destructive DDL, and regex-only verifier behavior through explicit tests.
  - >-
    [ID gf_w1_gov_005a_work_item_05] Emit bounded evidence to
    `evidence/phase0/gf_gov_005a_reference_order.json`.

acceptance_criteria:
  - >-
    [ID gf_w1_gov_005a_work_item_01] Duplicate governed ownership fails and the
    verifier constructs a deterministic `schema_object -> migration -> task` map.
  - >-
    [ID gf_w1_gov_005a_work_item_02] Forward references, same-file reference-
    before-create, and ownerless references all fail closed.
  - >-
    [ID gf_w1_gov_005a_work_item_03] Sidecar/SQL mismatches, undeclared governed
    objects, incomplete direct dependencies, and sequence/head mismatches fail.
  - >-
    [ID gf_w1_gov_005a_work_item_04] Procedural SQL, dynamic schema creation,
    destructive DDL, and regex-only extraction paths fail.
  - >-
    [ID gf_w1_gov_005a_work_item_05] Evidence file
    `evidence/phase0/gf_gov_005a_reference_order.json` exists and includes the declared proof fields.

negative_tests:
  - id: GF-W1-GOV-005A-N1
    description: >-
      Put `projects` in SQL but omit it from the sidecar. The verifier must
      fail the sidecar/SQL consistency and ownership-closure checks.
    required: true
  - id: GF-W1-GOV-005A-N2
    description: >-
      Embed schema-producing DDL inside a procedural block or function body.
      The verifier must reject the migration as non-compliant.
    required: true

verification:
  - >-
    grep -n "create table\\|references\\|alter table" schema/migrations/*_gf_*.sql || exit 1 # [ID gf_w1_gov_005a_work_item_01] [ID gf_w1_gov_005a_work_item_02] [ID gf_w1_gov_005a_work_item_03]
  - >-
    python3 -m pytest scripts/audit/tests/test_verify_migration_reference_order.py || exit 1 # [ID gf_w1_gov_005a_work_item_04]
  - >-
    python3 scripts/audit/verify_migration_reference_order.py | tee evidence/phase0/gf_gov_005a_reference_order.json >/dev/null && test -f evidence/phase0/gf_gov_005a_reference_order.json || exit 1 # [ID gf_w1_gov_005a_work_item_05]

evidence:
  - path: evidence/phase0/gf_gov_005a_reference_order.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - owners
      - references
      - task_ownership_map
      - task_dependency_failures
      - duplicate_owner_failures
      - forward_reference_failures
      - ambiguous_owner_failures
      - root_if_not_exists_failures
      - undeclared_object_failures
      - sidecar_sql_mismatch_failures
      - dynamic_ddl_failures
      - destructive_ddl_failures
      - normalization_cases
      - ignored_reference_warnings
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace

failure_modes:
  - "Verifier reduces to string matching => CRITICAL_FAIL"
  - "Duplicate owner accepted => CRITICAL_FAIL"
  - "Ownerless reference accepted => CRITICAL_FAIL"
  - "Sidecar/SQL mismatch accepted => CRITICAL_FAIL"
  - "Dynamic or procedural schema creation accepted => CRITICAL_FAIL"
  - "Destructive DDL accepted => CRITICAL_FAIL"
  - "Task dependency completeness not enforceable => FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/operations/PILOT_REJECTION_PLAYBOOK.md
  - docs/operations/AGENT_GUARDRAILS_GREEN_FINANCE.md

implementation_plan: docs/plans/phase0/GF-W1-GOV-005A/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-GOV-005A/EXEC_LOG.md

notes: >-
  This is governance enforcement, not a domain DAG node. It exists to fail
  closed on malformed schema ownership/reference graphs before any downstream
  Green Finance schema work is merged.
client: codex_cli
assigned_agent: <UNASSIGNED>
model: <UNASSIGNED>

domain: green_finance
pilot: true
second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: [all]
  unchanged_core_functions: [all]
  adapter_only_differences:
    - "The verifier is sector-agnostic; only migration content and task metadata differ by sector"
  jurisdiction_profile_impact: none
  required_core_changes: []
  explanation: >-
