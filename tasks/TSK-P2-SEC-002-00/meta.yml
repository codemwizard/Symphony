  to change, stop conditions, implementation steps, verification, evidence contract,
  and risk sections.'
- '[ID tsk_p2_sec_002_00_work_item_02] Document the INV-131 promotion requirements
  including live service test execution via test_admin_endpoints_require_key.sh.'
