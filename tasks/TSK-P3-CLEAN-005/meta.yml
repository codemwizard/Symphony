schema_version: 1
phase: '3'
task_id: TSK-P3-CLEAN-005
title: "Resolve non-canonical MADD/MAIN duplicate doctrine copy so that Phase 3 planning cites only canonical doctrine"
owner_role: ARCHITECT
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY

intent: >-
  A duplicate or non-canonical MADD/MAIN integration doctrine copy exists
  (docs/constitutional/MADD_MAIN_INTEGRATION_DOCTRINE-2.md or similar). This
  task archives it, marks it non-canonical, or merges it with a source-lineage
  decision — ensuring Phase 3 planning cites only the canonical copy.

depends_on: []
blocked_by:
  - TSK-P3-CLEAN-001
invariants: []

deliverable_files:
  - scripts/audit/verify_tsk_p3_clean_005.sh
  - evidence/phase3/tsk_p3_clean_005.json
  - docs/plans/phase3/TSK-P3-CLEAN-005/PLAN.md
  - docs/plans/phase3/TSK-P3-CLEAN-005/EXEC_LOG.md

regulated_surface_compliance:
  enabled: false
  approval_workflow: none
  stage_a_required_before_edit: false
  regulated_paths: []
  must_read: []

remediation_trace_compliance:
  enabled: false
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

out_of_scope:
  - "Rewriting canonical MADD/MAIN doctrine content."
  - "Creating new doctrine that does not already exist."
  - "Modifying Phase 3 planning scope or capability boundary."

stop_conditions:
  - "If duplicate doctrine is treated as canonical without explicit lineage decision => STOP."
  - "If merge is performed without source-lineage decision recorded => STOP."
  - "If Phase 3 planning documents still cite the duplicate after cleanup => STOP."

proof_guarantees:
  - "Verifier mechanically confirms the duplicate file is archived with non-canonical header or merged with lineage decision."
  - "Verifier mechanically confirms no Phase 3 planning doc under docs/PHASE3/ cites the duplicate as governing source."

proof_limitations:
  - "Does not verify the canonical MADD/MAIN doctrine content is complete or correct."
  - "Does not verify all possible citation locations outside docs/PHASE3/."

touches:
  - docs/constitutional/MADD_MAIN_INTEGRATION_DOCTRINE-2.md
  - scripts/audit/verify_tsk_p3_clean_005.sh
  - evidence/phase3/tsk_p3_clean_005.json
  - tasks/TSK-P3-CLEAN-005/meta.yml
  - docs/plans/phase3/TSK-P3-CLEAN-005/PLAN.md
  - docs/plans/phase3/TSK-P3-CLEAN-005/EXEC_LOG.md

work:
  - "[ID tsk_p3_clean_005_work_01] Identify the duplicate MADD/MAIN doctrine copy at docs/constitutional/MADD_MAIN_INTEGRATION_DOCTRINE-2.md or equivalent location."
  - "[ID tsk_p3_clean_005_work_02] Archive, mark non-canonical, or intentionally merge the duplicate with a source-lineage decision recorded."
  - "[ID tsk_p3_clean_005_work_03] Confirm Phase 3 planning documents cite only the canonical MADD/MAIN doctrine and exclude duplicate prompt-response material."

acceptance_criteria:
  - "[ID tsk_p3_clean_005_work_01] The duplicate MADD/MAIN doctrine file is identified and its canonical status is explicitly recorded."
  - "[ID tsk_p3_clean_005_work_02] The duplicate is either archived with non-canonical header or merged with lineage decision documented."
  - "[ID tsk_p3_clean_005_work_03] No Phase 3 planning document under docs/PHASE3/ cites the duplicate as a governing source."

negative_tests:
  - id: TSK-P3-CLEAN-005-N1
    description: "Feed a state where docs/PHASE3/ planning docs cite the duplicate as governing; verifier must reject."
    required: true

positive_tests:
  - id: TSK-P3-CLEAN-005-P1
    description: "Feed a state where duplicate is archived and no PHASE3 doc cites it; verifier must pass."
    required: true

verification:
  - '# [ID tsk_p3_clean_005_work_01] [ID tsk_p3_clean_005_work_02] [ID tsk_p3_clean_005_work_03] test -x scripts/audit/verify_tsk_p3_clean_005.sh && bash scripts/audit/verify_tsk_p3_clean_005.sh > evidence/phase3/tsk_p3_clean_005.json || exit 1'
  - 'bash scripts/dev/pre_ci.sh || exit 1'

evidence:
  - path: evidence/phase3/tsk_p3_clean_005.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes

failure_modes:
  - "Evidence file missing => FAIL"
  - "Duplicate treated as canonical without lineage decision => CRITICAL_FAIL"
  - "Phase 3 planning doc still cites duplicate as governing source => FAIL"

must_read:
  - AGENT_ENTRYPOINT.md
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
