schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-002-01
title: "Create factor_registry table"
owner_role: DB_FOUNDATION
status: planned
priority: HIGH
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  This task creates the factor_registry table to track emission factors with unique factor codes.
  Without this table, the system cannot manage factor definitions, creating risk of
  inconsistent factor usage across calculations.

anti_patterns:
  - "Creating the table without UNIQUE constraint on factor_code"
  - "Writing the migration without touching MIGRATION_HEAD"
  - "Writing the verifier after the migration is applied"

out_of_scope:
  - "unit_conversions table creation (deferred to TSK-P2-PREAUTH-002-02)"
  - "Data migration or backfill"
  - "Application layer changes"

stop_conditions:
  - "If migration 0117 does not create factor_registry table"
  - "If UNIQUE constraint on factor_code is missing"
  - "If MIGRATION_HEAD is not updated to 0117"

proof_guarantees:
  - "Migration 0117 creates factor_registry table"
  - "UNIQUE constraint on factor_code is present"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the table structure is optimal for all use cases"
  - "Cannot verify that the table will perform well at scale"

depends_on:
  - TSK-P2-PREAUTH-002-00
blocks:
  - TSK-P2-PREAUTH-002-02

touches:
  - schema/migrations/0117_create_factor_registry.sql
  - schema/migrations/MIGRATION_HEAD
  - scripts/db/verify_tsk_p2_preauth_002_01.sh
  - tasks/TSK-P2-PREAUTH-002-01/meta.yml

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_002_01_work_item_01] Write migration 0117 at schema/migrations/0117_create_factor_registry.sql
    creating factor_registry table with columns: factor_id UUID PRIMARY KEY, factor_code VARCHAR NOT NULL,
    factor_name VARCHAR NOT NULL, unit VARCHAR NOT NULL, and UNIQUE constraint on factor_code.
  - >-
    [ID tsk_p2_preauth_002_01_work_item_02] Update MIGRATION_HEAD to 0117: echo 0117 > schema/migrations/MIGRATION_HEAD.
  - >-
    [ID tsk_p2_preauth_002_01_work_item_03] Write verify_tsk_p2_preauth_002_01.sh that runs psql to verify
    table exists and UNIQUE constraint on factor_code is present.
  - >-
    [ID tsk_p2_preauth_002_01_work_item_04] Run verify_tsk_p2_preauth_002_01.sh to confirm migration is successful.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_002_01_work_item_01] Migration 0117 creates factor_registry table.
  - >-
    [ID tsk_p2_preauth_002_01_work_item_02] MIGRATION_HEAD contains 0117.
  - >-
    [ID tsk_p2_preauth_002_01_work_item_03] verify_tsk_p2_preauth_002_01.sh exists and checks for table existence.
  - >-
    [ID tsk_p2_preauth_002_01_work_item_04] verify_tsk_p2_preauth_002_01.sh exits 0.

negative_tests:
  - id: TSK-P2-PREAUTH-002-01-N1
    description: >-
      Verify that verify_tsk_p2_preauth_002_01.sh exits non-zero when factor_registry table does not exist.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-002-01-P1
    description: >-
      Verify that verify_tsk_p2_preauth_002_01.sh exits 0 when factor_registry table exists with UNIQUE constraint.
    required: false

verification:
  - >-
    # [ID tsk_p2_preauth_002_01_work_item_01] [ID tsk_p2_preauth_002_01_work_item_02]
    # [ID tsk_p2_preauth_002_01_work_item_03] [ID tsk_p2_preauth_002_01_work_item_04]
    test -x scripts/db/verify_tsk_p2_preauth_002_01.sh && bash scripts/db/verify_tsk_p2_preauth_002_01.sh > evidence/phase2/tsk_p2_preauth_002_01.json || exit 1
  - >-
    # [ID tsk_p2_preauth_002_01_work_item_02]
    test $(cat schema/migrations/MIGRATION_HEAD) = "0117" || exit 1
  - >-
    # [ID tsk_p2_preauth_002_01_work_item_04]
    test -f evidence/phase2/tsk_p2_preauth_002_01.json || exit 1
  - >-
    python3 scripts/audit/validate_evidence.py --task TSK-P2-PREAUTH-002-01 --evidence evidence/phase2/tsk_p2_preauth_002_01.json || exit 1
  - >-
    RUN_PHASE2_GATES=1 bash scripts/dev/pre_ci.sh || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_002_01.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - table_exists
      - unique_constraint_present
      - migration_head

failure_modes:
  - "Migration does not create table => CRITICAL_FAIL"
  - "UNIQUE constraint missing => CRITICAL_FAIL"
  - "MIGRATION_HEAD not updated => FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-002-01/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-002-01/EXEC_LOG.md

notes: >-
  This task blocks TSK-P2-PREAUTH-002-02. Phase Key: PRE-PHASE2. Phase Name: Pre-Phase 2 Implementation.

client: cursor
assigned_agent: db_foundation
model: <UNASSIGNED>
