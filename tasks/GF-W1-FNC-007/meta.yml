    - "The confidence level of Zambia vs Zimbabwe packs differs — data only"
  jurisdiction_profile_impact: >-
    The ISSUANCE_CONFIDENCE_GATE checkpoint rule applies identically across
    all jurisdictions. A Zambia pack with PENDING_CLARIFICATION and a Zimbabwe
    pack with CONFIRMED both go through the same column enforcement.
    No jurisdiction-specific logic is encoded in schema or function.
  required_core_changes: []
  explanation: >-
    interpretation_confidence_level is a neutral structural column that captures
    the epistemic state of whatever interpretation pack was active at decision
    time. A solar energy decision in Zimbabwe and a forestry carbon decision in
    Zambia both populate the same column from their respective interpretation
    packs. The ISSUANCE_CONFIDENCE_GATE lifecycle rule applies to both pilots
    identically. No sector-specific logic exists in this task.
  second_pilot_reviewed_by: Architecture Owner
