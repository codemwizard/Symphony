schema_version: 1
phase: '1'
task_id: GF-W1-FNC-007
title: "Phase 1: enforce interpretation_confidence_level NOT NULL on authority decisions and data-driven issuance block"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA
domain: green_finance
pilot: false

intent: >-
  FNC-004 handles the provisional pass case during lifecycle transitions: when
  a CONDITIONALLY_REQUIRED checkpoint references a PENDING_CLARIFICATION
  interpretation pack, the transition proceeds with CONDITIONALLY_SATISFIED
  state rather than blocking. That is runtime behaviour.
  This task handles a distinct structural gap: authority_decision_records must
  carry interpretation_confidence_level as NOT NULL so every decision record
  permanently captures the epistemic status of the interpretation pack that
  governed it. Without this column, a decision made under PENDING_CLARIFICATION
  is indistinguishable from one made under CONFIRMED when the record is
  inspected later — destroying the audit trail needed for regulatory replay.
  Additionally, the issuance block under PENDING_CLARIFICATION must be
  expressed as a data-driven rule in lifecycle_checkpoint_rules, not as
  hardcoded function logic — so that the policy can be updated without a
  migration when regulators confirm practice. These are structural enforcement
  concerns separate from the runtime provisional-pass behaviour in FNC-004.

anti_patterns:
  - "Hardcoding 'block issuance if PENDING_CLARIFICATION' in issue_asset_batch — this belongs in lifecycle_checkpoint_rules data"
  - "Making interpretation_confidence_level nullable — every decision must capture its epistemic status"
  - "Conflating this task with FNC-004 provisional pass behaviour — they solve different problems"
  - "Storing confidence_level only on interpretation_packs without propagating to decision records"

depends_on:
  - GF-W1-FNC-004
  - GF-W1-SCH-002

blocks:
  - GF-W1-FNC-005

touches:
  - schema/migrations/0094_gf_fn_confidence_enforcement.sql
  - scripts/db/verify_gf_fnc_007.sh
  - tasks/GF-W1-FNC-007/meta.yml

invariants:
  - INV-165
  - INV-167

work:
  - >-
    Write migration 0094. Add column interpretation_confidence_level TEXT NOT NULL
    to authority_decisions table. CHECK (interpretation_confidence_level IN
    ('CONFIRMED', 'PRACTICE_ASSUMED', 'PENDING_CLARIFICATION')). This column
    is populated at INSERT time by record_authority_decision — it copies the
    confidence_level from the referenced interpretation_pack. It must not be
    derived later; it must be captured at the moment of decision to preserve
    the epistemic state at that point in time, even if the interpretation pack
    is later superseded with a higher confidence level.
  - >-
    Update record_authority_decision (from FNC-004) to populate
    interpretation_confidence_level by querying the confidence_level from
    interpretation_packs where interpretation_pack_id matches the input.
    This is a single additional SELECT before the INSERT. The function must
    raise SQLSTATE P0001 if interpretation_pack_id does not resolve to a row
    in interpretation_packs — a dangling reference must not produce a decision
    record with a NULL confidence level.
  - >-
    Seed the issuance block rule as a data row in lifecycle_checkpoint_rules,
    not as hardcoded logic. Insert a row with:
    checkpoint_type = 'CONDITIONALLY_REQUIRED',
    transition = 'ACTIVE->ISSUED',
    checkpoint_code = 'ISSUANCE_CONFIDENCE_GATE',
    rule_expression = 'interpretation_confidence_level != PENDING_CLARIFICATION',
    blocking_behavior = 'SOFT_BLOCK',
    notes = 'Issuance under PENDING_CLARIFICATION pack produces CONDITIONALLY_SATISFIED
    state per DSN-003 Section 5. This rule is data-driven — update the row
    when MGEE confirms practice rather than migrating function logic.'
    This means the issuance behaviour under each confidence level is
    inspectable and modifiable without touching function code.
  - >-
    Write scripts/db/verify_gf_fnc_007.sh confirming: column exists with NOT
    NULL and CHECK constraint, record_authority_decision populates it
    correctly, seed row exists in lifecycle_checkpoint_rules for
    ISSUANCE_CONFIDENCE_GATE, and negative tests pass.

acceptance_criteria:
  - >-
    bash scripts/db/verify_gf_fnc_007.sh exits 0.
  - >-
    INSERT into authority_decisions without interpretation_confidence_level
    (i.e. calling record_authority_decision with a dangling interpretation_pack_id)
    fails — the column is NOT NULL and enforced in the function body.
  - >-
    Call record_authority_decision with a CONFIRMED interpretation pack.
    SELECT the resulting row. interpretation_confidence_level = 'CONFIRMED'.
  - >-
    Call record_authority_decision with a PENDING_CLARIFICATION interpretation pack.
    SELECT the resulting row. interpretation_confidence_level =
    'PENDING_CLARIFICATION'. The value is captured permanently even if the
    pack is later superseded.
  - >-
    SELECT from lifecycle_checkpoint_rules where checkpoint_code =
    'ISSUANCE_CONFIDENCE_GATE'. Row exists with correct fields.
    This proves the issuance block is data-driven, not hardcoded.
  - >-
    Evidence file evidence/phase1/gf_fnc_007.json exists and passes verifier.

negative_tests:
  - id: GF-W1-FNC-007-N1
    description: >-
      Attempt direct INSERT into authority_decisions with
      interpretation_confidence_level = NULL (bypassing the function). Must
      fail with NOT NULL constraint. This proves the column enforces
      structural integrity independently of the function.
    required: true
  - id: GF-W1-FNC-007-N2
    description: >-
      Call record_authority_decision with an interpretation_pack_id that does
      not exist in interpretation_packs. Must fail with explicit SQLSTATE
      before any INSERT occurs. A dangling reference must never produce a
      decision record.
    required: true
  - id: GF-W1-FNC-007-N3
    description: >-
      Record an authority decision under a PENDING_CLARIFICATION pack. Supersede
      that pack by inserting a new CONFIRMED pack and setting effective_to on
      the old one. SELECT the original decision record. interpretation_confidence_level
      must still be 'PENDING_CLARIFICATION' — the historical epistemic state
      is permanently captured and must not change when the pack is superseded.
    required: true

verification:
  - bash scripts/db/verify_gf_fnc_007.sh
  - python3 scripts/audit/verify_neutral_schema_ast.py schema/migrations/0087_gf_fn_confidence_enforcement.sql
  - bash scripts/dev/pre_ci.sh

