schema_version: 1
phase: '1'
task_id: TSK-P1-224
title: Build a report-only task verification runner and gate result contract so that
  Wave 1 has one orchestrated execution path
owner_role: SECURITY_GUARDIAN
status: completed
depends_on:
- TSK-P1-223
touches:
- scripts/audit/task_verification_runner.py
- scripts/audit/task_gate_result.py
- scripts/audit/verify_tsk_p1_224.sh
- evidence/phase1/tsk_p1_224_runner_contract.json
- tasks/TSK-P1-224/meta.yml
- docs/plans/phase1/TSK-P1-224/PLAN.md
- docs/plans/phase1/TSK-P1-224/EXEC_LOG.md
invariants:
- INV-105
- INV-119
work:
- '[ID tsk_p1_224_work_item_01] Implement a report-only task verification runner that
  loads task metadata via the shared loader and executes an ordered gate pipeline
  without claiming CI authority.'
- '[ID tsk_p1_224_work_item_02] Define a shared gate result contract that requires
  machine-readable status, failure class, message, and gate identity fields for all
  downstream gates.'
- '[ID tsk_p1_224_work_item_03] Add a task-specific verifier that exercises dry-run
  execution and rejects malformed gate results before more gate families are introduced.'
acceptance_criteria:
- '[ID tsk_p1_224_work_item_01] The runner executes an ordered gate list through one
  report-only path and does not require manual assembly of gate invocations.'
- '[ID tsk_p1_224_work_item_02] The shared gate result contract rejects malformed
  or incomplete gate outputs instead of passing unstructured failure data downstream.'
- '[ID tsk_p1_224_work_item_03] `scripts/audit/verify_tsk_p1_224.sh` verifies both
  runner dry-run behavior and gate-result contract enforcement and emits the declared
  Phase-1 evidence.'
verification:
- '# [ID tsk_p1_224_work_item_01] [ID tsk_p1_224_work_item_02] [ID tsk_p1_224_work_item_03]
  test -x scripts/audit/verify_tsk_p1_224.sh && bash scripts/audit/verify_tsk_p1_224.sh
  > evidence/phase1/tsk_p1_224_runner_contract.json || exit 1'
- '# [ID tsk_p1_224_work_item_03] test -f evidence/phase1/tsk_p1_224_runner_contract.json
  && cat evidence/phase1/tsk_p1_224_runner_contract.json | grep "malformed_gate_case"
  || exit 1'
- '# [ID tsk_p1_224_work_item_03] test -x scripts/dev/pre_ci.sh && RUN_PHASE1_GATES=1
  bash scripts/dev/pre_ci.sh || exit 1'
evidence:
- '{''path'': ''evidence/phase1/tsk_p1_224_runner_contract.json'', ''must_include'':
  [''task_id'', ''git_sha'', ''timestamp_utc'', ''status'', ''checks'', ''observed_paths'',
  ''observed_hashes'', ''command_outputs'', ''execution_trace'', ''runner_entrypoint'',
  ''gate_result_fields'', ''malformed_gate_case'']}'
failure_modes:
- Multiple task verification entry points exist after runner implementation => FAIL
- Malformed gate output passes through the report-only runner => BLOCKED
- Evidence file missing => FAIL
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- AGENT_ENTRYPOINT.md
- docs/operations/AGENT_PROMPT_ROUTER.md
- docs/reference/rls-remediation-final-plan.md
- docs/reference/rls-remediation-first-five-tasks.md
implementation_plan: docs/plans/phase1/TSK-P1-224/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-224/EXEC_LOG.md
notes: Keep this task report-only. It must not pull in CI attestation, DB-backed proof,
  or specialized semantic gates. The only goal is one orchestrated path plus one shared
  result contract.
client: cursor
assigned_agent: security_guardian
model: Cascade
