schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-003-REM-04B
title: "Register INV-EXEC-TRUTH-001 in docs/architecture/THREAT_MODEL.md and docs/architecture/COMPLIANCE_MAP.md under ARCHITECT path authority"
owner_role: ARCHITECT
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: POLICY_SURFACE

intent: >-
  Extend the INV-EXEC-TRUTH-001 registration surface from REM-04 into the
  Architect's docs/architecture/** territory. Add a threat entry for
  execution-record tamper to docs/architecture/THREAT_MODEL.md and a compliance
  row to docs/architecture/COMPLIANCE_MAP.md. This task exists as a
  role-separation split of REM-04 per Devin Review findings
  BUG_pr-review-job-c4fc938f95fc4692ac528a10081cda97_0002 (original split)
  and BUG_pr-review-job-108a9b4113194ec09d57c8e6c3986cd1_0001 (path
  correction from docs/security/** to docs/architecture/**, the path where
  THREAT_MODEL.md and COMPLIANCE_MAP.md actually live; ARCHITECT owns
  docs/architecture/** per AGENTS.md).

anti_patterns:
  - "Editing docs/invariants/** (belongs to REM-04, INVARIANTS_CURATOR)"
  - "Editing scripts/db/** or schema/** (out of ARCHITECT path authority)"
  - "Editing docs/security/** (outside ARCHITECT path authority; the canonical threat model and compliance map live under docs/architecture/**)"
  - "Declaring coverage of lifecycle state, retry, or failure semantics"
  - "Introducing new threat entries unrelated to the execution_records anchor"

out_of_scope:
  - "Registering the invariant in INVARIANTS_MANIFEST.yml or INVARIANTS_IMPLEMENTED.md (belongs to REM-04)"
  - "Authoring the verifier (belongs to REM-05)"
  - "Wiring CI (belongs to REM-05B)"
  - "Lifecycle / retry / execution_state threats (owned by REM-2026-04-20_execution-lifecycle)"

stop_conditions:
  - "If REM-04 evidence is missing (INVARIANTS_MANIFEST.yml lacks the INV-EXEC-TRUTH-001 block)"
  - "If THREAT_MODEL.md fails repo-specific lint (if present) after append"
  - "If COMPLIANCE_MAP.md row omits a resolvable control reference"

proof_guarantees:
  - "docs/architecture/THREAT_MODEL.md contains a threat entry titled 'execution-record tamper' referencing INV-EXEC-TRUTH-001"
  - "docs/architecture/COMPLIANCE_MAP.md contains at least one row mapping an audit control (e.g. SOC2 CC7.2) to INV-EXEC-TRUTH-001"
  - "Registration verifier emits evidence with threat_model_present=true and compliance_map_present=true"

proof_limitations:
  - "This task is pure documentation; enforcement lives in REM-03 / REM-05 at the DB and verifier layers."
  - "Compliance control mapping is asserted, not audit-validated; external auditor sign-off is out of scope."

depends_on:
  - TSK-P2-PREAUTH-003-REM-04

blocks:
  - checkpoint/EXEC-TRUTH-REM

touches:
  - docs/architecture/THREAT_MODEL.md
  - docs/architecture/COMPLIANCE_MAP.md
  - scripts/audit/verify_invariant_exec_truth_001_security_docs.sh
  - evidence/phase2/tsk_p2_preauth_003_rem_04b.json
  - tasks/TSK-P2-PREAUTH-003-REM-04B/meta.yml
  - docs/plans/phase2/TSK-P2-PREAUTH-003-REM-04B/PLAN.md
  - docs/plans/phase2/TSK-P2-PREAUTH-003-REM-04B/EXEC_LOG.md

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_003_rem_04b_work_item_01] Append a threat entry titled 'execution-record tamper' to
    docs/architecture/THREAT_MODEL.md with assets = execution_records.*,
    attack vectors = UPDATE/DELETE after INSERT and retroactive temporal rebinding,
    mitigation = INV-EXEC-TRUTH-001 (append-only trigger + temporal-binding trigger + NOT NULL + UNIQUE determinism).
    Reference scripts/db/verify_execution_truth_anchor.sh as the verifier.
  - >-
    [ID tsk_p2_preauth_003_rem_04b_work_item_02] Append a compliance row to docs/architecture/COMPLIANCE_MAP.md
    mapping at least one external audit control (SOC2 CC7.2 or local regulator equivalent) to INV-EXEC-TRUTH-001.
  - >-
    [ID tsk_p2_preauth_003_rem_04b_work_item_03] Author scripts/audit/verify_invariant_exec_truth_001_security_docs.sh
    that greps for 'execution-record tamper' and 'INV-EXEC-TRUTH-001' in docs/architecture/THREAT_MODEL.md and for 'INV-EXEC-TRUTH-001' in
    docs/architecture/COMPLIANCE_MAP.md. Emit evidence/phase2/tsk_p2_preauth_003_rem_04b.json carrying
    task_id, git_sha, timestamp_utc, status, checks, observed_paths, observed_hashes, command_outputs,
    execution_trace, threat_model_present, compliance_map_present.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_003_rem_04b_work_item_01] grep -q 'execution-record tamper' docs/architecture/THREAT_MODEL.md AND grep -q 'INV-EXEC-TRUTH-001' docs/architecture/THREAT_MODEL.md.
  - >-
    [ID tsk_p2_preauth_003_rem_04b_work_item_02] grep -q 'INV-EXEC-TRUTH-001' docs/architecture/COMPLIANCE_MAP.md.
  - >-
    [ID tsk_p2_preauth_003_rem_04b_work_item_03] PRE_CI_CONTEXT=1 bash scripts/audit/verify_invariant_exec_truth_001_security_docs.sh exits 0 and evidence file carries threat_model_present=true and compliance_map_present=true.

negative_tests:
  - id: TSK-P2-PREAUTH-003-REM-04B-N1
    description: >-
      Remove the INV-EXEC-TRUTH-001 reference from THREAT_MODEL.md and re-run the verifier; exits non-zero with threat_model_present=false.
    required: true
  - id: TSK-P2-PREAUTH-003-REM-04B-N2
    description: >-
      Remove the COMPLIANCE_MAP.md row and re-run; exits non-zero with compliance_map_present=false.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-003-REM-04B-P1
    description: >-
      With both surfaces registered, verifier exits 0 and emits evidence with status=PASS.
    required: true

verification:
  - >-
    # [ID tsk_p2_preauth_003_rem_04b_work_item_01] THREAT_MODEL.md carries the execution-record tamper entry linked to INV-EXEC-TRUTH-001.
    test -f docs/architecture/THREAT_MODEL.md && grep -q 'execution-record tamper' docs/architecture/THREAT_MODEL.md && grep -q 'INV-EXEC-TRUTH-001' docs/architecture/THREAT_MODEL.md || exit 1
  - >-
    # [ID tsk_p2_preauth_003_rem_04b_work_item_02] COMPLIANCE_MAP.md references INV-EXEC-TRUTH-001.
    test -f docs/architecture/COMPLIANCE_MAP.md && grep -q 'INV-EXEC-TRUTH-001' docs/architecture/COMPLIANCE_MAP.md || exit 1
  - >-
    # [ID tsk_p2_preauth_003_rem_04b_work_item_03] Registration verifier exists and exits 0.
    test -x scripts/audit/verify_invariant_exec_truth_001_security_docs.sh && PRE_CI_CONTEXT=1 bash scripts/audit/verify_invariant_exec_truth_001_security_docs.sh || exit 1
  - >-
    # [ID tsk_p2_preauth_003_rem_04b_work_item_03] Evidence file evidence/phase2/tsk_p2_preauth_003_rem_04b.json carries required proof fields.
    test -f evidence/phase2/tsk_p2_preauth_003_rem_04b.json && grep -q 'threat_model_present' evidence/phase2/tsk_p2_preauth_003_rem_04b.json && grep -q 'compliance_map_present' evidence/phase2/tsk_p2_preauth_003_rem_04b.json || exit 1

