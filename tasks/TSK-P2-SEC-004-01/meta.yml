schema_version: 1
phase: '2'
task_id: TSK-P2-SEC-004-01
title: Verify default-deny and promote INV-133
owner_role: SECURITY_GUARDIAN
status: completed
priority: HIGH
risk_class: SECURITY
blast_radius: CI_GATES
intent: This task runs the default-deny tenant allowlist test for INV-133 and promotes
  the invariant to implemented status. Without this verification, tenants not on the
  allowlist may be granted access, creating unauthorized access risk.
anti_patterns:
- Promoting INV-133 to implemented without running default-deny test
- Assuming the test passes without actual execution
- Writing the verifier after marking the invariant as implemented
out_of_scope:
- Changing tenant allowlist logic implementation (deferred to separate task if needed)
- Modifying other security verifiers
- Database schema changes
stop_conditions:
- If test_tenant_allowlist_deny_all.sh does not exit 0
- If INV-133 status is not updated to implemented
- If the default-deny test is skipped or mocked
proof_guarantees:
- test_tenant_allowlist_deny_all.sh exits 0
- 'INV-133 in INVARIANTS_MANIFEST.yml has status: implemented'
- Verifier script exists and emits evidence
proof_limitations:
- Cannot verify that all tenant access paths are covered by the test
- Cannot verify that default-deny cannot be bypassed
depends_on:
- TSK-P2-SEC-004-00
blocks:
- TSK-P2-CCG-001-00
touches:
- docs/invariants/INVARIANTS_MANIFEST.yml
- scripts/audit/verify_tsk_p2_sec_004_01.sh
- tasks/TSK-P2-SEC-004-01/meta.yml
invariants:
- INV-133
work:
- '[ID tsk_p2_sec_004_01_work_item_01] Run test_tenant_allowlist_deny_all.sh to verify
  default-deny behavior for tenant access.'
- '[ID tsk_p2_sec_004_01_work_item_02] Update INV-133 in INVARIANTS_MANIFEST.yml with
  status: implemented, enforcement_location, and verification_command.'
- '[ID tsk_p2_sec_004_01_work_item_03] Write verify_tsk_p2_sec_004_01.sh that runs
  the verifier and emits evidence.'
acceptance_criteria:
- >-
  [ID tsk_p2_sec_004_01_work_item_01] [ID tsk_p2_sec_004_01_ac_01] test_tenant_allowlist_deny_all.sh exits 0.
- >-
  [ID tsk_p2_sec_004_01_work_item_02] [ID tsk_p2_sec_004_01_ac_02] INV-133 in INVARIANTS_MANIFEST.yml has status: implemented.
- >-
  [ID tsk_p2_sec_004_01_work_item_03] [ID tsk_p2_sec_004_01_ac_03] verify_tsk_p2_sec_004_01.sh exists and exits 0.
negative_tests:
- id: TSK-P2-SEC-004-01-N1
  description: Verify that test_tenant_allowlist_deny_all.sh exits non-zero when a
    tenant not on the allowlist is granted access.
  required: true
positive_tests:
- id: TSK-P2-SEC-004-01-P1
  description: Verify that test_tenant_allowlist_deny_all.sh exits 0 when a tenant
    on the allowlist is granted access.
  required: false
verification:
  - >-
    # [ID tsk_p2_sec_004_01_work_item_01] [ID tsk_p2_sec_004_01_work_item_02] [ID tsk_p2_sec_004_01_work_item_03] [ID tsk_p2_sec_004_01_ac_01] [ID tsk_p2_sec_004_01_ac_02] [ID tsk_p2_sec_004_01_ac_03]
    bash scripts/audit/test_tenant_allowlist_deny_all.sh || exit 1
  - >-
    # [ID tsk_p2_sec_004_01_work_item_01] [ID tsk_p2_sec_004_01_work_item_02] [ID tsk_p2_sec_004_01_work_item_03] [ID tsk_p2_sec_004_01_ac_01] [ID tsk_p2_sec_004_01_ac_02] [ID tsk_p2_sec_004_01_ac_03]
    grep -A 5 'id: INV-133' docs/invariants/INVARIANTS_MANIFEST.yml | grep -q 'status: implemented' || exit 1
  - >-
    # [ID tsk_p2_sec_004_01_work_item_01] [ID tsk_p2_sec_004_01_work_item_02] [ID tsk_p2_sec_004_01_work_item_03] [ID tsk_p2_sec_004_01_ac_01] [ID tsk_p2_sec_004_01_ac_02] [ID tsk_p2_sec_004_01_ac_03]
    test -x scripts/audit/verify_tsk_p2_sec_004_01.sh && bash scripts/audit/verify_tsk_p2_sec_004_01.sh && test -f evidence/phase2/tsk_p2_sec_004_01.json || exit 1
  - >-
    # [ID tsk_p2_sec_004_01_work_item_01] [ID tsk_p2_sec_004_01_work_item_02] [ID tsk_p2_sec_004_01_work_item_03] [ID tsk_p2_sec_004_01_ac_01] [ID tsk_p2_sec_004_01_ac_02] [ID tsk_p2_sec_004_01_ac_03]
    python3 scripts/audit/validate_evidence.py --task TSK-P2-SEC-004-01 --evidence evidence/phase2/tsk_p2_sec_004_01.json || exit 1
  - >-
    # [ID tsk_p2_sec_004_01_work_item_01] [ID tsk_p2_sec_004_01_work_item_02] [ID tsk_p2_sec_004_01_work_item_03] [ID tsk_p2_sec_004_01_ac_01] [ID tsk_p2_sec_004_01_ac_02] [ID tsk_p2_sec_004_01_ac_03]
    bash scripts/dev/pre_ci.sh || exit 1
