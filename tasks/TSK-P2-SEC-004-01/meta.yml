- path: evidence/phase2/tsk_p2_sec_004_01.json
  must_include:
  - task_id
  - git_sha
  - timestamp_utc
  - status
  - checks
  - inv_133_status
  - observed_paths
  - observed_hashes
  - command_outputs
  - execution_trace
failure_modes:
