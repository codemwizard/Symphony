work:
- The current pilot-demo path reuses ADMIN_API_KEY as the signing basis for the operator cookie and
  also allows evidence/instruction signing to collapse onto shared environment key material. That is
  weak key-domain separation and makes rotation unsafe.
- Define separate secret domains at minimum for ingress/read API auth, admin API auth, operator
  session signing, evidence signing, and instruction-file signing.
- Resolve each domain through the secret provider abstraction backed by OpenBao and support managed
  bootstrap plus rotation verification.
- Remove key reuse from the hardened profile. One compromised key domain must not automatically grant
  another capability.
acceptance_criteria:
- ADMIN_API_KEY is no longer reused as operator-session cookie signing material.
- Evidence-signing and instruction-signing keys are independently addressable and rotatable.
- Rotation verification proves each required domain can be updated without collapsing the others.
- Hardened profile documentation and bootstrap material enumerate distinct key domains and their
  OpenBao paths.
verification:
- bash scripts/audit/verify_tsk_p1_216.sh
- python3 scripts/audit/validate_evidence.py --task TSK-P1-216 --evidence evidence/phase1/tsk_p1_216_key_domain_separation_rotation.json
evidence:
- evidence/phase1/tsk_p1_216_key_domain_separation_rotation.json
failure_modes:
- Admin and operator-session secrets remain the same value or same secret path.
- Rotation proof exercises only one key while the rest remain undocumented or coupled.
- Browser-visible code gains access to admin or signing secrets.
