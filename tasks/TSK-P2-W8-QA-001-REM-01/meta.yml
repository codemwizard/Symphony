schema_version: 1
phase: '2'
task_id: TSK-P2-W8-QA-001-REM-01
title: "Fix GitHub workflow evidence file corruption"
owner_role: QA_VERIFIER_AGENT
status: completed
priority: HIGH
risk_class: EVIDENCE_INTEGRITY
blast_radius: GITHUB_WORKFLOWS

intent: >-
  Fix GitHub workflow shell redirection conflict that corrupts
  evidence/phase2/phase2_contract_status.json file.

primary_enforcement_domain: >-
  GitHub workflow evidence file coordination and integrity

anti_patterns:
  - "Shell redirection to files scripts also write"
  - "Missing atomic file operations for evidence"

out_of_scope:
  - "Changes to other GitHub workflows"
  - "Non-evidence related script operations"

stop_conditions:
  - "If fix requires changes to evidence generation, stop and verify"
  - "If other workflows have similar issues, stop and audit"

proof_guarantees:
  - "Evidence file corruption eliminated"
  - "Atomic evidence writing implemented"
  - "Workflow coordination restored"

proof_limitations:
  - "This fix only addresses evidence file corruption"

depends_on:
  - TSK-P2-W8-QA-001

blocks: []

touches:
  - .github/workflows/
  - scripts/audit/
  - evidence/phase2/

invariants:
  - INV-EVIDENCE-001
  - INV-CI-001

deliverable_files:
  - Fixed GitHub workflow file
  - Updated verification script
  - evidence/phase2/github_workflow_evidence_fix.json

regulated_surface_compliance:
  enabled: true
  approval_workflow: stage_a_only
  stage_a_required_before_edit: true
  regulated_paths:
    - evidence/phase2/github_workflow_evidence_fix.json
    - .github/workflows/
    - scripts/audit/
  must_read:
    - docs/operations/REGULATED_SURFACE_PATHS.yml

remediation_trace_compliance:
  enabled: true
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

database_connection:
  enabled: false

migration_dependencies:
  enabled: false

work:
  - >-
    [ID w8_qa_001_rem_01_work_01] Remove shell redirection
    from GitHub workflow to prevent evidence file corruption.

  - >-
    [ID w8_qa_001_rem_01_work_02] Update verification script
    to implement atomic evidence writing and prevent concurrent writes.

  - >-
    [ID w8_qa_001_rem_01_work_03] Test workflow execution
    to ensure evidence files are not corrupted.

acceptance_criteria:
  - >-
    [ID w8_qa_001_rem_01_work_01] GitHub workflow no longer
    redirects stdout to evidence file.

  - >-
    [ID w8_qa_001_rem_01_work_02] Verification script implements
    atomic evidence writing.

  - >-
    [ID w8_qa_001_rem_01_work_03] Workflow execution produces
    valid evidence artifacts without corruption.

negative_tests:
  - id: TSK-P2-W8-QA-001-REM-01-N1
    description: >-
      Verifier fails if workflow still has shell redirection
      or evidence files are corrupted.

positive_tests:
  - id: TSK-P2-W8-QA-001-REM-01-P1
    description: >-
      Verifier passes when workflow executes without evidence
      file corruption and produces valid JSON artifacts.

verification:
  - >-
    [ID w8_qa_001_rem_01_work_01] [ID w8_qa_001_rem_01_work_02] 
    bash -x .github/workflows/invariants.yml

evidence:
  - path: evidence/phase2/github_workflow_evidence_fix.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace

failure_modes:
  - "Evidence file corruption persists => FAIL"
  - "Workflow coordination failure => CRITICAL_FAIL"
  - "Missing atomic evidence writing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - AGENT_ENTRYPOINT.md
  - docs/operations/REMEDIATION_TRACE_WORKFLOW.md
  - docs/operations/AGENT_PROMPT_ROUTER.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/operations/WAVE5_TASK_CREATION_LESSONS_LEARNED.md
  - docs/PLANS-addendum_1.md
  - tasks/TSK-P1-240/meta.yml

implementation_plan: docs/plans/phase2/REM-2026-05-05_github_workflow_evidence_corruption/PLAN.md
implementation_log: docs/plans/phase2/REM-2026-05-05_github_workflow_evidence_corruption/EXEC_LOG.md

notes: >-
  Derived from DRD REM-2026-05-05_github_workflow_evidence_corruption
  to fix critical evidence integrity failure in GitHub workflow that
  could corrupt verification artifacts.

client: codex
assigned_agent: qa_verifier
model: gpt-5.5
