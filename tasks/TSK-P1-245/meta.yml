work:
- '[ID tsk_p1_245_work_item_01] Extend `scripts/audit/runtime_guarded_execution_core.sh`
  so guarded execution can emit a deterministic final proof artifact only when an
  explicit evidence target is provided.'
- '[ID tsk_p1_245_work_item_02] Finalize the guarded evidence payload so it includes
  strong proof fields tied to real execution outputs, bounded scope statements, and
  stable metadata needed by `validate_evidence.py`.'
- '[ID tsk_p1_245_work_item_03] Create `scripts/audit/verify_tsk_p1_245.sh` so the
  verifier exercises real evidence emission behavior and rejects incomplete or self-declared
  proof payloads.'
- '[ID tsk_p1_245_work_item_04] Emit bounded evidence at `evidence/phase1/tsk_p1_245_evidence_finalization.json`
  proving the guarded evidence-finalization contract and explicitly leaving adversarial
  coverage downstream.'
acceptance_criteria:
- '[ID tsk_p1_245_work_item_01] The guarded execution core emits a proof artifact
  only when an explicit evidence path is supplied and does not silently finalize proof
  output on other execution paths.'
- '[ID tsk_p1_245_work_item_02] The emitted guarded-runtime evidence contains strong
  proof fields derived from real execution state, including observed paths, hashes,
  command outputs, execution trace, and a bounded scope statement.'
- '[ID tsk_p1_245_work_item_03] `scripts/audit/verify_tsk_p1_245.sh` exercises the
  real evidence emission path, rejects incomplete proof payloads, and emits `evidence/phase1/tsk_p1_245_evidence_finalization.json`.'
- '[ID tsk_p1_245_work_item_04] The evidence proves only guarded evidence-finalization
  behavior and states that adversarial or corruption-focused coverage remains a downstream
  obligation.'
verification:
- '# [ID tsk_p1_245_work_item_01] [ID tsk_p1_245_work_item_02] # [ID tsk_p1_245_work_item_03]
  [ID tsk_p1_245_work_item_04] bash -lc ''test -x scripts/audit/verify_tsk_p1_245.sh
  && bash scripts/audit/verify_tsk_p1_245.sh > evidence/phase1/tsk_p1_245_evidence_finalization.json
  || exit 1'''
- '# [ID tsk_p1_245_work_item_04] bash -lc ''test -f evidence/phase1/tsk_p1_245_evidence_finalization.json
  && python3 scripts/audit/validate_evidence.py --task TSK-P1-245 --evidence evidence/phase1/tsk_p1_245_evidence_finalization.json
  || exit 1'''
- '# [ID tsk_p1_245_work_item_01] [ID tsk_p1_245_work_item_02] # [ID tsk_p1_245_work_item_03]
  [ID tsk_p1_245_work_item_04] bash -lc ''test -x scripts/dev/pre_ci.sh && RUN_PHASE1_GATES=1
  bash scripts/dev/pre_ci.sh || exit 1'''
