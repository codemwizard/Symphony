  - Running `sign_evidence.py --write` with `SYMPHONY_EVIDENCE_DETERMINISTIC=1` produces a file stamped with `1970-01-01T00:00:00Z`.
  - All 18 Track-3 verifiers produce `standalone-1970` strings when prompted by the determinism flag.
  - The `pre_ci.sh` harness successfully propagates the determinism flag to all child verifiers.
  - The verification script `verify_tsk_p1_247.sh` passes successfully and emits signed evidence.
