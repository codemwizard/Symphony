  verification_step: "Confirm the target migration chain and authoritative boundary exist before implementation."

work:
  - >-
    [ID w8_db_005_work_01] Define and create one authoritative signer-resolution surface with the required normalized fields for verifier identity, key lifecycle, and scope.
  - >-
    [ID w8_db_005_work_02] Enforce semantically closed lookup behavior: no fallback resolution, no implicit inheritance, no null-derived authorization semantics, and hard-fail on multiple active matches for the same resolution query.
  - >-
    [ID w8_db_005_work_03] Build a verifier that distinguishes unknown signer, unauthorized signer, ambiguous signer precedence, and authorized signer cases.

acceptance_criteria:
  - >-
    [ID w8_db_005_work_01] One authoritative signer-resolution surface exists with the required normalized fields.
  - >-
    [ID w8_db_005_work_02] The signer-resolution surface hard-fails on ambiguous precedence and disallows fallback or inherited authorization semantics.
  - >-
    [ID w8_db_005_work_03] The verifier distinguishes unknown, unauthorized, ambiguous, and authorized signer outcomes.

negative_tests:
  - id: TSK-P2-W8-DB-005-N1
    description: >-
      Verifier fails if multiple active matching keys can resolve without a hard failure.
    required: true

positive_tests:
  - id: TSK-P2-W8-DB-005-P1
    description: >-
      Verifier passes only when signer resolution is deterministic and semantically closed.
    required: true

