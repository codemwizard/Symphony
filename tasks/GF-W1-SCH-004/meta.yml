schema_version: 1
phase: '0'
task_id: GF-W1-SCH-004
title: "Migration 0100: evidence_nodes and evidence_edges universal lineage graph"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  This task creates the neutral evidence-lineage graph only after the corrected
  foundational and monitoring tasks exist. It isolates lineage ownership from
  both root-table creation and lifecycle-table work so the graph can be proven
  structurally complete without hidden scope leakage.

anti_patterns:
  - "Recreating monitoring or foundational objects in the lineage task"
  - "Adding undeclared helper objects to the lineage graph migration"
  - "Allowing destructive cascade behavior that collapses lineage silently"

depends_on:
  - GF-W1-SCH-003
  - GF-W1-SCH-002A

blocks:
  - GF-W1-SCH-005

touches:
  - schema/migrations/0100_gf_evidence_lineage.sql
  - schema/migrations/0100_gf_evidence_lineage.meta.yml
  - schema/migrations/MIGRATION_HEAD
  - scripts/db/verify_gf_evidence_lineage.sh
  - evidence/phase0/gf_evidence_lineage.json
  - tasks/GF-W1-SCH-004/meta.yml

invariants:
  - INV-SCHEMA-ORDER-002
  - INV-SCHEMA-NO-FORWARD-REF-003
  - INV-SCHEMA-TASK-REF-DEP-006
  - INV-SCHEMA-OWNERSHIP-MAP-007
  - INV-SCHEMA-OWNERSHIP-CLOSURE-008
  - INV-SCHEMA-STATIC-DDL-ONLY-010
  - INV-SCHEMA-SIDECAR-SQL-CONSISTENCY-012
  - INV-SCHEMA-NO-PROCEDURAL-DDL-013
  - INV-SCHEMA-NO-DESTRUCTIVE-DDL-015

work:
  - >-
    [ID gf_w1_sch_004_work_item_01] Create migration 0100 for
    `public.evidence_nodes` and `public.evidence_edges` only.
  - >-
    [ID gf_w1_sch_004_work_item_02] Add the sidecar and update `MIGRATION_HEAD`
    from actual filesystem state.
  - >-
    [ID gf_w1_sch_004_work_item_03] Write `scripts/db/verify_gf_evidence_lineage.sh`
    to prove lineage-only ownership, self-loop prevention, and rejection of
    undeclared/procedural/destructive behavior.
  - >-
    [ID gf_w1_sch_004_work_item_04] Emit bounded evidence to
    `evidence/phase0/gf_evidence_lineage.json`.

acceptance_criteria:
  - >-
    [ID gf_w1_sch_004_work_item_01] Migration 0100 introduces only
    `public.evidence_nodes`, `public.evidence_edges`, and their declared dependent
    governed objects.
  - >-
    [ID gf_w1_sch_004_work_item_02] The sidecar matches parsed SQL exactly and
    direct dependencies on both `GF-W1-SCH-003` and `GF-W1-SCH-002A` are preserved.
  - >-
    [ID gf_w1_sch_004_work_item_03] The verifier exits 0 and fails closed on
    self-loop regressions, undeclared objects, procedural SQL, destructive DDL,
    or non-lineage object leakage.
  - >-
    [ID gf_w1_sch_004_work_item_04] Evidence file
    `evidence/phase0/gf_evidence_lineage.json` exists and includes the declared proof fields.

negative_tests:
  - id: GF-W1-SCH-004-N1
    description: >-
      Add a third governed table to the lineage migration without declaring it
      in the sidecar. Ownership closure and sidecar/SQL consistency must fail.
    required: true
  - id: GF-W1-SCH-004-N2
    description: >-
      Remove self-loop prevention or add destructive cascade semantics. The
      lineage verifier must fail.
    required: true

verification:
  - >-
    grep -n "evidence_nodes\\|evidence_edges" schema/migrations/0100_gf_evidence_lineage.sql || exit 1 # [ID gf_w1_sch_004_work_item_01] [ID gf_w1_sch_004_work_item_02]
  - >-
    bash scripts/db/verify_gf_evidence_lineage.sh | tee evidence/phase0/gf_evidence_lineage.json >/dev/null && test -f evidence/phase0/gf_evidence_lineage.json || exit 1 # [ID gf_w1_sch_004_work_item_03]
  - >-
    test -f evidence/phase0/gf_evidence_lineage.json || exit 1 # [ID gf_w1_sch_004_work_item_04]

evidence:
  - path: evidence/phase0/gf_evidence_lineage.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - evidence_nodes_owner
      - evidence_edges_owner
      - self_loop_prevention_confirmed
      - ownership_closure_confirmed
      - sidecar_sql_consistency_confirmed
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace

failure_modes:
  - "Lineage task recreates non-lineage objects => CRITICAL_FAIL"
  - "Lineage graph allows destructive collapse or self-loops => CRITICAL_FAIL"
  - "Undeclared created object => CRITICAL_FAIL"
  - "Procedural or destructive DDL detected => CRITICAL_FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/operations/PILOT_REJECTION_PLAYBOOK.md
  - docs/operations/AGENT_GUARDRAILS_GREEN_FINANCE.md

implementation_plan: docs/plans/phase0/GF-W1-SCH-004/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-SCH-004/EXEC_LOG.md

notes: >-
  This repaired task owns evidence lineage only. It explicitly depends on both
  the corrected foundational root and the monitoring ledger task because the
  lineage graph references both upstream concepts.
client: codex_cli
assigned_agent: <UNASSIGNED>
model: <UNASSIGNED>

domain: green_finance
pilot: true
second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: [evidence_nodes, evidence_edges]
  unchanged_core_functions: [attach_evidence, link_evidence_to_record]
  adapter_only_differences:
    - "Evidence payload semantics and referenced record types differ by adapter"
    - "Lineage topology remains neutral across sectors"
  jurisdiction_profile_impact: >-
    Jurisdiction changes affect policy rules and evidence content, not the
    neutral lineage-graph schema.
  required_core_changes: []
  explanation: >-
    Solar meter evidence and forestry inspection evidence both need the same
    neutral lineage primitives: nodes for evidence artifacts and edges for
    provenance links. The graph does not encode sector-specific assumptions,
    so both sectors reuse the same schema and functions unchanged.
  second_pilot_reviewed_by: Architecture Owner
pilot_scope_ref: not_applicable
