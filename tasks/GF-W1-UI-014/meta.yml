implementation_log: docs/plans/phase1/GF-W1-UI-014/EXEC_LOG.md
notes: 'This task implements the technical criteria section with 6 criteria. Criterion statuses and invariant IDs are fetched
  from API data, not hardcoded. Color-coded status indicators follow UI canonical design rules. Phase: Green Finance Wave
  1. Domain: green_finance.'
client: kiro
assigned_agent: architect
model: claude-sonnet-4-20250514
domain: green_finance
pilot: true
second_pilot_test: The technical criteria section pattern works for any programme requiring compliance dashboard. For PWRM0001
  plastic collection, the section shows technical criteria like append-only log integrity and RLS enforcement. For a hypothetical
  VM0044 solar energy programme, the section would show technical criteria like energy meter data integrity and generation
  record validation. The section structure, renderCategory() function, status indicators, invariant ID display, click handlers,
  and category badge are identical; only the criteria content differs per programme.
pilot_scope_ref: docs/pilots/PILOT_PWRM0001/SCOPE.md
