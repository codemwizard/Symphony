    test -f services/ledger-api/dotnet/src/LedgerApi/Program.cs
    && grep -q "index.html" services/ledger-api/dotnet/src/LedgerApi/Program.cs
    && cat services/ledger-api/dotnet/src/LedgerApi/Program.cs
    | grep "evidence-link"
