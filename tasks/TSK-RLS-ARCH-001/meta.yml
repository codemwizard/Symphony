schema_version: 1
phase: '1'
task_id: TSK-RLS-ARCH-001
title: "Remediate RLS architecture to deterministic dual-policy system so that tenant isolation is declared, generated, and structurally enforced"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: SECURITY
blast_radius: DB_SCHEMA

intent: >-
  RLS layer uses RESTRICTIVE-only (deny-all) or PERMISSIVE-only (no constraint
  enforcement) policies applied via dynamic DO blocks. This is fundamentally
  broken: RESTRICTIVE-only blocks all access, PERMISSIVE-only has no isolation.
  This task replaces the entire RLS architecture with a deterministic
  dual-policy model: baseline PERMISSIVE (USING true) + RESTRICTIVE isolation
  per table. Policies are declared in YAML, generated from structure, and
  enforced via runtime kill switch. Must complete before any new tenant-scoped
  tables are added, or they silently lack isolation.

anti_patterns:
  - "Classifying existing policies by string matching or normalization — classification is eliminated entirely"
  - "Trusting policy names as stable identifiers — structural preservation only"
  - "Marking implemented without adversarial negative tests proving cross-tenant access is blocked"
  - "Using _normalize_rls_expr() for security-critical classification — function eliminated"
  - "Assuming FORCE RLS applies to BYPASSRLS roles — it does not"

depends_on: []

blocks:
  - TSK-RLS-ARCH-002  # Lint enforcement
  - TSK-RLS-ARCH-003  # Runtime verifier

touches:
  - docs/plans/phase1/TSK-RLS-ARCH-001/PLAN.md
  - docs/plans/phase1/TSK-RLS-ARCH-001/EXEC_LOG.md
  - evidence/phase1/rls_arch/tsk_rls_arch_001.json
  - tasks/TSK-RLS-ARCH-001/meta.yml

invariants:
  - INV-RLS-001  # Every tenant table has exactly 1 PERMISSIVE + 1 RESTRICTIVE policy
  - INV-RLS-002  # USING and WITH CHECK expressions are identical for isolation policies
  - INV-RLS-003  # No manual policy creation outside migration
  - INV-RLS-004  # Every table with tenant_id is in rls_tables.yml
  - INV-RLS-005  # SET LOCAL is the only approved method for GUC
  - INV-RLS-006  # SECURITY DEFINER functions owned by symphony_reader

work:
  - >-
    Phase 0: Create rls_tables.yml declaring every tenant-scoped table as
    DIRECT, JOIN, or GLOBAL with structured annotations.
  - >-
    Phase 0: Write phase0_rls_enumerate.py to populate _rls_table_config from
    YAML, validate FK existence + NOT NULL + NOT DEFERRABLE, partition check,
    traffic tiers, and capture _preserved_policies structurally.
  - >-
    Phase 0: Generate 0095_pre_snapshot.sql (executable snapshot for rollback),
    store fingerprint (audit only) and function hash (advisory).
  - >-
    Phase 1: Write 0095_rls_dual_policy_architecture.sql as single-transaction
    migration: infrastructure tables, guard, advisory lock, blocker report,
    dependency-ordered NOWAIT locking, destructive reset with structural
    preservation, idempotent deterministic policy generation, GUC hardening,
    post-generation sanity assertion, runtime coverage kill switch.
  - >-
    Phase 1R: Write 0095_rollback.sql restoring pre-snapshot state.
  - >-
    Phase 2: Create dual tenant getter functions (strict + permissive) and
    mandatory set_tenant_context() SECURITY DEFINER setter wrapper.
  - >-
    Phase 3: Update lint_rls_born_secure.py for declarative enforcement:
    YAML parity, no manual policies, no direct SET, USING/WC parity,
    tenant presence, no nested UDF, DEFINER gate, grant whitelist.
  - >-
    Phase 4: Update verify_gf_rls_runtime.sh for binary drift model:
    exactly 2 policies per table, target coverage, YAML-DB parity,
    FK integrity, GUC leakage detection, role audit.
  - >-
    Phase 5: Write test_rls_dual_policy_access.sh with 21 adversarial
    test cases covering read, write, abuse, cross-table, and plan-cache
    scenarios.
  - >-
    Phase 6: Verify migration bootstrap gate passes with 0 errors.
  - >-
    Phase 7: Create admin DEFINER functions with OWNER TO symphony_reader
    and 4-layer governance (lint + CI audit + periodic review + usage monitoring).
  - >-
    Trust Boundaries: Document what the system does NOT protect against
    in rls_trust_boundaries.md.
  - >-
    Write run_migration_0095.sh standardized retry runner with NOWAIT +
    exponential backoff.

acceptance_criteria:
  - >-
    This task is strictly non-implementing and delegates all RLS execution to Wave 1 and the remainder plan.
  - >-
    Every table with tenant_id in public schema is delegated to Wave 1 for PERMISSIVE + RESTRICTIVE policy isolation.
  - >-
    All 21 adversarial test cases are explicitly assigned to child tasks in the remainder plan.

negative_tests:
  - id: TSK-RLS-ARCH-001-N1
    description: >-
      Cross-tenant SELECT with wrong tenant GUC returns 0 rows
      (RESTRICTIVE policy blocks access).
    required: true
  - id: TSK-RLS-ARCH-001-N2
    description: >-
      INSERT with tenant_id different from GUC fails WITH CHECK violation.
    required: true
  - id: TSK-RLS-ARCH-001-N3
    description: >-
      NULL GUC (no set_tenant_context call) returns 0 rows from all
      tenant-scoped tables (fail-closed via current_tenant_id_or_null).
    required: true
  - id: TSK-RLS-ARCH-001-N4
    description: >-
      Migration aborts if a table with tenant_id exists but is not in
      _rls_table_config (coverage kill switch).
    required: true

positive_tests:
  - id: TSK-RLS-ARCH-001-P1
    description: >-
      Correct tenant GUC returns expected rows from DIRECT and JOIN tables.
    required: true
  - id: TSK-RLS-ARCH-001-P2
    description: >-
      admin_read functions return cross-tenant data when called by
      symphony_ops_role member (BYPASSRLS by design).
    required: true

verification:
