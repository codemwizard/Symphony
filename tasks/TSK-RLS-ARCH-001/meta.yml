- 'Phase 1: Write 0095_rls_dual_policy_architecture.sql as single-transaction migration:
  infrastructure tables, guard, advisory lock, blocker report, dependency-ordered
  NOWAIT locking, destructive reset with structural preservation, idempotent deterministic
  policy generation, GUC hardening, post-generation sanity assertion, runtime coverage
  kill switch.'
- 'Phase 1R: Write 0095_rollback.sql restoring pre-snapshot state.'
- 'Phase 2: Create dual tenant getter functions (strict + permissive) and mandatory
  set_tenant_context() SECURITY DEFINER setter wrapper.'
- 'Phase 3: Update lint_rls_born_secure.py for declarative enforcement: YAML parity,
  no manual policies, no direct SET, USING/WC parity, tenant presence, no nested UDF,
  DEFINER gate, grant whitelist.'
- 'Phase 4: Update verify_gf_rls_runtime.sh for binary drift model: exactly 2 policies
  per table, target coverage, YAML-DB parity, FK integrity, GUC leakage detection,
  role audit.'
- 'Phase 5: Write test_rls_dual_policy_access.sh with 21 adversarial test cases covering
  read, write, abuse, cross-table, and plan-cache scenarios.'
- 'Phase 6: Verify migration bootstrap gate passes with 0 errors.'
- 'Phase 7: Create admin DEFINER functions with OWNER TO symphony_reader and 4-layer
  governance (lint + CI audit + periodic review + usage monitoring).'
- 'Trust Boundaries: Document what the system does NOT protect against in rls_trust_boundaries.md.'
- Write run_migration_0095.sh standardized retry runner with NOWAIT + exponential
  backoff.
acceptance_criteria:
- This task is strictly non-implementing and delegates all RLS execution to Wave 1
  and the remainder plan.
- Every table with tenant_id in public schema is delegated to Wave 1 for PERMISSIVE
  + RESTRICTIVE policy isolation.
- All 21 adversarial test cases are explicitly assigned to child tasks in the remainder
  plan.
