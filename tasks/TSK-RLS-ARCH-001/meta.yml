  - "Migration partially applied (no transaction boundary) => CRITICAL_FAIL"
  - "Adversarial test fails (cross-tenant leak) => CRITICAL_FAIL"
  - "Lint passes manual policy creation => FAIL"
  - "Evidence file missing => FAIL"
  - "Rollback fingerprint mismatch => BLOCKED"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/operations/PILOT_REJECTION_PLAYBOOK.md
  - docs/operations/AGENT_GUARDRAILS_GREEN_FINANCE.md
  - docs/invariants/INVARIANTS_MANIFEST.yml

implementation_plan: docs/plans/phase1/TSK-RLS-ARCH-001/PLAN.md
implementation_log: docs/plans/phase1/TSK-RLS-ARCH-001/EXEC_LOG.md

notes: >-
  v10.1 hybrid architecture. Core philosophy: declare-generate-replace.
  No classification, no normalization, no heuristics. Policies generated
  deterministically from YAML registry. All v9.x operational safety
  retained: split guard tables, advisory lock, blocker report, retry,
  structural preservation, force_override, trust boundaries.
  Phase Key: RLS-ARCH. Phase Name: RLS Architecture Remediation.

