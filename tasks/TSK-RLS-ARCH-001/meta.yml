second_pilot_test:
  candidate_sector_1: "PWRM0001 Plastic Waste Recovery"
  candidate_sector_2: "VM0044 Solar Energy Generation"
  unchanged_core_tables: [_rls_table_config, _migration_guards, _migration_fingerprints, _migration_fn_hashes, _preserved_policies]
  unchanged_core_functions: [current_tenant_id, current_tenant_id_or_null, set_tenant_context]
  adapter_only_differences: ["rls_tables.yml entries differ per sector (different table sets)", "JOIN parent tables vary by methodology schema"]
  jurisdiction_profile_impact: "None — RLS isolation is tenant-scoped, not jurisdiction-scoped. Jurisdiction isolation uses same mechanism with different column."
  required_core_changes: []
  explanation: >-
    The dual-policy RLS architecture is tenant-agnostic by design. The
    rls_tables.yml declares table isolation types (DIRECT/JOIN/GLOBAL)
    which are universal across sectors. PWRM0001 plastic collection
    tables and VM0044 solar generation tables both use tenant_id columns
    with identical RESTRICTIVE policies generated from _rls_table_config.
    The only sector-specific variation is which tables appear in the YAML
    registry — the isolation mechanism is identical.
  second_pilot_reviewed_by: "architect"

