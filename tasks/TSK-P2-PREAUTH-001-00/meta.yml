    test -f docs/plans/phase2/TSK-P2-PREAUTH-001-00/PLAN.md || exit 1
  - >-
    # [ID tsk_p2_preauth_001_00_work_item_02]
    grep -q "temporal uniqueness" docs/plans/phase2/TSK-P2-PREAUTH-001-00/PLAN.md &&
    grep -q "effective_from" docs/plans/phase2/TSK-P2-PREAUTH-001-00/PLAN.md || exit 1
  - >-
