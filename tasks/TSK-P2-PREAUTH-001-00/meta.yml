  - >-
    [ID tsk_p2_preauth_001_00_work_item_01] PLAN.md exists at docs/plans/phase2/TSK-P2-PREAUTH-001-00/PLAN.md
    and contains all required sections.
  - >-
    [ID tsk_p2_preauth_001_00_work_item_02] PLAN.md documents temporal uniqueness constraints on
    (project_id, interpretation_pack_id, effective_from).
  - >-
    [ID tsk_p2_preauth_001_00_work_item_03] PLAN.md documents the exact function signature for
    resolve_interpretation_pack().
  - >-
    [ID tsk_p2_preauth_001_00_work_item_04] verify_plan_semantic_alignment.py exits 0 with
    NO_ORPHANS=true and GRAPH_CONNECTED=true.

