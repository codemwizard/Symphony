    grep -q "resolve_interpretation_pack" docs/plans/phase2/TSK-P2-PREAUTH-001-00/PLAN.md &&
    grep -q "p_project_id UUID" docs/plans/phase2/TSK-P2-PREAUTH-001-00/PLAN.md &&
    grep -q "p_effective_at TIMESTAMPTZ" docs/plans/phase2/TSK-P2-PREAUTH-001-00/PLAN.md || exit 1
  - >-
    # [ID tsk_p2_preauth_001_00_work_item_04]
    python3 scripts/audit/verify_plan_semantic_alignment.py --plan docs/plans/phase2/TSK-P2-PREAUTH-001-00/PLAN.md --meta tasks/TSK-P2-PREAUTH-001-00/meta.yml || exit 1
