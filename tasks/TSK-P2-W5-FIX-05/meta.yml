# ── Work items ─────────────────────────────────────────────────────────────
work:
  - >-
    [ID w5_fix_05_work_01] Audit current trigger names and firing order. Query
    pg_trigger for state_transitions triggers ordered by tgname. Record
    current alphabetical order in EXEC_LOG.md.
  - >-
    [ID w5_fix_05_work_02] Write migration
    0149_rename_triggers_deterministic_order.sql. The migration must:
    (a) DROP TRIGGER old_name ON state_transitions;
    (b) CREATE TRIGGER bi_XX_new_name BEFORE INSERT ON state_transitions;
    Mapping: bi_01_enforce_transition_authority,
    bi_02_enforce_transition_state_rules, bi_03_generate_transition_hash,
    bi_04_enforce_hash_uniqueness, bi_05_set_transitioned_at.
    update_current_state stays as AFTER INSERT trigger (ai_01_update_current_state).
  - >-
    [ID w5_fix_05_work_03] Update MIGRATION_HEAD to 0149.
  - >-
    [ID w5_fix_05_work_04] Write verification script
    scripts/db/verify_tsk_p2_w5_fix_05.sh: Verify new trigger names exist,
    old trigger names do not exist, and alpha sort matches intended sequence.
  - >-
    [ID w5_fix_05_work_05] Run verification script and generate evidence JSON.
  - >-
    [ID w5_fix_05_work_06] Post-implementation governance — Steps 9-11.
  - >-
    [ID w5_fix_05_work_07] Post-implementation governance — Steps 12-13.
  - >-
    [ID w5_fix_05_work_08] Update EXEC_LOG.md with final remediation trace.

