schema_version: 1
phase: '2'
task_id: TSK-P2-W5-FIX-05
title: "Rename triggers on state_transitions to bi_XX_ prefix for deterministic execution order"
owner_role: DB_FOUNDATION
status: planned
priority: HIGH
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

# ── Why this task exists ───────────────────────────────────────────────────
intent: >-
  PostgreSQL fires BEFORE INSERT triggers in alphabetical order by trigger
  name. The current trigger names (trg_enforce_*, trg_generate_*, trg_set_*)
  fire in a non-deterministic-looking order that does not match the intended
  logical sequence: (1) validate authority, (2) validate state rules,
  (3) generate hash, (4) enforce hash uniqueness, (5) set timestamp,
  (6) update current state. Without explicit bi_XX_ prefixing (where XX is
  a two-digit ordering number), trigger firing order depends on alphabetical
  coincidence and becomes fragile as new triggers are added. This violates
  the replay determinism guarantee.

# ── What this task must NOT do ─────────────────────────────────────────────
anti_patterns:
  - "Editing existing migrations that created triggers"
  - "Changing function logic — only renaming triggers"
  - "Using non-padded prefixes (bi_1_ instead of bi_01_)"

# ── Anti-drift boundaries ──────────────────────────────────────────────────
out_of_scope:
  - "Function body changes"
  - "SECURITY DEFINER changes (already done in FIX-04)"
  - "Adding new triggers"
stop_conditions:
  - "Trigger names do not use zero-padded bi_XX_ prefix"
  - "Trigger ordering does not match logical sequence"
  - "Approval metadata not created before editing regulated surface"

# ── Proof limits ───────────────────────────────────────────────────────────
proof_guarantees:
  - "All 6 triggers renamed with bi_XX_ prefix"
  - "Alpha sort of trigger names matches intended logical sequence"
  - "Old trigger names no longer exist in pg_trigger"
proof_limitations:
  - "Cannot prove firing order without live trace — relies on PostgreSQL alphabetical guarantee"

