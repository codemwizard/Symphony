      bi_01_, bi_02_, bi_03_, bi_04_, bi_05_, ai_01_.
    required: true

# ── Verification commands ──────────────────────────────────────────────────
verification:
  - >-
    [ID w5_fix_05_work_02] psql "$DATABASE_URL" -tAc "SELECT tgname FROM
    pg_trigger WHERE tgrelid = 'state_transitions'::regclass AND NOT
    tgisinternal ORDER BY tgname" | head -1 | grep -q 'bi_01' || exit 1
  - >-
    [ID w5_fix_05_work_03] test "$(cat schema/migrations/MIGRATION_HEAD)" =
    '0149' || exit 1
  - >-
    [ID w5_fix_05_work_04] bash scripts/db/verify_tsk_p2_w5_fix_05.sh ||
    exit 1
  - >-
    [ID w5_fix_05_work_05] test -f evidence/phase2/tsk_p2_w5_fix_05.json ||
    exit 1

