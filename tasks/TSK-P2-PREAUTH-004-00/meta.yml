  - tasks/TSK-P2-PREAUTH-004-00/meta.yml
  - docs/tasks/PHASE2_TASKS.md

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_004_00_work_item_01] Author the Cryptographic Contract section of PLAN.md
    pinning decision_hash = sha256(canonical_json(decision_payload)) and signature = ed25519_sign(decision_hash, private_key),
    including the verifier recompute rule that rejects on hash or signature mismatch.
  - >-
    [ID tsk_p2_preauth_004_00_work_item_02] Author the policy_decisions Schema section of PLAN.md
    with 11 columns including execution_id UUID NOT NULL REFERENCES execution_records(execution_id),
    entity_type TEXT NOT NULL, entity_id UUID NOT NULL, decision_hash TEXT NOT NULL, signature TEXT NOT NULL,
    plus the append-only trigger contract and five mandatory negative tests.
  - >-
    [ID tsk_p2_preauth_004_00_work_item_03] Author the state_rules Schema section of PLAN.md
    including rule_priority INT NOT NULL DEFAULT 0 and the deterministic tiebreak rule
    (lower state_rule_id UUID wins on equal priority).
  - >-
    [ID tsk_p2_preauth_004_00_work_item_04] Author the Authority-Transition Binding Invariant section of PLAN.md
    declaring invariant id INV-AUTH-TRANSITION-BINDING-01, its statement, enforcement location,
    verification location, proof guarantees, and proof limitations that 004-03 must adopt verbatim.
  - >-
    [ID tsk_p2_preauth_004_00_work_item_05] Run python3 scripts/audit/verify_plan_semantic_alignment.py
    against docs/plans/phase2/TSK-P2-PREAUTH-004-00/PLAN.md and tasks/TSK-P2-PREAUTH-004-00/meta.yml
    and confirm exit 0 with Proof graph integrity PASSED.

