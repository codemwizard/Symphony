schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-004-00
title: "Author Wave 4 authority-binding contract (policy_decisions + state_rules + invariant) and prove semantic alignment before any schema work"
owner_role: DB_FOUNDATION
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY

intent: >-
  Wave 3 closed execution truth; Wave 4 must close authority binding. The
  previous Wave 4 draft was hollow: decision_hash/signature had no algorithm,
  policy_decisions had no entity context, and state_rules had no priority
  tiebreaker. This task authors the Wave 4 contract PLAN.md that pins
  sha256(canonical_json(payload)) + Ed25519 cryptography, adds entity_type +
  entity_id to prevent cross-entity replay, and adds rule_priority INT NOT NULL
  DEFAULT 0 with a deterministic tiebreak to prevent transition deadlocks.
  No SQL is written here; 004-01, 004-02, 004-03 inherit this contract.

anti_patterns:
  - "Writing any SQL migration for policy_decisions or state_rules in this task"
  - "Leaving decision_hash undefined as an opaque string instead of sha256(canonical_json(payload))"
  - "Documenting policy_decisions without entity_type and entity_id columns (cross-entity replay surface)"
  - "Documenting state_rules without rule_priority or without a deterministic tiebreak rule"
  - "Marking this PLAN complete while verify_plan_semantic_alignment.py exits non-zero"
  - "Editing the meta.yml or PLAN.md of 004-01, 004-02, or 004-03 inside this CREATE-TASK scope"

out_of_scope:
  - "Authoring the policy_decisions migration (belongs to TSK-P2-PREAUTH-004-01)"
  - "Authoring the state_rules migration (belongs to TSK-P2-PREAUTH-004-02)"
  - "Authoring the authority-transition binding invariant verifier (belongs to TSK-P2-PREAUTH-004-03)"
  - "Runtime key management, key rotation, or public-key resolution for signature verification (future wave)"
  - "Modifying any Wave 3 artefact (execution_records schema, verifiers, evidence)"
  - "Touching 004-01 / 004-02 / 004-03 task packs"

stop_conditions:
  - "If any SQL migration file is authored by this task"
  - "If any verifier script is authored by this task"
  - "If the PLAN documents decision_hash without specifying sha256 and canonical_json"
  - "If the PLAN documents policy_decisions without both entity_type and entity_id columns"
  - "If the PLAN documents state_rules without rule_priority INT NOT NULL DEFAULT 0"
  - "If the PLAN omits INV-AUTH-TRANSITION-BINDING-01 declaration"
  - "If verify_plan_semantic_alignment.py exits non-zero"
  - "If weak-signal score reported by verify_plan_semantic_alignment.py is >= 3"

proof_guarantees:
  - "PLAN.md exists at docs/plans/phase2/TSK-P2-PREAUTH-004-00/PLAN.md"
  - "PLAN.md contains the literal string sha256(canonical_json pinning the hash algorithm"
  - "PLAN.md contains the literal string ed25519 pinning the signature scheme"
  - "PLAN.md contains the tokens entity_type and entity_id in the policy_decisions schema section"
  - "PLAN.md contains the token rule_priority in the state_rules schema section"
  - "PLAN.md declares invariant id INV-AUTH-TRANSITION-BINDING-01"
  - "verify_plan_semantic_alignment.py exits 0 against this PLAN and meta"

proof_limitations:
  - "This PLAN proves the contract exists, not that 004-01/02/03 will implement it faithfully; enforcement lives in their packs and verifiers"
  - "Signature authenticity (public-key resolution) is deferred; 004-03's verifier validates structural binding only until a later wave lands key management"
  - "Canonical JSON serialisation conformance to RFC 8785 is a convention pinned in the PLAN text; byte-level conformance is enforced by 004-03's verifier, not this task"

depends_on:
  - TSK-P2-PREAUTH-003-02

blocks:
  - TSK-P2-PREAUTH-004-01
  - TSK-P2-PREAUTH-004-02
  - TSK-P2-PREAUTH-004-03

