    [ID tsk_p2_preauth_004_00_work_item_01] docs/plans/phase2/TSK-P2-PREAUTH-004-00/PLAN.md exists
    and contains the literal strings sha256(canonical_json and ed25519 in the Cryptographic Contract section.
  - >-
    [ID tsk_p2_preauth_004_00_work_item_02] docs/plans/phase2/TSK-P2-PREAUTH-004-00/PLAN.md documents
    the policy_decisions schema with the tokens entity_type, entity_id, decision_hash, signature, and execution_id.
  - >-
    [ID tsk_p2_preauth_004_00_work_item_03] docs/plans/phase2/TSK-P2-PREAUTH-004-00/PLAN.md documents
    the state_rules schema including the token rule_priority.
  - >-
    [ID tsk_p2_preauth_004_00_work_item_04] docs/plans/phase2/TSK-P2-PREAUTH-004-00/PLAN.md declares
    invariant id INV-AUTH-TRANSITION-BINDING-01 with its statement and verifier contract.
  - >-
    [ID tsk_p2_preauth_004_00_work_item_05] python3 scripts/audit/verify_plan_semantic_alignment.py
    --plan docs/plans/phase2/TSK-P2-PREAUTH-004-00/PLAN.md --meta tasks/TSK-P2-PREAUTH-004-00/meta.yml exits 0.

