schema_version: 1
phase: '1'
task_id: TSK-P1-230
title: "Implement a report-only task-pack authoring gate so hollow or incomplete task contracts fail readiness truthfully"
owner_role: SECURITY_GUARDIAN
status: completed
priority: HIGH
risk_class: INTEGRITY
blast_radius: CI_GATES
intent: >-
  Once template, process, and parity foundations exist, the repo needs a report-only
  gate that can surface hollow or incomplete task contracts before implementation begins.
  This task creates the first Pack B authoring gate, establishes the shared enforcement-
  transition model, and prevents structurally weak task packs from hiding behind
  placeholder prose or fragmented readiness assumptions.
anti_patterns:
  - "Treating report-only authoring checks as permanent advisory tooling with no path to authority"
  - "Letting repeated weak authoring signals remain isolated warnings instead of a stronger drift pattern"
  - "Duplicating parity or scope logic inside the authoring gate until gate boundaries become unclear"
depends_on:
  - TSK-P1-227
  - TSK-P1-228
  - TSK-P1-229
  - TSK-P1-224
blocks:
  - TSK-P1-231
  - TSK-P1-232
touches:
  - scripts/audit/task_authoring_gate.py
  - scripts/audit/verify_tsk_p1_230.sh
  - evidence/phase1/tsk_p1_230_authoring_gate.json
  - tasks/TSK-P1-230/meta.yml
  - docs/plans/phase1/TSK-P1-230/PLAN.md
  - docs/plans/phase1/TSK-P1-230/EXEC_LOG.md
invariants:
  - INV-105
  - INV-119
work:
  - >-
    Implement a report-only authoring gate that checks for hardened required sections,
    declared-doc resolution, placeholder or filler verification prose, structurally
    complete evidence contracts, and parity findings from the shared parity gate.
  - >-
    Emit all authoring findings through the shared gate result contract and define the
    initial enforcement-transition contract for Pack B, including report-only mode,
    promotion criteria, rollback conditions, and drift-density escalation rules.
  - >-
    Add a task-specific verifier that exercises hollow and valid task-pack fixtures,
    proves repeated weak signals escalate deterministically, and emits declared evidence.
acceptance_criteria:
  - >-
    Hollow or incomplete task contracts are surfaced by one report-only authoring gate
    instead of being discovered ad hoc during implementation handoff.
  - >-
    The authoring gate emits the shared gate result contract fields exactly and defines a
    concrete report-only to soft-block transition path with rollback conditions.
  - >-
    Repeated weak authoring findings escalate deterministically rather than appearing as
    isolated advisory lint with no aggregate meaning.
  - >-
    `scripts/audit/verify_tsk_p1_230.sh` exercises hollow, repeated-warning, and valid
    task-pack fixtures and emits `evidence/phase1/tsk_p1_230_authoring_gate.json`.
negative_tests:
  - id: TSK-P1-230-N1
    description: >-
      Run the authoring gate against a fixture task pack missing hardened sections and
      carrying placeholder verification prose, and confirm the gate emits a structured
      failing result instead of allowing readiness theater.
    required: true
  - id: TSK-P1-230-N2
    description: >-
      Run the gate against a fixture task pack with multiple warning-class authoring
      issues and confirm the drift-density rules promote the result beyond isolated lint.
    required: true
positive_tests:
  - id: TSK-P1-230-P1
    description: >-
      Run the authoring gate against a well-formed fixture task pack and confirm it emits
      a clean structured report-only result using the shared gate contract.
    required: false
verification:
  - bash scripts/audit/verify_tsk_p1_230.sh
  - python3 scripts/audit/validate_evidence.py --task TSK-P1-230 --evidence evidence/phase1/tsk_p1_230_authoring_gate.json
  - RUN_PHASE1_GATES=1 bash scripts/dev/pre_ci.sh
evidence:
  - path: evidence/phase1/tsk_p1_230_authoring_gate.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - gate_result_contract_fields
      - current_mode
      - next_mode
      - promotion_criteria
      - rollback_conditions
      - drift_density_rules
      - invalid_fixture_result
      - escalation_fixture_result
      - valid_fixture_result
failure_modes:
  - "Authoring gate emits output outside the shared gate result contract => FAIL"
  - "Repeated weak authoring signals do not escalate under the declared drift-density rules => BLOCKED"
  - "Report-only authoring gate has no explicit promotion or rollback model => BLOCKED"
  - "Evidence file missing => FAIL"
must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - AGENT_ENTRYPOINT.md
  - docs/operations/AGENT_PROMPT_ROUTER.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/reference/rls-anti-drift-wave2-task-plan.md
implementation_plan: docs/plans/phase1/TSK-P1-230/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-230/EXEC_LOG.md
notes: >-
  Detection scope is authoring-contract truthfulness only. This gate must use the shared
  gate result contract, declare its promotion path, and avoid duplicating scope or proof
  logic owned by later gates.
client: cursor
assigned_agent: security_guardian
model: Cascade
