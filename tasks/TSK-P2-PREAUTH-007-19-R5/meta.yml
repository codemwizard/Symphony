schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-007-19-R5
title: Replace tab delimiter with non-whitespace delimiter
owner_role: SECURITY_GUARDIAN
status: planned
priority: MEDIUM
risk_class: GOVERNANCE
blast_radius: SCRIPTS_ONLY

intent: >-
  Replace tab delimiter with a non-whitespace delimiter (e.g., "|") to eliminate IFS whitespace merging
  fragility. The original implementation used tabs which caused Bash to merge consecutive tabs when fields
  were empty, requiring a placeholder workaround. A non-whitespace delimiter eliminates this fragility.

anti_patterns:
  - "Using tab delimiter with IFS whitespace merging"
  - "Relying on placeholder workarounds for delimiter issues"
  - "Using whitespace delimiters in trace logs"
  - "Not testing delimiter parsing with empty fields"

out_of_scope:
  - Changing trace log field structure or count
  - Modifying field content or semantics
  - Changing evidence digest computation

stop_conditions:
  - "If tab delimiter is still used → STOP"
  - "If new delimiter is whitespace → STOP"
  - "If verifier doesn't parse new delimiter correctly → STOP"

proof_guarantees:
  - "Trace log uses '|' delimiter instead of '\\t'"
  - "Verifier parses '|' delimiter correctly"
  - "Empty fields are handled correctly without placeholder workaround"
  - "All 8 fields are parsed correctly"

proof_limitations:
  - "Requires updating any external tools that parse the trace log"
  - "If '|' appears in field content, could cause parsing issues (unlikely)"

