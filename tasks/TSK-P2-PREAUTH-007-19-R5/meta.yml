notes: >-
  This fix addresses the delimiter fragility issue. The original implementation used tabs which caused Bash
  IFS whitespace merging when fields were empty, requiring a placeholder workaround. Using "|" (pipe) as
  a non-whitespace delimiter eliminates this fragility and removes the need for the placeholder workaround.
  This is a cleanup task after the critical security fixes (R1-R4) are complete.
