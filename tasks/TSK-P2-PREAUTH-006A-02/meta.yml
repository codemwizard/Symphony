schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-006A-02
title: "Add data_authority columns to monitoring_records"
owner_role: DB_FOUNDATION
status: completed
priority: HIGH
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  This task adds data_authority, audit_grade, and authority_explanation columns to monitoring_records
  table. Without these columns, the system cannot track data authority for monitoring records,
  creating risk of non-auditable data usage.

anti_patterns:
  - "Adding columns without appropriate defaults"
  - "Writing the migration without updating existing data"
  - "Writing the verifier after the migration is applied"

out_of_scope:
  - "Adding columns to other tables (deferred to TSK-P2-PREAUTH-006A-03)"
  - "Trigger implementation (deferred to TSK-P2-PREAUTH-006B)"
  - "Application layer changes"

stop_conditions:
  - "If migration does not add data_authority column"
  - "If audit_grade column is missing"
  - "If authority_explanation column is missing"

proof_guarantees:
  - "Migration adds data_authority, audit_grade, and authority_explanation columns"
  - "Columns have appropriate defaults for existing data"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the defaults are semantically correct for all existing data"
  - "Cannot verify that the columns will perform well at scale"

depends_on:
  - TSK-P2-PREAUTH-006A-01
blocks:
  - TSK-P2-PREAUTH-006A-03

touches:
  - schema/migrations/0121_create_data_authority_enum.sql
  - scripts/db/verify_tsk_p2_preauth_006a_02.sh
  - tasks/TSK-P2-PREAUTH-006A-02/meta.yml

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_006a_02_work_item_01] Add columns to migration 0121: ALTER TABLE monitoring_records
    ADD COLUMN data_authority public.data_authority_level NOT NULL DEFAULT 'phase1_indicative_only',
    ADD COLUMN audit_grade BOOLEAN NOT NULL DEFAULT false, ADD COLUMN authority_explanation TEXT NOT NULL
    DEFAULT 'Phase 1 data - no execution binding'.
  - >-
    [ID tsk_p2_preauth_006a_02_work_item_02] Update existing data: UPDATE monitoring_records SET
    data_authority='phase1_indicative_only' WHERE data_authority IS DISTINCT FROM 'phase1_indicative_only'.
  - >-
    [ID tsk_p2_preauth_006a_02_work_item_03] Write verify_tsk_p2_preauth_006a_02.sh that runs psql to verify
    columns exist and have appropriate defaults.
  - >-
    [ID tsk_p2_preauth_006a_02_work_item_04] Run verify_tsk_p2_preauth_006a_02.sh to confirm migration is successful.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_006a_02_work_item_01] Migration adds data_authority, audit_grade, and authority_explanation columns.
  - >-
    [ID tsk_p2_preauth_006a_02_work_item_02] Existing data is updated with appropriate defaults.
  - >-
    [ID tsk_p2_preauth_006a_02_work_item_03] verify_tsk_p2_preauth_006a_02.sh exists and checks for columns.
  - >-
    [ID tsk_p2_preauth_006a_02_work_item_04] verify_tsk_p2_preauth_006a_02.sh exits 0.

negative_tests:
  - id: TSK-P2-PREAUTH-006A-02-N1
    description: >-
      Verify that verify_tsk_p2_preauth_006a_02.sh exits non-zero when data_authority column does not exist.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-006A-02-P1
    description: >-
      Verify that verify_tsk_p2_preauth_006a_02.sh exits 0 when columns exist with appropriate defaults.
    required: false

verification:
  - >-
    # [ID tsk_p2_preauth_006a_02_work_item_01] [ID tsk_p2_preauth_006a_02_work_item_02]
    # [ID tsk_p2_preauth_006a_02_work_item_03] [ID tsk_p2_preauth_006a_02_work_item_04]
    test -x scripts/db/verify_tsk_p2_preauth_006a_02.sh && bash scripts/db/verify_tsk_p2_preauth_006a_02.sh > evidence/phase2/tsk_p2_preauth_006a_02.json || exit 1
  - >-
    # [ID tsk_p2_preauth_006a_02_work_item_01]
    psql -c "\d monitoring_records" | grep -q "data_authority" || exit 1
  - >-
    # [ID tsk_p2_preauth_006a_02_work_item_04]
    test -f evidence/phase2/tsk_p2_preauth_006a_02.json || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_006a_02.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - columns_exist
      - defaults_applied

failure_modes:
  - "Columns not added => CRITICAL_FAIL"
  - "Defaults not applied => FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-006A-02/PLAN.md
