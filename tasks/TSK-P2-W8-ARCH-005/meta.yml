  - >-
    [ID w8_arch_005_work_02] The design explicitly requires one dispatcher trigger and explicit equality invariants instead of emergent trigger behavior.
  - >-
    [ID w8_arch_005_work_03] The design explicitly records no-credit, no advisory fallback, and unavailable-crypto hard-fail rules.

