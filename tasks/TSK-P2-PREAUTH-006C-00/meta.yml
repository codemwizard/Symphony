  Without a verified plan, the C# changes lack architectural documentation and verification trace,
  creating risk of incomplete or incorrect implementation of cross-layer data authority contract.

anti_patterns:
  - "Creating PLAN.md after implementation has started"
  - "Writing PLAN.md without explicit tracking IDs for work items"
  - "Omitting stop conditions or proof limitations"

