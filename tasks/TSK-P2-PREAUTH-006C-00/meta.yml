  - >-
    [ID tsk_p2_preauth_006c_00_work_item_03] PLAN.md documents adding DataAuthority and AuditGrade to 3 read models.
  - >-
    [ID tsk_p2_preauth_006c_00_work_item_04] verify_plan_semantic_alignment.py exits 0 with
