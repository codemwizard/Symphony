work:
- Introduce AWAITING_EXECUTION state for post-egress pre-acknowledgement lifecycle.
- Implement timed tiered escalation for missing acknowledgement.
- Reuse existing supervisor approval queue and stored procedures for Tier-3 interrupt flow.
- Extend supervisor queue status model to include recovery-compatible states required by interrupt lifecycle (including ESCALATED and RESET), with auditable transition controls.
- Persist interrupt actions (acknowledge, resume, reset) in evidence-visible audit trail.
- Define RESET semantics explicitly as "return from ESCALATED to AWAITING_EXECUTION with acknowledgement requirement still active"; RESET must never imply settlement or acknowledgement bypass.
- Refresh the governed schema baseline and baseline ADR log so baseline drift closes at migration cutoff `0073_int_004_ack_gap_controls.sql`.
acceptance_criteria:
- No instruction is silently marked settled without explicit acknowledgement or approved verified equivalent.
- Tier-3 escalation creates mandatory supervisor-visible interrupt and explicit escalation artifact.
- Supervisor interrupt transitions workflow into known degraded-but-safe state.
- Recovery path supports explicit acknowledge/resume/reset actions with auditable evidence.
- No parallel supervisor queue is introduced; existing queue path is extended and reused.
- RESET action is mechanically constrained to return to AWAITING_EXECUTION and preserve acknowledgement requirement.
- Recovery actions are recorded in append-only audit evidence even if queue row state is updated in place.
- Schema baseline artifacts are refreshed through migration cutoff `0073_int_004_ack_gap_controls.sql`, and the baseline ADR log records the update.
