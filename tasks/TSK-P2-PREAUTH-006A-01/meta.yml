schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-006A-01
title: "Create data_authority_level ENUM type"
owner_role: DB_FOUNDATION
status: completed
priority: HIGH
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  This task creates the data_authority_level ENUM type to track data authority levels across
  the system. Without this ENUM, the system cannot enforce data authority constraints,
  creating risk of non-auditable data usage.

anti_patterns:
  - "Creating ENUM without all required values"
  - "Writing the migration without touching MIGRATION_HEAD"
  - "Writing the verifier after the migration is applied"

out_of_scope:
  - "Adding data_authority columns (deferred to TSK-P2-PREAUTH-006A-02)"
  - "Trigger implementation (deferred to TSK-P2-PREAUTH-006B)"
  - "Application layer changes"

stop_conditions:
  - "If migration does not create data_authority_level ENUM"
  - "If ENUM values are missing or incorrect"
  - "If MIGRATION_HEAD is not updated to 0121"

proof_guarantees:
  - "Migration creates data_authority_level ENUM with all 7 values"
  - "MIGRATION_HEAD contains 0121"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the ENUM values are semantically correct"
  - "Cannot verify that the ENUM will work for all future use cases"

depends_on:
  - TSK-P2-PREAUTH-006A-00
blocks:
  - TSK-P2-PREAUTH-006A-02

touches:
  - schema/migrations/0121_create_data_authority_enum.sql
  - schema/migrations/MIGRATION_HEAD
  - scripts/db/verify_tsk_p2_preauth_006a_01.sh
  - tasks/TSK-P2-PREAUTH-006A-01/meta.yml

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_006a_01_work_item_01] Write migration 0121 at schema/migrations/0121_create_data_authority_enum.sql
    creating data_authority_level ENUM type with values: 'phase1_indicative_only', 'non_reproducible',
    'derived_unverified', 'policy_bound_unsigned', 'authoritative_signed', 'superseded', 'invalidated'.
  - >-
    [ID tsk_p2_preauth_006a_01_work_item_02] Update MIGRATION_HEAD to 0121: echo 0121 > schema/migrations/MIGRATION_HEAD.
  - >-
    [ID tsk_p2_preauth_006a_01_work_item_03] Write verify_tsk_p2_preauth_006a_01.sh that runs psql to verify
    ENUM type exists and contains all 7 values.
  - >-
    [ID tsk_p2_preauth_006a_01_work_item_04] Run verify_tsk_p2_preauth_006a_01.sh to confirm migration is successful.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_006a_01_work_item_01] Migration creates data_authority_level ENUM with all 7 values.
  - >-
    [ID tsk_p2_preauth_006a_01_work_item_02] MIGRATION_HEAD contains 0121.
  - >-
    [ID tsk_p2_preauth_006a_01_work_item_03] verify_tsk_p2_preauth_006a_01.sh exists and checks for ENUM existence.
  - >-
    [ID tsk_p2_preauth_006a_01_work_item_04] verify_tsk_p2_preauth_006a_01.sh exits 0.

negative_tests:
  - id: TSK-P2-PREAUTH-006A-01-N1
    description: >-
      Verify that verify_tsk_p2_preauth_006a_01.sh exits non-zero when data_authority_level ENUM does not exist.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-006A-01-P1
    description: >-
      Verify that verify_tsk_p2_preauth_006a_01.sh exits 0 when ENUM exists with all 7 values.
    required: false

verification:
  - >-
    # [ID tsk_p2_preauth_006a_01_work_item_01] [ID tsk_p2_preauth_006a_01_work_item_02]
    # [ID tsk_p2_preauth_006a_01_work_item_03] [ID tsk_p2_preauth_006a_01_work_item_04]
    test -x scripts/db/verify_tsk_p2_preauth_006a_01.sh && bash scripts/db/verify_tsk_p2_preauth_006a_01.sh > evidence/phase2/tsk_p2_preauth_006a_01.json || exit 1
  - >-
    # [ID tsk_p2_preauth_006a_01_work_item_02]
    test $(cat schema/migrations/MIGRATION_HEAD) = "0121" || exit 1
  - >-
    # [ID tsk_p2_preauth_006a_01_work_item_01]
    psql -c "SELECT enumlabel FROM pg_enum WHERE enumtypid='data_authority_level'::regtype" | grep -c 'phase1_indicative_only' || exit 1
  - >-
    # [ID tsk_p2_preauth_006a_01_work_item_04]
    test -f evidence/phase2/tsk_p2_preauth_006a_01.json || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_006a_01.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - enum_exists
      - enum_values_present
      - migration_head

failure_modes:
  - "ENUM not created => CRITICAL_FAIL"
  - "ENUM values missing => CRITICAL_FAIL"
  - "MIGRATION_HEAD not updated => FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-006A-01/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-006A-01/EXEC_LOG.md

notes: >-
  This task blocks TSK-P2-PREAUTH-006A-02. Phase Key: PRE-PHASE2. Phase Name: Pre-Phase 2 Implementation.

client: cursor
assigned_agent: db_foundation
model: <UNASSIGNED>
