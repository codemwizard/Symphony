implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-004-03/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-004-03/EXEC_LOG.md

notes: >-
  SINGLE_INVARIANT scope. This task seals Wave 4: the row type (004-01) and
  the rule type (004-02) are inert without the binding invariant. The
  enforcement function is SECURITY DEFINER because the state machine
  (Wave 5) will invoke it from a role that does not have SELECT on
  execution_records directly; the SET search_path hardening is mandatory
  per AGENTS.md. Signature authenticity is explicitly NOT claimed; the
  verifier declares this in proof_limitations so a future auditor can
  locate the gap.

