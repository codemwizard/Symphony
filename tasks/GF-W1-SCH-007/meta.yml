schema_version: 1
phase: '0'
task_id: GF-W1-SCH-007
title: Wire Phase 0 GF schema closeout verifier so all schema verifiers are gated by a single aggregated check
owner_role: DB_FOUNDATION
status: completed
priority: HIGH
risk_class: INTEGRITY
blast_radius: DOCS_ONLY
domain: green_finance
pilot: false
intent: After SCH-002A through SCH-006 are complete, a single aggregated closeout verifier must run all prior GF schema verifiers
  in DAG order and fail if any one fails. This ensures SCH-008 and Phase 1 functions cannot start against a partially verified
  schema. No new migration is introduced by this task.
anti_patterns:
- Creating a closeout script that only runs some of the GF verifiers
- Allowing the closeout script to exit 0 when any individual verifier exits non-zero
- Adding schema migrations to this task (CI wiring only)
out_of_scope:
- Any schema migration SQL (no migration in this task)
- Changes to individual verifier scripts already created by prior tasks
- Any file outside scripts/db/ and evidence/phase0/
stop_conditions:
- If closeout script passes when any individual verifier exits non-zero → STOP
- If any migration SQL is created in this task → STOP (scope violation)
proof_guarantees:
- Closeout script invokes verify_gf_sch_002a.sh, verify_gf_monitoring_records.sh, verify_gf_evidence_lineage.sh, verify_gf_asset_lifecycle.sh,
  and verify_gf_regulatory_plane.sh
- Closeout script exits non-zero if any sub-verifier fails
- Evidence artifact records all_verifiers_pass and individual verifier exit codes
proof_limitations:
- Verifier cannot run sub-verifiers end-to-end without all prior migrations applied
- Closeout does not re-verify DB state; it only orchestrates static verifiers
depends_on:
- GF-W1-SCH-006
blocks:
- GF-W1-SCH-008
touches:
- scripts/db/verify_gf_schema_closeout.sh
- evidence/phase0/gf_schema_closeout.json
- tasks/GF-W1-SCH-007/meta.yml
invariants:
- INV-SCHEMA-OWNERSHIP-001
work:
- '[ID GF-W1-SCH-007] [ID gf_w1_sch_007_wi01] Create scripts/db/verify_gf_schema_closeout.sh that invokes verify_gf_sch_002a.sh,
  verify_gf_monitoring_records.sh, verify_gf_evidence_lineage.sh, verify_gf_asset_lifecycle.sh, and verify_gf_regulatory_plane.sh
  in DAG order.'
- '[ID GF-W1-SCH-007] [ID gf_w1_sch_007_wi02] Implement fail-closed aggregation logic: exit non-zero immediately if any individual
  sub-verifier exits non-zero, preventing downstream tasks from starting against a partially verified schema.'
- '[ID GF-W1-SCH-007] [ID gf_w1_sch_007_wi03] Emit evidence/phase0/gf_schema_closeout.json with all_verifiers_pass boolean,
  individual verifier exit codes, task_id, git_sha, timestamp_utc, and execution_trace fields.'
acceptance_criteria:
- '[ID GF-W1-SCH-007] [ID gf_w1_sch_007_wi01] verify_gf_schema_closeout.sh exits 0 and evidence/phase0/gf_schema_closeout.json
  contains all_verifiers_pass=true when all five sub-verifiers pass.'
- '[ID GF-W1-SCH-007] [ID gf_w1_sch_007_wi01] verify_gf_schema_closeout.sh exits non-zero and evidence/phase0/gf_schema_closeout.json
  contains all_verifiers_pass=false when any one sub-verifier exits non-zero.'
negative_tests:
- id: GF-W1-SCH-007-N1
  description: When verify_gf_monitoring_records.sh is replaced with a stub that exits 1, verify_gf_schema_closeout.sh must
    exit non-zero and set all_verifiers_pass=false in the evidence JSON.
  required: true
positive_tests:
- id: GF-W1-SCH-007-P1
  description: When all five sub-verifier stubs exit 0, verify_gf_schema_closeout.sh must exit 0 and set all_verifiers_pass=true.
  required: false
verification:
- '[ID GF-W1-SCH-007] bash scripts/dev/pre_ci.sh | grep -q ''.'' >> evidence/phase1/gf_w1_sch_007.json || exit 1'
- '[ID GF-W1-SCH-007] [ID gf_w1_sch_007_wi01] bash scripts/db/verify_gf_schema_closeout.sh && test -f evidence/phase0/gf_schema_closeout.json
  > /dev/null || exit 1'
- '[ID GF-W1-SCH-007] [ID gf_w1_sch_007_wi01] grep -q ''"all_verifiers_pass"'' evidence/phase0/gf_schema_closeout.json > /dev/null
  || exit 1'
evidence:
- path: evidence/phase0/gf_schema_closeout.json
  must_include:
  - task_id
  - run_id
  - git_sha
  - timestamp_utc
  - status
  - observed_paths
  - observed_hashes
  - command_outputs
  - execution_trace
  - all_verifiers_pass
  - verifier_results
  - failures
failure_modes:
- Evidence file missing → BLOCKED (GF-W1-SCH-008 cannot start)
- Closeout exits 0 when any sub-verifier fails → CRITICAL_FAIL (downstream tasks run against broken schema)
- Script omits one or more GF schema verifiers → FAIL_REVIEW
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
- docs/operations/AGENT_GUARDRAILS_GREEN_FINANCE.md
- docs/plans/phase0/GF-W1-SCH-007/PLAN.md
implementation_plan: docs/plans/phase0/GF-W1-SCH-007/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-SCH-007/EXEC_LOG.md
notes: This is a CI-wiring-only task. blast_radius is DOCS_ONLY because no schema migration is created. The closeout script
  is a shell orchestrator that calls existing verifier scripts; it does not duplicate their logic.
