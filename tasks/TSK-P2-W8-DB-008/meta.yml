work:
  - >-
    [ID w8_db_008_work_01] Enforce active, revoked, expired, and superseded key states in the `asset_batches` verification path according to the Wave 8 signing contract.
  - >-
    [ID w8_db_008_work_02] Define and implement explicit superseded-key behavior rather than leaving it implicit or inherited.
  - >-
    [ID w8_db_008_work_03] Build a verifier that proves revoked and expired keys fail and that superseded-key behavior matches explicit policy.

acceptance_criteria:
  - >-
    [ID w8_db_008_work_01] Revoked and expired keys are rejected by PostgreSQL at the authoritative boundary.
  - >-
    [ID w8_db_008_work_02] Superseded-key behavior is explicit and enforced rather than inferred.
  - >-
    [ID w8_db_008_work_03] The verifier proves revoked, expired, and superseded-key cases behave according to policy.

negative_tests:
  - id: TSK-P2-W8-DB-008-N1
    description: >-
      Verifier fails if a revoked or expired key can still authorize a write at `asset_batches`.
    required: true

positive_tests:
  - id: TSK-P2-W8-DB-008-P1
    description: >-
      Verifier passes only when key lifecycle state changes write acceptance behavior.
    required: true

