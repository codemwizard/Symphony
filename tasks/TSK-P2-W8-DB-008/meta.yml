title: "Key lifecycle enforcement"
owner_role: DB_FOUNDATION
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DB_SCHEMA

intent: >-
  This task converts key lifecycle from registry metadata into actual boundary behavior.

primary_enforcement_domain: >-
  key lifecycle enforcement

anti_patterns:
  - "Recording revocation without changing write acceptance"
  - "Treating key status as audit-only metadata"
  - "Leaving superseded-key semantics implicit"

out_of_scope:
  - "Any work outside the single primary enforcement domain declared for this task."
  - "Implementation or evidence claims for non-authoritative surfaces unless explicitly routed through the same `asset_batches` boundary."

stop_conditions:
  - "If the task begins to span more than one primary enforcement domain, stop and split the work into separate task packs."
  - "If the verifier cannot produce a deterministic fail domain for the task objective, stop and repair the pack before implementation."
  - "If a runtime verifier does not physically cause PostgreSQL to accept or reject a write at `asset_batches`, stop and treat the verifier as insufficient."

proof_guarantees:
  - "The task is constrained to one primary enforcement domain."
  - "The verifier path is tied to explicit work-item IDs and proof-carrying evidence expectations."

proof_limitations:
  - "This task alone does not certify Wave 8 complete; it proves only its declared domain."

