schema_version: 1
phase: '2'
task_id: TSK-P2-SEC-002-01
title: Run live service test and promote INV-131
owner_role: SECURITY_GUARDIAN
status: completed
priority: HIGH
risk_class: SECURITY
blast_radius: CI_GATES
intent: This task runs the live service test for INV-131 (admin endpoints require
  key) and promotes the invariant to implemented status. Without this verification,
  admin endpoints may be accessible without authentication, creating unauthorized
  access risk.
anti_patterns:
- Promoting INV-131 to implemented without running the live service test
- Assuming the test passes without actual execution
- Writing the verifier after marking the invariant as implemented
out_of_scope:
- Changing admin endpoint authentication code (deferred to separate task if needed)
- Modifying other security verifiers
- Database schema changes
stop_conditions:
- If test_admin_endpoints_require_key.sh does not exit 0
- If INV-131 status is not updated to implemented
- If the live service test is skipped or mocked
proof_guarantees:
- test_admin_endpoints_require_key.sh exits 0 on live service
- 'INV-131 in INVARIANTS_MANIFEST.yml has status: implemented'
- Verifier script exists and emits evidence
proof_limitations:
- Cannot verify that all admin endpoints are covered by the test
- Cannot verify that the authentication mechanism cannot be bypassed
depends_on:
- TSK-P2-SEC-002-00
blocks:
- TSK-P2-CCG-001-00
touches:
- docs/invariants/INVARIANTS_MANIFEST.yml
- scripts/audit/verify_tsk_p2_sec_002_01.sh
- tasks/TSK-P2-SEC-002-01/meta.yml
invariants:
- INV-131
work:
- '[ID tsk_p2_sec_002_01_work_item_01] Run test_admin_endpoints_require_key.sh against
  live service to verify admin endpoints require authentication key.'
- '[ID tsk_p2_sec_002_01_work_item_02] Update INV-131 in INVARIANTS_MANIFEST.yml with
  status: implemented, enforcement_location, and verification_command.'
- '[ID tsk_p2_sec_002_01_work_item_03] Write verify_tsk_p2_sec_002_01.sh that runs
  the verifier and emits evidence.'
acceptance_criteria:
- >-
  [ID tsk_p2_sec_002_01_work_item_01] [ID tsk_p2_sec_002_01_ac_01] test_admin_endpoints_require_key.sh exits 0.
- >-
  [ID tsk_p2_sec_002_01_work_item_02] [ID tsk_p2_sec_002_01_ac_02] INV-131 in INVARIANTS_MANIFEST.yml has status: implemented.
- >-
  [ID tsk_p2_sec_002_01_work_item_03] [ID tsk_p2_sec_002_01_ac_03] verify_tsk_p2_sec_002_01.sh exists and exits 0.
negative_tests:
- id: TSK-P2-SEC-002-01-N1
  description: Verify that test_admin_endpoints_require_key.sh exits non-zero when
    called without authentication key on admin endpoint.
  required: true
positive_tests:
- id: TSK-P2-SEC-002-01-P1
  description: Verify that test_admin_endpoints_require_key.sh exits 0 when called
    with valid authentication key on admin endpoint.
  required: false
verification:
  - >-
    # [ID tsk_p2_sec_002_01_work_item_01] [ID tsk_p2_sec_002_01_work_item_02] [ID tsk_p2_sec_002_01_work_item_03] [ID tsk_p2_sec_002_01_ac_01] [ID tsk_p2_sec_002_01_ac_02] [ID tsk_p2_sec_002_01_ac_03]
    bash scripts/audit/test_admin_endpoints_require_key.sh || exit 1
  - >-
    # [ID tsk_p2_sec_002_01_work_item_01] [ID tsk_p2_sec_002_01_work_item_02] [ID tsk_p2_sec_002_01_work_item_03] [ID tsk_p2_sec_002_01_ac_01] [ID tsk_p2_sec_002_01_ac_02] [ID tsk_p2_sec_002_01_ac_03]
    grep -A 5 'id: INV-131' docs/invariants/INVARIANTS_MANIFEST.yml | grep -q 'status: implemented' || exit 1
  - >-
    # [ID tsk_p2_sec_002_01_work_item_01] [ID tsk_p2_sec_002_01_work_item_02] [ID tsk_p2_sec_002_01_work_item_03] [ID tsk_p2_sec_002_01_ac_01] [ID tsk_p2_sec_002_01_ac_02] [ID tsk_p2_sec_002_01_ac_03]
    test -x scripts/audit/verify_tsk_p2_sec_002_01.sh && bash scripts/audit/verify_tsk_p2_sec_002_01.sh && test -f evidence/phase2/tsk_p2_sec_002_01.json || exit 1
  - >-
    # [ID tsk_p2_sec_002_01_work_item_01] [ID tsk_p2_sec_002_01_work_item_02] [ID tsk_p2_sec_002_01_work_item_03] [ID tsk_p2_sec_002_01_ac_01] [ID tsk_p2_sec_002_01_ac_02] [ID tsk_p2_sec_002_01_ac_03]
    python3 scripts/audit/validate_evidence.py --task TSK-P2-SEC-002-01 --evidence evidence/phase2/tsk_p2_sec_002_01.json || exit 1
  - >-
    # [ID tsk_p2_sec_002_01_work_item_01] [ID tsk_p2_sec_002_01_work_item_02] [ID tsk_p2_sec_002_01_work_item_03] [ID tsk_p2_sec_002_01_ac_01] [ID tsk_p2_sec_002_01_ac_02] [ID tsk_p2_sec_002_01_ac_03]
    bash scripts/dev/pre_ci.sh || exit 1
evidence:
- path: evidence/phase2/tsk_p2_sec_002_01.json
  must_include:
  - task_id
  - git_sha
  - timestamp_utc
  - status
  - checks
  - inv_131_status
  - observed_paths
  - observed_hashes
  - command_outputs
  - execution_trace
failure_modes:
- Live service test fails => CRITICAL_FAIL
- INV-131 not promoted to implemented => FAIL
- Evidence file missing => FAIL
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- docs/operations/TASK_CREATION_PROCESS.md
- docs/invariants/INVARIANTS_MANIFEST.yml
- docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md
implementation_plan: docs/plans/phase2/TSK-P2-SEC-002-01/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-SEC-002-01/EXEC_LOG.md
notes: 'This task blocks TSK-P2-CCG-001-00. Phase Key: PRE-PHASE2. Phase Name: Pre-Phase
  2 Implementation.'
