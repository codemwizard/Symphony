schema_version: 1
phase: '0'
task_id: GF-W1-SCH-003
title: Introduce monitoring_records append-only event ledger so GF monitoring events
  are immutably recorded per tenant
owner_role: DB_FOUNDATION
status: completed
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA
domain: green_finance
pilot: false
intent: The monitoring_records table is the authoritative append-only ledger for all
  Green Finance monitoring events. Without it, no evidence of monitoring activity
  can be captured. The table must prevent UPDATE and DELETE at the privilege level
  to guarantee immutability. This task creates migration 0099 which depends on the
  GF-W1-SCH-002A foundational root tables (projects, methodology_versions).
anti_patterns:
- Granting UPDATE or DELETE on monitoring_records to any runtime role
- Using CREATE TABLE IF NOT EXISTS (masks accidental re-creation of the table)
- Marking completed without negative test evidence of append-only enforcement
out_of_scope:
- Application-layer functions for writing monitoring records (reserved for GF-W1-FNC-002)
- RLS policy changes to any table outside monitoring_records
- Any migration number other than 0099
stop_conditions:
- "If UPDATE or DELETE is grantable to any runtime role on monitoring_records \u2192\
  \ STOP"
- "If CREATE TABLE IF NOT EXISTS appears in the migration SQL \u2192 STOP"
- "If verify_gf_monitoring_records.sh exits 0 on a SQL file containing IF NOT EXISTS\
  \ \u2192 STOP"
proof_guarantees:
- Verifier confirms REVOKE UPDATE/DELETE privilege on monitoring_records for runtime
  roles
- Verifier confirms RLS is enabled with canonical tenant isolation policy
- Sidecar declares monitoring_records as the sole governed identifier for migration
  0099
proof_limitations:
- Verifier cannot test live DB enforcement without a running Postgres instance
- Verifier cannot confirm application layer respects append-only semantics at runtime
depends_on:
- GF-W1-SCH-002A
blocks:
- GF-W1-SCH-004
touches:
- schema/migrations/0099_gf_monitoring_records.sql
- schema/migrations/0099_gf_monitoring_records.meta.yml
- schema/migrations/MIGRATION_HEAD
- scripts/db/verify_gf_monitoring_records.sh
- evidence/phase0/gf_monitoring_records.json
- tasks/GF-W1-SCH-003/meta.yml
invariants:
- INV-SCHEMA-OWNERSHIP-001
- INV-SCHEMA-ORDER-002
- INV-SCHEMA-NO-FORWARD-REF-003
- INV-SCHEMA-OWNERSHIP-MAP-007
- INV-SCHEMA-SIDECAR-SQL-CONSISTENCY-012
work:
- '[ID GF-W1-SCH-003] [ID gf_w1_sch_003_wi01] Create schema/migrations/0099_gf_monitoring_records.sql:
  monitoring_records table with REVOKE UPDATE/DELETE for runtime roles, RLS enabled,
  canonical tenant isolation policy, no IF NOT EXISTS.'
- '[ID GF-W1-SCH-003] [ID gf_w1_sch_003_wi02] Create schema/migrations/0099_gf_monitoring_records.meta.yml
  sidecar declaring monitoring_records and its index as sole introduced identifiers;
  update schema/migrations/MIGRATION_HEAD to 0099.'
- '[ID GF-W1-SCH-003] [ID gf_w1_sch_003_wi01] Create scripts/db/verify_gf_monitoring_records.sh:
  check IF NOT EXISTS rejection, ownership uniqueness, append-only privileges, RLS
  policy, migration head; emit evidence/phase0/gf_monitoring_records.json with run_id.'
acceptance_criteria:
- '[ID GF-W1-SCH-003] [ID gf_w1_sch_003_wi01] verify_gf_monitoring_records.sh exits
  0 and evidence/phase0/gf_monitoring_records.json contains status=PASS with append_only_confirmed=true
  and rls_confirmed=true.'
- '[ID GF-W1-SCH-003] [ID gf_w1_sch_003_wi01] verify_gf_monitoring_records.sh exits
  non-zero when given a SQL file containing CREATE TABLE IF NOT EXISTS monitoring_records.'
- '[ID GF-W1-SCH-003] [ID gf_w1_sch_003_wi02] MIGRATION_HEAD contains 0099 and sidecar
  declares monitoring_records as the sole governed table identifier.'
negative_tests:
- id: GF-W1-SCH-003-N1
  description: SQL file containing CREATE TABLE IF NOT EXISTS monitoring_records must
    cause verify_gf_monitoring_records.sh to exit non-zero with if_not_exists_antipattern
    in the failures array of the evidence JSON.
  required: true
- id: GF-W1-SCH-003-N2
  description: Sidecar declaring monitoring_records in two separate meta.yml files
    must cause the verifier to fail with ownership_not_unique in the failures array.
  required: true
positive_tests:
- id: GF-W1-SCH-003-P1
  description: SQL file using CREATE TABLE monitoring_records (no IF NOT EXISTS) with
    correct REVOKE UPDATE/DELETE grants must cause verify_gf_monitoring_records.sh
    to exit 0.
  required: false
verification:
- '[ID GF-W1-SCH-003] bash scripts/dev/pre_ci.sh | grep -q ''.'' >> evidence/phase1/gf_w1_sch_003.json
  || exit 1'
- '[ID GF-W1-SCH-003] [ID gf_w1_sch_003_wi01] bash scripts/db/verify_gf_monitoring_records.sh
  && test -f evidence/phase0/gf_monitoring_records.json > /dev/null || exit 1'
- '[ID GF-W1-SCH-003] [ID gf_w1_sch_003_wi01] grep -q ''"status"'' evidence/phase0/gf_monitoring_records.json
  > /dev/null || exit 1'
- '[ID GF-W1-SCH-003] [ID gf_w1_sch_003_wi02] python3 scripts/audit/verify_migration_meta_alignment.py
  && grep -q ''0099'' schema/migrations/MIGRATION_HEAD || exit 1'
evidence:
- path: evidence/phase0/gf_monitoring_records.json
  must_include:
  - task_id
  - run_id
  - git_sha
  - timestamp_utc
  - status
  - observed_paths
  - observed_hashes
  - command_outputs
  - execution_trace
  - append_only_confirmed
  - rls_confirmed
  - migration_head_confirmed
  - checks
  - failures
failure_modes:
- "Evidence file missing \u2192 BLOCKED (GF-W1-SCH-004 cannot start)"
- "append_only_confirmed=false in evidence \u2192 CRITICAL_FAIL (monitoring_records\
  \ is mutable)"
- "if_not_exists_antipattern in migration SQL \u2192 FAIL (verifier exits non-zero)"
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
- docs/operations/AGENT_GUARDRAILS_GREEN_FINANCE.md
- docs/plans/phase0/GF-W1-SCH-003/PLAN.md
implementation_plan: docs/plans/phase0/GF-W1-SCH-003/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-SCH-003/EXEC_LOG.md
notes: monitoring_records is the first append-only table in the GF schema chain. Append-only
  is enforced via privilege revocation (no triggers at this phase). Migration 0099
  depends on 0097 (projects) and 0098 (methodology_versions) being applied first per
  DAG order.
client: codex_cli
assigned_agent: db_foundation_agent
model: <UNASSIGNED>
second_pilot_test:
  candidate_sector_1: PWRM0001 plastic waste recovery
  candidate_sector_2: VM0044 solar energy generation
  unchanged_core_tables:
  - projects
  - methodology_versions
  unchanged_core_functions: []
  adapter_only_differences:
  - 'record_type discriminator: PWRM_COLLECTION_EVENT vs SOLAR_GENERATION_READING'
  - record_payload_json schema differs per adapter registration
  jurisdiction_profile_impact: "Not applicable \u2014 monitoring_records uses tenant\
    \ isolation, not jurisdiction isolation. Both sectors share identical table structure."
  required_core_changes: []
  explanation: The monitoring_records table uses a record_type TEXT discriminator
    and record_payload_json JSONB for adapter-specific fields. PWRM0001 plastic collection
    events and VM0044 solar generation readings both fit without any schema change.
    Sector differences are fully contained in the payload and discriminator, which
    are validated against adapter-registered schemas.
  second_pilot_reviewed_by: DB_FOUNDATION
pilot_scope_ref: not_applicable
