    to StateTransition read model with default NonReproducible.
  - >-
    [ID tsk_p2_preauth_006c_03_work_item_04] Add AuditGrade property of type bool to StateTransition
    read model with default false.
  - >-
    [ID tsk_p2_preauth_006c_03_work_item_05] Write verify_tsk_p2_preauth_006c_03.sh that runs grep to verify
    properties exist and have correct types.
  - >-
