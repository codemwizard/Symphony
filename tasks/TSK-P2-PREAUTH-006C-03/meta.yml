priority: HIGH
risk_class: INTEGRITY
blast_radius: APP_LAYER

intent: >-
  This task adds DataAuthority and AuditGrade properties to the AssetBatch and StateTransition
  read models. Without these properties, the C# layer cannot track data authority for these
  entities, creating risk of non-auditable data usage.

anti_patterns:
  - "Adding properties without appropriate defaults"
  - "Using different type than DB column"
  - "Writing the verifier after the code is written"

out_of_scope:
  - "Database schema changes"
  - "Other read model changes"

stop_conditions:
  - "If DataAuthority property is not added to AssetBatch"
  - "If DataAuthority property is not added to StateTransition"
  - "If properties do not have appropriate types"

proof_guarantees:
  - "DataAuthority property exists in AssetBatch read model"
  - "DataAuthority property exists in StateTransition read model"
  - "AuditGrade property exists in both read models"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the properties are semantically correct"
  - "Cannot verify that the properties will work for all use cases"

