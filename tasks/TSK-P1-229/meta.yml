schema_version: 1
phase: '1'
task_id: TSK-P1-229
title: "Implement a report-only parity verifier so task YAML and companion docs cannot silently diverge"
owner_role: SECURITY_GUARDIAN
status: completed
priority: HIGH
risk_class: INTEGRITY
blast_radius: CI_GATES
intent: >-
  After the template and process are hardened, the repo still needs a mechanical way to
  catch divergence between `meta.yml`, companion plan/log docs, and human task index
  registration. This task introduces a report-only parity verifier that emits the shared
  gate result envelope early so later gates can consume one consistent contract instead
  of inventing their own mismatch formats.
anti_patterns:
  - "Treating YAML and human companion docs as independently authoritative sources"
  - "Emitting parity mismatches in ad hoc output shapes that later gates cannot consume"
  - "Promoting later authoring gates before parity drift is mechanically visible"
depends_on:
  - TSK-P1-227
  - TSK-P1-228
  - TSK-P1-224
blocks:
  - TSK-P1-230
  - TSK-P1-231
  - TSK-P1-232
touches:
  - scripts/audit/task_parity_gate.py
  - scripts/audit/verify_tsk_p1_229.sh
  - evidence/phase1/tsk_p1_229_task_parity.json
  - tasks/TSK-P1-229/meta.yml
  - docs/plans/phase1/TSK-P1-229/PLAN.md
  - docs/plans/phase1/TSK-P1-229/EXEC_LOG.md
invariants:
  - INV-105
  - INV-119
work:
  - >-
    Implement a report-only parity gate that compares task intent/objective language,
    verification declarations, evidence declarations, plan/log path declarations, and
    human task index registration for the same task.
  - >-
    Emit parity findings in the shared gate result contract so downstream authoring and
    scope/proof gates can consume one consistent envelope instead of bespoke mismatch
    output.
  - >-
    Add a task-specific verifier that exercises both mismatched and aligned task-pack
    fixtures and emits declared Phase-1 parity evidence.
acceptance_criteria:
  - >-
    Divergence between task YAML and human companion docs is surfaced deterministically
    through one shared gate result shape instead of ad hoc comparison output.
  - >-
    The parity gate compares plan/log/index contract fields that matter for task-pack
    truthfulness rather than limiting itself to superficial path existence checks.
  - >-
    `scripts/audit/verify_tsk_p1_229.sh` exercises mismatched and aligned fixtures and
    emits `evidence/phase1/tsk_p1_229_task_parity.json`.
negative_tests:
  - id: TSK-P1-229-N1
    description: >-
      Run the parity verifier against a task-pack fixture whose `meta.yml` and companion
      docs disagree on verification or evidence declarations and confirm the mismatch is
      surfaced in the shared gate result contract.
    required: true
positive_tests:
  - id: TSK-P1-229-P1
    description: >-
      Run the parity verifier against an aligned fixture task pack and confirm it emits a
      clean structured parity result without mismatch findings.
    required: false
verification:
  - bash scripts/audit/verify_tsk_p1_229.sh
  - python3 scripts/audit/validate_evidence.py --task TSK-P1-229 --evidence evidence/phase1/tsk_p1_229_task_parity.json
  - RUN_PHASE1_GATES=1 bash scripts/dev/pre_ci.sh
evidence:
  - path: evidence/phase1/tsk_p1_229_task_parity.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - gate_result_contract_fields
      - mismatched_fixture_result
      - aligned_fixture_result
      - compared_contract_sections
failure_modes:
  - "Parity verifier allows YAML and human companion docs to diverge silently => FAIL"
  - "Parity output does not conform to the shared gate result contract => BLOCKED"
  - "Evidence file missing => FAIL"
must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - AGENT_ENTRYPOINT.md
  - docs/operations/AGENT_PROMPT_ROUTER.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/reference/rls-anti-drift-wave2-task-plan.md
implementation_plan: docs/plans/phase1/TSK-P1-229/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-229/EXEC_LOG.md
notes: >-
  This gate remains report-only in this wave, but it must already emit the shared gate
  result envelope so later Pack B gates consume one canonical parity signal.
client: cursor
assigned_agent: security_guardian
model: Cascade
