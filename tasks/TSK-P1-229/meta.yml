schema_version: 1
phase: '1'
task_id: TSK-P1-229
title: Implement a report-only parity verifier so task YAML and companion docs cannot
  silently diverge
owner_role: SECURITY_GUARDIAN
status: completed
depends_on:
- TSK-P1-227
- TSK-P1-228
- TSK-P1-224
touches:
- scripts/audit/task_parity_gate.py
- scripts/audit/verify_tsk_p1_229.sh
