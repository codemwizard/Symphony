schema_version: 1
phase: '1'
task_id: TSK-P1-PLT-004
title: "Map Monitoring ReadModel to UI and implement ZEMA Export trigger"
owner_role: ARCHITECT
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: APP_LAYER
intent: >-
  The Monitoring Report UI has three structural mismatches with the backend ReadModel:
  nested Article 6 compliance flags, dictionary-based plastic totals, and a missing 
  Export artifact trigger. This task aligns these schemas and wires the 'GENERATE'
  button to the reporting pack script.
anti_patterns:
  - "Hardcoding the ZEMA compliance chips in the HTML."
  - "Serving raw weights without units or type mappings."
out_of_scope:
  - "Modifying the generate_programme_reporting_pack.sh script itself."
stop_conditions:
  - "If the 'GENERATE' button remains disabled or fails to trigger the export shim."
proof_guarantees:
  - "Verification confirms that the Export shim returns 201 Created and artifact URLs."
proof_limitations:
  - "The PDF artifact produced is a placeholder format per the script's current state."
depends_on:
  - TSK-P1-PLT-001
touches:
  - services/ledger-api/dotnet/src/LedgerApi/Program.cs
  - src/symphony-pilot/monitoring-report.html
  - tasks/TSK-P1-PLT-004/meta.yml
invariants:
  - INV-GOV-PILOT-004
work:
  - "[ID TSK-P1-PLT-004_work_item_01] Implement the JSON mapping in Program.cs to flatten zgft_waste_sector_alignment."
  - "[ID TSK-P1-PLT-004_work_item_02] Implement GET /pilot-demo/api/monitoring-report/{programId}/export shim in Program.cs."
  - "[ID TSK-P1-PLT-004_work_item_03] Update monitoring-report.html to call the Export shim and display artifact links."
acceptance_criteria:
  - "[ID TSK-P1-PLT-004_work_item_01] UI chips for 'Pollution' and 'Circular' turn green when ReadModel returns true."
  - "[ID TSK-P1-PLT-004_work_item_02] Export shim triggers the bash script and returns artifact paths."
negative_tests:
  - id: TSK-P1-PLT-004-N1
    description: "Exporting for a non-existent programme must return 404."
    required: true
verification:
  - "# [ID TSK-P1-PLT-004_work_item_02] curl -i http://localhost:5242/pilot-demo/api/monitoring-report/PGM-ZAMBIA-GRN-001/export -H 'Cookie: symphony_pilot_demo_operator=VALID' | grep '200 OK' || exit 1"
evidence:
  - path: evidence/phase1/tsk_p1_plt_004.json
    must_include:
      - task_id
      - git_sha
      - status
      - checks
failure_modes:
  - "Export script fails silently => FAIL"
  - "UI fails to map the nested JSON => FAIL"
must_read:
  - services/ledger-api/dotnet/src/LedgerApi/ReadModels/Pwrm0001MonitoringReportHandler.cs
  - scripts/dev/generate_programme_reporting_pack.sh
implementation_plan: docs/plans/phase1/TSK-P1-PLT-004/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-PLT-004/EXEC_LOG.md
notes: This task aligns the monitoring report UI with the backend ReadModel structure. The export trigger is a shim that calls the existing bash script rather than reimplementing PDF generation logic.
client: cursor
assigned_agent: architect
model: <UNASSIGNED>
