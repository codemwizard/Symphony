    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

# ── Database Connection ────────────────────────────────────────────────────
database_connection:
  enabled: true
  connection_string_format: "postgresql://<user>:<password>@<host>:<port>/<database>"
  example_connection_string: "postgresql://symphony_admin:symphony_pass@localhost:5432/symphony"
  container_name: symphony-postgres
  database_url_env_var: DATABASE_URL
  setup_command: "export DATABASE_URL=\"postgresql://symphony_admin:symphony_pass@localhost:5432/symphony\""

# ── Migration Dependencies ─────────────────────────────────────────────────
migration_dependencies:
  enabled: true
  required_migrations:
    - "0139": "enforce_transition_state_rules() with RAISE statements"
    - "0140": "enforce_transition_authority() with RAISE statements"
    - "0141": "enforce_transition_signature() with RAISE statements"
    - "0142": "enforce_execution_binding() with RAISE statements"
    - "0143": "deny_state_transitions_mutation() with RAISE statements"
    - "0151": "NOT NULL verify (FIX-07)"
  table_dependencies:
    - "state_transitions": "must exist with all trigger functions"
  verification_step: "Confirm all referenced tables exist in earlier migrations"


work:
  - >-
    [ID w5_fix_08_work_01] Audit all RAISE EXCEPTION statements in the 6
    trigger functions. Record each one with its current (default) SQLSTATE.
  - >-
    [ID w5_fix_08_work_02] Write migration
    0152_add_sqlstate_codes_to_triggers.sql: CREATE OR REPLACE all functions
    with RAISE EXCEPTION ... USING ERRCODE = 'GFxxx'. Codes must use the
    GF prefix (class GF for Green Finance) in the user-definable range.
  - >-
    [ID w5_fix_08_work_03] Update MIGRATION_HEAD to 0152.
  - >-
    [ID w5_fix_08_work_04] Write verification script: Trigger each exception
    path and verify the returned SQLSTATE matches the declared code.
  - >-
    [ID w5_fix_08_work_05] Run verification and generate evidence.
  - >-
    [ID w5_fix_08_work_06] Post-implementation governance — Steps 9-13.
  - >-
    [ID w5_fix_08_work_07] Update EXEC_LOG.md with final remediation trace.

acceptance_criteria:
  - >-
    [ID w5_fix_08_work_01] EXEC_LOG documents all RAISE statements and
    default P0001 codes before fix.
  - >-
    [ID w5_fix_08_work_02] All RAISE statements include USING ERRCODE
    with GF-prefixed codes after migration.
  - >-
    [ID w5_fix_08_work_03] MIGRATION_HEAD contains '0152'.
  - >-
    [ID w5_fix_08_work_04] [ID w5_fix_08_work_05] Verification exits 0.
  - >-
    [ID w5_fix_08_work_06] Governance docs updated, baseline regenerated.
  - >-
    [ID w5_fix_08_work_07] EXEC_LOG remediation trace complete.

negative_tests:
