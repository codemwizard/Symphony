    description: >-
      AFTER fix: Trigger an authority violation and verify SQLSTATE returned
      is the declared GF code, NOT default P0001.
    required: true

positive_tests:
  - id: TSK-P2-W5-FIX-08-P1
    description: >-
      AFTER fix: Valid INSERT still succeeds without SQLSTATE errors.
    required: true

verification:
