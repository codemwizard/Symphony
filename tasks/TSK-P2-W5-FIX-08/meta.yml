schema_version: 1
phase: '2'
task_id: TSK-P2-W5-FIX-08
title: "Add explicit SQLSTATE codes to all Wave 5 trigger RAISE EXCEPTION statements"
owner_role: DB_FOUNDATION
status: planned
priority: NORMAL
risk_class: GOVERNANCE
blast_radius: DB_SCHEMA

intent: >-
  All RAISE EXCEPTION statements in Wave 5 triggers use the default generic
  SQLSTATE P0001 (raise_exception). The state machine contract requires
  GF-coded SQLSTATE values that allow the application layer to distinguish
  between different failure types (e.g., authority violation vs state rule
  violation vs hash uniqueness violation). Without explicit codes, the
  application layer must parse exception message text — which is fragile
  and non-deterministic across locales.

anti_patterns:
  - "Using SQLSTATE codes that collide with PostgreSQL built-in codes"
  - "Editing existing migration files"
  - "Changing exception message text — only adding USING ERRCODE"

out_of_scope:
  - "Defining the full SQLSTATE registry (that's a Wave 6 design task)"
  - "Application layer error handling"
stop_conditions:
  - "SQLSTATE codes collide with PostgreSQL reserved ranges"
  - "Exception message text changed"

proof_guarantees:
  - "All RAISE EXCEPTION statements include USING ERRCODE"
  - "SQLSTATE codes are documented in EXEC_LOG.md"
proof_limitations:
  - "Does not prove application layer correctly handles codes"
  - "Does not prove codes are registered in a central sqlstate_map"

depends_on:
  - TSK-P2-W5-FIX-07

blocks:
  - TSK-P2-W5-FIX-09

touches:
  - schema/migrations/0152_add_sqlstate_codes_to_triggers.sql
  - schema/migrations/MIGRATION_HEAD
  - scripts/db/verify_tsk_p2_w5_fix_08.sh
  - evidence/phase2/tsk_p2_w5_fix_08.json
  - tasks/TSK-P2-W5-FIX-08/meta.yml
  - docs/plans/phase2/TSK-P2-W5-FIX-08/PLAN.md
  - docs/plans/phase2/TSK-P2-W5-FIX-08/EXEC_LOG.md
  - docs/architecture/THREAT_MODEL.md
  - docs/architecture/COMPLIANCE_MAP.md
  - schema/baseline.sql
  - schema/baselines/current/0001_baseline.sql
  - schema/baselines/current/baseline.cutoff
  - schema/baselines/current/baseline.meta.json
  - docs/decisions/ADR-0010-baseline-policy.md
  - evidence/phase0/baseline_drift.json
