- Create a strict start-now checklist that gives operators a go or no-go sequence for beginning host-based demo deployment in rehearsal-only mode.
- Separate start conditions from full-demo signoff conditions so operators can begin end-to-end testing without misclassifying the run.
- Define exact stop conditions, continuation conditions, and result classification for deployment start, health, onboarding, smoke, rehearsal, and browser checks.
