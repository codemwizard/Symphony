schema_version: 1
phase: '2'
task_id: TSK-P2-GOV-CONV-009
title: "Verify Phase-2 human and machine contract alignment"
owner_role: SECURITY_GUARDIAN
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: CI_GATES

intent: >-
  After the Phase-2 human contract document exists, the repository needs a
  deterministic check that it does not drift away from the machine contract. This
  task creates only the alignment verifier and its evidence. It prevents
  anti-hallucination failures by rejecting human-readable delivery claims that are
  not backed by machine contract rows.

anti_patterns:
  - >-
    Treating the existence of PHASE2_CONTRACT.md as proof that it aligns with the
    machine contract.
  - >-
    Using shallow string greps that cannot detect unsupported invariant or delivery
    claims.
  - >-
    Modifying the human contract or machine contract in the same task as creating
    the alignment verifier.

out_of_scope:
  - Editing docs/PHASE2/PHASE2_CONTRACT.md
  - Editing docs/PHASE2/phase2_contract.yml
  - Editing scripts/audit/verify_phase2_contract.sh
  - Wiring this verifier into CI or pre_ci
  - Creating Phase-2 policy or ratification artifacts

stop_conditions:
  - >-
    STOP if TSK-P2-GOV-CONV-008 is incomplete or docs/PHASE2/PHASE2_CONTRACT.md
    does not exist.
  - >-
    STOP if TSK-P2-GOV-CONV-006 is incomplete or scripts/audit/verify_phase2_contract.sh
    does not exist.
  - >-
    STOP if the verifier cannot distinguish explanatory prose from delivery-claim
    sections.
  - >-
    STOP if approval metadata is absent before editing scripts/audit/** or evidence/**.

proof_guarantees:
  - >-
    The verifier rejects human contract delivery claims whose invariant IDs are absent
    from docs/PHASE2/phase2_contract.yml.
  - >-
    The verifier rejects a human contract that omits required machine authority
    references.
  - >-
    Evidence records extracted human claims, machine contract rows, and unsupported
    claims.

proof_limitations:
  - >-
    This task does not prove all prose is semantically equivalent to the machine
    contract.
  - >-
    This task does not modify either contract document.
  - >-
    This task does not wire the verifier into local or CI gates.

depends_on:
  - TSK-P2-GOV-CONV-006
  - TSK-P2-GOV-CONV-008
blocks:
  - TSK-P2-GOV-CONV-012

touches:
  - scripts/audit/verify_gov_conv_009.sh
  - evidence/phase2/gov_conv_009_human_machine_contract_alignment.json
  - tasks/TSK-P2-GOV-CONV-009/meta.yml
  - docs/plans/phase2/TSK-P2-GOV-CONV-009/PLAN.md
  - docs/plans/phase2/TSK-P2-GOV-CONV-009/EXEC_LOG.md

deliverable_files:
  - scripts/audit/verify_gov_conv_009.sh
  - evidence/phase2/gov_conv_009_human_machine_contract_alignment.json
  - docs/plans/phase2/TSK-P2-GOV-CONV-009/PLAN.md
  - docs/plans/phase2/TSK-P2-GOV-CONV-009/EXEC_LOG.md

invariants:
  - INV-GOV-CONV-009

regulated_surface_compliance:
  enabled: true
  approval_workflow: stage_a_stage_b
  stage_a_required_before_edit: true
  regulated_paths:
    - scripts/audit/verify_gov_conv_009.sh
    - evidence/phase2/gov_conv_009_human_machine_contract_alignment.json
  must_read:
    - docs/operations/REGULATED_SURFACE_PATHS.yml
    - docs/operations/approval_metadata.schema.json

remediation_trace_compliance:
  enabled: true
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

work:
  - >-
    [ID gov_conv_009_w01] Create scripts/audit/verify_gov_conv_009.sh to parse
    docs/PHASE2/phase2_contract.yml and extract machine contract invariant IDs and
    required rows.
  - >-
    [ID gov_conv_009_w02] Inspect docs/PHASE2/PHASE2_CONTRACT.md for delivery-claim
    invariant references and required authority statements.
  - >-
    [ID gov_conv_009_w03] Reject unsupported human delivery claims, missing machine
    authority statement, missing verifier reference, and missing evidence reference.
  - >-
    [ID gov_conv_009_w04] Add negative fixture coverage for unsupported invariant
    claim, missing authority statement, and missing verifier reference.
  - >-
    [ID gov_conv_009_w05] Emit evidence/phase2/gov_conv_009_human_machine_contract_alignment.json
    with machine_invariants, human_claims, unsupported_claims, missing_references,
    and alignment_status.

acceptance_criteria:
  - >-
    [ID gov_conv_009_w01] The verifier extracts machine invariant IDs from structured
    phase2_contract.yml rather than relying only on raw grep.
  - >-
    [ID gov_conv_009_w02] The verifier identifies human delivery-claim invariant
    references and required authority references.
  - >-
    [ID gov_conv_009_w03] The verifier exits non-zero for unsupported human claims
    or missing authority/verifier/evidence references.
  - >-
    [ID gov_conv_009_w04] Each negative fixture exits non-zero for the expected reason.
  - >-
    [ID gov_conv_009_w05] Evidence records unsupported_claims: [] and
    alignment_status: PASS on the live repository.

negative_tests:
  - id: TSK-P2-GOV-CONV-009-N1
    description: >-
      Run the verifier against a fixture PHASE2_CONTRACT.md containing an invariant
      claim absent from phase2_contract.yml. It must exit non-zero and report the
      unsupported claim.
    required: true
  - id: TSK-P2-GOV-CONV-009-N2
    description: >-
      Run the verifier against a fixture PHASE2_CONTRACT.md that omits the machine
      contract authority statement. It must exit non-zero.
    required: true
  - id: TSK-P2-GOV-CONV-009-N3
    description: >-
      Run the verifier against a fixture PHASE2_CONTRACT.md that omits the
      verify_phase2_contract.sh reference. It must exit non-zero.
    required: true

positive_tests:
  - id: TSK-P2-GOV-CONV-009-P1
    description: >-
      Run the verifier against the live Phase-2 human and machine contract files.
      It must emit PASS evidence with unsupported_claims empty.
    required: true

verification:
  - >-
    # [ID gov_conv_009_w01] [ID gov_conv_009_w02] [ID gov_conv_009_w03] [ID gov_conv_009_w04] [ID gov_conv_009_w05]
    test -x scripts/audit/verify_gov_conv_009.sh && bash scripts/audit/verify_gov_conv_009.sh > evidence/phase2/gov_conv_009_human_machine_contract_alignment.json || exit 1
  - >-
    python3 scripts/audit/validate_evidence.py --task TSK-P2-GOV-CONV-009 --evidence evidence/phase2/gov_conv_009_human_machine_contract_alignment.json || exit 1
  - >-
    RUN_PHASE2_GATES=1 bash scripts/dev/pre_ci.sh || exit 1

evidence:
  - path: evidence/phase2/gov_conv_009_human_machine_contract_alignment.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - machine_invariants
      - human_claims
      - unsupported_claims
      - missing_references
      - alignment_status

failure_modes:
  - >-
    Human contract claim absent from machine contract exits 0 => CRITICAL_FAIL
  - >-
    Verifier relies on shallow grep and cannot distinguish supported and unsupported
    claims => CRITICAL_FAIL
  - >-
    Missing authority or verifier references are accepted => FAIL
  - >-
    Evidence file missing => FAIL

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/operations/TASK_AUTHORING_STANDARD_v2.md
  - docs/operations/PHASE_LIFECYCLE.md
  - docs/PHASE2/phase2_contract.yml
  - docs/PHASE2/PHASE2_CONTRACT.md

implementation_plan: docs/plans/phase2/TSK-P2-GOV-CONV-009/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-GOV-CONV-009/EXEC_LOG.md
notes: >-
  This verifier is intentionally separate from document authoring. If it finds
  misalignment, a separate narrowly scoped fix task must update the offending
  document rather than expanding this verifier task.
client: codex_cli
assigned_agent: security_guardian
model: UNASSIGNED