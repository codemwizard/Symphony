schema_version: 1
phase: '1'
task_id: GF-W1-UI-001
title: Delete symphony_ui and establish clean CSS baseline
owner_role: SUPERVISOR
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: APP_LAYER
intent: Establish the canonical CSS design system for all Symphony UI work by ensuring the :root block in the supervisory
  dashboard contains exactly the tokens defined in the steering file, delete the abandoned symphony_ui/ directory, and confirm
  no viewport-level scrollbar exists.
anti_patterns:
- Creating new CSS files or React components instead of editing the two canonical HTML files
- Overriding or extending the CSS token set beyond what the steering file defines
- Referencing symphony_ui/ directory or any file from it
out_of_scope:
- Backend API changes — no routes modified
- JavaScript logic changes — only CSS tokens in this task
- Tab layout or content — handled by GF-W1-UI-002+
- Recipient landing page — handled by GF-W1-UI-008
stop_conditions:
- symphony_ui/ directory still exists after this task => CRITICAL_FAIL
- Any CSS token from the steering file missing from :root => FAIL
- Viewport-level scrollbar visible => FAIL
- Any node in the proof graph is orphaned => STOP
proof_guarantees:
- grep verifies all 17 CSS tokens are present in :root block
- test ! -d symphony_ui confirms directory deletion
- grep verifies overflow:hidden on html/body
proof_limitations:
- grep checks token names but not exact values — a token with wrong hex value would pass
- overflow:hidden check is text-based — does not verify runtime rendering
depends_on:
- pilot-demo-seeding-fix
blocks:
- GF-W1-UI-002
- GF-W1-UI-008
touches:
- src/supervisory-dashboard/index.html
- tasks/GF-W1-UI-001/meta.yml
- evidence/phase1/gf_w1_ui_001.json
invariants:
- INV-GF-UI-001
work:
- '[ID gf_w1_ui_001_work_01] Delete the directory symphony_ui/ entirely — it will not be used.'
- '[ID gf_w1_ui_001_work_02] In src/supervisory-dashboard/index.html, locate the :root { } CSS block and ensure it contains
  exactly the tokens from the steering file: --bg, --surface, --panel, --border, --gold, --gold-lt, --bright, --dim, --red,
  --red-lt, --amber, --amber-lt, --cream, --smoke, --mono, --serif, --body. Add any missing tokens verbatim.'
- '[ID gf_w1_ui_001_work_03] Confirm html and body have overflow: hidden so the page never scrolls at viewport level.'
acceptance_criteria:
- '[ID gf_w1_ui_001_work_01] symphony_ui/ directory does not exist. No file in the repository references symphony_ui/ as an
  import or path.'
- '[ID gf_w1_ui_001_work_02] src/supervisory-dashboard/index.html :root block contains all 17 CSS tokens from .kiro/steering/ui-canonical-design.md
  with exact hex values: --bg:#050c08, --surface:#0a1a0d, --panel:#0d1f10, etc.'
- '[ID gf_w1_ui_001_work_03] html and body elements have overflow:hidden. No viewport-level scrollbar visible. Background
  colour is #050c08.'
negative_tests:
- id: GF-W1-UI-001-N1
  description: Grep for any reference to symphony_ui/ in the codebase. The grep must find zero matches. If any reference remains,
    the test fails => FAIL.
  required: true
positive_tests:
- id: GF-W1-UI-001-P1
  description: Grep src/supervisory-dashboard/index.html for all 17 CSS token names in the :root block. All 17 must be present.
  required: true
verification:
- '# [ID gf_w1_ui_001_work_01] [ID gf_w1_ui_001_work_02] [ID gf_w1_ui_001_work_03] test ! -d symphony_ui && grep -q "\-\-bg"
  src/supervisory-dashboard/index.html && grep -q "\-\-bright" src/supervisory-dashboard/index.html && grep -q "overflow.*hidden"
  src/supervisory-dashboard/index.html && cat src/supervisory-dashboard/index.html | grep "\-\-body" > evidence/phase1/gf_w1_ui_001.json
  || exit 1'
- '# [ID gf_w1_ui_001_work_01] test -z "$(grep -r ''symphony_ui'' src/ .kiro/ || true)" || exit 1'
evidence:
- path: evidence/phase1/gf_w1_ui_001.json
  must_include:
  - task_id
  - git_sha
  - timestamp_utc
  - status
  - checks
  - observed_paths
  - observed_hashes
  - command_outputs
  - execution_trace
  - css_tokens_verified
failure_modes:
- symphony_ui/ directory still exists => CRITICAL_FAIL
- Any of the 17 CSS tokens missing from :root => FAIL
- Viewport scrollbar visible => FAIL
- Evidence file missing => FAIL
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- .kiro/steering/ui-canonical-design.md
- .kiro/steering/pwrm0001-domain-rules.md
- .kiro/steering/symphony-platform-conventions.md
- .kiro/specs/symphony-ui-canonical/requirements.md
- .kiro/specs/symphony-ui-canonical/design.md
- .kiro/specs/symphony-ui-canonical/tasks.md
- docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
implementation_plan: docs/plans/phase1/GF-W1-UI-001/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-UI-001/EXEC_LOG.md
