work:
  - >-
    [ID w8_gov_001_work_01] Produce a governance remediation ADR that states Wave 8 completion is measured only at the authoritative `asset_batches` boundary and that contract documents outrank implementation drift.
  - >-
    [ID w8_gov_001_work_02] Create a corrected Wave 8 task status matrix and false-completion revocation ledger that classify existing `TSK-P2-REG-*` and legacy `TSK-P2-W8-CRYPTO-*` artifacts as scaffold, partial, or true-complete with evidence basis.
  - >-
    [ID w8_gov_001_work_03] Create a migration-head truth table and authoritative Wave 8 closure rubric that bind future task creation to the approved DoD control surface.
  - >-
    [ID w8_gov_001_work_04] Produce a proof-integrity threat register, evidence admissibility policy, and false-completion pattern catalog that explicitly ban detached function proof, grep proof, reflection-only surface proof, toy-crypto proof, garbage-payload matrix fraud, fake crypto behind real trigger wiring, superuser-only success, and mirrored-vector fraud.
  - >-
    [ID w8_gov_001_work_05] Register the governance artifacts in the Phase 2 task index and execution log, and explicitly mark old `TSK-P2-W8-DB-007` as superseded by `007a/007b/007c`.

acceptance_criteria:
  - >-
    [ID w8_gov_001_work_01] A governance ADR exists and explicitly states that contracts define Wave 8 semantics while SQL executes them at the `asset_batches` boundary.
  - >-
    [ID w8_gov_001_work_02] The corrected status matrix and revocation ledger classify the legacy Wave 8 artifacts using evidence-backed categories rather than inherited status text.
  - >-
    [ID w8_gov_001_work_03] The migration-head truth table and closure rubric explicitly name `asset_batches` as the sole authoritative Wave 8 boundary.
  - >-
    [ID w8_gov_001_work_04] The threat register, evidence admissibility policy, and false-completion pattern catalog exist and explicitly ban the named inadmissible proof patterns.
  - >-
    [ID w8_gov_001_work_05] The Phase 2 index references the Wave 8 closure track and governance artifacts explicitly state that unsplit `W8-DB-007` is non-executable for closure.

negative_tests:
  - id: TSK-P2-W8-GOV-001-N1
    description: >-
      Verifier fails if any governance artifact is missing, if the closure rubric
      does not explicitly name `asset_batches`, or if inadmissible proof
      patterns are not named explicitly.
    required: true

positive_tests:
  - id: TSK-P2-W8-GOV-001-P1
    description: >-
      Verifier passes only when the governance ADR, status matrix, revocation
      ledger, migration-head truth table, closure rubric, threat register,
      evidence admissibility policy, false-completion pattern catalog, and index
      update all exist and align.
    required: true

verification:
  - '# [ID w8_gov_001_work_01] [ID w8_gov_001_work_02] [ID w8_gov_001_work_03] [ID w8_gov_001_work_04] [ID w8_gov_001_work_05] test -e scripts/agent/verify_tsk_p2_w8_gov_001.py && python3 scripts/agent/verify_tsk_p2_w8_gov_001.py > evidence/phase2/tsk_p2_w8_gov_001.json || exit 1'
  - 'bash scripts/audit/verify_task_pack_readiness.sh --task TSK-P2-W8-GOV-001'
  - 'python3 scripts/audit/validate_evidence.py --task TSK-P2-W8-GOV-001 --evidence evidence/phase2/tsk_p2_w8_gov_001.json'

