work:
- Add explicit authn and authz enforcement for all /v1/admin/supervisor/* routes in server.py.
- Read ADMIN_API_KEY from environment in server.py and validate it on privileged routes using a constant-time comparison.
- Move audit-record token transport from query-string token input to HTTP authorization header transport and reject query tokens.
- Harden malformed JSON and ttl_seconds parsing to deterministic 4xx responses and remove raw DB exception detail reflection.
- Upgrade the HIER-011 verifier to assert the hardened auth contract and the new token transport.
acceptance_criteria:
- No privileged supervisor route is callable without explicit authn/authz.
- Audit-record token retrieval no longer accepts query-string tokens.
- Malformed body and TTL failures return deterministic 4xx responses.
- Approval failures no longer reflect raw DB exception text.
