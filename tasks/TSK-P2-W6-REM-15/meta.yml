  - evidence/phase2/tsk_p2_w6_rem_15.json
  - tasks/TSK-P2-W6-REM-15/meta.yml

invariants:
  - INV-STATE-MACHINE-INTEGRITY

work:
  - >-
    Author a forward-only database migration 0155 that CREATE OR REPLACEs the trigger function enforce_k13_taxonomy_alignment() to raise GF061 instead of GF060.
  - >-
    Author a verification script that inspects the source code of the trigger function to verify it contains GF061.
  - >-
    Include a raw negative test in the verifier demonstrating a direct UPDATE to projects raising GF061.

acceptance_criteria:
  - >-
    The source code of enforce_k13_taxonomy_alignment() must contain 'GF061'.
  - >-
    A direct UPDATE to projects raises GF061.

negative_tests:
