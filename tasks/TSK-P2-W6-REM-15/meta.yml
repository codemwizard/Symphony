schema_version: 1
phase: '2'
task_id: TSK-P2-W6-REM-15
title: "Reassign K13 SQLSTATE from GF060 to GF061 to protect the P76xx series and prevent collision with legacy code"
owner_role: DB Foundation
status: completed
priority: HIGH
risk_class: REGISTRY
blast_radius: DB_SCHEMA

intent: >-
  The K13 exception code was mistakenly assigned GF060, colliding with existing GF060 infrastructure. 
  This migration reassigns it to GF061 to protect the P76xx SQLSTATE series and cleanly separate the authority subsystem from the hardening subsystem.

anti_patterns:
  - "Changing the exception code in 0151 (mutating past migration)"
  - "Updating the trigger without asserting its orientation (FOR EACH ROW vs STATEMENT)"

out_of_scope:
  - "Migrating legacy data that might have triggered GF060"

stop_conditions:
  - "Trigger does not exist or has an unexpected definition"

proof_guarantees:
  - "The trigger correctly raises GF061 when an illegal projects mutation is attempted"

proof_limitations:
  - "Cannot prove no application code hardcodes GF060"

depends_on:
  - TSK-P2-W6-REM-14

blocks:
  - TSK-P2-W6-REM-16b

touches:
  - schema/migrations/0155_reassign_k13_sqlstate_gf061.sql
