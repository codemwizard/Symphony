  - "If migration 0134 does not create policy_decisions table with 11 columns"
  - "If required constraints are missing (FK, UNIQUE, 2 CHECK, append-only trigger)"
  - "If required indexes are missing (idx_policy_decisions_entity, idx_policy_decisions_declared_by)"

proof_guarantees:
  - "Migration 0134 creates policy_decisions table with 11 columns"
  - "All 5 constraints present (PK, FK, UNIQUE, 2 CHECK)"
  - "Append-only trigger with SECURITY DEFINER and pinned search_path"
  - "2 indexes present (idx_policy_decisions_entity, idx_policy_decisions_declared_by)"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the table structure is optimal for all use cases"
  - "Cannot verify that the table will perform well at scale"

