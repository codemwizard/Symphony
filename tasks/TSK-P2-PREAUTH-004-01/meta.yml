invariants:
  - INV-138

work:
  - >-
    [ID tsk_p2_preauth_004_01_work_item_01] Migration 0134 creates policy_decisions table with 11 columns:
    policy_decision_id UUID NOT NULL DEFAULT gen_random_uuid(), execution_id UUID NOT NULL,
    decision_type TEXT NOT NULL, authority_scope TEXT NOT NULL, declared_by UUID NOT NULL,
    entity_type TEXT NOT NULL, entity_id UUID NOT NULL, decision_hash TEXT NOT NULL,
    signature TEXT NOT NULL, signed_at TIMESTAMPTZ NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT now().
  - >-
    [ID tsk_p2_preauth_004_01_work_item_02] Migration 0134 creates 5 constraints:
    policy_decisions_pk (PRIMARY KEY), policy_decisions_fk_execution (FK to execution_records),
    policy_decisions_unique_exec_type (UNIQUE), policy_decisions_hash_hex_64 (CHECK on decision_hash),
    policy_decisions_sig_hex_128 (CHECK on signature).
  - >-
    [ID tsk_p2_preauth_004_01_work_item_03] Migration 0134 creates 2 indexes:
    idx_policy_decisions_entity (entity_type, entity_id), idx_policy_decisions_declared_by (declared_by).
  - >-
    [ID tsk_p2_preauth_004_01_work_item_04] Migration 0134 creates append-only trigger
    policy_decisions_append_only_trigger with function enforce_policy_decisions_append_only()
    having SECURITY DEFINER and pinned search_path.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_004_01_work_item_01] Migration 0134 creates policy_decisions table with all 11 columns.
  - >-
    [ID tsk_p2_preauth_004_01_work_item_02] Migration 0134 creates all 5 constraints (PK, FK, UNIQUE, 2 CHECK).
  - >-
    [ID tsk_p2_preauth_004_01_work_item_03] Migration 0134 creates 2 indexes.
  - >-
    [ID tsk_p2_preauth_004_01_work_item_04] Migration 0134 creates append-only trigger with SECURITY DEFINER and pinned search_path.

