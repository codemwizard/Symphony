intent: >-
  This task creates the policy_decisions table to track policy decisions with cryptographic binding.
  The table is append-only with 11 columns, 5 constraints, and 2 indexes per migration 0134.
  This task was remediated by TSK-P2-PREAUTH-004-01-REM to align with the hardened 0134 contract.

anti_patterns:
  - "Creating the table without required indexes"
  - "Writing the migration without touching MIGRATION_HEAD"
  - "Writing the verifier after the migration is applied"

