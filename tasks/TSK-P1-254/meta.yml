  - '[ID tsk_p1_254_work_item_02] Files such as stale signed evidence and legacy runtime-only payloads are no longer rewritten solely to remove live values or removed fields.'
  - '[ID tsk_p1_254_work_item_03] bash scripts/audit/verify_tsk_p1_254.sh reports zero stale deterministic evidence files remaining.'
