  - '[ID tsk_p1_254_work_item_04] test -f evidence/phase1/tsk_p1_254_evidence_rebaseline.json && cat evidence/phase1/tsk_p1_254_evidence_rebaseline.json | tee /tmp/tsk_p1_254_evidence.log >/dev/null || exit 1'
  - '[ID tsk_p1_254_work_item_04] test -f evidence/phase1/tsk_p1_254_evidence_rebaseline.json && python3 scripts/audit/validate_evidence.py --task TSK-P1-254 --evidence evidence/phase1/tsk_p1_254_evidence_rebaseline.json || exit 1'
  - '[ID tsk_p1_254_work_item_01] [ID tsk_p1_254_work_item_02] [ID tsk_p1_254_work_item_03] test -x scripts/dev/pre_ci.sh && RUN_PHASE1_GATES=1 bash scripts/dev/pre_ci.sh || exit 1'
