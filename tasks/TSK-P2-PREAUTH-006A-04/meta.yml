schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-006A-04
title: "Add data_authority columns to state_transitions"
owner_role: DB_FOUNDATION
status: completed
priority: HIGH
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  This task adds data_authority, audit_grade, and authority_explanation columns to state_transitions
  table with default 'non_reproducible'. Without these columns, the system cannot track data
  authority for state transitions, creating risk of non-auditable state changes.

anti_patterns:
  - "Adding columns without appropriate defaults"
  - "Writing the migration without touching MIGRATION_HEAD"
  - "Writing the verifier after the migration is applied"

out_of_scope:
  - "Trigger implementation (deferred to TSK-P2-PREAUTH-006B)"
  - "Application layer changes"

stop_conditions:
  - "If migration does not add data_authority column"
  - "If default is not 'non_reproducible'"
  - "If MIGRATION_HEAD is not updated to 0121"

proof_guarantees:
  - "Migration adds data_authority, audit_grade, and authority_explanation columns"
  - "Default is 'non_reproducible' for data_authority"
  - "MIGRATION_HEAD contains 0121"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the defaults are semantically correct for all existing data"
  - "Cannot verify that the columns will perform well at scale"

depends_on:
  - TSK-P2-PREAUTH-006A-03
blocks:
  - TSK-P2-PREAUTH-006B-00

touches:
  - schema/migrations/0121_create_data_authority_enum.sql
  - schema/migrations/MIGRATION_HEAD
  - scripts/db/verify_tsk_p2_preauth_006a_04.sh
  - tasks/TSK-P2-PREAUTH-006A-04/meta.yml

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_01] Add columns to migration 0121: ALTER TABLE state_transitions
    ADD COLUMN data_authority public.data_authority_level NOT NULL DEFAULT 'non_reproducible',
    ADD COLUMN audit_grade BOOLEAN NOT NULL DEFAULT false, ADD COLUMN authority_explanation TEXT NOT NULL
    DEFAULT 'No execution context recorded'.
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_02] Update existing data: UPDATE state_transitions SET
    data_authority='non_reproducible' WHERE data_authority IS DISTINCT FROM 'non_reproducible'.
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_03] Update MIGRATION_HEAD to 0121: echo 0121 > schema/migrations/MIGRATION_HEAD.
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_04] Write verify_tsk_p2_preauth_006a_04.sh that runs psql to verify
    columns exist and have appropriate defaults.
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_05] Run verify_tsk_p2_preauth_006a_04.sh to confirm migration is successful.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_01] Migration adds data_authority, audit_grade, and authority_explanation columns.
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_01] Default is 'non_reproducible' for data_authority.
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_02] Existing data is updated with appropriate defaults.
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_03] MIGRATION_HEAD contains 0121.
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_04] verify_tsk_p2_preauth_006a_04.sh exists and checks for columns.
  - >-
    [ID tsk_p2_preauth_006a_04_work_item_05] verify_tsk_p2_preauth_006a_04.sh exits 0.

negative_tests:
  - id: TSK-P2-PREAUTH-006A-04-N1
    description: >-
      Verify that verify_tsk_p2_preauth_006a_04.sh exits non-zero when data_authority column does not exist.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-006A-04-P1
    description: >-
      Verify that verify_tsk_p2_preauth_006a_04.sh exits 0 when columns exist with appropriate defaults.
    required: false

verification:
  - >-
    # [ID tsk_p2_preauth_006a_04_work_item_01] [ID tsk_p2_preauth_006a_04_work_item_02]
    # [ID tsk_p2_preauth_006a_04_work_item_03] [ID tsk_p2_preauth_006a_04_work_item_04]
    # [ID tsk_p2_preauth_006a_04_work_item_05]
    test -x scripts/db/verify_tsk_p2_preauth_006a_04.sh && bash scripts/db/verify_tsk_p2_preauth_006a_04.sh > evidence/phase2/tsk_p2_preauth_006a_04.json || exit 1
  - >-
    # [ID tsk_p2_preauth_006a_04_work_item_03]
    test $(cat schema/migrations/MIGRATION_HEAD) = "0121" || exit 1
  - >-
    # [ID tsk_p2_preauth_006a_04_work_item_05]
    test -f evidence/phase2/tsk_p2_preauth_006a_04.json || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_006a_04.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - columns_exist
      - defaults_applied
      - migration_head

failure_modes:
  - "Columns not added => CRITICAL_FAIL"
  - "Default not 'non_reproducible' => CRITICAL_FAIL"
  - "MIGRATION_HEAD not updated => FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-006A-04/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-006A-04/EXEC_LOG.md

