schema_version: 1
phase: '1'
task_id: GF-W1-UI-004
title: "Programme Health tab: Activity table with financial columns"
owner_role: SUPERVISOR
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: APP_LAYER

intent: >-
  Add the activity table below the KPI rows showing instruction-level data with
  financial columns (Net Weight, tCO₂ est.) and status chips. The table fills
  remaining viewport height. Row click opens the instruction drawer (Task 5).

anti_patterns:
  - "Using SELECT * or unbounded queries"
  - "Computing tCO₂ with floating-point instead of the canonical constant"
  - "Table exceeding viewport — must use flex:1 and overflow-y:auto"

out_of_scope:
  - "Instruction drawer — handled by GF-W1-UI-005"
  - "KPI cards — done in GF-W1-UI-003"
  - "Monitoring report — handled by GF-W1-UI-006"

stop_conditions:
  - "tCO₂ computed with wrong constant (must be 0.00048) => CRITICAL_FAIL"
  - "Table has no overflow-y:auto => FAIL"
  - "Row click does not trigger drawer open => FAIL"
  - "Any node in the proof graph is orphaned => STOP"

proof_guarantees:
  - "grep verifies tCO₂ column header and 0.00048 constant exist in HTML"
  - "grep verifies overflow-y:auto on table container"
  - "grep verifies row click handler references instruction detail endpoint"

proof_limitations:
  - "Column rendering and data population require live API"
  - "Flex layout proportions require visual inspection"

depends_on:
  - GF-W1-UI-003

blocks:
  - GF-W1-UI-005

touches:
  - src/supervisory-dashboard/index.html
  - tasks/GF-W1-UI-004/meta.yml
  - evidence/phase1/gf_w1_ui_004.json

invariants:
  - INV-GF-UI-001

work:
  - >-
    [ID gf_w1_ui_004_work_01] Below the KPI rows, add a table filling remaining
    viewport height (flex: 1; overflow-y: auto). Columns: Instruction ID | Proof
    Type | Status | Net Weight | tCO₂ est. | Time.
  - >-
    [ID gf_w1_ui_004_work_02] Status chip: green=PRESENT, amber=PENDING, red=MISSING.
    Net Weight: net_weight_kg + " kg" if WEIGHBRIDGE_RECORD, else "—". tCO₂ est.:
    (net_weight_kg * 0.00048).toFixed(4) if weight present, else "—". Time:
    observed_at_utc formatted as HH:mm local.
  - >-
    [ID gf_w1_ui_004_work_03] Row click calls GET /pilot-demo/api/instructions/{instructionId}/detail
    and opens the drawer (Task 5).

acceptance_criteria:
  - >-
    [ID gf_w1_ui_004_work_01] Activity table exists below KPI rows with all 6 columns.
    Table container has flex:1 and overflow-y:auto.
  - >-
    [ID gf_w1_ui_004_work_02] tCO₂ column uses constant 0.00048. Status chips use
    canonical colours (--bright, --amber, --red). Weight shows "—" for non-weighbridge.
  - >-
    [ID gf_w1_ui_004_work_03] Clicking a row calls the instruction detail endpoint
    and triggers drawer open.

negative_tests:
  - id: GF-W1-UI-004-N1
    description: >-
      Grep for any tCO₂ computation that does not use 0.00048 as the constant.
      Any other constant value => FAIL.
    required: true

positive_tests:
  - id: GF-W1-UI-004-P1
    description: >-
      Grep for "tCO" column header and "0.00048" constant in the HTML file.
      Both must be present.
    required: true

verification:
  - >-
    # [ID gf_w1_ui_004_work_01] [ID gf_w1_ui_004_work_02] [ID gf_w1_ui_004_work_03]
    test -f src/supervisory-dashboard/index.html
    && grep -q "0.00048" src/supervisory-dashboard/index.html
    && grep -q "overflow-y" src/supervisory-dashboard/index.html
    && cat src/supervisory-dashboard/index.html | grep "instructions.*detail"
    > evidence/phase1/gf_w1_ui_004.json || exit 1

evidence:
  - path: evidence/phase1/gf_w1_ui_004.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace

failure_modes:
  - tCO₂ constant is not 0.00048 => CRITICAL_FAIL
  - Table has no overflow => FAIL
  - Row click does not work => FAIL
  - Evidence file missing => FAIL

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - .kiro/steering/ui-canonical-design.md
  - .kiro/steering/pwrm0001-domain-rules.md
  - .kiro/steering/symphony-platform-conventions.md
  - .kiro/specs/symphony-ui-canonical/requirements.md
  - .kiro/specs/symphony-ui-canonical/design.md
  - .kiro/specs/symphony-ui-canonical/tasks.md

implementation_plan: docs/plans/phase1/GF-W1-UI-004/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-UI-004/EXEC_LOG.md

notes: >-
  Atomic task 4 of 10. Adds the activity table with financial meaning (tCO₂ column)
  to the Programme Health tab. Phase Key: GF-W1. Phase Name: Green Finance Wave 1.

client: cursor
assigned_agent: supervisor
model: <UNASSIGNED>

domain: green_finance

second_pilot_test:
  candidate_sector_1: "PWRM0001 plastic collection (Chunga Dumpsite, Lusaka)"
  candidate_sector_2: "VM0044 solar energy generation (hypothetical)"
  unchanged_core_tables: []
  unchanged_core_functions: []
  adapter_only_differences:
    - "Column label 'Net Weight' becomes 'Net kWh' for solar — only label changes"
    - "tCO₂ conversion constant would differ per methodology but same structure"
  jurisdiction_profile_impact: "None"
  required_core_changes: []
  explanation: >-
    The activity table structure (ID, type, status, value, carbon estimate, time)
    is sector-neutral. Only the unit labels and conversion constants differ.
  second_pilot_reviewed_by: "Supervisor (automated review)"

pilot_scope_ref: docs/pilots/PILOT_PWRM0001/SCOPE.md
