  - evidence/phase3/tsk_p3_clean_003.json
  - docs/plans/phase3/TSK-P3-CLEAN-003/PLAN.md
  - docs/plans/phase3/TSK-P3-CLEAN-003/EXEC_LOG.md

regulated_surface_compliance:
  enabled: false
  approval_workflow: none
  stage_a_required_before_edit: false
  regulated_paths: []
  must_read: []

