    description: "Feed an invariant register where INV-305 has status 'implemented' but no verifier file exists; verifier must reject."
    required: true

positive_tests:
  - id: TSK-P3-CLEAN-003-P1
    description: "Feed a correctly annotated register with all doctrine refs resolving; verifier must pass."
    required: true

verification:
  - '# [ID tsk_p3_clean_003_work_01] [ID tsk_p3_clean_003_work_02] [ID tsk_p3_clean_003_work_03] test -x scripts/audit/verify_tsk_p3_clean_003.sh && bash scripts/audit/verify_tsk_p3_clean_003.sh > evidence/phase3/tsk_p3_clean_003.json || exit 1'
  - 'bash scripts/dev/pre_ci.sh || exit 1'

evidence:
  - path: evidence/phase3/tsk_p3_clean_003.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes

failure_modes:
  - "Evidence file missing => FAIL"
  - "Invariant promoted to implemented without verifier evidence => CRITICAL_FAIL"
  - "Doctrine citation does not resolve to existing file => FAIL"
  - "Doctrine invented locally => CRITICAL_FAIL"

