  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

out_of_scope:
  - "Promoting any invariant to implemented status."
  - "Creating verifier scripts for individual invariants."
  - "Inventing doctrine locally; all citations must reference existing canonical docs."
  - "Modifying invariant descriptions, IDs, or verification expectations."

stop_conditions:
  - "If any invariant is marked implemented without verifier evidence on disk => STOP."
  - "If any doctrine citation does not resolve to an existing canonical document => STOP."
  - "If doctrine is invented locally rather than cited from existing sources => STOP."

proof_guarantees:
  - "Verifier mechanically confirms every INV-301 through INV-310 has at least one doctrine reference."
  - "Verifier mechanically confirms no invariant has status 'implemented' without a verifier file on disk."
  - "Verifier mechanically confirms all cited doctrine files exist in the repository."

proof_limitations:
  - "Does not verify doctrine semantic applicability to each invariant."
  - "Does not verify invariant descriptions are complete or correct beyond reference presence."

touches:
  - docs/PHASE3/PHASE3_INVARIANT_REGISTER.md
