  - docs/plans/phase3/TSK-P3-CLEAN-003/PLAN.md
  - docs/plans/phase3/TSK-P3-CLEAN-003/EXEC_LOG.md

work:
  - "[ID tsk_p3_clean_003_work_01] Add governing doctrine citations to each invariant row INV-301 through INV-310 in docs/PHASE3/PHASE3_INVARIANT_REGISTER.md."
  - "[ID tsk_p3_clean_003_work_02] Preserve existing roadmap or implementation status honestly; do not promote any invariant to implemented without verifier evidence."
  - "[ID tsk_p3_clean_003_work_03] Ensure no doctrine is invented locally; all citations must reference existing canonical documents."

acceptance_criteria:
  - "[ID tsk_p3_clean_003_work_01] Every invariant INV-301 through INV-310 has at least one doctrine reference field that resolves to an existing canonical document."
  - "[ID tsk_p3_clean_003_work_02] No invariant row has status 'implemented' unless a verifier script and evidence file exist on disk for it."
  - "[ID tsk_p3_clean_003_work_03] All doctrine citations resolve to files that exist in the repository and are not marked archived or non-canonical."

negative_tests:
