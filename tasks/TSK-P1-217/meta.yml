work:
- The current onboarding model depends on SYMPHONY_KNOWN_TENANTS and ad hoc operator sequencing.
  The repo has tenant creation, supplier upsert, and allowlist upsert endpoints, but no durable
  programme lifecycle, governed activation state, or policy binding control plane.
- Add persisted control-plane tables and store abstractions for tenant registry, programme registry,
  programme activation state, and programme-to-policy binding. The hardened onboarding path must not
  depend on mutable startup environment allowlists.
- Replace env-driven tenant allowlisting for the hardened profile with governed persisted state.
  Bootstrap env may seed the first admin or first bootstrap context only; it must not remain the
  live operational registry.
- Scope exclusion - supplier registry and programme supplier allowlist are already owned by
  TSK-P1-214 and must not be re-implemented here.
acceptance_criteria:
- Tenant recognition in the hardened profile is backed by persisted control-plane state, not by
  SYMPHONY_KNOWN_TENANTS as the operational source of truth.
- Programmes can be created, updated, activated, suspended, and bound to policy identifiers through
  durable backend state.
- Restart does not erase tenant or programme onboarding state.
- API authorization and readiness checks use the governed control plane for tenant existence and
  activation decisions in the hardened profile.
verification:
