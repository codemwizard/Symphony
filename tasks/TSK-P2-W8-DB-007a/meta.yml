schema_version: 1
phase: '2'
task_id: TSK-P2-W8-DB-007a
title: Scope authorization enforcement
owner_role: DB_FOUNDATION
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DB_SCHEMA
intent: Wave 8 must distinguish cryptographic validity from authorization scope.
  This task adds the scope-authorization failure domain without bundling it
  into timestamp or replay checks.
primary_enforcement_domain: scope authorization
anti_patterns:
- Treating valid signature bytes as sufficient without scope authorization
- Regenerating `occurred_at` during verification or replay
- Bundling scope and timestamp failures into generic crypto invalidity
out_of_scope:
- Any work outside the single primary enforcement domain declared for this task.
- Implementation or evidence claims for non-authoritative surfaces unless explicitly
  routed through the same `asset_batches` boundary.
stop_conditions:
- If the task begins to span more than one primary enforcement domain, stop and split
  the work into separate task packs.
- If the verifier cannot produce a deterministic fail domain for the task objective,
  stop and repair the pack before implementation.
- If a runtime verifier does not physically cause PostgreSQL to accept or reject a
  write at `asset_batches`, stop and treat the verifier as insufficient.
proof_guarantees:
- The task is constrained to one primary enforcement domain.
- The verifier path is tied to explicit work-item IDs and proof-carrying evidence
  expectations.
proof_limitations:
- This task alone does not certify Wave 8 complete; it proves only its declared domain.
