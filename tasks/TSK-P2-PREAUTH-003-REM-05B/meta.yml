schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-003-REM-05B
title: "Wire scripts/db/verify_execution_truth_anchor.sh into scripts/dev/pre_ci.sh and scripts/audit/run_invariants_fast_checks.sh with fail-closed exit semantics"
owner_role: SECURITY_GUARDIAN
status: completed
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: CI_GATES

intent: >-
  Wire the integrity verifier produced by REM-05 into the two CI entrypoints
  that the Security Guardian owns per AGENTS.md path authority:
  scripts/dev/pre_ci.sh and scripts/audit/run_invariants_fast_checks.sh.
  Both invocations must be guarded by || exit 1 so a verifier failure
  short-circuits the gate. This task exists as a path-authority-correct
  split of the original REM-05 per Devin Review finding
  BUG_pr-review-job-c4fc938f95fc4692ac528a10081cda97_0001:
  scripts/db/** is DB_FOUNDATION territory; scripts/dev/pre_ci.sh and
  scripts/audit/** are SECURITY_GUARDIAN territory.

anti_patterns:
  - "Invoking the verifier behind an unconditional || true (fail-open)"
  - "Adding the verifier inside a conditional branch that CI never executes"
  - "Duplicating the invocation in multiple blocks inside pre_ci.sh"
  - "Editing scripts/db/** or docs/invariants/** (out of SECURITY_GUARDIAN path authority)"

out_of_scope:
  - "Authoring the verifier itself (belongs to REM-05, DB_FOUNDATION)"
  - "Registering the invariant (belongs to REM-04, INVARIANTS_CURATOR)"
  - "Editing the verifier's evidence shape (belongs to REM-05)"
  - "Adapter lifecycle / retry / execution_state (deferred to REM-2026-04-20_execution-lifecycle)"

stop_conditions:
  - "If scripts/db/verify_execution_truth_anchor.sh does not exist or is not executable (REM-05 has not landed)"
  - "If the invocation in pre_ci.sh is missing || exit 1"
  - "If the invocation position is before DATABASE_URL is set in pre_ci.sh"
  - "If the fast-check script loses its set -e posture"

proof_guarantees:
  - "scripts/dev/pre_ci.sh contains exactly one invocation of scripts/db/verify_execution_truth_anchor.sh guarded by || exit 1"
  - "scripts/audit/run_invariants_fast_checks.sh references scripts/db/verify_execution_truth_anchor.sh at least once"
  - "RUN_PHASE1_GATES=1 bash scripts/dev/pre_ci.sh exercises the new gate"

proof_limitations:
  - "Fast-check path is no-DB; it asserts shell-syntax + presence of the verifier, not live DB integrity. Live-DB enforcement is in pre_ci.sh."
  - "GitHub Actions workflow coverage relies on existing pre_ci.sh invocation in CI; this task does not edit .github/workflows/**."

depends_on:
  - TSK-P2-PREAUTH-003-REM-05

blocks:
  - TSK-P2-PREAUTH-003-REM-04

touches:
  - scripts/dev/pre_ci.sh
  - scripts/audit/run_invariants_fast_checks.sh
  - evidence/phase2/tsk_p2_preauth_003_rem_05b.json
  - tasks/TSK-P2-PREAUTH-003-REM-05B/meta.yml
  - docs/plans/phase2/TSK-P2-PREAUTH-003-REM-05B/PLAN.md
  - docs/plans/phase2/TSK-P2-PREAUTH-003-REM-05B/EXEC_LOG.md

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_003_rem_05b_work_item_01] Edit scripts/dev/pre_ci.sh to invoke scripts/db/verify_execution_truth_anchor.sh
    at the schema-invariants gate position (immediately after the existing scripts/db/verify_invariants.sh call),
    guarded by || exit 1. Edit is idempotent: re-running the task does not duplicate the invocation block.
  - >-
    [ID tsk_p2_preauth_003_rem_05b_work_item_02] Edit scripts/audit/run_invariants_fast_checks.sh to reference
    scripts/db/verify_execution_truth_anchor.sh in its shell-syntax-check array (no-DB path) so the fast gate
    catches a missing/broken verifier script.
  - >-
    [ID tsk_p2_preauth_003_rem_05b_work_item_03] Produce evidence/phase2/tsk_p2_preauth_003_rem_05b.json attesting that
    both entrypoints contain the required reference, with observed_paths, observed_hashes of the edited files,
    command_outputs (grep results), execution_trace, and task_id/git_sha/timestamp_utc/status.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_003_rem_05b_work_item_01] grep -c 'verify_execution_truth_anchor.sh' scripts/dev/pre_ci.sh returns exactly 1, and that line contains '|| exit 1'.
  - >-
    [ID tsk_p2_preauth_003_rem_05b_work_item_02] grep -c 'verify_execution_truth_anchor.sh' scripts/audit/run_invariants_fast_checks.sh returns at least 1.
  - >-
    [ID tsk_p2_preauth_003_rem_05b_work_item_03] evidence/phase2/tsk_p2_preauth_003_rem_05b.json exists with status=PASS.

negative_tests:
  - id: TSK-P2-PREAUTH-003-REM-05B-N1
    description: >-
      Remove the || exit 1 guard from pre_ci.sh's invocation; re-run the REM-05B verifier and assert it exits non-zero.
    required: true
  - id: TSK-P2-PREAUTH-003-REM-05B-N2
    description: >-
      Delete the scripts/db/verify_execution_truth_anchor.sh reference from run_invariants_fast_checks.sh; re-run the REM-05B verifier and assert it exits non-zero.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-003-REM-05B-P1
    description: >-
      With both entrypoints wired, the REM-05B verifier exits 0 and emits evidence with status=PASS.
    required: true

verification:
  - >-
    # [ID tsk_p2_preauth_003_rem_05b_work_item_01] pre_ci.sh contains exactly one fail-closed invocation.
    test -f scripts/dev/pre_ci.sh && [ "$(grep -c 'verify_execution_truth_anchor.sh' scripts/dev/pre_ci.sh)" -eq 1 ] || exit 1
  - >-
    # [ID tsk_p2_preauth_003_rem_05b_work_item_01] The invocation is fail-closed (|| exit 1 on the same line or directly after).
    grep -E 'verify_execution_truth_anchor.sh.*\|\| exit 1' scripts/dev/pre_ci.sh || exit 1
  - >-
    # [ID tsk_p2_preauth_003_rem_05b_work_item_02] run_invariants_fast_checks.sh references the verifier.
    test -f scripts/audit/run_invariants_fast_checks.sh && grep -q 'verify_execution_truth_anchor.sh' scripts/audit/run_invariants_fast_checks.sh || exit 1
  - >-
    # [ID tsk_p2_preauth_003_rem_05b_work_item_03] Evidence JSON exists with PASS status and wiring booleans.
    test -f evidence/phase2/tsk_p2_preauth_003_rem_05b.json && grep -q '"status": "PASS"' evidence/phase2/tsk_p2_preauth_003_rem_05b.json && grep -q 'pre_ci_wired' evidence/phase2/tsk_p2_preauth_003_rem_05b.json && grep -q 'fast_checks_wired' evidence/phase2/tsk_p2_preauth_003_rem_05b.json || exit 1
  - >-
    # [ID tsk_p2_preauth_003_rem_05b_work_item_02] Exercise the wired fast-check entrypoint so the new verifier reference is live-proved by an owner-aligned script.
    PRE_CI_CONTEXT=1 bash scripts/audit/run_invariants_fast_checks.sh || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_003_rem_05b.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace
      - pre_ci_wired
      - fast_checks_wired

failure_modes:
  - "Invocation is present but guarded by || true or missing the exit guard => CRITICAL_FAIL (fail-open CI)"
  - "Invocation duplicated in multiple pre_ci.sh blocks => FAIL (non-idempotent edit)"
  - "fast-check reference missing => FAIL (fast gate blind-spot)"
  - "Task silently edits scripts/db/** or docs/invariants/** => PATH_AUTHORITY_VIOLATION"

must_read:
  - AGENTS.md
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - scripts/dev/pre_ci.sh
  - scripts/audit/run_invariants_fast_checks.sh
  - docs/plans/phase2/TSK-P2-PREAUTH-003-REM-05/PLAN.md
  - docs/plans/remediation/REM-2026-04-20_execution-truth-anchor/PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-003-REM-05B/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-003-REM-05B/EXEC_LOG.md

notes: >-
  Split from TSK-P2-PREAUTH-003-REM-05 on 2026-04-20 in response to
  Devin Review comment BUG_pr-review-job-c4fc938f95fc4692ac528a10081cda97_0001
  so that every work item falls under the owner role's AGENTS.md path authority.
  DB_FOUNDATION owns the verifier itself; SECURITY_GUARDIAN owns the CI wiring.

client: cursor
assigned_agent: security_guardian
model: <UNASSIGNED>
