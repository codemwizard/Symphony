schema_version: 1
phase: '1'
task_id: GF-W1-UI-003
title: "Programme Health tab: KPI row and disbursement status card"
owner_role: SUPERVISOR
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: APP_LAYER

intent: >-
  Add four KPI cards (Evidence Submissions, Exceptions, Complete, Completeness Rate)
  and a full-width Disbursement Status card to the Programme Health tab. Wire to
  real data from the reveal endpoint. Disbursement status dynamically switches
  between red (NOT AUTHORIZED) and green (AUTHORIZED) based on completeness.

anti_patterns:
  - "Hardcoding KPI values instead of reading from API"
  - "Using static colours instead of dynamic red/green disbursement logic"
  - "KPI cards exceeding 40% viewport height"

out_of_scope:
  - "Activity table — handled by GF-W1-UI-004"
  - "Instruction drawer — handled by GF-W1-UI-005"
  - "Monitoring report — handled by GF-W1-UI-006"

stop_conditions:
  - "KPI values are hardcoded => FAIL"
  - "Disbursement card does not change colour based on completeness => CRITICAL_FAIL"
  - "Cards exceed 40% viewport height => FAIL"
  - "Any node in the proof graph is orphaned => STOP"

proof_guarantees:
  - "grep verifies KPI label strings exist in HTML"
  - "grep verifies disbursement status text patterns exist"
  - "grep verifies API endpoint URL is referenced"

proof_limitations:
  - "Dynamic colour switching requires live API — grep checks text patterns only"
  - "40% viewport height constraint requires visual inspection"

depends_on:
  - GF-W1-UI-002

blocks:
  - GF-W1-UI-004

touches:
  - src/supervisory-dashboard/index.html
  - tasks/GF-W1-UI-003/meta.yml
  - evidence/phase1/gf_w1_ui_003.json

invariants:
  - INV-GF-UI-001

work:
  - >-
    [ID gf_w1_ui_003_work_01] Inside the Programme Health screen div, create Row 1
    with four KPI cards: "Evidence Submissions", "Exceptions", "Complete",
    "Completeness Rate". Each shows large number + small label.
  - >-
    [ID gf_w1_ui_003_work_02] Create Row 2 with full-width Disbursement Status card.
    Dynamic styling: rate < 1.0 or total_collections == 0 => red background, text
    "NOT AUTHORIZED — Incomplete MRV (N%)". rate == 1.0 and total_collections > 0 =>
    green background, text "AUTHORIZED".
  - >-
    [ID gf_w1_ui_003_work_03] Wire to real data from the reveal endpoint. Extend the
    existing initDashboard() function. All four cards and the disbursement card fit in
    the top 40% of the viewport.

acceptance_criteria:
  - >-
    [ID gf_w1_ui_003_work_01] Four KPI cards with exact labels "Evidence Submissions",
    "Exceptions", "Complete", "Completeness Rate" exist in the Programme Health div.
  - >-
    [ID gf_w1_ui_003_work_02] Disbursement Status card shows "NOT AUTHORIZED" with red
    when completeness < 100%, and "AUTHORIZED" with green when completeness == 100%.
  - >-
    [ID gf_w1_ui_003_work_03] KPI numbers update from the reveal API endpoint. Cards
    fit in the top 40% of the viewport.

negative_tests:
  - id: GF-W1-UI-003-N1
    description: >-
      Search for hardcoded numeric KPI values that are not computed from API response.
      Any static number in a KPI card that is not a default/loading state => FAIL.
    required: true

positive_tests:
  - id: GF-W1-UI-003-P1
    description: >-
      Grep for all four KPI label strings and the disbursement status text patterns.
      All must be present.
    required: true

verification:
  - >-
    # [ID gf_w1_ui_003_work_01] [ID gf_w1_ui_003_work_02] [ID gf_w1_ui_003_work_03]
    test -f src/supervisory-dashboard/index.html
    && grep -q "Evidence Submissions" src/supervisory-dashboard/index.html
    && grep -q "Completeness Rate" src/supervisory-dashboard/index.html
    && grep -q "NOT AUTHORIZED" src/supervisory-dashboard/index.html
    && grep -q "AUTHORIZED" src/supervisory-dashboard/index.html
    && cat src/supervisory-dashboard/index.html | grep "reveal"
    > evidence/phase1/gf_w1_ui_003.json || exit 1

evidence:
  - path: evidence/phase1/gf_w1_ui_003.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace

failure_modes:
  - KPI labels do not match exactly => FAIL
  - Disbursement card does not switch red/green => CRITICAL_FAIL
  - KPI values hardcoded => FAIL
  - Cards exceed 40% viewport => FAIL
  - Evidence file missing => FAIL

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - .kiro/steering/ui-canonical-design.md
  - .kiro/steering/pwrm0001-domain-rules.md
  - .kiro/steering/symphony-platform-conventions.md
  - .kiro/specs/symphony-ui-canonical/requirements.md
  - .kiro/specs/symphony-ui-canonical/design.md
  - .kiro/specs/symphony-ui-canonical/tasks.md

implementation_plan: docs/plans/phase1/GF-W1-UI-003/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-UI-003/EXEC_LOG.md

notes: >-
  Atomic task 3 of 10. Adds the KPI summary row and disbursement gate to the
  Programme Health tab. Phase Key: GF-W1. Phase Name: Green Finance Wave 1.

client: cursor
assigned_agent: supervisor
model: <UNASSIGNED>

domain: green_finance

