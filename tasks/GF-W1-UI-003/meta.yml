notes: 'This task implements worker validation before token issuance. supplier_type=WORKER enforcement prevents token issuance
  to non-waste-collector suppliers. Neighbourhood labels used throughout to comply with UI canonical design rules. Phase:
  Green Finance Wave 1. Domain: green_finance.'
client: kiro
assigned_agent: architect
model: claude-sonnet-4-20250514
domain: green_finance
pilot: true
second_pilot_test: The worker lookup pattern with supplier_type validation works for any programme requiring field operator
  verification. For PWRM0001 plastic collection, supplier_type=WORKER identifies waste collectors. For a hypothetical VM0044
  solar energy programme, supplier_type=TECHNICIAN would identify solar panel installers. The validation logic (check supplier_type
  matches expected role) and error states (not registered, invalid type, inactive) are identical; only the expected supplier_type
  value differs per programme.
pilot_scope_ref: docs/pilots/PILOT_PWRM0001/SCOPE.md
intent: Implement the worker lookup form with phone number validation, registry API integration, and supplier_type=WORKER
  enforcement. The form prevents token issuance to non-waste-collector suppliers by validating the worker exists in the registry,
  is active, and holds the correct supplier_type before enabling the Request Collection Token button. Neighbourhood labels
  are displayed instead of raw GPS coordinates to comply with UI canonical design rules.
anti_patterns:
- Displaying raw GPS coordinates instead of neighbourhood labels
- Allowing token issuance without validating supplier_type equals WORKER
- Enabling the Request Collection Token button before worker validation completes
negative_tests:
- id: GF-W1-UI-003-N1
  description: Looking up a phone number that is not registered in the worker registry must display a red error message and
    keep the Request Collection Token button disabled.
  required: true
- id: GF-W1-UI-003-N2
  description: Looking up a registered supplier whose supplier_type is not WORKER must display a supplier type mismatch error
    and keep the button disabled.
  required: true
