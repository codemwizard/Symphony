schema_version: 1
phase: '1'
task_id: TSK-P1-235
title: Detect and classify non-canonical verification execution so bypass outputs
  are treated as non-authoritative
owner_role: SECURITY_GUARDIAN
status: completed
depends_on:
- TSK-P1-234
touches:
- scripts/audit/task_execution_authority_gate.py
- scripts/audit/verify_tsk_p1_235.sh
- evidence/phase1/tsk_p1_235_execution_authority.json
- tasks/TSK-P1-235/meta.yml
- docs/plans/phase1/TSK-P1-235/PLAN.md
- docs/plans/phase1/TSK-P1-235/EXEC_LOG.md
invariants:
- INV-105
- INV-119
work:
- Implement a report-only execution-authority gate that detects direct gate invocation,
  partial runner bypass, and outputs lacking canonical authority markers.
- Classify bypass results as non-authoritative through the shared gate result contract
  so humans and automation do not treat them as canonical verification truth.
- Add a task-specific verifier that exercises canonical and non-canonical execution
  fixtures and emits declared evidence.
acceptance_criteria:
- Direct gate invocation and partial runner bypass are detected and classified as
  non- authoritative instead of being treated as equivalent to canonical verification.
- Execution-authority findings use the shared gate result contract and include one
  clear next action for returning to the sanctioned verification path.
- '`scripts/audit/verify_tsk_p1_235.sh` exercises canonical and bypass fixtures and
  emits `evidence/phase1/tsk_p1_235_execution_authority.json`.'
verification:
- bash scripts/audit/verify_tsk_p1_235.sh
- python3 scripts/audit/validate_evidence.py --task TSK-P1-235 --evidence evidence/phase1/tsk_p1_235_execution_authority.json
- RUN_PHASE1_GATES=1 bash scripts/dev/pre_ci.sh
evidence:
- '{''path'': ''evidence/phase1/tsk_p1_235_execution_authority.json'', ''must_include'':
  [''task_id'', ''git_sha'', ''timestamp_utc'', ''status'', ''checks'', ''gate_result_contract_fields'',
  ''direct_invocation_result'', ''partial_bypass_result'', ''canonical_flow_result'']}'
failure_modes:
- Non-canonical verification outputs remain socially or mechanically authoritative
  => FAIL
- Execution-authority gate cannot distinguish direct gate invocation from canonical
  flow => BLOCKED
- Evidence file missing => FAIL
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- AGENT_ENTRYPOINT.md
- docs/operations/AGENT_PROMPT_ROUTER.md
- docs/operations/TASK_CREATION_PROCESS.md
- docs/reference/rls-anti-drift-wave2-task-plan.md
implementation_plan: docs/plans/phase1/TSK-P1-235/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-235/EXEC_LOG.md
notes: This task classifies execution authority only. It must not redefine the canonical
  entrypoint contract already established by TSK-P1-234.
client: cursor
assigned_agent: security_guardian
model: Cascade
