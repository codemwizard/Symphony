  - >-
    [ID w8_db_002_work_02] Add a forward-only migration that removes or rejects those placeholder and compatibility formats on the authoritative path.
  - >-
    [ID w8_db_002_work_03] Build a verifier that proves placeholder-style values are rejected or impossible on the `asset_batches` write boundary.

acceptance_criteria:
  - >-
    [ID w8_db_002_work_01] The task identifies all placeholder and compatibility postures that would contaminate canonicalization or signature semantics.
  - >-
    [ID w8_db_002_work_02] A forward-only migration removes or rejects those postures on the authoritative boundary.
  - >-
    [ID w8_db_002_work_03] The verifier proves PostgreSQL rejects or prevents placeholder-style writes on `asset_batches`.

negative_tests:
