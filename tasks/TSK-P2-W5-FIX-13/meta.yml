schema_version: 1
phase: '2'
task_id: TSK-P2-W5-FIX-13
title: "Create standalone integration verifier script for complete Wave 5 state machine behavioral proof"
owner_role: QA_VERIFIER
status: planned
priority: NORMAL
risk_class: GOVERNANCE
blast_radius: CI_GATES

intent: >-
  After all FIX-01 through FIX-12 tasks complete, there is no single script
  that proves the entire state machine works end-to-end. Individual verifiers
  prove isolated concerns. This task creates a standalone integration verifier
  that exercises the full INSERT lifecycle: authority check → state rule
  check → hash generation → hash uniqueness → timestamp → current state
  update. This is the Wave 5 graduation gate — if this script passes, the
  state machine is proven correct and Wave 6 can begin.

anti_patterns:
  - "Calling individual verifiers sequentially without integration logic"
  - "Using mocked state instead of live DB"
  - "Passing on structural checks alone"

out_of_scope:
  - "Schema changes"
  - "Wave 6 design"
stop_conditions:
  - "Script does not exercise full INSERT lifecycle"
  - "Script passes without checking state_current update"

proof_guarantees:
  - "Full INSERT lifecycle completes: all 6 triggers fire in order"
  - "state_current updated with correct current_state after INSERT"
  - "Invalid transitions are rejected"
proof_limitations:
  - "Does not prove concurrent behavior"
  - "Does not prove all edge cases"

depends_on:
  - TSK-P2-W5-FIX-12

blocks: []

touches:
  - scripts/db/verify_wave5_state_machine_integration.sh
  - evidence/phase2/tsk_p2_w5_fix_13.json
  - tasks/TSK-P2-W5-FIX-13/meta.yml
  - docs/plans/phase2/TSK-P2-W5-FIX-13/PLAN.md
  - docs/plans/phase2/TSK-P2-W5-FIX-13/EXEC_LOG.md

invariants: []

# ── Deliverable files (for churn control) ─────────────────────────────────
deliverable_files:
  - scripts/db/verify_wave5_state_machine_integration.sh
  - evidence/phase2/tsk_p2_w5_fix_13.json
  - docs/plans/phase2/TSK-P2-W5-FIX-13/EXEC_LOG.md

# ── Regulated Surface Compliance (CRITICAL) ────────────────────────────────
regulated_surface_compliance:
  enabled: true
  approval_workflow: stage_a_only
  stage_a_required_before_edit: true
  regulated_paths:
    - scripts/db/verify_wave5_state_machine_integration.sh
  must_read:
    - docs/operations/REGULATED_SURFACE_PATHS.yml

# ── Remediation Trace Compliance (CRITICAL) ────────────────────────────────
remediation_trace_compliance:
  enabled: true
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

# ── Database Connection ────────────────────────────────────────────────────
database_connection:
  enabled: true
  connection_string_format: "postgresql://<user>:<password>@<host>:<port>/<database>"
  example_connection_string: "postgresql://symphony_admin:symphony_pass@localhost:5432/symphony"
  container_name: symphony-postgres
  database_url_env_var: DATABASE_URL
  setup_command: "export DATABASE_URL=\"postgresql://symphony_admin:symphony_pass@localhost:5432/symphony\""

# ── Migration Dependencies ─────────────────────────────────────────────────
migration_dependencies:
  enabled: false


work:
  - >-
    [ID w5_fix_13_work_01] Design integration test scenario: Create test
    execution_record, policy_decision, state_rule, then INSERT
    state_transition and verify all 6 trigger side effects.
  - >-
    [ID w5_fix_13_work_02] Write
    scripts/db/verify_wave5_state_machine_integration.sh with full lifecycle
    test in a transaction. Must verify: (a) transition_hash is set with
    placeholder prefix, (b) transitioned_at is set, (c) state_current row
    exists with correct current_state, (d) invalid transition is rejected.
  - >-
    [ID w5_fix_13_work_03] Run integration verifier and generate evidence.
  - >-
    [ID w5_fix_13_work_04] Update EXEC_LOG.md with final remediation trace.

acceptance_criteria:
  - >-
    [ID w5_fix_13_work_01] Test scenario documented in PLAN.md.
  - >-
    [ID w5_fix_13_work_02] Integration script covers all 6 trigger effects.
  - >-
    [ID w5_fix_13_work_03] Evidence JSON produced with lifecycle_complete=true.
  - >-
    [ID w5_fix_13_work_04] EXEC_LOG remediation trace complete.

negative_tests:
  - id: TSK-P2-W5-FIX-13-N1
    description: >-
      INSERT with invalid state transition (no matching rule) is rejected.
    required: true
  - id: TSK-P2-W5-FIX-13-N2
    description: >-
      INSERT with non-existent policy_decision_id is rejected by FK.
    required: true

positive_tests:
  - id: TSK-P2-W5-FIX-13-P1
    description: >-
      Full lifecycle INSERT succeeds: transition_hash set, transitioned_at
      set, state_current updated.
    required: true

verification:
  - bash scripts/db/verify_wave5_state_machine_integration.sh || exit 1
  - test -f evidence/phase2/tsk_p2_w5_fix_13.json || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_w5_fix_13.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - lifecycle_complete
      - trigger_effects_verified
      - negative_test_results

failure_modes:
  - "Integration script does not verify all 6 trigger effects => FAIL"
  - "Script passes without checking state_current => CRITICAL_FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/SYMPHONY_TASK_IMPLEMENTATION_PROCESS.md

implementation_plan: docs/plans/phase2/TSK-P2-W5-FIX-13/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-W5-FIX-13/EXEC_LOG.md

notes: >-
  Phase Key: W5-FIX. Phase Name: Wave 5 Stabilization. Thirteenth and
  final task. This is the Wave 5 graduation gate — passing this verifier
  proves the state machine is correct and Wave 6 can begin.
client: cursor
assigned_agent: qa_verifier
model: <UNASSIGNED>
