schema_version: 1
phase: '1'
task_id: TSK-P1-PLT-003
title: "Implement /pilot-demo/api/pilot-success-criteria for KPI tracking"
owner_role: ARCHITECT
status: completed
priority: MEDIUM
risk_class: GOVERNANCE
blast_radius: APP_LAYER
intent: >-
  The pilot frontend needs to display progress against pre-defined success criteria.
  This task adds the backend route and a deterministic data generator for the 
  PWRM0001 pilot success metrics (e.g. 1000kg weight target, 50 workers onboarded).
anti_patterns:
  - "Hardcoding the success criteria in the frontend HTML."
  - "Serving inconsistent data that doesn't match the established pilot goals."
out_of_scope:
  - "Dynamic goal setting via the UI (goals are static for the pilot phase)."
stop_conditions:
  - "If the frontend displays a loading spinner indefinitely after the route is added."
proof_guarantees:
  - "Verification confirms the endpoint returns the structured JSON expected by the UI."
proof_limitations:
  - "The data returned is based on a deterministic pilot-demo mapping."
depends_on:
  - TSK-P1-PLT-001
touches:
  - services/ledger-api/dotnet/src/LedgerApi/Program.cs
  - tasks/TSK-P1-PLT-003/meta.yml
invariants:
  - INV-GOV-PILOT-003
work:
  - "[ID TSK-P1-PLT-003_work_item_01] Define GET /pilot-demo/api/pilot-success-criteria in Program.cs."
  - "[ID TSK-P1-PLT-003_work_item_02] Implement the Success Criteria handler returning the PWRM0001 metrics."
  - "[ID TSK-P1-PLT-003_work_item_03] Wire the Operator Cookie validation to ensure secure access."
acceptance_criteria:
  - "[ID TSK-P1-PLT-003_work_item_01] GET /pilot-demo/api/pilot-success-criteria returns status 200."
  - "[ID TSK-P1-PLT-003_work_item_02] JSON response includes 'overallProgress' and 'criteria' array."
negative_tests:
  - id: TSK-P1-PLT-003-N1
    description: "Invalid programme IDs or lack of auth must return non-200 responses."
    required: true
verification:
  - "# [ID TSK-P1-PLT-003_work_item_01] curl -i http://localhost:5242/pilot-demo/api/pilot-success-criteria -H 'Cookie: symphony_pilot_demo_operator=VALID' | grep '200 OK' || exit 1"
  - "# [ID TSK-P1-PLT-003_work_item_02] curl http://localhost:5242/pilot-demo/api/pilot-success-criteria -H 'Cookie: symphony_pilot_demo_operator=VALID' | grep 'overallProgress' || exit 1"
evidence:
  - path: evidence/phase1/tsk_p1_plt_003.json
    must_include:
      - task_id
      - git_sha
      - status
failure_modes:
  - "Frontend ring chart fails to render due to missing 'overallProgress' key => FAIL"
must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - src/symphony-pilot/success-criteria.html
implementation_plan: docs/plans/phase1/TSK-P1-PLT-003/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-PLT-003/EXEC_LOG.md
client: cursor
assigned_agent: architect
model: <UNASSIGNED>
