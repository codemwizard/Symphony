schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-003-01
title: "Create execution_records table"
owner_role: DB_FOUNDATION
status: completed
priority: HIGH
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  This task creates the execution_records table to anchor execution truth with timestamps.
  Without this table, the system cannot track execution events, creating risk of
  non-reproducible calculations and audit failures.

anti_patterns:
  - "Creating the table without required indexes"
  - "Writing the migration without touching MIGRATION_HEAD"
  - "Writing the verifier after the migration is applied"

out_of_scope:
  - "interpretation_version_id FK addition (deferred to TSK-P2-PREAUTH-003-02)"
  - "Data migration or backfill"
  - "Application layer changes"

stop_conditions:
  - "If migration 0118 does not create execution_records table"
  - "If required indexes are missing"
  - "If MIGRATION_HEAD is not updated to 0118"

proof_guarantees:
  - "Migration 0118 creates execution_records table"
  - "Indexes on project_id and execution_timestamp are present"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the table structure is optimal for all use cases"
  - "Cannot verify that the table will perform well at scale"

depends_on:
  - TSK-P2-PREAUTH-003-00
blocks:
  - TSK-P2-PREAUTH-003-02

touches:
  - schema/migrations/0118_create_execution_records.sql
  - schema/migrations/MIGRATION_HEAD
  - scripts/db/verify_tsk_p2_preauth_003_01.sh
  - tasks/TSK-P2-PREAUTH-003-01/meta.yml

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_003_01_work_item_01] Write migration 0118 at schema/migrations/0118_create_execution_records.sql
    creating execution_records table with columns: execution_id UUID PRIMARY KEY, project_id UUID NOT NULL,
    execution_timestamp TIMESTAMPTZ NOT NULL, and indexes on project_id and execution_timestamp.
  - >-
    [ID tsk_p2_preauth_003_01_work_item_02] Update MIGRATION_HEAD to 0118: echo 0118 > schema/migrations/MIGRATION_HEAD.
  - >-
    [ID tsk_p2_preauth_003_01_work_item_03] Write verify_tsk_p2_preauth_003_01.sh that runs psql to verify
    table exists and indexes are present.
  - >-
    [ID tsk_p2_preauth_003_01_work_item_04] Run verify_tsk_p2_preauth_003_01.sh to confirm migration is successful.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_003_01_work_item_01] Migration 0118 creates execution_records table.
  - >-
    [ID tsk_p2_preauth_003_01_work_item_02] MIGRATION_HEAD contains 0118.
  - >-
    [ID tsk_p2_preauth_003_01_work_item_03] verify_tsk_p2_preauth_003_01.sh exists and checks for table existence.
  - >-
    [ID tsk_p2_preauth_003_01_work_item_04] verify_tsk_p2_preauth_003_01.sh exits 0.

negative_tests:
  - id: TSK-P2-PREAUTH-003-01-N1
    description: >-
      Verify that verify_tsk_p2_preauth_003_01.sh exits non-zero when execution_records table does not exist.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-003-01-P1
    description: >-
      Verify that verify_tsk_p2_preauth_003_01.sh exits 0 when execution_records table exists with indexes.
    required: false

verification:
  - >-
    # [ID tsk_p2_preauth_003_01_work_item_01] [ID tsk_p2_preauth_003_01_work_item_02]
    # [ID tsk_p2_preauth_003_01_work_item_03] [ID tsk_p2_preauth_003_01_work_item_04]
    test -x scripts/db/verify_tsk_p2_preauth_003_01.sh && bash scripts/db/verify_tsk_p2_preauth_003_01.sh > evidence/phase2/tsk_p2_preauth_003_01.json || exit 1
  - >-
    # [ID tsk_p2_preauth_003_01_work_item_02]
    test $(cat schema/migrations/MIGRATION_HEAD) = "0118" || exit 1
  - >-
    # [ID tsk_p2_preauth_003_01_work_item_04]
    test -f evidence/phase2/tsk_p2_preauth_003_01.json || exit 1
  - >-
    # [ID tsk_p2_preauth_003_01_work_item_04]
    python3 scripts/audit/validate_evidence.py --task TSK-P2-PREAUTH-003-01 --evidence evidence/phase2/tsk_p2_preauth_003_01.json || exit 1
  - >-
    # [ID tsk_p2_preauth_003_01_work_item_04]
    RUN_PHASE1_GATES=1 bash scripts/dev/pre_ci.sh || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_003_01.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - table_exists
      - indexes_present
      - migration_head

failure_modes:
  - "Migration does not create table => CRITICAL_FAIL"
  - "Indexes missing => CRITICAL_FAIL"
  - "MIGRATION_HEAD not updated => FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-003-01/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-003-01/EXEC_LOG.md

notes: >-
  This task blocks TSK-P2-PREAUTH-003-02. Phase Key: PRE-PHASE2. Phase Name: Pre-Phase 2 Implementation.

