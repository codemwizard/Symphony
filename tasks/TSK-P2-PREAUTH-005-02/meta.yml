schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-005-02
title: "Create state_current table"
owner_role: DB_FOUNDATION
status: planned
priority: HIGH
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  This task creates the state_current table to track current state for each project.
  Without this table, the system cannot efficiently query current state, creating risk of
  performance degradation and incorrect state queries.

anti_patterns:
  - "Creating the table without project_id PRIMARY KEY"
  - "Writing the migration without touching MIGRATION_HEAD"
  - "Writing the verifier after the migration is applied"

out_of_scope:
  - "Trigger implementation (deferred to TSK-P2-PREAUTH-005-03 through 005-08)"
  - "Application layer changes"
  - "Data migration"

stop_conditions:
  - "If migration does not create state_current table"
  - "If project_id PRIMARY KEY is missing"
  - "If MIGRATION_HEAD is not updated"

proof_guarantees:
  - "Migration creates state_current table"
  - "project_id is PRIMARY KEY"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the table will perform well at scale"
  - "Cannot verify that state_since is always correct"

depends_on:
  - TSK-P2-PREAUTH-005-01
blocks:
  - TSK-P2-PREAUTH-005-03

touches:
  - schema/migrations/0120_create_state_transitions.sql
  - scripts/db/verify_tsk_p2_preauth_005_02.sh
  - tasks/TSK-P2-PREAUTH-005-02/meta.yml

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_005_02_work_item_01] Add state_current table to migration 0120 with columns:
    project_id UUID PRIMARY KEY, current_state VARCHAR NOT NULL, state_since TIMESTAMPTZ NOT NULL.
  - >-
    [ID tsk_p2_preauth_005_02_work_item_02] Write verify_tsk_p2_preauth_005_02.sh that runs psql to verify
    table exists and project_id is PRIMARY KEY.
  - >-
    [ID tsk_p2_preauth_005_02_work_item_03] Run verify_tsk_p2_preauth_005_02.sh to confirm migration is successful.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_005_02_work_item_01] Migration creates state_current table with project_id PRIMARY KEY.
  - >-
    [ID tsk_p2_preauth_005_02_work_item_02] verify_tsk_p2_preauth_005_02.sh exists and checks for table and PK.
  - >-
    [ID tsk_p2_preauth_005_02_work_item_03] verify_tsk_p2_preauth_005_02.sh exits 0.

negative_tests:
  - id: TSK-P2-PREAUTH-005-02-N1
    description: >-
      Verify that verify_tsk_p2_preauth_005_02.sh exits non-zero when state_current table does not exist.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-005-02-P1
    description: >-
      Verify that verify_tsk_p2_preauth_005_02.sh exits 0 when state_current table exists with project_id PRIMARY KEY.
    required: false

verification:
  - >-
    # [ID tsk_p2_preauth_005_02_work_item_01] [ID tsk_p2_preauth_005_02_work_item_02]
    # [ID tsk_p2_preauth_005_02_work_item_03]
    test -x scripts/db/verify_tsk_p2_preauth_005_02.sh && bash scripts/db/verify_tsk_p2_preauth_005_02.sh > evidence/phase2/tsk_p2_preauth_005_02.json || exit 1
  - >-
    # [ID tsk_p2_preauth_005_02_work_item_01]
    test -f schema/migrations/0120_create_state_transitions.sql || exit 1
  - >-
    # [ID tsk_p2_preauth_005_02_work_item_03]
    test -f evidence/phase2/tsk_p2_preauth_005_02.json || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_005_02.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - table_exists
      - primary_key_present

failure_modes:
  - "Table not created => CRITICAL_FAIL"
  - "PRIMARY KEY missing => CRITICAL_FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-005-02/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-005-02/EXEC_LOG.md

notes: >-
  This task blocks TSK-P2-PREAUTH-005-03. Phase Key: PRE-PHASE2. Phase Name: Pre-Phase 2 Implementation.

client: cursor
assigned_agent: db_foundation
model: <UNASSIGNED>
