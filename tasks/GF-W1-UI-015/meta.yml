schema_version: 1
phase: '1'
task_id: GF-W1-UI-015
title: Implement operational criteria section showing 5 criteria with status indicators and verification methods
owner_role: ARCHITECT
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: APP_LAYER
intent: >-
  Implement operational criteria section showing 5 criteria with status indicators and verification
  methods to enable stakeholders to view real-time validation of Symphony's operational compliance
  posture. This section displays criteria such as worker onboarding completeness, token issuance
  flow validation, and monitoring report accuracy with color-coded status indicators and clickable
  detail access.
anti_patterns:
  - "Hardcoding criterion statuses instead of fetching from API"
  - "Missing verification method display for criteria"
  - "Status indicators not color-coded according to UI canonical design rules"
  - "Criteria not clickable for detail access"
  - "Category badge missing or not computed from criteria statuses"
depends_on:
  - GF-W1-UI-014
blocks:
  - GF-W1-UI-016
touches:
  - src/supervisory-dashboard/index.html
  - evidence/phase1/gf_w1_ui_015.json
  - tasks/GF-W1-UI-015/meta.yml
invariants: []
work:
  - '[ID gf_w1_ui_015_work_item_01] Add operational criteria card HTML structure in category-operational placeholder'
  - '[ID gf_w1_ui_015_work_item_02] Reuse renderCategory() function with operational-specific data'
  - '[ID gf_w1_ui_015_work_item_03] Add criterion rows with status indicators using ✓ ⧗ ✗ symbols with green/amber/red colors'
  - '[ID gf_w1_ui_015_work_item_04] Add verification method display for each criterion from criterion data'
  - '[ID gf_w1_ui_015_work_item_05] Add click handler to criterion rows calling showCriterionDetail(id)'
  - '[ID gf_w1_ui_015_work_item_06] Add category status badge showing ALL PASS (green) or ATTENTION REQUIRED (red)'
acceptance_criteria:
  - '[ID gf_w1_ui_015_work_item_01] Operational criteria card structure exists in category-operational div'
  - '[ID gf_w1_ui_015_work_item_02] renderCategory() generates operational criterion rows from data correctly'
  - '[ID gf_w1_ui_015_work_item_03] Status indicators display with correct symbols and colors (green/amber/red)'
  - '[ID gf_w1_ui_015_work_item_04] Verification methods are visible for all criteria'
  - '[ID gf_w1_ui_015_work_item_05] Clicking criterion row opens detail panel'
  - '[ID gf_w1_ui_015_work_item_06] Category badge shows correct status based on criteria'
negative_tests:
  - id: GF-W1-UI-015-N1
    description: >-
      Verify that criterion statuses are not hardcoded but fetched from API data.
    required: true
  - id: GF-W1-UI-015-N2
    description: >-
      Verify that verification methods are displayed from criterion data, not hardcoded.
    required: true
positive_tests:
  - id: GF-W1-UI-015-P1
    description: >-
      Verify that operational criteria section displays correctly with all 5 criteria.
    required: true
verification:
  - grep -q 'category-operational' src/supervisory-dashboard/index.html || exit 1
  - test -f evidence/phase1/gf_w1_ui_015.json || exit 1
evidence:
  - path: evidence/phase1/gf_w1_ui_015.json
    must_include:
      - task_id
      - timestamp
      - status
      - operational_criteria_card_created
      - render_category_reused
      - criterion_rows_with_status_indicators
      - verification_methods_displayed
      - click_handler_wired
      - category_badge_present
      - checks
      - observed_paths
      - command_outputs
      - execution_trace
failure_modes:
  - "Criterion statuses hardcoded => FUNCTIONAL.STALE_STATUS_DISPLAY => FAIL"
  - "Verification methods missing => GOVERNANCE.INCOMPLETE_VERIFICATION_INFO => FAIL"
  - "Status indicators not color-coded => UI.DESIGN_VIOLATION => FAIL"
  - "Criteria not clickable => FUNCTIONAL.NO_DETAIL_ACCESS => FAIL"
  - "Category badge missing => FUNCTIONAL.INCOMPLETE_STATUS_SUMMARY => FAIL"
must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - .kiro/steering/ui-canonical-design.md
  - docs/operations/PILOT_DEMO_VIDEO_SCRIPT.md
implementation_plan: docs/plans/phase1/GF-W1-UI-015/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-UI-015/EXEC_LOG.md
notes: >-
  This task implements the operational criteria section with 5 criteria. Reuses renderCategory()
  function from GF-W1-UI-014. Criterion statuses and verification methods are fetched from API
  data, not hardcoded. Color-coded status indicators follow UI canonical design rules.
  Phase: Green Finance Wave 1. Domain: green_finance.
client: kiro
assigned_agent: architect
model: claude-sonnet-4-20250514
domain: green_finance
pilot: true
second_pilot_test: >-
  The operational criteria section pattern works for any programme requiring compliance dashboard.
  For PWRM0001 plastic collection, the section shows operational criteria like worker onboarding
  completeness and token issuance flow validation. For a hypothetical VM0044 solar energy programme,
  the section would show operational criteria like technician certification validation and equipment
  installation verification. The section structure, renderCategory() reuse, status indicators,
  verification method display, click handlers, and category badge are identical; only the criteria
  content differs per programme.
pilot_scope_ref: docs/pilots/PILOT_PWRM0001/SCOPE.md
