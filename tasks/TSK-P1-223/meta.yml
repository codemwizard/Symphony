schema_version: 1
phase: '1'
task_id: TSK-P1-223
title: Build a task metadata loader primitive so that Wave 1 verification can read
  task contracts deterministically
owner_role: SECURITY_GUARDIAN
status: completed
depends_on:
- TSK-P1-222
touches:
- scripts/audit/task_meta_loader.py
- scripts/audit/verify_tsk_p1_223.sh
- evidence/phase1/tsk_p1_223_task_meta_loader.json
- tasks/TSK-P1-223/meta.yml
- docs/plans/phase1/TSK-P1-223/PLAN.md
- docs/plans/phase1/TSK-P1-223/EXEC_LOG.md
invariants:
- INV-105
- INV-119
work:
- '[ID tsk_p1_223_work_item_01] Implement `scripts/audit/task_meta_loader.py` to load
  a task `meta.yml` into a deterministic in-memory structure suitable for later runner/gate
  use.'
- '[ID tsk_p1_223_work_item_02] Reject malformed metadata shape with explicit loader
  errors instead of silent fallthrough or partial parsing.'
- '[ID tsk_p1_223_work_item_03] Add a task-specific verifier that exercises valid
  and malformed metadata inputs and emits Phase-1 evidence for deterministic loader
  behavior.'
acceptance_criteria:
- '[ID tsk_p1_223_work_item_01] The loader reads valid task metadata deterministically
  and returns the same normalized structure for identical input on repeated runs.'
- '[ID tsk_p1_223_work_item_02] Malformed or structurally invalid metadata produces
  explicit non-zero failure instead of partial success or silent field omission.'
- '[ID tsk_p1_223_work_item_03] `scripts/audit/verify_tsk_p1_223.sh` validates loader
  pass/fail behavior and writes `evidence/phase1/tsk_p1_223_task_meta_loader.json`.'
verification:
- '# [ID tsk_p1_223_work_item_01] [ID tsk_p1_223_work_item_02] [ID tsk_p1_223_work_item_03]
  test -x scripts/audit/verify_tsk_p1_223.sh && bash scripts/audit/verify_tsk_p1_223.sh
  > evidence/phase1/tsk_p1_223_task_meta_loader.json || exit 1'
- '# [ID tsk_p1_223_work_item_03] test -f evidence/phase1/tsk_p1_223_task_meta_loader.json
  && cat evidence/phase1/tsk_p1_223_task_meta_loader.json | grep "deterministic_output_hash"
  || exit 1'
- '# [ID tsk_p1_223_work_item_03] test -x scripts/dev/pre_ci.sh && RUN_PHASE1_GATES=1
  bash scripts/dev/pre_ci.sh || exit 1'
evidence:
- '{''path'': ''evidence/phase1/tsk_p1_223_task_meta_loader.json'', ''must_include'':
  [''task_id'', ''git_sha'', ''timestamp_utc'', ''status'', ''checks'', ''observed_paths'',
  ''observed_hashes'', ''command_outputs'', ''execution_trace'', ''loaded_task_id'',
  ''deterministic_output_hash'', ''malformed_case_result'']}'
failure_modes:
- Loader returns different structures for identical metadata input => FAIL
- Malformed metadata is accepted without explicit failure => BLOCKED
- Evidence file missing => FAIL
must_read:
- docs/operations/AI_AGENT_OPERATION_MANUAL.md
- AGENT_ENTRYPOINT.md
- docs/operations/AGENT_PROMPT_ROUTER.md
- docs/reference/rls-remediation-final-plan.md
- docs/reference/rls-remediation-first-five-tasks.md
implementation_plan: docs/plans/phase1/TSK-P1-223/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-223/EXEC_LOG.md
notes: This is a primitive task only. It must not absorb runner behavior, CI wiring,
  or deep gate logic. Keep the loader deterministic and narrowly scoped.
