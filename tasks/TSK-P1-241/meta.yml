  \ tasks/TSK-P1-241 docs/plans/phase1/TSK-P1-241 docs/tasks >/dev/null && bash scripts/audit/verify_task_meta_schema.sh\
  \ --mode strict --allow-legacy --root tasks/TSK-P1-241 --json > /tmp/tsk_p1_241_meta_schema.json\
  \ && bash scripts/audit/verify_task_pack_readiness.sh --task TSK-P1-241 --json >\
  \ /tmp/tsk_p1_241_pack_readiness.json && python3 - <<'\"'\"'PY'\"'\"' > evidence/phase1/tsk_p1_241_parent_task_pack.json\
  \ import hashlib import json from pathlib import Path\nroot = Path('.') observed_files\
  \ = sorted(str(p) for p in (root / 'tasks' / 'TSK-P1-241').glob('*')) observed_files\
  \ += sorted(str(p) for p in (root / 'docs' / 'plans' / 'phase1' / 'TSK-P1-241').glob('*'))\
  \ observed_files += ['docs/tasks/DEFERRED_INBOX.md', 'docs/tasks/PHASE1_GOVERNANCE_TASKS.md']\n\
  def digest(path_str):\n    path = root / path_str\n    return hashlib.sha256(path.read_bytes()).hexdigest()\
  \ if path.exists() else None\n\nmeta_report = json.loads(Path('/tmp/tsk_p1_241_meta_schema.json').read_text())\
  \ readiness_report = json.loads(Path('/tmp/tsk_p1_241_pack_readiness.json').read_text())\n\
  report = {\n    'task_id': 'TSK-P1-241',\n    'git_sha': 'UNSET',\n    'timestamp_utc':\
  \ 'UNSET',\n    'status': 'PASS' if meta_report['status'] == 'PASS' and readiness_report['status']\
  \ == 'PASS' else 'FAIL',\n    'checks': {\n        'task_meta_schema': meta_report['status'],\n\
  \        'task_pack_readiness': readiness_report['status'],\n    },\n    'observed_paths':\
  \ observed_files,\n    'observed_hashes': {path: digest(path) for path in observed_files},\n\
  \    'command_outputs': {\n        'task_meta_schema': meta_report,\n        'task_pack_readiness':\
  \ readiness_report,\n    },\n    'execution_trace': [\n        'bash scripts/audit/verify_task_meta_schema.sh\
  \ --mode strict --allow-legacy --root tasks/TSK-P1-241 --json',\n        'bash scripts/audit/verify_task_pack_readiness.sh\
  \ --task TSK-P1-241 --json',\n    ],\n    'child_task_boundaries': [\n        'TSK-P1-242:runtime_host_path_authority',\n\
  \        'guarded_execution_core',\n        'repository_filesystem_integrity',\n\
  \        'evidence_finalization',\n        'adversarial_verifier_suite',\n     \
  \   'optional_invariant_promotion',\n    ],\n    'dependency_edges': [\n       \
  \ 'TSK-P1-241->TSK-P1-242',\n        'TSK-P1-242->guarded_execution_core',\n   \
  \     'guarded_execution_core->repository_filesystem_integrity',\n        'guarded_execution_core->evidence_finalization',\n\
  \        'repository_filesystem_integrity+evidence_finalization->adversarial_verifier_suite',\n\
  \    ],\n    'inbox_entry_ref': 'docs/tasks/DEFERRED_INBOX.md',\n    'phase1_index_ref':\
  \ 'docs/tasks/PHASE1_GOVERNANCE_TASKS.md',\n}\nprint(json.dumps(report, indent=2))\
  \ if report['status'] != 'PASS':\n    raise SystemExit(1)\nPY' || exit 1"
