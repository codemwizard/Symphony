schema_version: 1
phase: '1'
task_id: TSK-P1-241
title: "Create the runtime-integrity parent task graph so implementation starts from narrow repo-local child tasks"
owner_role: SUPERVISOR
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY
intent: >-
  The runtime-integrity sandbox line was being treated as one broad work item, which
  violates the repo's anti-drift rule that tasks must have one primary proof obligation
  and split when owner/path surfaces diverge. This parent task creates the authoritative
  repo-local scheduling scaffold for TSK-P1-241 so the work is decomposed into narrow
  child tasks with explicit dependency edges before any runtime implementation begins.
anti_patterns:
  - "Treating TSK-P1-241 as the entire runtime implementation bundle instead of a parent scheduling task"
  - "Assuming a runtime host path before the repo has assigned authority for it"
  - "Creating child implementation tasks without a repo-local parent graph and canonical reminder trail"
depends_on:
  - TSK-P1-239
blocks:
  - TSK-P1-242
touches:
  - docs/tasks/DEFERRED_INBOX.md
  - docs/tasks/PHASE1_GOVERNANCE_TASKS.md
  - tasks/TSK-P1-241/meta.yml
  - docs/plans/phase1/TSK-P1-241/PLAN.md
  - docs/plans/phase1/TSK-P1-241/EXEC_LOG.md
  - evidence/phase1/tsk_p1_241_parent_task_pack.json
invariants:
  - INV-105
  - INV-119
work:
  - >-
    [ID tsk_p1_241_parent_work_item_01] Create the repo-local parent task pack for
    TSK-P1-241 with the canonical Phase-1 plan and execution log paths.
  - >-
    [ID tsk_p1_241_parent_work_item_02] Register a deferred inbox reminder for the
    unresolved runtime host-path and ownership decision so the blocker is tracked
    without ad hoc scheduling.
  - >-
    [ID tsk_p1_241_parent_work_item_03] Register TSK-P1-241 in the Phase-1 governance
    task index so the parent scheduling task is visible as an executable repo-local
    contract.
  - >-
    [ID tsk_p1_241_parent_work_item_04] Define the first child-task boundaries and
    dependency order in the parent plan without bundling runtime implementation into
    this task.
acceptance_criteria:
  - >-
    [ID tsk_p1_241_parent_work_item_01] The repo contains a TSK-P1-241 parent task
    pack with a phase-1 plan path and execution log path that resolve correctly.
  - >-
    [ID tsk_p1_241_parent_work_item_02] [ID tsk_p1_241_parent_work_item_03] The
    deferred inbox and Phase-1 governance index both reference TSK-P1-241 as a
    repo-local scheduling task.
  - >-
    [ID tsk_p1_241_parent_work_item_04] The parent plan defines narrow child-task
    boundaries and dependency order without claiming runtime implementation or
    host-path resolution is complete.
negative_tests:
  - id: TSK-P1-241-N1
    description: >-
      If the parent plan claims runtime implementation completion or treats the
      unresolved host-path decision as already settled, the parent task pack must be
      considered invalid.
    required: true
positive_tests:
  - id: TSK-P1-241-P1
    description: >-
      The parent task pack passes task-meta schema and task-pack readiness checks
      while remaining limited to scheduling and decomposition scope.
    required: false
verification:
  - >-
    # [ID tsk_p1_241_parent_work_item_01] [ID tsk_p1_241_parent_work_item_02]
    # [ID tsk_p1_241_parent_work_item_03] [ID tsk_p1_241_parent_work_item_04]
    bash -lc 'ls tasks/TSK-P1-241 docs/plans/phase1/TSK-P1-241 docs/tasks >/dev/null &&
    bash scripts/audit/verify_task_meta_schema.sh --mode strict --allow-legacy --root tasks/TSK-P1-241 --json > /tmp/tsk_p1_241_meta_schema.json &&
    bash scripts/audit/verify_task_pack_readiness.sh --task TSK-P1-241 --json > /tmp/tsk_p1_241_pack_readiness.json &&
    python3 - <<'"'"'PY'"'"' > evidence/phase1/tsk_p1_241_parent_task_pack.json
    import hashlib
    import json
    from pathlib import Path

    root = Path('.')
    observed_files = sorted(str(p) for p in (root / 'tasks' / 'TSK-P1-241').glob('*'))
    observed_files += sorted(str(p) for p in (root / 'docs' / 'plans' / 'phase1' / 'TSK-P1-241').glob('*'))
    observed_files += ['docs/tasks/DEFERRED_INBOX.md', 'docs/tasks/PHASE1_GOVERNANCE_TASKS.md']

    def digest(path_str):
        path = root / path_str
        return hashlib.sha256(path.read_bytes()).hexdigest() if path.exists() else None

    meta_report = json.loads(Path('/tmp/tsk_p1_241_meta_schema.json').read_text())
    readiness_report = json.loads(Path('/tmp/tsk_p1_241_pack_readiness.json').read_text())

    report = {
        'task_id': 'TSK-P1-241',
        'git_sha': 'UNSET',
        'timestamp_utc': 'UNSET',
        'status': 'PASS' if meta_report['status'] == 'PASS' and readiness_report['status'] == 'PASS' else 'FAIL',
        'checks': {
            'task_meta_schema': meta_report['status'],
            'task_pack_readiness': readiness_report['status'],
        },
        'observed_paths': observed_files,
        'observed_hashes': {path: digest(path) for path in observed_files},
        'command_outputs': {
            'task_meta_schema': meta_report,
            'task_pack_readiness': readiness_report,
        },
        'execution_trace': [
            'bash scripts/audit/verify_task_meta_schema.sh --mode strict --allow-legacy --root tasks/TSK-P1-241 --json',
            'bash scripts/audit/verify_task_pack_readiness.sh --task TSK-P1-241 --json',
        ],
        'child_task_boundaries': [
            'TSK-P1-242:runtime_host_path_authority',
            'guarded_execution_core',
            'repository_filesystem_integrity',
            'evidence_finalization',
            'adversarial_verifier_suite',
            'optional_invariant_promotion',
        ],
        'dependency_edges': [
            'TSK-P1-241->TSK-P1-242',
            'TSK-P1-242->guarded_execution_core',
            'guarded_execution_core->repository_filesystem_integrity',
            'guarded_execution_core->evidence_finalization',
            'repository_filesystem_integrity+evidence_finalization->adversarial_verifier_suite',
        ],
        'inbox_entry_ref': 'docs/tasks/DEFERRED_INBOX.md',
        'phase1_index_ref': 'docs/tasks/PHASE1_GOVERNANCE_TASKS.md',
    }

    print(json.dumps(report, indent=2))
    if report['status'] != 'PASS':
        raise SystemExit(1)
    PY' || exit 1
  - >-
    # [ID tsk_p1_241_parent_work_item_01] [ID tsk_p1_241_parent_work_item_02]
    # [ID tsk_p1_241_parent_work_item_03] [ID tsk_p1_241_parent_work_item_04]
    bash -lc 'test -f evidence/phase1/tsk_p1_241_parent_task_pack.json &&
    cat evidence/phase1/tsk_p1_241_parent_task_pack.json | grep '"status": "PASS"' >/dev/null &&
    cat evidence/phase1/tsk_p1_241_parent_task_pack.json | grep 'child_task_boundaries' >/dev/null' || exit 1
evidence:
  - path: evidence/phase1/tsk_p1_241_parent_task_pack.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace
      - child_task_boundaries
      - dependency_edges
      - inbox_entry_ref
      - phase1_index_ref
failure_modes:
  - "Parent task pack omits the repo-local reminder or governance index registration => FAIL"
  - "Parent plan still bundles runtime implementation into the scheduling task => BLOCKED"
  - "Evidence file missing => FAIL"
must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - AGENT_ENTRYPOINT.md
  - docs/operations/AGENT_PROMPT_ROUTER.md
  - docs/contracts/templates/PLAN_TEMPLATE.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - tasks/TSK-P1-239/meta.yml
implementation_plan: docs/plans/phase1/TSK-P1-241/PLAN.md
implementation_log: docs/plans/phase1/TSK-P1-241/EXEC_LOG.md
notes: >-
  TSK-P1-241 is the parent scheduling and decomposition task only. It creates the
  repo-local contract and dependency edges for narrower child tasks and must not
  absorb runtime implementation or host-path resolution work.
client: codex_ide
assigned_agent: supervisor
model: Cascade
