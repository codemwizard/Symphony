schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-002-00
title: "Create PLAN.md and verify alignment for factor_registry"
owner_role: DB_FOUNDATION
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY

intent: >-
  This task creates the PLAN.md for the factor_registry and unit_conversions tables.
  Without a verified plan, the schema changes lack architectural documentation and
  verification trace, creating risk of incomplete or incorrect implementation of
  factor tracking and unit conversion logic.

anti_patterns:
  - "Creating PLAN.md after implementation has started"
  - "Writing PLAN.md without explicit tracking IDs for work items"
  - "Omitting stop conditions or proof limitations"

out_of_scope:
  - "Actual migration writing (deferred to TSK-P2-PREAUTH-002-01)"
  - "Data migration or backfill"
  - "Application layer changes"

stop_conditions:
  - "If verify_plan_semantic_alignment.py fails with orphaned nodes"
  - "If the plan lacks explicit verifier specifications"
  - "If the plan lacks negative test definitions"

proof_guarantees:
  - "PLAN.md exists at docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md"
  - "PLAN.md passes verify_plan_semantic_alignment.py validation"

proof_limitations:
  - "Cannot verify that the plan content is technically correct without implementation"
  - "Cannot verify that the migrations will actually create the correct schema"

depends_on:
  - TSK-P2-CCG-001-01
blocks:
  - TSK-P2-PREAUTH-002-01

touches:
  - docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md
  - tasks/TSK-P2-PREAUTH-002-00/meta.yml

invariants: []

work:
  - >-
    [ID tsk_p2_preauth_002_00_work_item_01] Create PLAN.md at docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md
    from PLAN_TEMPLATE.md with objective, architectural context, pre-conditions, files to change,
    stop conditions, implementation steps, verification, evidence contract, rollback, and risk sections.
  - >-
    [ID tsk_p2_preauth_002_00_work_item_02] Document the factor_registry table requirements including
    columns: factor_id UUID PRIMARY KEY, factor_code VARCHAR NOT NULL, factor_name VARCHAR NOT NULL,
    unit VARCHAR NOT NULL, and UNIQUE constraint on factor_code.
  - >-
    [ID tsk_p2_preauth_002_00_work_item_03] Document the unit_conversions table requirements including
    columns: conversion_id UUID PRIMARY KEY, from_unit VARCHAR NOT NULL, to_unit VARCHAR NOT NULL,
    conversion_factor NUMERIC NOT NULL, and UNIQUE constraint on (from_unit, to_unit).
  - >-
    [ID tsk_p2_preauth_002_00_work_item_04] Run verify_plan_semantic_alignment.py to validate
    proof graph integrity: python3 scripts/audit/verify_plan_semantic_alignment.py
    --plan docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md --meta tasks/TSK-P2-PREAUTH-002-00/meta.yml

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_002_00_work_item_01] PLAN.md exists at docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md
    and contains all required sections.
  - >-
    [ID tsk_p2_preauth_002_00_work_item_02] PLAN.md documents factor_registry table with factor_code UNIQUE constraint.
  - >-
    [ID tsk_p2_preauth_002_00_work_item_03] PLAN.md documents unit_conversions table with (from_unit, to_unit) UNIQUE constraint.
  - >-
    [ID tsk_p2_preauth_002_00_work_item_04] verify_plan_semantic_alignment.py exits 0 with
    NO_ORPHANS=true and GRAPH_CONNECTED=true.

negative_tests:
  - id: TSK-P2-PREAUTH-002-00-N1
    description: >-
      Verify that verify_plan_semantic_alignment.py fails on a plan with orphaned work items
      (missing acceptance criteria mapping).
    required: true

positive_tests: []

verification:
  - >-
    # [ID tsk_p2_preauth_002_00_work_item_01]
    test -f docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md || exit 1
  - >-
    # [ID tsk_p2_preauth_002_00_work_item_02]
    grep -q "factor_registry" docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md &&
    grep -q "factor_code" docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md || exit 1
  - >-
    # [ID tsk_p2_preauth_002_00_work_item_03]
    grep -q "unit_conversions" docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md &&
    grep -q "from_unit" docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md || exit 1
  - >-
    # [ID tsk_p2_preauth_002_00_work_item_04]
    python3 scripts/audit/verify_plan_semantic_alignment.py --plan docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md --meta tasks/TSK-P2-PREAUTH-002-00/meta.yml || exit 1
  - >-
    python3 scripts/audit/validate_evidence.py --task TSK-P2-PREAUTH-002-00 --evidence evidence/phase2/tsk_p2_preauth_002_00.json || exit 1
  - >-
    RUN_PHASE2_GATES=1 bash scripts/dev/pre_ci.sh || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_002_00.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - plan_path
      - graph_validation_enabled
      - no_orphans
      - graph_connected

failure_modes:
  - "PLAN.md missing => CRITICAL_FAIL"
  - "verify_plan_semantic_alignment.py fails => FAIL"
  - "PLAN lacks table documentation => FAIL_REVIEW"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/contracts/templates/PLAN_TEMPLATE.md
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-002-00/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-002-00/EXEC_LOG.md

notes: >-
  This task depends on TSK-P2-CCG-001-01 and blocks TSK-P2-PREAUTH-002-01.
  Phase Key: PRE-PHASE2. Phase Name: Pre-Phase 2 Implementation.

