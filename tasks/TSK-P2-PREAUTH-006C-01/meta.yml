    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - enum_exists
      - enum_values_present

failure_modes:
  - "Enum not created => CRITICAL_FAIL"
  - "Enum values missing => CRITICAL_FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

