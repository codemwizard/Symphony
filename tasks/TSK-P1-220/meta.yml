work:
- Implement the single supported bootstrap entrypoint for the hardened GreenTech4CE demo. The
  bootstrap must start dependencies, initialize or verify OpenBao secret material, run migrations,
  verify control-plane readiness, start the application, and fail closed on any missing prerequisite.
- Remove manual key generation, manual secret export choreography, and other provisional deployment
  steps from the supported deployment path.
- Retire any helper script whose purpose is to generate env secrets for the demo as the endorsed path.
  Such helpers may remain only if clearly marked developer-only and excluded from the hardened guide.
acceptance_criteria:
- A single documented bootstrap command brings up the hardened demo from a clean checkout.
- The bootstrap flow provisions or verifies required OpenBao-backed secrets instead of asking the
  operator to mint and export them manually.
- The bootstrap flow runs migrations and verifies readiness before declaring success.
- The supported deployment guide no longer instructs manual secret generation or multi-step shell
  choreography for the hardened path.
verification:
- bash scripts/audit/verify_tsk_p1_220.sh
