schema_version: 1
phase: '1'
task_id: GF-W1-UI-006
title: "Monitoring Report tab: full financial report display"
owner_role: SUPERVISOR
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: APP_LAYER

intent: >-
  Implement the Monitoring Report tab with disbursement banner, additionality row,
  plastic totals table, tCO₂/credits row, benefit-sharing three-way split, ZGFT
  alignment chips, and Generate Report button. This is the primary financial
  transparency view.

anti_patterns:
  - "Using floating-point for currency instead of the steering file constants"
  - "Omitting the (indicative) qualifier from financial values"
  - "Hardcoding benefit-sharing percentages instead of using BENEFIT_SHARE constant"
  - "Not showing additionality row or hiding it when baseline is zero"

out_of_scope:
  - "Programme Health tab — done in GF-W1-UI-003/004/005"
  - "Onboarding Console — handled by GF-W1-UI-007"
  - "E2E verification — handled by GF-W1-UI-010"

stop_conditions:
  - "Financial values displayed without (indicative) qualifier => FAIL"
  - "Additionality row missing or baseline not explicitly shown => FAIL"
  - "Benefit-sharing block missing or percentages don't sum to 100% => FAIL"
  - "tCO₂ constant is not 0.00048 => CRITICAL_FAIL"
  - "PRICE_PER_TCO2_ZMW is not 150.0 => CRITICAL_FAIL"
  - "Any node in the proof graph is orphaned => STOP"

proof_guarantees:
  - "grep verifies additionality row text pattern exists"
  - "grep verifies benefit-sharing labels with percentages"
  - "grep verifies indicative qualifier presence"
  - "grep verifies canonical constants 0.00048 and 150.0"

proof_limitations:
  - "Financial computation correctness requires live API and manual cross-check"
  - "Visual layout (3 sections filling 100vh) requires browser inspection"
  - "Generate Report button functionality requires manual testing"

depends_on:
  - GF-W1-UI-002

blocks:
  - GF-W1-UI-010

touches:
  - src/supervisory-dashboard/index.html
  - tasks/GF-W1-UI-006/meta.yml
  - evidence/phase1/gf_w1_ui_006.json

invariants:
  - INV-GF-UI-002
  - INV-GF-UI-004
  - INV-GF-UI-005

work:
  - >-
    [ID gf_w1_ui_006_work_01] Section 1 (~20%): Disbursement status banner (same
    red/green logic as Task 3 but from monitoring report API).
  - >-
    [ID gf_w1_ui_006_work_02] Section 2 (~50%): (a) Additionality row: "Baseline:
    0 kg | Actual: N kg | Additionality: +N kg ● GREEN". Always shown. Green chip
    when actual > 0, amber when 0. (b) Plastic totals table: PET, HDPE, LDPE, PP,
    PS, OTHER, TOTAL with kg values. (c) tCO₂ and credits row: "Estimated tCO₂: X
    | Estimated Credits: X credits (1 credit = 1 tCO₂, indicative)".
  - >-
    [ID gf_w1_ui_006_work_03] Section 3 (~30%): (a) Benefit sharing block (always
    shown, values "(indicative)"): "Project Developer (50%): ZMW X", "Community
    (30%): ZMW X", "National Fund (20%): ZMW X". (b) Three ZGFT alignment chips
    (green): "Pollution Prevention ✓", "Circular Economy ✓", "DNSH Declared ✓".
    (c) "Generate Report" button with amber spinner while in-flight.
  - >-
    [ID gf_w1_ui_006_work_04] Wire to GET /pilot-demo/api/monitoring-report/{programId}
    on tab load and button click. Use TCO2_PER_KG = 0.00048, PRICE_PER_TCO2_ZMW = 150.0,
    BENEFIT_SHARE = {0.50, 0.30, 0.20} from steering file constants.

acceptance_criteria:
  - >-
    [ID gf_w1_ui_006_work_01] Disbursement banner shows red/green based on completeness
    from monitoring report endpoint.
  - >-
    [ID gf_w1_ui_006_work_02] Additionality row shows "Baseline: 0 kg | Actual: N kg |
    Additionality: +N kg". Plastic totals table shows all 6 types + TOTAL. tCO₂ and
    credits row shows with (indicative) qualifier.
  - >-
    [ID gf_w1_ui_006_work_03] Benefit sharing shows three rows with 50%/30%/20% split,
    all marked (indicative). ZGFT chips all green. Generate Report button works.
  - >-
    [ID gf_w1_ui_006_work_04] Data wired to monitoring-report API. Constants match
    steering file exactly: 0.00048, 150.0, {0.50, 0.30, 0.20}.

negative_tests:
  - id: GF-W1-UI-006-N1
    description: >-
      Grep for financial value patterns (ZMW, tCO₂, credits) not followed by "(indicative)"
      or "(est.)" within the monitoring report tab section. Any unqualified financial
      value => FAIL.
    required: true

positive_tests:
  - id: GF-W1-UI-006-P1
    description: >-
      Grep for additionality row "Baseline" and benefit sharing "Project Developer (50%)"
      text patterns. Both must be present.
    required: true

verification:
  - >-
    # [ID gf_w1_ui_006_work_01] [ID gf_w1_ui_006_work_02]
    # [ID gf_w1_ui_006_work_03] [ID gf_w1_ui_006_work_04]
    test -f src/supervisory-dashboard/index.html
    && grep -q "Baseline" src/supervisory-dashboard/index.html
    && grep -q "Additionality" src/supervisory-dashboard/index.html
    && grep -q "Project Developer" src/supervisory-dashboard/index.html
    && grep -q "indicative" src/supervisory-dashboard/index.html
    && grep -q "0.00048" src/supervisory-dashboard/index.html
    && cat src/supervisory-dashboard/index.html | grep "monitoring-report"
    > evidence/phase1/gf_w1_ui_006.json || exit 1
  - >-
    # [ID gf_w1_ui_006_work_03]
    test -f src/supervisory-dashboard/index.html
    && grep -q "50%" src/supervisory-dashboard/index.html
    && grep -q "30%" src/supervisory-dashboard/index.html
    && cat src/supervisory-dashboard/index.html | grep "20%"
    || exit 1

evidence:
  - path: evidence/phase1/gf_w1_ui_006.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace
      - additionality_row_verified
      - benefit_sharing_verified

failure_modes:
  - Financial values without (indicative) qualifier => FAIL
  - Additionality row missing => FAIL
  - Benefit-sharing percentages don't sum to 100% => FAIL
  - Constants don't match steering file => CRITICAL_FAIL
  - Evidence file missing => FAIL

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - .kiro/steering/ui-canonical-design.md
  - .kiro/steering/pwrm0001-domain-rules.md
  - .kiro/steering/symphony-platform-conventions.md
  - .kiro/specs/symphony-ui-canonical/requirements.md
  - .kiro/specs/symphony-ui-canonical/design.md
  - .kiro/specs/symphony-ui-canonical/tasks.md

implementation_plan: docs/plans/phase1/GF-W1-UI-006/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-UI-006/EXEC_LOG.md

notes: >-
  Atomic task 6 of 10. The primary financial transparency view. Enforces 3 invariants:
  additionality display, benefit-sharing, and carbon credits unit of account.
  Phase Key: GF-W1. Phase Name: Green Finance Wave 1.

client: cursor
assigned_agent: supervisor
model: <UNASSIGNED>

domain: green_finance

