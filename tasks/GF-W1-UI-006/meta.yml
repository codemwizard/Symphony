    - "Unit labels: kg→kWh, but structure identical"
  jurisdiction_profile_impact: "None — financial logic is methodology-driven not jurisdiction-driven"
  required_core_changes: []
  explanation: >-
    The monitoring report structure (disbursement banner, additionality row, totals
    table, tCO₂/credits, benefit-sharing, ZGFT chips) is sector-neutral. Only the
    unit labels, type breakdown columns, and conversion constants change. The
    benefit-sharing three-way split is methodology-agnostic.
  second_pilot_reviewed_by: "Supervisor (automated review)"

