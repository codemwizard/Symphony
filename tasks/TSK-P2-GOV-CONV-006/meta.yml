schema_version: 1
phase: '2'
task_id: TSK-P2-GOV-CONV-006
title: "Create canonical Phase-2 contract verifier"
owner_role: SECURITY_GUARDIAN
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: CI_GATES

intent: >-
  After the Phase-2 machine contract is rewritten to invariant-centric rows, a
  reusable canonical verifier is needed to enforce row schema, status vocabulary,
  registered invariant references, verifier references, and evidence bindings. This
  task creates only scripts/audit/verify_phase2_contract.sh and its evidence output.
  It prevents fake Phase-2 contract compliance by making contract validity a
  deterministic check rather than a human review claim.

anti_patterns:
  - >-
    Creating a verifier that only greps for expected strings and cannot reject bad
    contract rows.
  - >-
    Wiring CI in the same task as verifier creation, making failures harder to
    attribute.
  - >-
    Accepting missing verifier or evidence paths as warnings instead of fail-closed
    contract violations.

out_of_scope:
  - Modifying docs/PHASE2/phase2_contract.yml except fixture-free read access
  - Modifying .github/workflows/** or scripts/dev/pre_ci.sh
  - Writing docs/PHASE2/PHASE2_CONTRACT.md
  - Writing docs/operations/AGENTIC_SDLC_PHASE2_POLICY.md
  - Creating ratification approval artifacts

stop_conditions:
  - >-
    STOP if TSK-P2-GOV-CONV-005 is incomplete or docs/PHASE2/phase2_contract.yml
    still contains task_id-keyed rows.
  - >-
    STOP if the verifier cannot inspect YAML structure as structured data.
  - >-
    STOP if any required contract violation would be reported only as a warning.
  - >-
    STOP if approval metadata is absent before editing scripts/audit/** or evidence/**.

proof_guarantees:
  - >-
    scripts/audit/verify_phase2_contract.sh fails closed for malformed Phase-2
    contract rows.
  - >-
    The verifier rejects invalid status values, missing invariant IDs, unregistered
    invariant IDs, missing verifier references, and missing evidence bindings.
  - >-
    The evidence records checked rows and concrete violation arrays.

proof_limitations:
  - >-
    This task does not wire the verifier into CI or pre_ci; that is TSK-P2-GOV-CONV-007.
  - >-
    This task does not prove each referenced verifier's full semantic strength.
  - >-
    This task does not create human-readable Phase-2 contract or policy documents.

depends_on:
  - TSK-P2-GOV-CONV-005
blocks:
  - TSK-P2-GOV-CONV-007
  - TSK-P2-GOV-CONV-012

touches:
  - scripts/audit/verify_phase2_contract.sh
  - evidence/phase2/phase2_contract_status.json
  - tasks/TSK-P2-GOV-CONV-006/meta.yml
  - docs/plans/phase2/TSK-P2-GOV-CONV-006/PLAN.md
  - docs/plans/phase2/TSK-P2-GOV-CONV-006/EXEC_LOG.md

deliverable_files:
  - scripts/audit/verify_phase2_contract.sh
  - evidence/phase2/phase2_contract_status.json
  - docs/plans/phase2/TSK-P2-GOV-CONV-006/PLAN.md
  - docs/plans/phase2/TSK-P2-GOV-CONV-006/EXEC_LOG.md

invariants:
  - INV-GOV-CONV-006

regulated_surface_compliance:
  enabled: true
  approval_workflow: stage_a_stage_b
  stage_a_required_before_edit: true
  regulated_paths:
    - scripts/audit/verify_phase2_contract.sh
    - evidence/phase2/phase2_contract_status.json
  must_read:
    - docs/operations/REGULATED_SURFACE_PATHS.yml
    - docs/operations/approval_metadata.schema.json

remediation_trace_compliance:
  enabled: true
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

work:
  - >-
    [ID gov_conv_006_w01] Create scripts/audit/verify_phase2_contract.sh to parse
    docs/PHASE2/phase2_contract.yml as structured YAML and validate required row
    fields.
  - >-
    [ID gov_conv_006_w02] Enforce allowed Phase-2 status values: phase1_prerequisite,
    planned, implemented, and deferred_to_phase3.
  - >-
    [ID gov_conv_006_w03] Enforce that every invariant_id is registered in
    docs/invariants/INVARIANTS_MANIFEST.yml and that every required row has verifier
    and evidence_path values.
  - >-
    [ID gov_conv_006_w04] Add negative fixture coverage for invalid status, missing
    invariant registration, missing verifier field, missing evidence_path field, and
    task_id-keyed rows.
  - >-
    [ID gov_conv_006_w05] Emit evidence/phase2/phase2_contract_status.json with
    total_rows, checked_rows, invalid_rows, missing_invariants, missing_verifiers,
    missing_evidence_paths, and task_id_rows_found.

acceptance_criteria:
  - >-
    [ID gov_conv_006_w01] The verifier parses YAML structure and does not rely only
    on literal grep checks.
  - >-
    [ID gov_conv_006_w02] The verifier exits non-zero for any status outside the
    allowed Phase-2 status set.
  - >-
    [ID gov_conv_006_w03] The verifier exits non-zero for unregistered invariant IDs
    or missing verifier/evidence_path values on required rows.
  - >-
    [ID gov_conv_006_w04] Each negative fixture fails for the expected reason.
  - >-
    [ID gov_conv_006_w05] Evidence records all violation arrays and exits PASS only
    when they are empty.

negative_tests:
  - id: TSK-P2-GOV-CONV-006-N1
    description: >-
      Run the verifier against a fixture contract with invalid status. It must exit
      non-zero and report invalid_rows.
    required: true
  - id: TSK-P2-GOV-CONV-006-N2
    description: >-
      Run the verifier against a fixture contract with an unregistered invariant_id.
      It must exit non-zero and report missing_invariants.
    required: true
  - id: TSK-P2-GOV-CONV-006-N3
    description: >-
      Run the verifier against a fixture contract missing verifier or evidence_path
      on a required row. It must exit non-zero.
    required: true
  - id: TSK-P2-GOV-CONV-006-N4
    description: >-
      Run the verifier against a fixture contract containing a task_id-keyed row.
      It must exit non-zero and report task_id_rows_found.
    required: true

positive_tests:
  - id: TSK-P2-GOV-CONV-006-P1
    description: >-
      Run the verifier against the live rewritten Phase-2 contract. It must emit
      PASS evidence with all violation arrays empty.
    required: true

verification:
  - >-
    # [ID gov_conv_006_w01] [ID gov_conv_006_w02] [ID gov_conv_006_w03] [ID gov_conv_006_w04] [ID gov_conv_006_w05]
    test -x scripts/audit/verify_phase2_contract.sh && bash scripts/audit/verify_phase2_contract.sh > evidence/phase2/phase2_contract_status.json || exit 1
  - >-
    python3 scripts/audit/validate_evidence.py --task TSK-P2-GOV-CONV-006 --evidence evidence/phase2/phase2_contract_status.json || exit 1
  - >-
    RUN_PHASE2_GATES=1 bash scripts/dev/pre_ci.sh || exit 1

evidence:
  - path: evidence/phase2/phase2_contract_status.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - total_rows
      - checked_rows
      - invalid_rows
      - missing_invariants
      - missing_verifiers
      - missing_evidence_paths
      - task_id_rows_found

failure_modes:
  - >-
    Verifier accepts malformed contract rows because it relies on shallow string
    matching => CRITICAL_FAIL
  - >-
    Verifier treats missing invariant, verifier, or evidence references as warnings
    instead of failures => CRITICAL_FAIL
  - >-
    Negative fixture exits 0 => CRITICAL_FAIL
  - >-
    Evidence file missing => FAIL

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/operations/TASK_AUTHORING_STANDARD_v2.md
  - docs/operations/PHASE_LIFECYCLE.md
  - docs/PHASE2/phase2_contract.yml
  - docs/invariants/INVARIANTS_MANIFEST.yml

implementation_plan: docs/plans/phase2/TSK-P2-GOV-CONV-006/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-GOV-CONV-006/EXEC_LOG.md
notes: >-
  This task creates the canonical verifier only. CI and local workflow wiring are
  intentionally deferred to TSK-P2-GOV-CONV-007 to keep change ownership narrow.
client: codex_cli
assigned_agent: security_guardian
model: UNASSIGNED