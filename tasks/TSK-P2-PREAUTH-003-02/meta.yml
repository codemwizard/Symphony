task_id: TSK-P2-PREAUTH-003-02
title: "Add interpretation_version_id FK to execution_records"
owner_role: DB_FOUNDATION
status: completed
priority: HIGH
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  This task adds interpretation_version_id foreign key to execution_records table to bind
  executions to interpretation packs. Without this FK, executions cannot be linked to
    interpretation versions, creating risk of non-reproducible calculations.

anti_patterns:
  - "Adding FK without ON DELETE behavior specified"
  - "Writing the migration without touching MIGRATION_HEAD"
  - "Writing the verifier after the migration is applied"

out_of_scope:
  - "Data migration or backfill"
  - "Application layer changes"
  - "Additional FKs"

stop_conditions:
  - "If migration does not add interpretation_version_id column"
  - "If FK constraint to interpretation_packs is missing"
  - "If MIGRATION_HEAD is not updated"

proof_guarantees:
  - "Migration adds interpretation_version_id column"
  - "FK constraint to interpretation_packs is present"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the FK cascade behavior is correct for all scenarios"
  - "Cannot verify that existing data is compatible"

