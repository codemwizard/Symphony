schema_version: 1
phase: '1'
task_id: GF-W1-REM-004
title: "Remove rogue verify_gf_w1_fnc_007b references from GF-W1-FNC-007B task meta.yml so the task contract names the canonical verifier script"
owner_role: Security Guardian Agent
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY

intent: >-
  The GF-W1-FNC-007B task meta.yml references "verify_gf_w1_fnc_007b.sh" in its
  touches:, work:, acceptance_criteria:, and verification: fields — a naming pattern
  used exclusively by the rogue agent across all its fake verifiers. The canonical
  convention for this repo uses verify_gf_fnc_007b.sh (no w1_ infix). Leaving the
  rogue name in the contract means any implementing Security Guardian agent will create
  or reference the wrong script, the CI gate will point to a non-standard path, and
  the task will never pass scope enforcement checks.

anti_patterns:
  - "Updating only the touches: field and leaving work: or acceptance_criteria: stale"
  - Accepting the w1_ infix as an intentional naming difference without confirmation
  - Marking complete before confirming zero verify_gf_w1_fnc_007b refs via grep

out_of_scope:
  - Creating the verify_gf_fnc_007b.sh script itself (that is GF-W1-FNC-007B implementation)
  - Modifying any functional acceptance criteria beyond fixing the script name
  - Touching any meta.yml other than tasks/GF-W1-FNC-007B/meta.yml

stop_conditions:
  - If there is a legitimate reason for the w1_ infix in 007B that differs from the
    rogue pattern — stop and confirm with human before overwriting

proof_guarantees:
  - grep confirms zero verify_gf_w1_fnc_007b refs in tasks/GF-W1-FNC-007B/meta.yml
  - All 4 occurrences replaced with verify_gf_fnc_007b

proof_limitations:
  - Does not verify that scripts/audit/verify_gf_fnc_007b.sh exists or is correctly implemented
  - Does not validate the full FNC-007B meta.yml schema

