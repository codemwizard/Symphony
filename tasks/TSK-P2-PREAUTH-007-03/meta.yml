schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-007-03
title: "Register INV-172 state machine enforcement"
owner_role: INVARIANTS_CURATOR
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY

intent: >-
  This task registers INV-172 for state machine enforcement via triggers. Without this invariant,
  state machine enforcement is not governed, creating risk of invalid state transitions.

anti_patterns:
  - "Registering invariant without verification_command"
  - "Using incorrect enforcement_location"
  - "Writing the verifier after registration"

out_of_scope:
  - "Other invariant registrations (deferred to TSK-P2-PREAUTH-007-04 through 007-05)"
  - "Verifier implementation"

stop_conditions:
  - "If INV-172 is not added to INVARIANTS_MANIFEST.yml"
  - "If status is not set to draft"
  - "If enforcement_location is not set to schema/migrations/0120"

proof_guarantees:
  - "INV-172 exists in INVARIANTS_MANIFEST.yml"
  - "INV-172 has status: draft"
  - "INV-172 has enforcement_location: schema/migrations/0120"
  - "INV-172 has verification_command"
  - "Verifier script exits 0 and emits evidence"

proof_limitations:
  - "Cannot verify that the invariant will be correctly enforced"
  - "Cannot verify that the verification command is correct"

depends_on:
  - TSK-P2-PREAUTH-007-02
blocks:
  - TSK-P2-PREAUTH-007-04

touches:
  - docs/invariants/INVARIANTS_MANIFEST.yml
  - scripts/audit/verify_tsk_p2_preauth_007_03.sh
  - tasks/TSK-P2-PREAUTH-007-03/meta.yml

invariants:
  - INV-172

work:
  - >-
    [ID tsk_p2_preauth_007_03_work_item_01] Add INV-172 to INVARIANTS_MANIFEST.yml with:
    id: INV-172, title: state machine enforcement, status: draft,
    enforcement_location: schema/migrations/0120, verification_command: grep -E 'enforce_transition_state_rules.*BEFORE.*INSERT.*OR.*UPDATE.*state_transitions' schema/migrations/0120.
  - >-
    [ID tsk_p2_preauth_007_03_work_item_02] Write verify_tsk_p2_preauth_007_03.sh that runs grep to verify
    INV-172 exists in INVARIANTS_MANIFEST.yml with correct fields.
  - >-
    [ID tsk_p2_preauth_007_03_work_item_03] Run verify_tsk_p2_preauth_007_03.sh to confirm invariant is registered correctly.

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_007_03_work_item_01] INV-172 exists in INVARIANTS_MANIFEST.yml.
  - >-
    [ID tsk_p2_preauth_007_03_work_item_01] INV-172 has status: draft.
  - >-
    [ID tsk_p2_preauth_007_03_work_item_01] INV-172 has enforcement_location: schema/migrations/0120.
  - >-
    [ID tsk_p2_preauth_007_03_work_item_02] verify_tsk_p2_preauth_007_03.sh exists and checks for invariant.
  - >-
    [ID tsk_p2_preauth_007_03_work_item_03] verify_tsk_p2_preauth_007_03.sh exits 0.

negative_tests:
  - id: TSK-P2-PREAUTH-007-03-N1
    description: >-
      Verify that verify_tsk_p2_preauth_007_03.sh exits non-zero when INV-172 does not exist in INVARIANTS_MANIFEST.yml.
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-007-03-P1
    description: >-
      Verify that verify_tsk_p2_preauth_007_03.sh exits 0 when INV-172 exists with correct fields.
    required: false

verification:
  - >-
    # [ID tsk_p2_preauth_007_03_work_item_01] [ID tsk_p2_preauth_007_03_work_item_02]
    # [ID tsk_p2_preauth_007_03_work_item_03]
    test -x scripts/audit/verify_tsk_p2_preauth_007_03.sh && bash scripts/audit/verify_tsk_p2_preauth_007_03.sh > evidence/phase2/tsk_p2_preauth_007_03.json || exit 1
  - >-
    grep -A 5 "id: INV-172" docs/invariants/INVARIANTS_MANIFEST.yml | grep -q "status: draft" &&
    grep -A 5 "id: INV-172" docs/invariants/INVARIANTS_MANIFEST.yml | grep -q "enforcement_location" || exit 1
  - >-
    # [ID tsk_p2_preauth_007_03_work_item_03]
    test -f evidence/phase2/tsk_p2_preauth_007_03.json || exit 1

evidence:
  - path: evidence/phase2/tsk_p2_preauth_007_03.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - inv_172_registered
      - inv_172_status_draft

failure_modes:
  - "INV-172 not registered => CRITICAL_FAIL"
  - "INV-172 status not draft => FAIL"
  - "Evidence file missing => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/invariants/INVARIANTS_MANIFEST.yml
  - docs/plans/phase2/ATOMIC_TASK_BREAKDOWN_PLAN.md

implementation_plan: docs/plans/phase2/TSK-P2-PREAUTH-007-03/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-007-03/EXEC_LOG.md

notes: >-
  This task blocks TSK-P2-PREAUTH-007-04. Phase Key: PRE-PHASE2. Phase Name: Pre-Phase 2 Implementation.

client: cursor
assigned_agent: invariants_curator
model: <UNASSIGNED>
