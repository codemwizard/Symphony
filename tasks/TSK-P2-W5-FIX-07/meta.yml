schema_version: 1
phase: '2'
task_id: TSK-P2-W5-FIX-07
title: "Add NOT NULL constraint to state_current.current_state to prevent empty state records"
owner_role: DB_FOUNDATION
status: planned
priority: HIGH
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

intent: >-
  Migration 0138 created state_current with current_state TEXT but without a
  NOT NULL constraint. The update_current_state() trigger (migration 0144) 
  always sets current_state from NEW.to_state, but a direct INSERT bypassing
  the trigger could create a NULL current_state — making the state machine
  silently invalid. Adding NOT NULL closes this gap at the DB level.

anti_patterns:
  - "Editing migration 0138 directly"
  - "Testing only that the column exists without proving NULL rejection"

out_of_scope:
  - "Adding CHECK constraints on valid state values"
  - "Function logic changes"
stop_conditions:
  - "Existing rows with NULL current_state block constraint"
  - "Verifier does not attempt INSERT with NULL current_state"

proof_guarantees:
  - "current_state column has NOT NULL constraint"
  - "INSERT with NULL current_state is rejected at DB level"
proof_limitations:
  - "Does not enforce valid state values (no CHECK constraint)"

depends_on:
  - TSK-P2-W5-FIX-06

blocks:
  - TSK-P2-W5-FIX-08

touches:
