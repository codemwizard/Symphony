    [ID w8_arch_001_work_02] Define exact null, UUID, timestamp, UTF-8, and canonicalization algorithm/version rules for version 1 payload construction.
  - >-
    [ID w8_arch_001_work_03] Add frozen byte-level test vectors that show the canonical payload bytes for at least one valid attestation example.
  - >-
    [ID w8_arch_001_work_04] Link the contract to the Wave 8 closure rubric so every downstream task references this document as the payload source of truth.

acceptance_criteria:
  - >-
    [ID w8_arch_001_work_01] `CANONICAL_ATTESTATION_PAYLOAD_v1.md` explicitly defines the exact version 1 field set and source ordering.
  - >-
    [ID w8_arch_001_work_02] The contract explicitly defines null, UUID, timestamp, UTF-8, and canonicalization rules rather than leaving them implementation-defined.
  - >-
    [ID w8_arch_001_work_03] The contract contains frozen byte-level vectors that can be compared directly by SQL and application runtimes.
  - >-
    [ID w8_arch_001_work_04] Downstream contract references point back to this payload contract as the canonical definition source.

