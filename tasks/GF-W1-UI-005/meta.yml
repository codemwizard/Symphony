schema_version: 1
phase: '1'
task_id: GF-W1-UI-005
title: "Instruction detail drawer with GPS, sequence, registry status, and weighbridge data"
owner_role: SUPERVISOR
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: APP_LAYER

intent: >-
  Add a slide-in drawer that shows full instruction detail when an activity table
  row is clicked. The drawer displays instruction ID, worker ID, sequence number,
  registry status, duplicate check, GPS neighbourhood label (never raw coordinates),
  evidence completeness per proof type, and weighbridge data with tCO₂ and credits.

anti_patterns:
  - "Displaying raw GPS coordinates in any DOM element"
  - "Using geocoding API instead of resolveNeighbourhoodLabel"
  - "Hardcoding evidence completeness instead of reading from API"

out_of_scope:
  - "Activity table — done in GF-W1-UI-004"
  - "Monitoring report — handled by GF-W1-UI-006"
  - "Live registry integration — registry status is hardcoded 'NOT ISSUED' for pilot"

stop_conditions:
  - "Raw GPS coordinates rendered in DOM at any step => CRITICAL_FAIL, stop immediately"
  - "resolveNeighbourhoodLabel function not used => CRITICAL_FAIL"
  - "Registry status value other than 'NOT ISSUED' for pilot => FAIL"
  - "Any node in the proof graph is orphaned => STOP"

proof_guarantees:
  - "grep verifies resolveNeighbourhoodLabel is called in drawer rendering code"
  - "negative grep confirms no textContent/innerHTML assignment of raw coordinate patterns"
  - "grep verifies 'NOT ISSUED' and 'PASS' text in drawer"

proof_limitations:
  - "GPS grep catches explicit textContent/innerHTML patterns only — template literals not caught"
  - "Haversine distance computation correctness requires manual verification"
  - "Evidence completeness chips require live API data"

depends_on:
  - GF-W1-UI-004

blocks: []

touches:
  - src/supervisory-dashboard/index.html
  - tasks/GF-W1-UI-005/meta.yml
  - evidence/phase1/gf_w1_ui_005.json

invariants:
  - INV-GF-UI-003

work:
  - >-
    [ID gf_w1_ui_005_work_01] Add a drawer div: position: fixed; right: 0; width: 38%;
    height: 100%; transform: translateX(100%). On active: translateX(0). Close button
    (×) top-right hides the drawer.
  - >-
    [ID gf_w1_ui_005_work_02] The drawer shows: Instruction ID (monospace, truncated to
    12 chars + "…"), Worker ID if present, Sequence number from API, Registry Status:
    "NOT ISSUED" (amber chip) — hardcoded for pilot, Duplicate Check: "PASS" (green
    chip) — derived from unique sequence_number.
  - >-
    [ID gf_w1_ui_005_work_03] GPS: call resolveNeighbourhoodLabel(lat, lon) → show
    neighbourhood label only. Never show raw coordinates. Compute Haversine distance
    from (-15.4167, 28.2833) and show "Xm from boundary" with green chip ≤ 250m,
    red chip > 250m.
  - >-
    [ID gf_w1_ui_005_work_04] Evidence completeness: four PWRM0001 proof type rows
    (WEIGHBRIDGE_RECORD, COLLECTION_PHOTO, QUALITY_AUDIT_RECORD, TRANSFER_MANIFEST)
    — green PRESENT / red MISSING chip per row.
  - >-
    [ID gf_w1_ui_005_work_05] If WEIGHBRIDGE_RECORD has weighbridge_data: show
    plastic_type, net_weight_kg, tCO₂ estimate (net * 0.00048).toFixed(6), and
    carbon credits estimate (equal to tCO₂).

acceptance_criteria:
  - >-
    [ID gf_w1_ui_005_work_01] Drawer div exists with position:fixed, width:38%,
    transform:translateX(100%). Close button hides the drawer.
  - >-
    [ID gf_w1_ui_005_work_02] Drawer shows instruction ID, worker ID, sequence number,
    "NOT ISSUED" amber chip, "PASS" green chip.
  - >-
    [ID gf_w1_ui_005_work_03] GPS displays neighbourhood label via resolveNeighbourhoodLabel.
    No raw coordinates in any DOM element. Haversine distance shown with colour chip.
  - >-
    [ID gf_w1_ui_005_work_04] [ID gf_w1_ui_005_work_05] Four evidence completeness
    rows shown. Weighbridge data shows plastic_type, net_weight_kg, tCO₂ and credits.

negative_tests:
  - id: GF-W1-UI-005-N1
    description: >-
      Grep src/supervisory-dashboard/index.html for raw coordinate rendering patterns:
      textContent = latitude, innerHTML = longitude, or any DOM insertion of numeric GPS
      values without resolveNeighbourhoodLabel wrapper. The grep must find zero matches.
      If raw coordinates appear in DOM, the test fails => CRITICAL_FAIL.
    required: true

positive_tests:
  - id: GF-W1-UI-005-P1
    description: >-
      Grep for resolveNeighbourhoodLabel function call in the drawer rendering code.
      Must be present.
    required: true

verification:
  - >-
    # [ID gf_w1_ui_005_work_01] [ID gf_w1_ui_005_work_02] [ID gf_w1_ui_005_work_03]
    # [ID gf_w1_ui_005_work_04] [ID gf_w1_ui_005_work_05]
    test -f src/supervisory-dashboard/index.html
    && grep -q "resolveNeighbourhoodLabel" src/supervisory-dashboard/index.html
    && grep -q "NOT ISSUED" src/supervisory-dashboard/index.html
    && grep -q "translateX" src/supervisory-dashboard/index.html
    && cat src/supervisory-dashboard/index.html | grep "WEIGHBRIDGE_RECORD"
    > evidence/phase1/gf_w1_ui_005.json || exit 1
  - >-
    # [ID gf_w1_ui_005_work_03]
    test -z "$(grep -E 'textContent.*latitude|innerHTML.*longitude' src/supervisory-dashboard/index.html)"
    || exit 1

evidence:
  - path: evidence/phase1/gf_w1_ui_005.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - observed_paths
      - observed_hashes
      - command_outputs
      - execution_trace
      - gps_coordinate_check_passed

failure_modes:
  - Raw GPS coordinates rendered in DOM => CRITICAL_FAIL
  - resolveNeighbourhoodLabel not used => CRITICAL_FAIL
  - Drawer does not slide in => FAIL
  - Evidence completeness rows missing => FAIL
  - Evidence file missing => FAIL

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - .kiro/steering/ui-canonical-design.md
  - .kiro/steering/pwrm0001-domain-rules.md
  - .kiro/steering/symphony-platform-conventions.md
  - .kiro/specs/symphony-ui-canonical/requirements.md
  - .kiro/specs/symphony-ui-canonical/design.md
  - .kiro/specs/symphony-ui-canonical/tasks.md

implementation_plan: docs/plans/phase1/GF-W1-UI-005/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-UI-005/EXEC_LOG.md

notes: >-
  Atomic task 5 of 10. Privacy-critical: enforces the GPS coordinate prohibition
  via resolveNeighbourhoodLabel. Phase Key: GF-W1. Phase Name: Green Finance Wave 1.

client: cursor
assigned_agent: supervisor
model: <UNASSIGNED>

domain: green_finance

second_pilot_test:
  candidate_sector_1: "PWRM0001 plastic collection (Chunga Dumpsite, Lusaka)"
  candidate_sector_2: "VM0044 solar energy generation (hypothetical)"
  unchanged_core_tables: []
  unchanged_core_functions: []
  adapter_only_differences:
    - "Proof types change: WEIGHBRIDGE_RECORD→SOLAR_METER_READING, COLLECTION_PHOTO→PANEL_PHOTO, etc."
    - "Weighbridge data section shows kWh instead of kg — same structure, different unit"
  jurisdiction_profile_impact: "None — GPS privacy rules apply to all sectors"
  required_core_changes: []
  explanation: >-
    The drawer structure (ID, sequence, registry, GPS label, evidence completeness,
    payload data) is sector-neutral. Only proof type names and payload field labels
    differ. The GPS privacy guarantee (resolveNeighbourhoodLabel) applies universally.
  second_pilot_reviewed_by: "Supervisor (automated review)"

pilot_scope_ref: docs/pilots/PILOT_PWRM0001/SCOPE.md
