schema_version: 1
phase: '2'
task_id: TSK-P2-W5-FIX-01
title: "Fix column name mismatch in enforce_transition_authority() so that state_transitions INSERTs resolve correctly"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: INTEGRITY
blast_radius: DB_SCHEMA

# ── Why this task exists ───────────────────────────────────────────────────
intent: >-
  Migration 0140 created enforce_transition_authority() which references column
  'decision_id' in the policy_decisions table (line 19). The actual PK column
  is 'policy_decision_id' (defined in migration 0134, line 15). PostgreSQL
  deferred PL/pgSQL column resolution means the function compiled successfully
  but is silently broken at execution time. Every INSERT to state_transitions
  that fires trg_enforce_transition_authority raises a raw PostgreSQL error
  ('column "decision_id" does not exist') instead of the intended authority
  validation. This is the highest-priority runtime blocker — no other Wave 5
  trigger can be tested until this crash is eliminated.

# ── What this task must NOT do ─────────────────────────────────────────────
anti_patterns:
  - "Editing migration 0140 directly — forward-only migrations are immutable after apply"
  - "Bundling SECURITY DEFINER hardening — that is TSK-P2-W5-FIX-04's single concern"
  - "Testing only that the function exists in pg_proc without proving runtime behavioral change"
  - "Writing negative test after the fix — must prove bug exists before fix is applied"
  - "Marking completed without before/after INSERT behavioral proof in evidence"

# ── Anti-drift boundaries ──────────────────────────────────────────────────
out_of_scope:
  - "SECURITY DEFINER hardening (TSK-P2-W5-FIX-04)"
  - "Any changes to tables, columns, or indexes"
  - "Any changes to other trigger functions"
  - "Signature verification logic"
  - "Trigger ordering renaming"
stop_conditions:
  - "Migration 0145 references any column that does not exist in the target table"
  - "Verifier script does not execute a live INSERT to prove behavioral change"
  - "Approval metadata not created before editing regulated surface"
  - "EXEC_LOG.md missing required remediation trace markers at edit time"

# ── Proof limits ───────────────────────────────────────────────────────────
proof_guarantees:
  - "Column reference in enforce_transition_authority() resolves to policy_decisions.policy_decision_id"
  - "INSERT to state_transitions with valid policy_decision_id no longer raises raw PostgreSQL column error"
  - "INSERT with non-existent policy_decision_id raises application-level GF exception"
proof_limitations:
  - "Does not prove SECURITY DEFINER correctness (deferred to FIX-04)"
  - "Does not verify the specific GF error code is registered in sqlstate_map.yml"
  - "Cannot prove behavior under concurrent load without integration testing"
  - "Negative test ordering is unenforceable mechanically (process discipline only)"

# ── Dependencies ───────────────────────────────────────────────────────────
depends_on: []

blocks:
  - TSK-P2-W5-FIX-02
  - TSK-P2-W5-FIX-03
  - TSK-P2-W5-FIX-04

# ── File scope ─────────────────────────────────────────────────────────────
touches:
  - schema/migrations/0145_fix_enforce_transition_authority_column.sql
  - schema/migrations/MIGRATION_HEAD
  - scripts/db/verify_tsk_p2_w5_fix_01.sh
  - evidence/phase2/tsk_p2_w5_fix_01.json
  - tasks/TSK-P2-W5-FIX-01/meta.yml
  - docs/plans/phase2/TSK-P2-W5-FIX-01/PLAN.md
  - docs/plans/phase2/TSK-P2-W5-FIX-01/EXEC_LOG.md
  # Post-implementation governance (SYMPHONY_TASK_IMPLEMENTATION_PROCESS Steps 9-13)
  - docs/architecture/THREAT_MODEL.md
  - docs/architecture/COMPLIANCE_MAP.md
  - schema/baseline.sql
  - schema/baselines/current/0001_baseline.sql
  - schema/baselines/current/baseline.cutoff
  - schema/baselines/current/baseline.meta.json
