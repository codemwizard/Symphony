  - schema/migrations/0145_fix_enforce_transition_authority_column.sql
  - schema/migrations/MIGRATION_HEAD
  - scripts/db/verify_tsk_p2_w5_fix_01.sh
  - evidence/phase2/tsk_p2_w5_fix_01.json
  - docs/plans/phase2/TSK-P2-W5-FIX-01/EXEC_LOG.md
  - docs/architecture/THREAT_MODEL.md
  - docs/architecture/COMPLIANCE_MAP.md
  - schema/baselines/current/0001_baseline.sql
  - docs/decisions/ADR-0010-baseline-policy.md
