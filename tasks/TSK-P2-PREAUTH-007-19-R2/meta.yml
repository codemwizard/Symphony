work:
  - >-
    [ID tsk_p2_preauth_007_19_r2_work_01] Replace "-" placeholder with "NONE" in emit_preci_step_with_provenance
  - >-
    [ID tsk_p2_preauth_007_19_r2_work_02] Update verifier to validate that evidence_digest is either SHA256 or "NONE"
  - >-
    [ID tsk_p2_preauth_007_19_r2_work_03] Add check to ensure "NONE" is only used when evidence_file is empty/missing
  - >-
    [ID tsk_p2_preauth_007_19_r2_work_04] Update verifier to reject "-" as invalid evidence_digest
  - >-
    [ID tsk_p2_preauth_007_19_r2_work_05] Run verifier and confirm it accepts "NONE" but rejects "-"

acceptance_criteria:
  - >-
    [ID tsk_p2_preauth_007_19_r2_work_01] Placeholder is "NONE" (uppercase, meaningful)
  - >-
    [ID tsk_p2_preauth_007_19_r2_work_02] Verifier accepts "NONE" as valid empty indicator
  - >-
    [ID tsk_p2_preauth_007_19_r2_work_04] Verifier rejects "-" as invalid
  - >-
    [ID tsk_p2_preauth_007_19_r2_work_03] Verifier validates that "NONE" only appears when evidence_file is empty

negative_tests:
  - id: TSK-P2-PREAUTH-007-19-R2-N1
    description: Verifier rejects "-" as evidence digest
    required: true
  - id: TSK-P2-PREAUTH-007-19-R2-N2
    description: Verifier rejects "none" (lowercase) as evidence digest
    required: true

positive_tests:
  - id: TSK-P2-PREAUTH-007-19-R2-P1
    description: Verifier accepts "NONE" when evidence_file is empty
    required: true
  - id: TSK-P2-PREAUTH-007-19-R2-P2
    description: Verifier accepts SHA256 when evidence_file exists
    required: true

verification:
