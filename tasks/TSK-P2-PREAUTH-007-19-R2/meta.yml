implementation_log: docs/plans/phase2/TSK-P2-PREAUTH-007-19-R2/EXEC_LOG.md

notes: >-
  This fix addresses the weak placeholder issue. The original implementation used "-" which is
  ambiguous and could be confused with a real hash. "NONE" is semantically meaningful and clearly
  indicates "no evidence file available". This is a prerequisite for R3 (DATABASE_URL fallbacks)
  and R4 (evidence digest validation).
