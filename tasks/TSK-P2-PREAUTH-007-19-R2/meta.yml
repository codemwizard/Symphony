    export DATABASE_URL="postgresql://symphony_admin:symphony_pass@localhost:55432/symphony"
    bash scripts/audit/verify_tsk_p2_preauth_007_19.sh > evidence/phase2/tsk_p2_preauth_007_19_r2.json

