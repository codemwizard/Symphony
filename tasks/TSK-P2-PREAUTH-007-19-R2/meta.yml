schema_version: 1
phase: '2'
task_id: TSK-P2-PREAUTH-007-19-R2
title: Replace weak placeholders with meaningful empty indicators
owner_role: SECURITY_GUARDIAN
status: planned
priority: HIGH
risk_class: SECURITY
blast_radius: SCRIPTS_ONLY

intent: >-
  Replace "-" placeholder with a structured empty indicator that distinguishes between "no evidence file"
  and "legitimate empty hash". The original implementation used "-" which could be confused with a real hash
  and provided no semantic meaning.

anti_patterns:
  - "Using '-' as placeholder for empty fields"
  - "Placeholder that can be confused with real hash"
  - "Verifier that doesn't validate placeholder format"
  - "Accepting '-' as valid evidence digest"

out_of_scope:
  - Changing trace log field structure
  - Modifying evidence digest computation logic
  - Changing delimiter format

stop_conditions:
  - "If placeholder is still '-' → STOP"
  - "If placeholder can be confused with a real hash → STOP"
  - "If verifier doesn't validate placeholder format → STOP"

proof_guarantees:
  - "Empty evidence digest is represented by 'NONE' (uppercase, meaningful)"
  - "Verifier accepts 'NONE' as valid empty indicator"
  - "Verifier rejects '-' as invalid evidence digest"
  - "Verifier validates that 'NONE' only appears when evidence_file is empty"

proof_limitations:
  - "Only validates at emission time, not during trace log parsing by other tools"
  - "Relies on convention, not cryptographic guarantee"

depends_on:
  - TSK-P2-PREAUTH-007-19-R1

blocks:
  - TSK-P2-PREAUTH-007-19-R3

touches:
  - scripts/dev/pre_ci.sh
  - scripts/audit/verify_tsk_p2_preauth_007_19.sh
  - tasks/TSK-P2-PREAUTH-007-19-R2/meta.yml

deliverable_files:
  - scripts/dev/pre_ci.sh
  - scripts/audit/verify_tsk_p2_preauth_007_19.sh
  - docs/plans/phase2/TSK-P2-PREAUTH-007-19-R2/PLAN.md
  - docs/plans/phase2/TSK-P2-PREAUTH-007-19-R2/EXEC_LOG.md

invariants:
  - INV-SEC-002

regulated_surface_compliance:
  enabled: true
  approval_workflow: stage_a_stage_b
  stage_a_required_before_edit: true
  regulated_paths:
    - scripts/dev/**
    - scripts/audit/**
  must_read:
    - docs/operations/REGULATED_SURFACE_PATHS.yml
    - docs/operations/approval_metadata.schema.json

