schema_version: 1
phase: '2'
task_id: TSK-P2-GOV-CONV-005
title: "Rewrite Phase-2 machine contract to invariant-centric rows"
owner_role: INVARIANTS_CURATOR
status: completed
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY

intent: >-
  The Phase-2 machine contract must use invariant-centric rows before it can serve
  as a reliable gate for Phase-2 governance claims. This task rewrites only
  docs/PHASE2/phase2_contract.yml after the prerequisite invariant-registration
  tasks have completed. It prevents task-ID-based contract drift by requiring every
  contract row to reference a registered invariant ID and deterministic evidence
  path.

anti_patterns:
  - >-
    Keeping task_id-based rows in the Phase-2 contract while claiming the contract
    is invariant-centric.
  - >-
    Adding contract rows for unregistered invariant IDs or roadmap-only claims.
  - >-
    Modifying verifier scripts, policy documents, or CI wiring in the same task as
    the contract rewrite.

out_of_scope:
  - Creating scripts/audit/verify_phase2_contract.sh
  - Wiring CI or scripts/dev/pre_ci.sh
  - Writing docs/PHASE2/PHASE2_CONTRACT.md
  - Writing docs/operations/AGENTIC_SDLC_PHASE2_POLICY.md
  - Registering additional invariant IDs
  - Creating ratification approval artifacts

stop_conditions:
  - >-
    STOP if TSK-P2-GOV-CONV-002, TSK-P2-GOV-CONV-003, or TSK-P2-GOV-CONV-004 is
    not complete.
  - >-
    STOP if a needed invariant ID is absent from docs/invariants/INVARIANTS_MANIFEST.yml.
  - >-
    STOP if any intended row cannot name invariant_id, status, required, gate_id,
    verifier, and evidence_path.
  - >-
    STOP if approval metadata is absent before editing docs/PHASE2/**, scripts/audit/**,
    or evidence/**.

proof_guarantees:
  - >-
    docs/PHASE2/phase2_contract.yml uses invariant_id rows instead of task_id rows.
  - >-
    Every contract row references a registered invariant ID.
  - >-
    The task-specific verifier rejects task_id-keyed rows and invalid Phase-2 status
    values.

proof_limitations:
  - >-
    This task does not create the canonical Phase-2 contract verifier; that is
    TSK-P2-GOV-CONV-006.
  - >-
    This task does not wire any CI or local gate; that is TSK-P2-GOV-CONV-007.
  - >-
    This task does not prove that referenced verifiers are semantically complete.

depends_on:
  - TSK-P2-GOV-CONV-002
  - TSK-P2-GOV-CONV-003
  - TSK-P2-GOV-CONV-004
blocks:
  - TSK-P2-GOV-CONV-006
  - TSK-P2-GOV-CONV-008
  - TSK-P2-GOV-CONV-010

touches:
  - docs/PHASE2/phase2_contract.yml
  - scripts/audit/verify_gov_conv_005.sh
  - evidence/phase2/gov_conv_005_phase2_contract_rewrite.json
  - tasks/TSK-P2-GOV-CONV-005/meta.yml
  - docs/plans/phase2/TSK-P2-GOV-CONV-005/PLAN.md
  - docs/plans/phase2/TSK-P2-GOV-CONV-005/EXEC_LOG.md

deliverable_files:
  - docs/PHASE2/phase2_contract.yml
  - scripts/audit/verify_gov_conv_005.sh
  - evidence/phase2/gov_conv_005_phase2_contract_rewrite.json
  - docs/plans/phase2/TSK-P2-GOV-CONV-005/PLAN.md
  - docs/plans/phase2/TSK-P2-GOV-CONV-005/EXEC_LOG.md

invariants:
  - INV-GOV-CONV-005

regulated_surface_compliance:
  enabled: true
  approval_workflow: stage_a_stage_b
  stage_a_required_before_edit: true
  regulated_paths:
    - docs/PHASE2/phase2_contract.yml
    - scripts/audit/verify_gov_conv_005.sh
    - evidence/phase2/gov_conv_005_phase2_contract_rewrite.json
  must_read:
    - docs/operations/REGULATED_SURFACE_PATHS.yml
    - docs/operations/approval_metadata.schema.json

remediation_trace_compliance:
  enabled: true
  required_markers:
    - failure_signature
    - origin_task_id
    - repro_command
    - verification_commands_run
    - final_status
  marker_location: EXEC_LOG.md
  append_only: true
  markers_required_at_edit: true
  must_read:
    - docs/operations/REMEDIATION_TRACE_WORKFLOW.md

work:
  - >-
    [ID gov_conv_005_w01] Rewrite docs/PHASE2/phase2_contract.yml so each row uses
    invariant_id, status, required, gate_id, verifier, and evidence_path fields.
  - >-
    [ID gov_conv_005_w02] Remove task_id-keyed delivery rows from the Phase-2 machine
    contract without deleting the underlying task packs.
  - >-
    [ID gov_conv_005_w03] Ensure every invariant_id in the contract exists in
    docs/invariants/INVARIANTS_MANIFEST.yml.
  - >-
    [ID gov_conv_005_w04] Create scripts/audit/verify_gov_conv_005.sh to validate
    row schema, registered invariant references, allowed Phase-2 status values, and
    absence of task_id-keyed rows.
  - >-
    [ID gov_conv_005_w05] Emit evidence/phase2/gov_conv_005_phase2_contract_rewrite.json
    with row counts, invalid_rows, missing_invariants, and task_id_rows_found.

acceptance_criteria:
  - >-
    [ID gov_conv_005_w01] Every contract row contains invariant_id, status, required,
    gate_id, verifier, and evidence_path.
  - >-
    [ID gov_conv_005_w02] The verifier exits non-zero if any delivery row contains
    task_id as its row key or delivery identifier.
  - >-
    [ID gov_conv_005_w03] The verifier exits non-zero if any contract invariant_id
    is missing from docs/invariants/INVARIANTS_MANIFEST.yml.
  - >-
    [ID gov_conv_005_w04] The verifier exits non-zero for status values outside
    phase1_prerequisite, planned, implemented, and deferred_to_phase3.
  - >-
    [ID gov_conv_005_w05] Evidence records total_rows, invalid_rows, missing_invariants,
    and task_id_rows_found.

negative_tests:
  - id: TSK-P2-GOV-CONV-005-N1
    description: >-
      Run the verifier against a fixture contract containing a task_id-keyed row.
      It must exit non-zero and report task_id_rows_found.
    required: true
  - id: TSK-P2-GOV-CONV-005-N2
    description: >-
      Run the verifier against a fixture contract containing an invariant_id not
      present in INVARIANTS_MANIFEST.yml. It must exit non-zero.
    required: true
  - id: TSK-P2-GOV-CONV-005-N3
    description: >-
      Run the verifier against a fixture contract containing an invalid status value.
      It must exit non-zero and report invalid_rows.
    required: true

positive_tests:
  - id: TSK-P2-GOV-CONV-005-P1
    description: >-
      Run the verifier against the rewritten live contract. It must emit PASS evidence
      with invalid_rows: [], missing_invariants: [], and task_id_rows_found: [].
    required: true

verification:
  - >-
    # [ID gov_conv_005_w01] [ID gov_conv_005_w02] [ID gov_conv_005_w03] [ID gov_conv_005_w04] [ID gov_conv_005_w05]
    test -x scripts/audit/verify_gov_conv_005.sh && bash scripts/audit/verify_gov_conv_005.sh > evidence/phase2/gov_conv_005_phase2_contract_rewrite.json || exit 1
  - >-
    python3 scripts/audit/validate_evidence.py --task TSK-P2-GOV-CONV-005 --evidence evidence/phase2/gov_conv_005_phase2_contract_rewrite.json || exit 1
  - >-
    RUN_PHASE2_GATES=1 bash scripts/dev/pre_ci.sh || exit 1

evidence:
  - path: evidence/phase2/gov_conv_005_phase2_contract_rewrite.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - checks
      - total_rows
      - invalid_rows
      - missing_invariants
      - task_id_rows_found

failure_modes:
  - >-
    Contract keeps task_id-keyed delivery rows after rewrite => CRITICAL_FAIL
  - >-
    Contract references invariant IDs absent from INVARIANTS_MANIFEST.yml => CRITICAL_FAIL
  - >-
    Contract uses invalid Phase-2 status vocabulary => FAIL
  - >-
    Evidence file missing => FAIL

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/TASK_CREATION_PROCESS.md
  - docs/operations/TASK_AUTHORING_STANDARD_v2.md
  - docs/operations/PHASE_LIFECYCLE.md
  - docs/invariants/INVARIANTS_MANIFEST.yml
  - docs/PHASE2/phase2_contract.yml

implementation_plan: docs/plans/phase2/TSK-P2-GOV-CONV-005/PLAN.md
implementation_log: docs/plans/phase2/TSK-P2-GOV-CONV-005/EXEC_LOG.md
notes: >-
  This task is intentionally limited to the machine contract rewrite and its
  task-specific verification. The canonical reusable Phase-2 contract verifier is
  created separately to keep ownership and proof scope narrow.
client: codex_cli
assigned_agent: invariants_curator
model: UNASSIGNED
