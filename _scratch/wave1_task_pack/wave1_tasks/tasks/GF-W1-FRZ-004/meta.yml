schema_version: 1
phase: '0'
task_id: GF-W1-FRZ-004
title: "Declare PWRM 0070-0078 migration plan superseded and cancelled"
owner_role: SUPERVISOR
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY
domain: green_finance
pilot: false

intent: >-
  Migrations 0070–0078 were specified in PWRM_GAP_ANALYSIS_AND_TASKS.md as
  plastic-shaped Phase 0 schema. That design was explicitly superseded when
  the neutral host architecture was adopted. If those specifications remain
  unmarked, any agent could pick them up as outstanding work and build the
  plastic-first design that was deliberately abandoned. This task closes that
  ambiguity permanently.

anti_patterns:
  - "Soft deprecation comment that could be misread as 'do this later'"
  - "Leaving the task specifications in place without cancellation notation"

depends_on:
  - GF-W1-FRZ-001

blocks: []

touches:
  - docs/operations/PWRM_GAP_ANALYSIS_AND_TASKS.md
  - tasks/GF-W1-FRZ-004/meta.yml

invariants: []

work:
  - >-
    Add a SUPERSESSION NOTICE at the top of PWRM_GAP_ANALYSIS_AND_TASKS.md:
    "CANCELLED: Migrations 0070–0078 as specified in this document are
    superseded. PWRM0001 and PWRM0002 are Phase 2 methodology adapters that
    register against the neutral green-finance host. They do not define the
    host schema. See docs/operations/AGENTIC_SDLC_PILOT_POLICY.md section 9."
  - >-
    Add the same supersession notice to any planning doc or DAG file that
    references these migration numbers.
  - >-
    Confirm migration numbers 0070–0078 are not referenced as pending in any
    open task meta.yml.

acceptance_criteria:
  - >-
    PWRM_GAP_ANALYSIS_AND_TASKS.md contains SUPERSESSION NOTICE at the top.
    grep -q "SUPERSESSION NOTICE" docs/operations/PWRM_GAP_ANALYSIS_AND_TASKS.md
    exits 0.
  - >-
    No open task (status: planned or in-progress) references migrations 0070–0078
    as deliverables for plastic-specific schema.

negative_tests:
  - id: GF-W1-FRZ-004-N1
    description: >-
      Search all task meta files for references to plastic_credit_batches,
      collection_events, recycling_events as planned migration targets.
      Must return zero results.
    required: true

verification:
  - grep -q "SUPERSESSION NOTICE" docs/operations/PWRM_GAP_ANALYSIS_AND_TASKS.md
  - bash scripts/dev/pre_ci.sh

evidence:
  - path: evidence/phase0/pwrm_supersession.json
    must_include:
      - task_id
      - timestamp_utc
      - git_sha
      - status

failure_modes:
  - "Supersession notice absent — agent builds cancelled plastic schema => CRITICAL_FAIL"
  - "Open task still references plastic migrations as deliverables => BLOCKED"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md

second_pilot_test: >-
  This task makes a documentation correction only. It applies equally to any
  cancelled sector-first migration pack — solar, forestry, or any other.
  No sector logic is introduced.
pilot_scope_ref: not_applicable

implementation_plan: docs/plans/phase0/GF-W1-FRZ-004/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-FRZ-004/EXEC_LOG.md
notes: Document edit only. No code or schema changes.
client: codex_cli
assigned_agent: <UNASSIGNED>
model: <UNASSIGNED>
