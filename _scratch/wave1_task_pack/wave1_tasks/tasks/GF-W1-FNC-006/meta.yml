second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: [gf_verifier_read_tokens]
  unchanged_core_functions: [issue_verifier_read_token, revoke_verifier_read_token]
  adapter_only_differences:
    - "project_id value differs between pilots"
    - "methodology_scope check uses different adapter codes as data"
  jurisdiction_profile_impact: >-
    Regulation 26 check applies identically for Zambia and Zimbabwe verifiers.
    Token scope is project_id based — jurisdiction-agnostic at function level.
  required_core_changes: []
  explanation: >-
    issue_verifier_read_token is a generic DB primitive. A verifier for a
    solar energy project and a verifier for a forestry carbon project both
    call the same function with different project_id values. The Regulation 26
    check, the active-verifier check, and the token creation are all
    project-agnostic at the function level. No sector-specific logic exists.
  second_pilot_reviewed_by: Architecture Owner
pilot_scope_ref: not_applicable

implementation_plan: docs/plans/phase1/GF-W1-FNC-006/PLAN.md
implementation_log: docs/plans/phase1/GF-W1-FNC-006/EXEC_LOG.md
notes: >-
  This is a Phase 1 DB primitive only. The verifier read API surface —
  the .NET endpoint that accepts a token, validates it, and returns filtered
  evidence data — is Phase 2 work. Do not build any API endpoint, query
  abstraction, or response formatting in this task. The boundary is clean:
  issue_verifier_read_token produces a token. A Phase 2 API uses that token
  to scope read access. Building both here violates the Phase 1 scope guard
  and creates an untested security boundary at the worst possible moment.
