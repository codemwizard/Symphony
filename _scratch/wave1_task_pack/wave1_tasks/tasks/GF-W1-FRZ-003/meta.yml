schema_version: 1
phase: '0'
task_id: GF-W1-FRZ-003
title: "Wire Core Contract Gate and task meta verifier as blocking CI checks on green finance paths"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: GOVERNANCE
blast_radius: CI_GATES
domain: green_finance
pilot: false

intent: >-
  The Core Contract Gate script exists but does not run automatically in CI.
  A gate that does not run on every PR is not a gate. This task wires
  verify_core_contract_gate.sh and verify_task_meta_schema.sh into the CI
  workflow with path triggers covering all green finance paths, and configures
  them as required status checks so merge is blocked on failure.

anti_patterns:
  - "Wiring as informational check instead of required status check"
  - "Triggering only on schema/migrations paths — missing docs/pilots and task metas"
  - "Running gate without --fixtures in CI, missing self-test validation"

depends_on:
  - GF-W1-FRZ-001

blocks:
  - GF-W1-SCH-001

touches:
  - .github/workflows/green_finance_contract_gate.yml
  - tasks/GF-W1-FRZ-003/meta.yml

invariants:
  - INV-135
  - INV-136
  - INV-137
  - INV-142
  - INV-144

work:
  - >-
    Create .github/workflows/green_finance_contract_gate.yml. Trigger on
    push and pull_request for paths: schema/migrations/**, docs/pilots/**,
    tasks/**/meta.yml, scripts/audit/**, AGENTS.md,
    docs/operations/AGENTIC_SDLC_PILOT_POLICY.md.
  - >-
    Job 1: run verify_core_contract_gate.sh --fixtures. Must exit 0 before
    main checks run.
  - >-
    Job 2: run verify_core_contract_gate.sh. Emit evidence artifact. Fail
    workflow on non-zero exit.
  - >-
    Job 3: run verify_task_meta_schema.sh --mode strict on all green finance
    task meta files (tasks/GF-*/meta.yml). Fail workflow on non-zero exit.
  - >-
    Configure both jobs as required status checks in branch protection rules
    on main. Merge is blocked if either fails.
  - >-
    Upload evidence/phase0/core_contract_gate.json as a workflow artifact.

acceptance_criteria:
  - >-
    .github/workflows/green_finance_contract_gate.yml exists. All declared
    path triggers are present.
  - >-
    A test PR adding a migration with CREATE TABLE public.plastic_credit_batches
    causes the workflow to fail and block merge.
  - >-
    A test PR with a valid neutral migration passes all checks.
  - >-
    Fixture self-test job runs before main gate and fails-fast if fixtures fail.

negative_tests:
  - id: GF-W1-FRZ-003-N1
    description: >-
      Create a branch with a migration file containing a sector noun in a
      table name. Open a PR. The green_finance_contract_gate workflow must
      fail and the PR must be blocked from merge.
    required: true
  - id: GF-W1-FRZ-003-N2
    description: >-
      Create a branch with a green finance task meta.yml missing
      second_pilot_test. The task meta verifier job must fail.
    required: true

verification:
  - bash scripts/audit/verify_core_contract_gate.sh --fixtures
  - bash scripts/audit/verify_core_contract_gate.sh
  - bash scripts/audit/verify_task_meta_schema.sh --mode strict
  - bash scripts/dev/pre_ci.sh

evidence:
  - path: evidence/phase0/core_contract_gate.json
    must_include:
      - check_id
      - timestamp_utc
      - git_sha
      - status
      - violations
      - checks_run

failure_modes:
  - "Gate runs but is not a required status check — merge still possible => CRITICAL_FAIL"
  - "Path triggers missing docs/pilots/** — pilot scope violations not caught => FAIL"
  - "Fixture self-test not in CI — gate can silently degrade => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - .github/workflows/invariants.yml

second_pilot_test: >-
  The CI workflow triggers on generic green finance paths. It does not encode
  any sector logic. A solar pilot's migrations and a forestry pilot's migrations
  both trigger the same gate checks. No sector-specific workflow logic exists.
pilot_scope_ref: not_applicable

implementation_plan: docs/plans/phase0/GF-W1-FRZ-003/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-FRZ-003/EXEC_LOG.md
notes: >-
  Follow existing .github/workflows/invariants.yml as the pattern. Do not
  modify the existing invariants workflow. Create a new dedicated workflow file.
client: codex_cli
assigned_agent: <UNASSIGNED>
model: <UNASSIGNED>
