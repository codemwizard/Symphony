schema_version: 1
phase: '0'
task_id: GF-W1-GOV-003
title: "Add migration sidecar manifests and alignment verifier for green finance migrations"
owner_role: DB_FOUNDATION
status: planned
priority: HIGH
risk_class: GOVERNANCE
blast_radius: CI_GATES
domain: green_finance
pilot: false

intent: >-
  SQL migrations have no intent metadata. Without sidecars, there is no
  machine-verifiable link between a migration's intent, its declared scope,
  and its actual content. This creates a gap where a migration can claim to
  be neutral while introducing sector logic. Sidecar manifests force every
  green finance migration to declare its intent before it is reviewed, and
  the alignment verifier confirms the SQL matches the declared scope.

anti_patterns:
  - "Writing sidecars after migrations — they must be written first as intent declarations"
  - "Making sidecars optional for green finance migrations"
  - "Sidecar format that is too verbose to maintain — keep it minimal"

depends_on:
  - GF-W1-FRZ-001
  - GF-W1-FRZ-003

blocks:
  - GF-W1-SCH-001

touches:
  - scripts/audit/verify_migration_meta_alignment.py
  - schema/migrations/0070_gf_adapter_registrations.meta.yml
  - tasks/GF-W1-GOV-003/meta.yml

invariants:
  - INV-135

work:
  - >-
    Define the sidecar format: schema/migrations/<number>_<name>.meta.yml
    with required fields: phase (string), layer (enum: CORE_SCHEMA,
    POLICY_TABLE, ADAPTER_LAYER), touches_core_schema (bool),
    introduces_identifiers (list of all new table/column/function/enum names),
    second_pilot_justification_required (bool), volatility_class (enum matching
    GREEN_FINANCE_VOLATILITY_MAP.md classifications), notes (string).
  - >-
    Create scripts/audit/verify_migration_meta_alignment.py. For each
    schema/migrations/*.meta.yml file, verify: corresponding .sql exists,
    all identifiers in introduces_identifiers actually appear in the SQL,
    no identifier in the SQL is absent from introduces_identifiers, if
    touches_core_schema is true then a second_pilot justification must exist
    in the associated task meta.
  - >-
    Wire into .github/workflows/green_finance_contract_gate.yml as a blocking
    job. A migration without a sidecar or with a mismatched sidecar blocks merge.
  - >-
    Create the sidecar for migration 0070 as the reference example. This sidecar
    is authored as part of GF-W1-GOV-003, not GF-W1-SCH-001.
  - >-
    Add to pre_ci.sh: python3 scripts/audit/verify_migration_meta_alignment.py

acceptance_criteria:
  - >-
    python3 scripts/audit/verify_migration_meta_alignment.py exits non-zero
    when a .sql file has no corresponding .meta.yml.
  - >-
    Exits non-zero when introduces_identifiers lists a name not present in SQL.
  - >-
    Exits non-zero when SQL contains an identifier not declared in sidecar.
  - >-
    0070_gf_adapter_registrations.meta.yml exists and passes alignment check.

negative_tests:
  - id: GF-W1-GOV-003-N1
    description: >-
      Create a migration SQL file with no corresponding .meta.yml sidecar.
      Alignment verifier must exit non-zero and name the missing sidecar.
    required: true
  - id: GF-W1-GOV-003-N2
    description: >-
      Create a sidecar that lists introduces_identifiers: [projects] but the
      SQL creates a table named plastic_credit_batches. Verifier must detect
      the mismatch and exit non-zero.
    required: true

verification:
  - python3 scripts/audit/verify_migration_meta_alignment.py
  - bash scripts/dev/pre_ci.sh

evidence:
  - path: evidence/phase0/migration_meta_alignment.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - migrations_checked
      - mismatches_found

failure_modes:
  - "Sidecar optional for green finance migrations — gap exists for undeclared identifiers => CRITICAL_FAIL"
  - "Alignment verifier not blocking in CI — bad migrations merge => CRITICAL_FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/operations/GREEN_FINANCE_VOLATILITY_MAP.md

second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: [all — no schema touched by this task]
  unchanged_core_functions: [all]
  adapter_only_differences:
    - "Migration sidecar manifests are sector-agnostic — no adapter-specific surface"
  jurisdiction_profile_impact: none
  required_core_changes: []
  explanation: >-
    The sidecar format and alignment verifier apply identically to any green
    finance migration regardless of sector. A solar migration sidecar and a
    forestry migration sidecar follow the same schema. The verifier does not
    encode sector knowledge.
  second_pilot_reviewed_by: Architecture Owner
pilot_scope_ref: not_applicable

implementation_plan: docs/plans/phase0/GF-W1-GOV-003/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-GOV-003/EXEC_LOG.md
notes: Sidecars are authored before their migrations, not after. Treat them as intent declarations.
client: codex_cli
assigned_agent: <UNASSIGNED>
model: <UNASSIGNED>
