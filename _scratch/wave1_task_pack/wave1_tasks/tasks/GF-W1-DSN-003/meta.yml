schema_version: 1
phase: '0'
task_id: GF-W1-DSN-003
title: "Interpretation pack validation spec: override rules, null handling, conflict resolution, time overlap"
owner_role: SUPERVISOR
status: planned
priority: CRITICAL
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY
domain: green_finance
pilot: false

intent: >-
  GF-W1-DSN-002 defined the interpretation pack schema fields and uniqueness
  constraints. It did not fully resolve the operational edge cases that will
  cause the SCH-002 migration and FNC-004 functions to be rewritten if left
  ambiguous. Without explicit rules for how global packs are overridden by
  adapter-scoped packs, what happens when effective dates overlap, and how
  conflicts across authority levels resolve deterministically, the replayability
  guarantee is aspirational rather than enforced. This task locks those rules
  before any migration is written.

anti_patterns:
  - "Leaving override resolution as prose — must be a queryable algorithm, not a description"
  - "Treating this as a documentation task that can follow SCH-002 — it must precede it"
  - "Resolving edge cases informally during SCH-002 implementation"

depends_on:
  - GF-W1-DSN-002

blocks:
  - GF-W1-SCH-002

touches:
  - docs/architecture/INTERPRETATION_PACK_VALIDATION_SPEC.md
  - tasks/GF-W1-DSN-003/meta.yml

invariants:
  - INV-141
  - INV-143

work:
  - >-
    Write docs/architecture/INTERPRETATION_PACK_VALIDATION_SPEC.md with
    the following required sections:
  - >-
    SECTION 1 — Override resolution algorithm.
    When a function needs to resolve the active interpretation pack for
    (domain, jurisdiction_code), define the exact resolution order:
    (1) Find all packs where effective_to IS NULL AND jurisdiction_code matches.
    (2) If adapter_registration_id IS NOT NULL and matches the calling context,
    prefer that pack over the global pack for the same authority level.
    (3) Among remaining candidates, apply authority precedence:
    SOVEREIGN > REGULATORY > INTERNAL > DEFAULT.
    (4) If two packs have the same authority level and both are active —
    this is a data integrity failure; the uniqueness constraint should prevent
    it. If it somehow occurs, raise SQLSTATE P0001 with error code
    INTERP_CONFLICT and the conflicting pack IDs.
    Express this as a deterministic SQL query, not prose.
  - >-
    SECTION 2 — Null handling.
    adapter_registration_id NULL = global pack (applies to all adapters).
    superseded_by_id NULL = this pack is not superseded.
    effective_to NULL = this pack is currently active.
    dependency_refs NULL = no tracked external dependencies.
    All NULLable fields must have explicit semantics — no implicit assumptions.
  - >-
    SECTION 3 — Time overlap behaviour.
    Can two packs for the same (domain, jurisdiction_code, authority_level,
    adapter_registration_id) have overlapping effective date ranges?
    Answer: the uniqueness constraint on WHERE effective_to IS NULL allows
    at most one active pack. Historical packs (effective_to IS NOT NULL) may
    overlap — this is intentional to preserve history. Define what the
    resolution function does when asked to resolve at a past timestamp:
    find the pack where effective_from <= query_timestamp AND
    (effective_to IS NULL OR effective_to > query_timestamp).
    If multiple match (historical overlap), take the most recently created.
  - >-
    SECTION 4 — Conflict resolution.
    What constitutes a conflict vs valid coexistence:
    CONFLICT: two active packs, same domain+jurisdiction+authority+adapter_scope.
    VALID: one global + one adapter-scoped, same domain+jurisdiction+authority.
    VALID: two packs with same domain+jurisdiction but different authority levels.
    VALID: one active + one historical (effective_to IS NOT NULL).
    Document the SQLSTATE codes for each conflict type.
  - >-
    SECTION 5 — Provisional pack semantics.
    Packs with confidence_level = PENDING_CLARIFICATION are valid and
    queryable. Functions that use them must record the confidence level
    in the decision record. The checkpoint gate in attempt_lifecycle_transition
    must check if a required checkpoint relies on a PENDING_CLARIFICATION pack
    and if so, transition to CONDITIONALLY_SATISFIED state rather than
    SATISFIED. This is the "provisional pass" that keeps pilot execution
    unblocked when legal practice is unsettled.
  - >-
    SECTION 6 — Edge case index.
    List at minimum: empty jurisdiction (must be rejected at INSERT),
    future effective_from (valid), self-referential superseded_by_id (must
    be rejected), supersession chain length (no enforced limit but
    should be logged if > 5).

acceptance_criteria:
  - >-
    File docs/architecture/INTERPRETATION_PACK_VALIDATION_SPEC.md exists with
    all six required sections.
  - >-
    Section 1 contains an explicit SQL query for the resolution algorithm,
    not only prose.
  - >-
    Section 5 defines provisional pass semantics with CONDITIONALLY_SATISFIED
    state — this unblocks FNC-004 implementation.
  - >-
    Architecture Owner sign-off recorded in the document before SCH-002 begins.

negative_tests:
  - id: GF-W1-DSN-003-N1
    description: >-
      Attempt to begin GF-W1-SCH-002 before this document exists and is
      approved. The depends_on chain blocks this at DAG level. Verify the
      dependency is enforced in the task DAG — SCH-002 depends_on DSN-003.
    required: true

verification:
  - test -f docs/architecture/INTERPRETATION_PACK_VALIDATION_SPEC.md
  - grep -q "CONDITIONALLY_SATISFIED" docs/architecture/INTERPRETATION_PACK_VALIDATION_SPEC.md
  - grep -q "INTERP_CONFLICT" docs/architecture/INTERPRETATION_PACK_VALIDATION_SPEC.md
  - grep -q "resolution algorithm" docs/architecture/INTERPRETATION_PACK_VALIDATION_SPEC.md
  - bash scripts/dev/pre_ci.sh

evidence:
  - path: evidence/phase0/gf_dsn_003.json
    must_include:
      - task_id
      - git_sha
      - timestamp_utc
      - status
      - sections_present
      - sql_resolution_query_present
      - provisional_pass_defined
      - architecture_owner_signoff

failure_modes:
  - "SCH-002 written without this spec existing => BLOCKED (will require rewrite)"
  - "Provisional pass semantics absent — FNC-004 checkpoint gate blocks pilot => CRITICAL_FAIL"
  - "Resolution algorithm left as prose only — replayability remains aspirational => FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - docs/architecture/INTERPRETATION_PACK_SCHEMA.md

second_pilot_test:
  candidate_sector_1: solar_energy
  candidate_sector_2: forestry_carbon
  unchanged_core_tables: []
  unchanged_core_functions: []
  adapter_only_differences:
    - "Resolution algorithm applies identically — only data rows differ between sectors"
  jurisdiction_profile_impact: >-
    Resolution algorithm is jurisdiction-agnostic by design. Zambia and
    Zimbabwe both resolved via same algorithm with different jurisdiction_code
    values in the query predicate.
  required_core_changes: []
  explanation: >-
    The validation spec defines behaviour that applies universally. A solar
    adapter's interpretation pack and a forestry adapter's interpretation pack
    are both resolved by the same algorithm. The provisional pass semantics
    apply in any jurisdiction where practice has not confirmed requirements.
    No sector-specific logic exists in this spec.
  second_pilot_reviewed_by: Architecture Owner
pilot_scope_ref: not_applicable

implementation_plan: docs/plans/phase0/GF-W1-DSN-003/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-DSN-003/EXEC_LOG.md
notes: >-
  This is a design document task, not a code task. Output is one markdown
  spec file. The provisional pass semantics in Section 5 directly unblock
  FNC-004 — without them, attempt_lifecycle_transition cannot handle the
  PENDING_CLARIFICATION case correctly and will block all pilot execution
  where regulatory practice is unsettled.
