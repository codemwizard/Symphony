schema_version: 1
phase: '0'
task_id: GF-W1-FRZ-002
title: "Wire pilot containment policy into AGENTS.md as a hard agent constraint"
owner_role: SUPERVISOR
status: planned
priority: CRITICAL
risk_class: GOVERNANCE
blast_radius: DOCS_ONLY
domain: green_finance
pilot: false

intent: >-
  AGENTS.md is the apex hard-constraint document for all agents. A policy
  document not referenced there is advice, not a constraint. Until
  AGENTIC_SDLC_PILOT_POLICY.md, PILOT_REJECTION_PLAYBOOK.md, and
  AGENT_GUARDRAILS_GREEN_FINANCE.md appear in AGENTS.md, agents working on
  green finance tasks are not bound by pilot containment rules.

anti_patterns:
  - "Adding a soft 'see also' reference instead of a hard constraint entry"
  - "Referencing the policy in notes only, not in the hard constraints section"

depends_on:
  - GF-W1-FRZ-001

blocks:
  - GF-W1-DSN-001

touches:
  - AGENTS.md
  - tasks/GF-W1-FRZ-002/meta.yml

invariants:
  - INV-144

work:
  - >-
    Add to AGENTS.md hard constraints section: reference to
    docs/operations/AGENTIC_SDLC_PILOT_POLICY.md with instruction that any
    agent working on a task tagged domain: green_finance or pilot: true must
    read this document before beginning implementation.
  - >-
    Add references to PILOT_REJECTION_PLAYBOOK.md and
    AGENT_GUARDRAILS_GREEN_FINANCE.md in the green-finance agent path authority
    section.
  - >-
    Confirm AGENTS.md DB Foundation Agent and Invariants Curator Agent entries
    include the green finance governance docs in their must_read lists.

acceptance_criteria:
  - >-
    AGENTS.md contains a hard constraint entry for AGENTIC_SDLC_PILOT_POLICY.md.
    grep -q "AGENTIC_SDLC_PILOT_POLICY" AGENTS.md exits 0.
  - >-
    AGENTS.md contains references to PILOT_REJECTION_PLAYBOOK.md and
    AGENT_GUARDRAILS_GREEN_FINANCE.md.

negative_tests:
  - id: GF-W1-FRZ-002-N1
    description: >-
      An agent reading AGENTS.md must encounter the pilot containment policy
      reference before any green finance path is listed. Manual review confirms
      the reference is in the hard constraints section, not buried in notes.
    required: true

verification:
  - grep -q "AGENTIC_SDLC_PILOT_POLICY" AGENTS.md
  - grep -q "PILOT_REJECTION_PLAYBOOK" AGENTS.md
  - bash scripts/dev/pre_ci.sh

evidence:
  - path: evidence/phase0/agents_md_green_finance_wiring.json
    must_include:
      - task_id
      - timestamp_utc
      - git_sha
      - status
      - checks

failure_modes:
  - "Policy reference in notes only, not hard constraints => FAIL"
  - "AGENTS.md merge breaks existing agent path authority entries => CRITICAL_FAIL"

must_read:
  - docs/operations/AI_AGENT_OPERATION_MANUAL.md
  - docs/operations/AGENTIC_SDLC_PILOT_POLICY.md
  - AGENTS.md

second_pilot_test: >-
  This task modifies AGENTS.md only. The constraint applies identically to
  any pilot in any sector — solar, forestry, mining, or plastic. No
  sector-specific content is introduced.
pilot_scope_ref: not_applicable

implementation_plan: docs/plans/phase0/GF-W1-FRZ-002/PLAN.md
implementation_log: docs/plans/phase0/GF-W1-FRZ-002/EXEC_LOG.md
notes: Single file edit. Two to three lines. Do not restructure AGENTS.md.
client: codex_cli
assigned_agent: <UNASSIGNED>
model: <UNASSIGNED>
