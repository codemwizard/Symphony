rules:
  - id: symphony-dotnet-sql-commandtext-concat
    languages: [csharp]
    message: "Potential SQL injection: CommandText built via string concatenation. Use parameters."
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              $CMD.CommandText = $A + $B;
          - pattern: |
              $CMD.CommandText += $X;

  - id: symphony-dotnet-hardcoded-secret
    languages: [csharp]
    message: "Possible hardcoded secret/token. Use OpenBao/KMS or secure config provider."
    severity: ERROR
    pattern-regex: '(?i)(api[_-]?key|secret|token|password)\\s*=\\s*\".{8,}\"'

  - id: symphony-dotnet-insecure-rng
    languages: [csharp]
    message: "Insecure RNG detected. Use RandomNumberGenerator instead of Random for security-sensitive values."
    severity: ERROR
    pattern: |
      new Random(...)

  - id: symphony-admin-claim-bypass
    languages: [csharp]
    message: >
      Admin authentication bypass via x-admin-claim header detected.
      Admin endpoints must require ADMIN_API_KEY; header-based claim trust is forbidden.
    severity: ERROR
    pattern-either:
      - pattern: |
          ReadHeader($CTX, "x-admin-claim")
      - pattern: |
          $CTX.Request.Headers.TryGetValue("x-admin-claim", ...)

  - id: symphony-secret-fallback-literal
    languages: [csharp]
    message: >
      Hardcoded secret fallback via ?? operator detected.
      Use ?? throw or fail-closed patterns instead of literal fallbacks.
    severity: ERROR
    pattern-regex: 'Environment\\.GetEnvironmentVariable\\(\"EVIDENCE_SIGNING_KEY\"\\)\\s*\\?\\?\\s*\"[^\"]+\"'
