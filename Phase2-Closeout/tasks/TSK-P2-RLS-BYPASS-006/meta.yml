schema_version: 1
phase: '2'
task_id: TSK-P2-RLS-BYPASS-006
title: "Regenerate baseline with provenance after RLS bypass policy migration"
owner_role: DB_FOUNDATION
status: planned
priority: CRITICAL
risk_class: GOVERNANCE
blast_radius: DB_SCHEMA

intent: >-
  Removing app.bypass_rls from terminal RLS policies changes the schema contract and
  must be reflected in the canonical baseline under the baseline governance rules.
  This task regenerates schema/baseline.sql and normalized baseline artifacts only
  after the forward-only migration and terminal policy verifier have passed. It
  prevents baseline drift by requiring pg_dump provenance, migration-head alignment,
  and an explicit explanation artifact rather than silent baseline churn.

anti_patterns:
  - >-
    Updating schema/baseline.sql without a same-PR migration change and explanation
    artifact.
  - >-
    Regenerating baseline from host tooling with unknown pg_dump/server version drift.
  - >-
    Treating a baseline text update as proof that terminal RLS policy behavior is
    correct.
  - >-
    Combining baseline regeneration with runtime tenant-isolation proof or migration
    creation.

out_of_scope:
  - Creating or modifying schema migrations
  - Editing application/runtime source files
  - Editing RLS runtime proof scripts
  - Modifying CI workflow wiring
  - Changing baseline governance policy
  - Claiming Phase-2 closeout completion

stop_conditions:
  - >-
    STOP if TSK-P2-RLS-BYPASS-004 or TSK-P2-RLS-BYPASS-005 is incomplete.
  - >-
    STOP if schema/migrations/MIGRATION_HEAD does not match the RLS bypass migration
    head expected by this task.
  - >-
    STOP if no baseline refresh explanation artifact or plan-log rationale is present.
  - >-
    STOP if baseline generation cannot record pg_dump_version, pg_server_version,
    dump_source, and normalized_schema_sha256.
  - >-
    STOP if approval metadata is absent before editing schema/baseline.sql,
    schema/baselines/**, scripts/db/**, or evidence/phase2/**.

proof_guarantees:
  - >-
    Baseline artifacts are regenerated after the RLS bypass policy migration and
    terminal policy verifier.
  - >-
    Evidence records baseline provenance, migration head, dump source, and normalized
    schema hash.
  - >-
    The verifier rejects baseline drift if app.bypass_rls remains in current baseline
    policy definitions.

proof_limitations:
  - >-
    This task does not prove runtime tenant isolation behavior.
  - >-
    This task does not create or modify the RLS policy migration.
  - >-
    This task does not prove all historical baseline snapshots are clean; it updates
    only current canonical baseline artifacts.
  - >-
    This task does not close Phase-2.

depends_on:
  - TSK-P2-RLS-BYPASS-004
  - TSK-P2-RLS-BYPASS-005
blocks:
  - TSK-P2-RLS-BYPASS-008

touches:
  - schema/baseline.sql
  - schema/baselines/current/0001_baseline.sql
  - schema/baselines/current/baseline.normalized.sql
  - scripts/db/verify_rls_bypass_baseline_refresh.sh
  - evidence/phase2/rls_bypass_baseline_refresh.json
  - tasks/TSK-P2-RLS-BYPASS-006/meta.yml
  - docs/plans/phase2/TSK-P2-RLS-BYPASS-006/PLAN.md
  - docs/plans/phase2/TSK-P2-RLS-BYPASS-006/EXEC_LOG.md

deliverable_files:
  - schema/baseline.sql
  - schema/baselines/current/0001_baseline.sql
  - schema/baselines/current/baseline.normalized.sql
  - scripts/db/verify_rls_bypass_baseline_refresh.sh
  - evidence/phase2/rls_bypass_baseline_refresh.json
  - docs/plans/phase2/TSK-P2-RLS-BYPASS-006/PLAN.md
  - docs/plans/phase2/TSK-P2-RLS-BYPASS-006/EXEC_LOG.md

invariants:
  - INV-P0-TENANT-ISOLATION-RLS-BYPASS-006
  - INV-045

