schema_version: 1
phase: '2'
task_id: TSK-P2-RLS-BYPASS-003
title: "Refactor Ledger API demo seeding away from app.bypass_rls"
owner_role: SECURITY_GUARDIAN
status: planned
priority: CRITICAL
risk_class: SECURITY
blast_radius: APP_LAYER

intent: >-
  Demo seeding and bootstrap logic can legitimately require non-request operational
  behavior, but it must not depend on app.bypass_rls or normalize an ambient bypass
  pattern in application startup. This task refactors Ledger API demo seeding paths
  identified by the inventory so they do not set app.bypass_rls. It preserves a
  strict boundary between non-runtime setup and request-serving execution.

anti_patterns:
  - >-
    Treating demo seeding as harmless while it sets app.bypass_rls inside the Ledger
    API application process.
  - >-
    Replacing app.bypass_rls with an ambient superuser connection string available
    to request-serving runtime.
  - >-
    Combining demo seed refactor with RLS policy migration or runtime repository
    remediation in the same task.
  - >-
    Declaring seed remediation complete without proving normal request startup cannot
    activate privileged bypass behavior.

out_of_scope:
  - Editing services/ledger-api/dotnet/src/LedgerApi/Infrastructure/Stores.cs
  - Editing services/ledger-api/dotnet/src/LedgerApi/Security/ITenantReadinessProbe.cs
  - Editing schema/migrations/**
  - Editing schema/baseline.sql or schema/baselines/**
  - Creating a general administrative execution framework
  - Modifying CI workflows
  - Removing database policy predicates

stop_conditions:
  - >-
    STOP if TSK-P2-RLS-BYPASS-001 is incomplete or inventory evidence is missing.
  - >-
    STOP if Program.cs is classified RUNTIME rather than SEED or ADMIN; runtime
    remediation must be split into a separate task.
  - >-
    STOP if the replacement depends on ambient superuser credentials or hidden
    admin-mode runtime configuration.
  - >-
    STOP if demo seed behavior cannot be isolated from request-serving runtime.
  - >-
    STOP if approval metadata is absent before editing services/**, scripts/audit/**,
    or evidence/phase2/**.

proof_guarantees:
  - >-
    Ledger API Program.cs no longer contains active app.bypass_rls set_config calls
    after seed remediation.
  - >-
    The verifier rejects app.bypass_rls in active demo seed/bootstrap code and rejects
    ambient privileged fallback configuration.
  - >-
    Evidence records that seed/bootstrap remediation is isolated from normal runtime
    request paths.

proof_limitations:
  - >-
    This task does not create the full administrative execution boundary if the
    inventory identifies broader admin tooling needs.
  - >-
    This task does not remove runtime repository bypass usage; that is
    TSK-P2-RLS-BYPASS-002.
  - >-
    This task does not remove RLS policy bypass predicates.
  - >-
    This task does not regenerate baselines.

