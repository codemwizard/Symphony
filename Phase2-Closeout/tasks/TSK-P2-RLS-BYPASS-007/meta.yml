schema_version: 1
phase: '2'
task_id: TSK-P2-RLS-BYPASS-007
title: "Prove runtime tenant isolation without app.bypass_rls"
owner_role: SECURITY_GUARDIAN
status: planned
priority: CRITICAL
risk_class: SECURITY
blast_radius: CI_GATES

intent: >-
  The app.bypass_rls remediation is not complete until runtime tenant isolation is
  proven after runtime refactors and policy migration are applied. This task creates
  a full runtime proof verifier that exercises tenant-isolation behavior without
  relying on bypass semantics. It prevents fake closure where source and policy text
  are clean but cross-tenant access still succeeds or verification uses inadmissible
  proof patterns.

anti_patterns:
  - >-
    Treating absence of app.bypass_rls strings as proof of tenant isolation.
  - >-
    Using superuser-only tests that bypass normal runtime roles.
  - >-
    Running detached SQL checks that do not exercise the relevant runtime or RLS
    enforcement path.
  - >-
    Accepting advisory warnings instead of fail-closed cross-tenant rejection.

out_of_scope:
  - Editing runtime source files
  - Editing schema migrations
  - Editing baseline artifacts
  - Creating or modifying CI workflow wiring
  - Creating Phase-2 closeout approval artifacts
  - Fixing any newly discovered bypass dependency

stop_conditions:
  - >-
    STOP if TSK-P2-RLS-BYPASS-002, TSK-P2-RLS-BYPASS-003, TSK-P2-RLS-BYPASS-004,
    or TSK-P2-RLS-BYPASS-005 is incomplete.
  - >-
    STOP if DATABASE_URL is unavailable.
  - >-
    STOP if the verifier would run only as superuser or rely on session_replication_role.
  - >-
    STOP if app.bypass_rls appears in runtime source, active policy definitions, or
    verification setup.
  - >-
    STOP if approval metadata is absent before editing scripts/audit/** or
    evidence/phase2/**.

proof_guarantees:
  - >-
    The verifier executes tenant-isolation positive and negative scenarios without
    setting app.bypass_rls.
  - >-
    Cross-tenant reads and writes are rejected under normal runtime-role semantics.
  - >-
    Evidence records command outputs, runtime role used, tenant IDs, accepted positive
    paths, rejected negative paths, and absence of app.bypass_rls in verifier setup.

proof_limitations:
  - >-
    This task proves the configured runtime/RLS scenarios, not every possible
    application endpoint.
  - >-
    This task does not modify source, schema, or baseline files.
  - >-
    This task does not independently prove baseline provenance.
  - >-
    This task does not close Phase-2 by itself.

