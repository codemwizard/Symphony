work:
  - >-
    [ID rls_bypass_007_w01] Create scripts/audit/verify_rls_bypass_runtime_isolation.sh
    to run runtime/RLS positive and negative tenant-isolation scenarios using
    DATABASE_URL without setting app.bypass_rls.
  - >-
    [ID rls_bypass_007_w02] Assert verifier setup does not use superuser-only proof,
    session_replication_role, app.bypass_rls, or advisory-only checks.
  - >-
    [ID rls_bypass_007_w03] Execute positive same-tenant scenarios proving allowed
    runtime access still works after bypass removal.
  - >-
    [ID rls_bypass_007_w04] Execute negative cross-tenant read/write scenarios proving
    unauthorized tenant access is rejected under normal runtime-role semantics.
  - >-
    [ID rls_bypass_007_w05] Cross-check active RLS policy definitions during runtime
    proof and fail if app.bypass_rls reappears.
  - >-
    [ID rls_bypass_007_w06] Emit evidence/phase2/rls_bypass_runtime_isolation.json
    with positive_test_passed, negative_test_passed, runtime_role_used,
    bypass_setting_used, policy_cross_check, observed_paths, observed_hashes,
    command_outputs, and execution_trace.

acceptance_criteria:
  - >-
    [ID rls_bypass_007_w01] The verifier uses DATABASE_URL and does not set
    app.bypass_rls anywhere in setup or test execution.
  - >-
    [ID rls_bypass_007_w02] The verifier exits non-zero if run as superuser-only
    proof, if session_replication_role is used, or if checks are advisory.
  - >-
    [ID rls_bypass_007_w03] Same-tenant positive scenarios pass.
  - >-
    [ID rls_bypass_007_w04] Cross-tenant negative scenarios are rejected and recorded.
  - >-
    [ID rls_bypass_007_w05] Active policy cross-check reports no app.bypass_rls
    predicate.
  - >-
    [ID rls_bypass_007_w06] Evidence records bypass_setting_used: false,
    positive_test_passed: true, and negative_test_passed: true.

negative_tests:
  - id: TSK-P2-RLS-BYPASS-007-N1
    description: >-
      Modify a fixture verifier setup to set app.bypass_rls. The verifier must exit
      non-zero and report bypass_setting_used: true.
    required: true
  - id: TSK-P2-RLS-BYPASS-007-N2
    description: >-
      Run a cross-tenant access attempt that succeeds. The verifier must exit
      non-zero and report negative_test_passed: false.
    required: true
  - id: TSK-P2-RLS-BYPASS-007-N3
    description: >-
      Run the verifier through a superuser-only or session_replication_role path.
      It must exit non-zero as inadmissible proof.
    required: true
  - id: TSK-P2-RLS-BYPASS-007-N4
    description: >-
      Run the verifier against a database where an active policy contains
      app.bypass_rls. It must exit non-zero.
    required: true

positive_tests:
  - id: TSK-P2-RLS-BYPASS-007-P1
    description: >-
      Run the verifier against the remediated runtime/database. It must emit PASS
      evidence proving same-tenant success and cross-tenant rejection without
      app.bypass_rls.
    required: true

verification:
  - >-
    # [ID rls_bypass_007_w01] [ID rls_bypass_007_w02] [ID rls_bypass_007_w03] [ID rls_bypass_007_w04] [ID rls_bypass_007_w05] [ID rls_bypass_007_w06]
    test -x scripts/audit/verify_rls_bypass_runtime_isolation.sh && bash scripts/audit/verify_rls_bypass_runtime_isolation.sh > evidence/phase2/rls_bypass_runtime_isolation.json || exit 1
  - >-
    python3 scripts/audit/validate_evidence.py --task TSK-P2-RLS-BYPASS-007 --evidence evidence/phase2/rls_bypass_runtime_isolation.json || exit 1
  - >-
    RUN_PHASE2_GATES=1 bash scripts/dev/pre_ci.sh || exit 1

evidence:
