schema_version: 1
phase: '2'
task_id: TSK-P2-RLS-BYPASS-001
title: "Inventory all app.bypass_rls dependency surfaces before remediation"
owner_role: SECURITY_GUARDIAN
status: planned
priority: CRITICAL
risk_class: SECURITY
blast_radius: CI_GATES

intent: >-
  The terminal schema contains RLS policy predicates that depend on the
  app.bypass_rls setting, which weakens inherited tenant-isolation guarantees and
  blocks truthful Phase-2 closeout. Removing the policy predicate before discovering
  all runtime, seed, admin, test, migration, and CI dependencies risks replacing an
  explicit bypass with a hidden privileged path or breaking operational flows. This
  task produces a complete dependency inventory before any remediation changes are
  attempted.

anti_patterns:
  - >-
    Removing the RLS predicate first and discovering dependent runtime or seed paths
    only after operational failures appear.
  - >-
    Treating string deletion as equivalent to removing the operational dependency on
    bypass semantics.
  - >-
    Replacing app.bypass_rls with an ambient superuser connection or hidden runtime
    privilege escalation path.
  - >-
    Emitting an inventory PASS from grep-only output without classifying each finding
    by execution surface and remediation requirement.

out_of_scope:
  - Modifying existing migrations, including 0096_rls_admin_governance.sql
  - Creating a forward-only RLS policy migration
  - Editing Program.cs or any application/runtime source file
  - Editing seed, test, CI, bootstrap, or operational scripts
  - Regenerating schema/baseline.sql
  - Removing app.bypass_rls references

stop_conditions:
  - >-
    STOP if PHASE_EXECUTION_ENVELOPE.md cannot be read and applied before inventory
    generation.
  - >-
    STOP if the verifier cannot scan schema, source, scripts, tests, CI workflow,
    and docs surfaces.
  - >-
    STOP if any finding cannot be classified as RUNTIME, ADMIN, SEED, TEST,
    MIGRATION, CI_BOOTSTRAP, DOCS, or UNKNOWN.
  - >-
    STOP if any UNKNOWN classification remains in the final evidence.
  - >-
    STOP if approval metadata is absent before editing scripts/audit/** or
    evidence/phase2/**.

proof_guarantees:
  - >-
    The evidence enumerates every discovered repository reference to app.bypass_rls
    and set_config calls that manipulate it.
  - >-
    Every finding is classified by execution surface, file path, line number,
    remediation class, and whether it is runtime-reachable.
  - >-
    The verifier exits non-zero when any finding remains UNKNOWN or when required
    scan roots are skipped.

proof_limitations:
  - >-
    This task does not remove any bypass dependency.
  - >-
    This task does not prove dynamic runtime reachability beyond static surface
    classification.
  - >-
    This task does not prove tenant isolation after remediation; later runtime proof
    tasks own that.
  - >-
    This task does not update baseline artifacts.

