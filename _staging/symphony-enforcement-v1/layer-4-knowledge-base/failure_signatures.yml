# Symphony Failure Signature Registry
# TARGET: docs/operations/failure_signatures.yml
#
# FORMAT:
#   <FAILURE_SIGNATURE>:
#     description: human-readable explanation
#     owner: team responsible for this failure class
#     first_seen: YYYY-MM-DD date this signature was first encountered
#     layer: which system layer this failure belongs to
#     typical_root_causes: list of common causes
#     remediation_playbook: path to troubleshooting doc
#     drd_level: L0 | L1 | L2 | L3
#
#     # Optional lifecycle fields (add when renaming or retiring a signature):
#     deprecated: true                     # mark as retired; index builder will warn on new casefiles
#     superseded_by: NEW.SIGNATURE.NAME   # forward-reference to replacement
#     aliases:                             # historical names that map to this signature
#       - OLD.SIGNATURE.NAME              # allows old casefiles to resolve correctly
#
# These signatures are generated by pre_ci_debug_contract.sh and stored in
# .toolchain/pre_ci_debug/failure_state.env. The build_failure_index.sh script
# uses this file to annotate rejection contexts with remediation guidance.
#
# To add a new signature: follow the format below and add an entry.
# Signatures are dot-separated namespaced identifiers matching PRECI.* or CI.*.

PRECI.DB.ENVIRONMENT:
  description: >
    Pre-CI DB/environment gate failed. Docker is not running, DATABASE_URL is
    unset, or the postgres container failed to become healthy in time.
  owner: platform
  first_seen: 2026-03-01
  layer: DB/environment
  typical_root_causes:
    - Docker Desktop not running
    - postgres container crashed or not started
    - DATABASE_URL not set in infra/docker/.env
    - Port 5432 occupied by another process
    - FRESH_DB=1 ephemeral DB creation failed
  remediation_playbook: docs/troubleshooting/preci-db-environment.md
  drd_level: L1

PRECI.BOOTSTRAP.TOOLCHAIN:
  description: >
    Toolchain bootstrap failed. A required CLI tool is missing or the
    .toolchain/bin symlink is broken.
  owner: platform
  first_seen: 2026-03-01
  layer: bootstrap/toolchain
  typical_root_causes:
    - bootstrap_local_ci_toolchain.sh not executable
    - Missing dependency (yq, ripgrep, dotnet, etc.)
    - .toolchain/bin not on PATH
  remediation_playbook: docs/troubleshooting/preci-toolchain.md
  drd_level: L1

PRECI.SOURCE_CONTROL.ORIGIN_MAIN_SYNC:
  description: >
    Git fetch of origin/main failed. Cannot compute diff against base ref.
  owner: platform
  first_seen: 2026-03-01
  layer: source-control parity
  typical_root_causes:
    - No network access to remote
    - Authentication failure (expired token)
    - origin remote URL changed
  remediation_playbook: docs/troubleshooting/preci-source-control.md
  drd_level: L1

PRECI.STRUCTURAL.CHANGE_RULE:
  description: >
    Structural change-rule gate failed. A change touches a regulated surface
    without the required approval metadata or exception.
  owner: governance
  first_seen: 2026-03-04
  layer: branch-content
  typical_root_causes:
    - Missing approval_metadata.json for regulated surface change
    - DDL change without exception or meta.yml entry
    - Migration file added without MIGRATION_HEAD update
  remediation_playbook: docs/troubleshooting/preci-change-rule.md
  drd_level: L2

PRECI.GOVERNANCE.TASK_PLAN_LOG:
  description: >
    Task plan/log presence gate failed. A task is referenced but its
    PLAN.md or EXEC_LOG.md is missing.
  owner: governance
  first_seen: 2026-03-04
  layer: shared governance state
  typical_root_causes:
    - Task created without running TASK_CREATION_PROCESS steps 3 and 5
    - PLAN.md path in meta.yml does not match actual file location
    - Task pack not fully scaffolded before implementation began
  remediation_playbook: docs/troubleshooting/preci-governance.md
  drd_level: L1

PRECI.GOVERNANCE.TASK_META_SCHEMA:
  description: >
    Task meta schema validation failed. A changed meta.yml has missing
    required fields or invalid values.
  owner: governance
  first_seen: 2026-03-04
  layer: shared governance state
  typical_root_causes:
    - Required field missing (acceptance_criteria, verification, evidence)
    - status field value not in allowed set
    - schema_version not "1"
    - Green Finance fields missing for domain:green_finance tasks
  remediation_playbook: docs/troubleshooting/preci-governance.md
  drd_level: L1

PRECI.REMEDIATION.TRACE:
  description: >
    Remediation trace gate failed. A production-affecting change was made
    without a corresponding remediation trace document.
  owner: governance
  first_seen: 2026-03-05
  layer: shared governance state
  typical_root_causes:
    - Production-affecting file changed without REM-* or TSK-* casefile
    - Casefile exists but missing required markers (failure_signature, repro_command)
    - Casefile final_status still OPEN when change is being pushed
  remediation_playbook: docs/troubleshooting/preci-remediation.md
  drd_level: L2

PRECI.REMEDIATION.FRESHNESS:
  description: >
    Remediation artifact freshness gate failed. A guarded execution surface
    was changed but the remediation artifact is stale or missing.
  owner: governance
  first_seen: 2026-03-05
  layer: shared governance state
  typical_root_causes:
    - Guarded script modified without updating its associated evidence artifact
    - Evidence artifact run_id does not match current run
    - runtime_guarded_execution_core.sh changes not accompanied by new evidence
  remediation_playbook: docs/troubleshooting/preci-remediation.md
  drd_level: L2

PRECI.AGENT.CONFORMANCE:
  description: >
    Agent conformance verification failed. An agent prompt file is missing
    required headers, references, or approval metadata.
  owner: governance
  first_seen: 2026-03-09
  layer: shared governance state
  typical_root_causes:
    - AGENTS.md or .codex/agents/*.md missing required section headers
    - approval_metadata.json has invalid ai_prompt_hash (not SHA256)
    - Regulated surface changed without Stage-A approval artifact
    - Agent running on main branch
  remediation_playbook: docs/troubleshooting/preci-conformance.md
  drd_level: L2
